function getDBKey(key) {
    return projectCode? `v6_${projectCode}_${key}` : `v6_${key}`;
}

function initProjectDB() {
    if (!localStorage.getItem(getDBKey('initialized'))) {
        localStorage.setItem(getDBKey('users'), JSON.stringify([{
            id: 1, phone: '0597087767', password: '500600', name: 'المدير العام',
            role: 'superadmin', active: true, permissions: { all: true }, printCount: {},
            dailyTotalLimit: 0, allowedBondTypes: []
        }]));
        localStorage.setItem(getDBKey('bondTypes'), '[]');
        localStorage.setItem(getDBKey('payments'), '[]');
        localStorage.setItem(getDBKey('accountants'), '[]');
        localStorage.setItem(getDBKey('funds'), '[]');
        localStorage.setItem(getDBKey('bonds'), '[]');
        localStorage.setItem(getDBKey('cashbox'), '[]');
        localStorage.setItem(getDBKey('company'), JSON.stringify({"name":"سندات برو","address":"","cr":"","logo":""}));
        localStorage.setItem(getDBKey('printSettings'), JSON.stringify({"allowMultiplePrint":false,"maxPrints":1,"hideSignatures":true,"customHeaders":{"title":"","subtitle":""},"showQR":true,"qrPosition":"bottom-left","autoGenerateQR":true}));
        localStorage.setItem(getDBKey('initialized'), 'true');
    }
}

let db = {
    get users() { return JSON.parse(localStorage.getItem(getDBKey('users')) || '[]'); },
    set users(val) { localStorage.setItem(getDBKey('users'), JSON.stringify(val)); },
    get bondTypes() { return JSON.parse(localStorage.getItem(getDBKey('bondTypes')) || '[]'); },
    set bondTypes(val) { localStorage.setItem(getDBKey('bondTypes'), JSON.stringify(val)); },
    get payments() { return JSON.parse(localStorage.getItem(getDBKey('payments')) || '[]'); },
    set payments(val) { localStorage.setItem(getDBKey('payments'), JSON.stringify(val)); },
    get accountants() { return JSON.parse(localStorage.getItem(getDBKey('accountants')) || '[]'); },
    set accountants(val) { localStorage.setItem(getDBKey('accountants'), JSON.stringify(val)); },
    get funds() { return JSON.parse(localStorage.getItem(getDBKey('funds')) || '[]'); },
    set funds(val) { localStorage.setItem(getDBKey('funds'), JSON.stringify(val)); },
    get bonds() { return JSON.parse(localStorage.getItem(getDBKey('bonds')) || '[]'); },
    set bonds(val) { localStorage.setItem(getDBKey('bonds'), JSON.stringify(val)); },

    set printSettings(val) { localStorage.setItem(getDBKey('printSettings'), JSON.stringify(val)); }

function saveDB() {
    updateCompanyDisplay();
}

function setLang(lang) {
    currentLang = lang;
    localStorage.setItem('v6_lang', lang);
    document.documentElement.lang = lang;
    document.documentElement.dir = ['ar','ur','fa'].includes(lang)? 'rtl' : 'ltr';
    document.getElementById('languageScreen').classList.add('hidden');
    document.getElementById('loginScreen').classList.remove('hidden');
    applyTranslations();
    updateCompanyDisplay();
    updateProjectInfo();
}

function showLangScreen() {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('languageScreen').classList.remove('hidden');
}

function applyTranslations() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = translations[currentLang][el.dataset.i18n] || el.textContent;
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        el.placeholder = translations[currentLang][el.dataset.i18nPlaceholder] || el.placeholder;
    });
}

function updateProjectInfo() {
    const modeText = projectMode === 'single'? 'مشروع فردي' : 'مشروع متصل';
    document.getElementById('projectInfo').textContent = `${modeText}`;
    document.getElementById('projectInfoHeader').textContent = `${modeText} | ${projectCode}`;
}

function updateCompanyDisplay() {
    const name = db.company.name || translations[currentLang].app_name;
    document.getElementById('companyNameLogin').textContent = name;
    document.getElementById('companyNameHeader').textContent = name;
    document.title = name;
    if (db.company.logo) {
        document.getElementById('loginLogo').src = db.company.logo;
        document.getElementById('loginLogo').classList.remove('hidden');
        document.getElementById('headerLogo').src = db.company.logo;
        document.getElementById('headerLogo').classList.remove('hidden');
    }
}

function login() {
    const phone = document.getElementById('loginPhone').value.trim();
    const pass = document.getElementById('loginPass').value.trim();
    const user = db.users.find(u => u.phone === phone && u.password === pass);
    if (!user) return Swal.fire('خطأ', 'رقم الجوال أو كلمة المرور خطأ', 'error');
    if (!user.active) return Swal.fire('موقوف', 'حسابك موقوف. راجع الإدارة', 'error');
    currentUser = user;
    if (!currentUser.printCount) currentUser.printCount = {};
    if (!currentUser.allowedBondTypes) currentUser.allowedBondTypes = [];
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');
    document.getElementById('userName').textContent = user.name;
    document.getElementById('userRole').textContent = user.role === 'superadmin'? 'مدير عام' : user.role === 'manager'? 'مدير' : 'مندوب';

    if (user.role === 'delegate') {
        document.getElementById('delegateTabs').classList.remove('hidden');
        showTab('createBond');
    } else {
        document.getElementById('adminTabs').classList.remove('hidden');
        showTab('dashboard');
    }

    if (user.role === 'superadmin') {
        document.getElementById('superAdminOnly').classList.remove('hidden');
    }

    applyTranslations();
    updateCompanyDisplay();
    updateProjectInfo();
}

function logout() {
    localStorage.removeItem('v6_currentUser');
    location.reload();
}

function showCreateProject() {
    if (currentUser.role!== 'superadmin') {
        Swal.fire('خطأ', 'فقط المدير العام يستطيع إنشاء مشاريع جديدة', 'error');
        return;
    }
    const newCode = 'PROJ-' + Date.now();
    Swal.fire({
        title: 'إنشاء مشروع جديد',
        html: `
            <p class="mb-4">سيتم إنشاء مشروع جديد بكود:</p>
            <input value="${newCode}" class="swal2-input text-center font-bold" readonly>
            <p class="text-sm text-gray-600 mt-4">انسخ الكود وشاركه مع فريقك</p>
        `,

function checkDelegateLimits() {
    if (currentUser.role!== 'delegate') return { allowed: true };
    const today = new Date().toLocaleDateString('ar-SA');
    if (currentUser.bondsTodayDate!== today) {
        currentUser.bondsToday = 0;
        currentUser.bondsTodayAmount = 0;
        currentUser.bondsTodayDate = today;
    }
    if (currentUser.dailyLimit > 0 && currentUser.bondsToday >= currentUser.dailyLimit) {
        return { allowed: false, reason: `وصلت للسقف اليومي: ${currentUser.dailyLimit} سند` };
    }
    if (currentUser.dailyAmountLimit > 0 && (currentUser.bondsTodayAmount || 0) >= currentUser.dailyAmountLimit) {
        return { allowed: false, reason: `وصلت للحد الأقصى لإجمالي المبالغ اليوم: ${currentUser.dailyAmountLimit} ريال` };
    }
    return { allowed: true };
}

function renderCreateBond() {
    const limitCheck = checkDelegateLimits();
    if (!limitCheck.allowed) {
        return `<div class="bg-red-100 border-red-400 text-red-700 px-4 py-3 rounded">${limitCheck.reason}</div>`;
    }

    const remainingCount = currentUser.dailyLimit > 0? currentUser.dailyLimit - (currentUser.bondsToday || 0) : null;
    const remainingAmount = currentUser.dailyAmountLimit > 0? currentUser.dailyAmountLimit - (currentUser.bondsTodayAmount || 0) : null;
    const allowedPayments = currentUser.allowedPayments?.length? db.payments.filter(p => currentUser.allowedPayments.includes(p.name)) : db.payments;
    const allowedBondTypes = currentUser.allowedBondTypes?.length? db.bondTypes.filter(t => currentUser.allowedBondTypes.includes(t.id)) : db.bondTypes;

<textarea id="bond-desc" placeholder="البيان" class="border-2 p-3 rounded-lg md:col-span-2" rows="3"></textarea>

function saveBond() {
    const typeId = document.getElementById('bond-type').value;
    const amount = parseFloat(document.getElementById('bond-amount').value);
    const bondTypeEl = document.getElementById('bond-type');
    const bondTypeName = bondTypeEl.options[bondTypeEl.selectedIndex].dataset.name;
    const bondType = db.bondTypes.find(t => t.id == typeId);

    if (!bondType) return Swal.fire('خطأ', 'اختر نوع السند', 'error');
    if (!amount || amount <= 0) return Swal.fire('خطأ', 'اكتب المبلغ', 'error');

    const limitCheck = checkDelegateLimits();
    if (!limitCheck.allowed) return Swal.fire('موقوف', limitCheck.reason, 'error');

    if (currentUser.maxAmount > 0 && amount > currentUser.maxAmount) {
        return Swal.fire('خطأ', `المبلغ يتجاوز الحد المسموح للسند: ${currentUser.maxAmount} ريال`, 'error');
    }

    const todayAmount = (currentUser.bondsTodayAmount || 0);
    if (currentUser.dailyAmountLimit > 0 && (todayAmount + amount) > currentUser.dailyAmountLimit) {
        return Swal.fire('خطأ', `إجمالي المبالغ اليوم سيتجاوز الحد: ${currentUser.dailyAmountLimit} ريال`, 'error');
    }

    if (bondType.current > bondType.end) return Swal.fire('خطأ', 'انتهى تسلسل هذا النوع', 'error');

    const bondId = Date.now();
    const isQabdh = bondTypeName.includes('قبض') || bondTypeName.includes('قيد') || bondTypeName.includes('+');
    const isSarf = bondTypeName.includes('صرف') || bondTypeName.includes('-');

    const bond = {
        id: bondId, number: bondType.current, type: bondType.name, typeName: bondTypeName, amount: amount,
        clientName: document.getElementById('bond-client').value, clientPhone: document.getElementById('bond-client-phone').value,
        clientAccount: document.getElementById('bond-client-account').value, payment: document.getElementById('bond-payment').value,
        accountant: document.getElementById('bond-accountant').value, fund: document.getElementById('bond-fund').value,
        description: document.getElementById('bond-desc').value, supplied: false, verified: false,
        isQabdh: isQabdh, isSarf: isSarf, userId: currentUser.id, userName: currentUser.name,
        date: new Date().toLocaleString('ar-SA'), qrData: `${window.location.origin}${window.location.pathname}?project=${projectCode}&bond=${bondId}`,
        printCount: {}, projectCode: projectCode
    };

    if (!bond.clientName) return Swal.fire('خطأ', 'اكتب اسم العميل', 'error');

    const currentBonds = db.bonds;
    currentBonds.push(bond);
    db.bonds = currentBonds;

    const currentTypes = db.bondTypes;
    const typeIdx = currentTypes.findIndex(t => t.id == typeId);
    currentTypes[typeIdx].current++;
    db.bondTypes = currentTypes;

    currentUser.bondsToday = (currentUser.bondsToday || 0) + 1;
    currentUser.bondsTodayAmount = (currentUser.bondsTodayAmount || 0) + amount;
    currentUser.bondsTodayDate = new Date().toLocaleDateString('ar-SA');

    const users = db.users;
    const idx = users.findIndex(u => u.id === currentUser.id);
    users[idx] = currentUser;
    db.users = users;

    updateCashbox(bond);
    saveDB();
    Swal.fire('تم', `تم إنشاء السند رقم ${bond.number}`, 'success').then(() => showTab('myBonds'));
}

function updateCashbox(bond) {
    const cashbox = db.cashbox;
    const entry = {
        id: Date.now(),
        bondId: bond.id,
        bondNumber: bond.number,
        type: bond.type,
        amount: bond.amount,
        isQabdh: bond.isQabdh,
        isSarf: bond.isSarf,
        description: bond.description,
        date: bond.date,
        userId: bond.userId,
        userName: bond.userName,
        projectCode: projectCode
    };
    cashbox.push(entry);
    db.cashbox = cashbox;
}

    const reader = new FileReader();
    reader.onload = function(e) {
        const base64 = e.target.result;
        document.getElementById('comp-logo').value = base64;
        document.getElementById('logo-preview').src = base64;
        document.getElementById('logo-preview').classList.remove('hidden');
        Swal.fire('تم', 'تم رفع الشعار. اضغط حفظ الإعدادات لتأكيد الحفظ', 'success');

    reader.readAsDataURL(file);

function printBond(id) {
    const bond = db.bonds.find(b => b.id === id);
    const settings = db.printSettings;
    const printCount = bond.printCount[currentUser.id] || 0;

    if (!settings.allowMultiplePrint && printCount > 0) {
        return Swal.fire('خطأ', 'تم طباعة هذا السند من قبل', 'error');
    }

    const maxPrints = settings.maxPrints || 1;
    if (settings.allowMultiplePrint && printCount >= maxPrints) {
        return Swal.fire('خطأ', `تجاوزت الحد الأقصى للطباعة (${maxPrints} مرات)`, 'error');
    }

    bond.printCount[currentUser.id] = printCount + 1;
    const bonds = db.bonds;
    const idx = bonds.findIndex(b => b.id === id);
    bonds[idx] = bond;
    db.bonds = bonds;
    saveDB();

    const printWindow = window.open('', '_blank');
    printWindow.document.write(generateBondHTML(bond, true));
    printWindow.document.close();

    setTimeout(() => {
        const canvas = printWindow.document.getElementById('qrcanvas');
        if (canvas) {
            QRCode.toCanvas(canvas, bond.qrData, { width: 120, margin: 1 }, () => {
                printWindow.print();
            });
        } else {
            printWindow.print();
        }
    }, 500);
}

        filename: `سند-${bond.type}-${bond.number}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true, letterRendering: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = generateBondHTML(bond, false);
    document.body.appendChild(tempDiv);

    setTimeout(() => {
        const canvas = tempDiv.querySelector('#qrcanvas');
        if (canvas) {
            QRCode.toCanvas(canvas, bond.qrData, { width: 120, margin: 1 }, () => {
                html2pdf().set(opt).from(tempDiv).save().then(() => {
                    document.body.removeChild(tempDiv);
                });
            });
        } else {
            html2pdf().set(opt).from(tempDiv).save().then(() => {
                document.body.removeChild(tempDiv);
            });
        }
    }, 500);
}

function printQR(id) {
    const bond = db.bonds.find(b => b.id === id);
    const qrWindow = window.open('', '_blank');
    qrWindow.document.write(`
        <!DOCTYPE html>
        <html dir="rtl">
        <head>
            <meta charset="UTF-8">
            <title>QR Code - سند ${bond.number}</title>
            <style>
                body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: Cairo, Arial; }
           .qr-container { text-align: center; }
                h3 { margin-bottom: 20px; }
            </style>
        </head>
        <body>
            <div class="qr-container">
                <h3>سند ${bond.type} #${bond.number}</h3>
                <canvas id="qrcode"></canvas>
                <p style="margin-top:10px">${bond.clientName} - ${bond.amount} ريال</p>
            </div>
        </body>
        </html>
    `);
    qrWindow.document.close();
    setTimeout(() => {
        QRCode.toCanvas(qrWindow.document.getElementById('qrcode'), bond.qrData, { width: 300, margin: 2 }, () => {
            qrWindow.print();
        });
    }, 500);
}

function sendWhatsApp(phone, bondId) {
    const bond = db.bonds.find(b => b.id === bondId);
    const bondUrl = `${window.location.origin}${window.location.pathname}?project=${projectCode}&bond=${bondId}`;
    const message = `سند ${bond.type} رقم ${bond.number}\nالمبلغ: ${bond.amount} ريال\nالعميل: ${bond.clientName}\n\nلعرض السند:\n${bondUrl}`;
    const whatsappUrl = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
    window.open(whatsappUrl, '_blank');
}

function verifyBond(id) {
    const bonds = db.bonds;
    const bond = bonds.find(b => b.id === id);
    if (bond.isQabdh) {
        bond.supplied =!bond.supplied;
    } else {
        bond.verified =!bond.verified;
    }
    db.bonds = bonds;
    saveDB();
    showTab(currentUser.role === 'delegate'? 'myBonds' : 'bonds');
}

function deleteBond(id) {
    Swal.fire({
        title: 'متأكد؟',
        text: 'سيتم حذف السند نهائياً',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'نعم احذف',
        cancelButtonText: 'إلغاء'
    }).then((result) => {
        if (result.isConfirmed) {
            db.bonds = db.bonds.filter(b => b.id!== id);
            db.cashbox = db.cashbox.filter(c => c.bondId!== id);
            saveDB();
            showTab('bonds');
            Swal.fire('تم الحذف', '', 'success');
        }
    });
}

window.onload = () => {
    const urlParams = new URLSearchParams(window.location.search);
    const projectParam = urlParams.get('project');
    const bondParam = urlParams.get('bond');

    if (projectParam && bondParam) {
        projectCode = projectParam;
        projectMode = 'connected';
        localStorage.setItem('v6_project_code', projectCode);
        localStorage.setItem('v6_project_mode', projectMode);
        initProjectDB();
        viewBondByUrl();
    } else if (projectParam) {
        projectCode = projectParam;
        projectMode = 'connected';
        localStorage.setItem('v6_project_code', projectCode);
        localStorage.setItem('v6_project_mode', projectMode);
        initProjectDB();
        showLangScreen();
    } else {
        const savedMode = localStorage.getItem('v6_project_mode');
        if (savedMode) {
            projectMode = savedMode;
            projectCode = localStorage.getItem('v6_project_code');
            initProjectDB();
            showLangScreen();
        } else {
            document.getElementById('loadingScreen').classList.add('hidden');
            document.getElementById('languageScreen').classList.remove('hidden');
        }
    }
};
</script>
