    document.querySelectorAll('[data-i18n]').forEach(el => {

    });
}

function login() {
    const phone = document.getElementById('loginPhone').value.trim();
    const pass = document.getElementById('loginPass').value.trim();
    const user = db.users.find(u => u.phone === phone && u.password === pass);

    if (!user) return Swal.fire('خطأ', 'رقم الجوال أو كلمة المرور خطأ', 'error');
    if (!user.active) return Swal.fire('موقوف', 'حسابك موقوف. راجع الإدارة', 'error');

    currentUser = user;
    if (!currentUser.printCount) currentUser.printCount = {};

    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');
    document.getElementById('userName').textContent = user.name;
    document.getElementById('userRole').textContent = user.role === 'superadmin'? 'مدير عام' : user.role === 'manager'? 'مدير' : 'مندوب';

    if (user.role === 'delegate') {
        document.getElementById('delegateTabs').classList.remove('hidden');
        showTab('createBond');
    } else {
        document.getElementById('adminTabs').classList.remove('hidden');
        showTab('dashboard');
    }
    applyTranslations();
}

            const newPass = document.getElementById('newPass').value;
            if (!newPass || newPass.length < 4) Swal.showValidationMessage('كلمة المرور قصيرة');
            return newPass;
        }
    }).then((result) => {
        if (result.isConfirmed) {
            currentUser.password = result.value;
            const idx = db.users.findIndex(u => u.id === currentUser.id);
            db.users[idx] = currentUser;
            saveDB();
            Swal.fire('تم', 'تم تغيير كلمة المرور', 'success');
        }
    });

// ===== صندوق الحركة =====
function updateCashbox(bond) {
    const affectsCashbox = ['قبض', 'صرف', 'فاتورة'].includes(bond.type);
    if (!affectsCashbox) return;
    db.cashbox.push({
        id: Date.now(),
        bondId: bond.id,
        bondNumber: bond.number,
        type: bond.type,
        amount: bond.amount,
        description: bond.description,
        date: bond.date,
        userName: bond.userName
    });
    saveDB();
}

function renderCashbox() {
    const total = db.cashbox.reduce((sum, t) => sum + (t.type === 'قبض' || t.type === 'فاتورة'? t.amount : -t.amount), 0);
    return `<div class="bg-white rounded-lg shadow p-6">
        <div class="flex justify-between mb-4">
            <h2 class="text-xl font-bold">${translations[currentLang].cashbox}</h2>
            <div class="flex gap-2">

                        <td class="p-2">${t.date}</td>
                        <td class="p-2">${t.userName}</td>

// ===== إنشاء سند مع QR تلقائي + قيود المناديب =====
function renderCreateBond() {
    const today = new Date().toLocaleDateString('ar-SA');
    if (currentUser.bondsTodayDate!== today) {
        currentUser.bondsToday = 0;
        currentUser.bondsTodayDate = today;
    }

    // حساب إجمالي مبالغ السندات غير الموردة للمندوب
    const userBonds = db.bonds.filter(b => b.userId === currentUser.id &&!b.supplied);
    const totalAmount = userBonds.reduce((sum, b) => sum + b.amount, 0);

    if (currentUser.dailyLimit > 0 && currentUser.bondsToday >= currentUser.dailyLimit) {
        return `<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">وصلت للسقف اليومي: ${currentUser.dailyLimit} سند</div>`;
    }

    if (currentUser.maxTotalAmount > 0 && totalAmount >= currentUser.maxTotalAmount) {
        return `<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">تجاوزت الحد الأقصى لإجمالي المبالغ: ${currentUser.maxTotalAmount} ريال. المبلغ الحالي: ${totalAmount} ريال. ورّد بعض السندات لفتح الإنشاء</div>`;
    }

    // فلترة أنواع السندات المسموحة للمندوب
    let allowedTypes = db.bondTypes;
    if (currentUser.role === 'delegate' && currentUser.allowedBondTypes && currentUser.allowedBondTypes.length > 0) {
        allowedTypes = db.bondTypes.filter(t => currentUser.allowedBondTypes.includes(t.id));
    }

    const allowedPayments = currentUser.allowedPayments?.length? db.payments.filter(p => currentUser.allowedPayments.includes(p.name)) : db.payments;

    return `<div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-xl font-bold mb-4">${translations[currentLang].create_bond}</h2>
        ${currentUser.dailyLimit? `<div class="bg-blue-50 p-3 rounded mb-4 text-sm">المتبقي اليوم: ${currentUser.dailyLimit - currentUser.bondsToday} من ${currentUser.dailyLimit} سند | الحد الأقصى للمبلغ: ${currentUser.maxAmount || 'غير محدد'} ريال | إجمالي غير المورد: ${totalAmount} من ${currentUser.maxTotalAmount || '∞'} ريال</div>` : ''}
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <select id="bond-type" class="border-2 p-3 rounded-lg"><option value="">نوع السند</option>${allowedTypes.map(t=>`<option value="${t.id}">${t.name}</option>`).join('')}</select>
            <input id="bond-amount" type="number" placeholder="المبلغ" class="border-2 p-3 rounded-lg">
            <input id="bond-client" placeholder="اسم العميل" class="border-2 p-3 rounded-lg">
            <input id="bond-client-phone" placeholder="رقم العميل للواتساب" class="border-2 p-3 rounded-lg">

async function saveBond() {
    const typeId = document.getElementById('bond-type').value;
    const amount = parseFloat(document.getElementById('bond-amount').value);
    const bondType = db.bondTypes.find(t => t.id == typeId);

    if (!bondType) return Swal.fire('خطأ', 'اختر نوع السند', 'error');
    if (!amount || amount <= 0) return Swal.fire('خطأ', 'اكتب المبلغ', 'error');
    if (currentUser.maxAmount > 0 && amount > currentUser.maxAmount) return Swal.fire('خطأ', `المبلغ يتجاوز الحد المسموح: ${currentUser.maxAmount} ريال`, 'error');
    if (bondType.current > bondType.end) return Swal.fire('خطأ', 'انتهى تسلسل هذا النوع', 'error');

    // تحقق من التوتال
    const userBonds = db.bonds.filter(b => b.userId === currentUser.id &&!b.supplied);
    const totalAmount = userBonds.reduce((sum, b) => sum + b.amount, 0);
    if (currentUser.maxTotalAmount > 0 && (totalAmount + amount) > currentUser.maxTotalAmount) {
        return Swal.fire('خطأ', `سيتجاوز إجمالي مبالغك الحد المسموح: ${currentUser.maxTotalAmount} ريال`, 'error');
    }

    const bond = {
        id: Date.now(), number: bondType.current, type: bondType.name,
        amount: amount,
        clientName: document.getElementById('bond-client').value,
        clientPhone: document.getElementById('bond-client-phone').value,
        clientAccount: document.getElementById('bond-client-account').value,
        payment: document.getElementById('bond-payment').value,
        accountant: document.getElementById('bond-accountant').value,
        fund: document.getElementById('bond-fund').value,
        description: document.getElementById('bond-desc').value,
        supplied: document.getElementById('bond-supplied').value === 'true',
        userId: currentUser.id, userName: currentUser.name,
        date: new Date().toLocaleString('ar-SA'),
        qrData: '', qrBase64: '',
        printCount: {}
    };

    if (!bond.clientName) return Swal.fire('خطأ', 'اكتب اسم العميل', 'error');

    // توليد QR تلقائي لو مفعل في الإعدادات
    if (db.company.autoQR) {
        bond.qrData = `${window.location.origin}${window.location.pathname}#bond/${bond.id}`;
        try {
            bond.qrBase64 = await QRCode.toDataURL(bond.qrData, {width: 200});
        } catch(e) { console.error('QR Error:', e); }
    }

    db.bonds.push(bond);
    bondType.current++;
    currentUser.bondsToday = (currentUser.bondsToday || 0) + 1;
    currentUser.bondsTodayDate = new Date().toLocaleDateString('ar-SA');

    const idx = db.users.findIndex(u => u.id === currentUser.id);
    db.users[idx] = currentUser;

    updateCashbox(bond);
    saveDB();
    Swal.fire('تم', `تم إنشاء السند رقم ${bond.number}`, 'success').then(() => showTab('myBonds'));
}

        'التاريخ': t.date,
        'المندوب': t.userName
    })));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'صندوق الحركة');
    XLSX.writeFile(wb, 'cashbox.xlsx');
}

function backupDatabase() {
    const backup = {
        users: db.users,
        bondTypes: db.bondTypes,
        payments: db.payments,
        accountants: db.accountants,
        funds: db.funds,
        bonds: db.bonds,
        cashbox: db.cashbox,
        company: db.company,
        printSettings: db.printSettings,
        soundSettings: db.soundSettings,
        exportDate: new Date().toISOString()
    };
    const blob = new Blob([JSON.stringify(backup, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `sanadat-backup-${new Date().toISOString().split('T')[0]}.json`;
    a.click();
}

// ===== إدارة المناديب مع قيود أنواع السندات + توتال المبالغ =====
function renderDelegates() {
    const delegates = db.users.filter(u => u.role === 'delegate');
    return `<div class="bg-white rounded-lg shadow p-6">
        <div class="flex justify-between mb-4"><h2 class="text-xl font-bold">${translations[currentLang].delegates}</h2>
        <button onclick="addUser('delegate');playSound()" class="bg-green-600 text-white px-4 py-2 rounded-lg">+ إضافة مندوب</button>
        </div>
        <div class="space-y-2">${delegates.map(d => {
            const userBonds = db.bonds.filter(b => b.userId === d.id &&!b.supplied);
            const totalAmount = userBonds.reduce((sum, b) => sum + b.amount, 0);
            return `
            <div class="border p-4 rounded-lg">
                <div class="flex justify-between items-start mb-2">
                    <div>
                        <div class="font-bold text-lg">${d.name} ${d.active? '<span class="text-green-600 text-sm">● نشط</span>' : '<span class="text-red-600 text-sm">● موقوف</span>'}</div>
                        <div class="text-sm text-gray-600">${d.phone}</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editDelegate(${d.id});playSound()" class="bg-blue-500 text-white px-3 py-1 rounded text-sm">تعديل</button>
                        <button onclick="toggleUserActive(${d.id});playSound()" class="${d.active? 'bg-orange-500' : 'bg-green-500'} text-white px-3 py-1 rounded text-sm">${d.active? 'إيقاف' : 'تنشيط'}</button>
                        <button onclick="deleteUser(${d.id});playSound()" class="bg-red-500 text-white px-3 py-1 rounded text-sm">حذف</button>
                    </div>
                </div>
                <div class="text-xs text-gray-500 grid grid-cols-2 gap-2">
                    <div>السقف اليومي: ${d.dailyLimit || 'غير محدد'} سند</div>
                    <div>أكبر مبلغ للسند: ${d.maxAmount || 'غير محدد'} ريال</div>
                    <div>إجمالي غير المورد: <span class="${d.maxTotalAmount > 0 && totalAmount >= d.maxTotalAmount? 'text-red-600 font-bold' : 'text-green-600'}">${totalAmount} من ${d.maxTotalAmount || '∞'} ريال</span></div>
                    <div>سندات اليوم: ${d.bondsToday || 0} من ${d.dailyLimit || '∞'}</div>
                    <div class="col-span-2">طرق الدفع: ${d.allowedPayments?.join(', ') || 'الكل'}</div>
                    <div class="col-span-2">أنواع السندات: ${d.allowedBondTypes?.length? d.allowedBondTypes.map(id => db.bondTypes.find(t=>t.id===id)?.name).join(', ') : 'الكل'}</div>
                </div>
            </div>`}).join('') || '<p class="text-gray-500 text-center py-8">لا يوجد مناديب</p>'}
        </div></div>`;
}

function editDelegate(id) {
    const d = db.users.find(u => u.id === id);
    const paymentsOptions = db.payments.map(p => `<label class="flex items-center gap-2 text-sm"><input type="checkbox" value="${p.name}" class="payment-check" ${d.allowedPayments?.includes(p.name)? 'checked' : ''}> ${p.name}</label>`).join('');
    const bondTypesOptions = db.bondTypes.map(t => `<label class="flex items-center gap-2 text-sm"><input type="checkbox" value="${t.id}" class="bondtype-check" ${d.allowedBondTypes?.includes(t.id)? 'checked' : ''}> ${t.name}</label>`).join('');

    Swal.fire({
        title: 'تعديل المندوب: ' + d.name,
        html: `
            <input id="swal-name" class="swal2-input" placeholder="الاسم" value="${d.name}">
            <input id="swal-phone" class="swal2-input" placeholder="رقم الجوال" value="${d.phone}">
            <input id="swal-limit" type="number" class="swal2-input" placeholder="السقف اليومي لعدد السندات" value="${d.dailyLimit || ''}">
            <input id="swal-maxamount" type="number" class="swal2-input" placeholder="أكبر مبلغ للسند الواحد" value="${d.maxAmount || ''}">
            <input id="swal-maxtotal" type="number" class="swal2-input" placeholder="الحد الأقصى لإجمالي المبالغ غير الموردة" value="${d.maxTotalAmount || ''}">
            <div class="text-right mt-3 mb-1 font-bold text-sm">طرق الدفع المتاحة:</div>
            <div class="text-right max-h-32 overflow-y-auto">${paymentsOptions || 'لا توجد طرق دفع'}</div>
            <div class="text-right mt-3 mb-1 font-bold text-sm">أنواع السندات المسموحة:</div>
            <div class="text-right max-h-32 overflow-y-auto">${bondTypesOptions || 'لا توجد أنواع'}</div>
        `,
        confirmButtonText: 'حفظ',
        width: '600px',
        preConfirm: () => {
            return {
                name: document.getElementById('swal-name').value,
                phone: document.getElementById('swal-phone').value,
                limit: parseInt(document.getElementById('swal-limit').value) || 0,
                maxAmount: parseInt(document.getElementById('swal-maxamount').value) || 0,
                maxTotalAmount: parseInt(document.getElementById('swal-maxtotal').value) || 0,
                allowedPayments: Array.from(document.querySelectorAll('.payment-check:checked')).map(cb => cb.value),
                allowedBondTypes: Array.from(document.querySelectorAll('.bondtype-check:checked')).map(cb => parseInt(cb.value))
            };
        }
    }).then((result) => {
        if (result.isConfirmed) {
            Object.assign(d, result.value);
            saveDB();
            showTab('delegates');
            Swal.fire('تم', 'تم تحديث بيانات المندوب', 'success');
        }
    });
}

function addUser(role) {
    const paymentsOptions = db.payments.map(p => `<label class="flex items-center gap-2 text-sm"><input type="checkbox" value="${p.name}" class="payment-check"> ${p.name}</label>`).join('');
    const bondTypesOptions = db.bondTypes.map(t => `<label class="flex items-center gap-2 text-sm"><input type="checkbox" value="${t.id}" class="bondtype-check"> ${t.name}</label>`).join('');
    Swal.fire({
        title: `إضافة ${role === 'manager'? 'مدير' : 'مندوب'} جديد`,
        html: `
            <input id="swal-name" class="swal2-input" placeholder="الاسم">
            <input id="swal-phone" class="swal2-input" placeholder="رقم الجوال 05xxxxxxxx">
            ${role === 'delegate'? `
                <input id="swal-limit" type="number" class="swal2-input" placeholder="السقف اليومي لعدد السندات">
                <input id="swal-maxamount" type="number" class="swal2-input" placeholder="أكبر مبلغ للسند الواحد">
                <input id="swal-maxtotal" type="number" class="swal2-input" placeholder="الحد الأقصى لإجمالي المبالغ غير الموردة">
                <div class="text-right mt-3 mb-1 font-bold text-sm">طرق الدفع المتاحة:</div>
                <div class="text-right max-h-24 overflow-y-auto">${paymentsOptions || 'لا توجد طرق دفع. أضفها أولاً'}</div>
                <div class="text-right mt-3 mb-1 font-bold text-sm">أنواع السندات المسموحة:</div>
                <div class="text-right max-h-24 overflow-y-auto">${bondTypesOptions || 'لا توجد أنواع'}</div>
            ` : ''}
        `,
        confirmButtonText: 'إضافة',
        width: '600px',
        preConfirm: () => {
            const name = document.getElementById('swal-name').value;
            const phone = document.getElementById('swal-phone').value;
            if (!name ||!phone) Swal.showValidationMessage('املأ الاسم والجوال');
            if (db.users.find(u => u.phone === phone)) Swal.showValidationMessage('رقم الجوال مسجل مسبقاً');
            return {
                name, phone,
                limit: parseInt(document.getElementById('swal-limit')?.value) || 0,
                maxAmount: parseInt(document.getElementById('swal-maxamount')?.value) || 0,
                maxTotalAmount: parseInt(document.getElementById('swal-maxtotal')?.value) || 0,
                allowedPayments: Array.from(document.querySelectorAll('.payment-check:checked')).map(cb => cb.value),
                allowedBondTypes: Array.from(document.querySelectorAll('.bondtype-check:checked')).map(cb => parseInt(cb.value))
            };
        }
    }).then((result) => {
        if (result.isConfirmed) {
            db.users.push({
                id: Date.now(), phone: result.value.phone, password: '123456',
                name: result.value.name, role: role, active: true,
                dailyLimit: result.value.limit,
                maxAmount: result.value.maxAmount,
                maxTotalAmount: result.value.maxTotalAmount,
                allowedPayments: result.value.allowedPayments,
                allowedBondTypes: result.value.allowedBondTypes,
                bondsToday: 0, bondsTodayDate: '', printCount: {}
            });
            saveDB();
            showTab(role === 'manager'? 'managers' : 'delegates');
            Swal.fire('تم', 'تمت الإضافة. كلمة المرور: 123456', 'success');
        }
    });
}

function toggleUserActive(id) {
    const user = db.users.find(u => u.id === id);
    user.active =!user.active;
    saveDB();
    showTab('delegates');
}

function deleteUser(id) {
    Swal.fire({title: 'متأكد؟', text: 'سيتم حذف المستخدم نهائياً', icon: 'warning', showCancelButton: true, confirmButtonText: 'نعم احذف', cancelButtonText: 'إلغاء'}).then((result) => {
        if (result.isConfirmed) {
            db.users = db.users.filter(u => u.id!== id);
            saveDB(); showTab('delegates');
            Swal.fire('تم الحذف', '', 'success');
        }
    });
}

function renderManagers() {
    const managers = db.users.filter(u => u.role === 'manager');
    return `<div class="bg-white rounded-lg shadow p-6">
        <div class="flex justify-between mb-4"><h2 class="text-xl font-bold">${translations[currentLang].managers}</h2>
        ${currentUser.role === 'superadmin'? '<button onclick="addUser(\'manager\');playSound()" class="bg-green-600 text-white px-4 py-2 rounded-lg">+ إضافة مدير</button>' : ''}
        </div>
        <div class="space-y-2">${managers.map(m => `
            <div class="border p-4 rounded-lg flex justify-between items-center">
                <div><div class="font-bold">${m.name}</div><div class="text-sm text-gray-600">${m.phone}</div></div>
                ${currentUser.role === 'superadmin'? `<button onclick="deleteUser(${m.id});playSound()" class="bg-red-500 text-white px-3 py-1 rounded">حذف</button>` : ''}
            </div>`).join('') || '<p class="text-gray-500 text-center py-8">لا يوجد مدراء</p>'}
        </div></div>`;
}

function renderBondTypes() {
    return `<div class="bg-white rounded-lg shadow p-6">
        <div class="flex justify-between mb-4"><h2 class="text-xl font-bold">${translations[currentLang].bond_types}</h2>
        <button onclick="addBondType();playSound()" class="bg-green-600 text-white px-4 py-2 rounded-lg">+ إضافة نوع</button></div>
        <div class="space-y-2">${db.bondTypes.map(bt => `
            <div class="border p-4 rounded-lg">
                <div class="flex justify-between items-start">
                    <div>
                        <div class="font-bold text-lg">${bt.name}</div>
                        <div class="text-sm text-gray-600">التسلسل: ${bt.start} → ${bt.end} | الحالي: ${bt.current}</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editBondType(${bt.id});playSound()" class="bg-blue-500 text-white px-3 py-1 rounded text-sm">تعديل</button>
                        <button onclick="deleteBondType(${bt.id});playSound()" class="bg-red-500 text-white px-3 py-1 rounded text-sm">حذف</button>
                    </div>
                </div>
            </div>`).join('') || '<p class="text-gray-500 text-center py-8">لا توجد أنواع</p>'}
        </div></div>`;
}

function addBondType() {
    Swal.fire({
        title: 'إضافة نوع سند',
        html: `
            <input id="bt-name" class="swal2-input" placeholder="اسم النوع: قبض/صرف">
            <input id="bt-start" type="number" class="swal2-input" placeholder="بداية التسلسل">
            <input id="bt-end" type="number" class="swal2-input" placeholder="نهاية التسلسل">
        `,
        preConfirm: () => {
            return {
                name: document.getElementById('bt-name').value,
                start: parseInt(document.getElementById('bt-start').value),
                end: parseInt(document.getElementById('bt-end').value),
                current: parseInt(document.getElementById('bt-start').value)
            };
        }
    }).then((result) => {
        if (result.isConfirmed) {
            db.bondTypes.push({id: Date.now(),...result.value});
            saveDB(); showTab('bondTypes');
        }
    });
}

function editBondType(id) {
    const bt = db.bondTypes.find(t => t.id === id);
    Swal.fire({
        title: 'تعديل نوع السند',
        html: `
            <input id="bt-name" class="swal2-input" placeholder="اسم النوع" value="${bt.name}">
            <input id="bt-start" type="number" class="swal2-input" placeholder="بداية التسلسل" value="${bt.start}">
            <input id="bt-end" type="number" class="swal2-input" placeholder="نهاية التسلسل" value="${bt.end}">
            <input id="bt-current" type="number" class="swal2-input" placeholder="الرقم الحالي" value="${bt.current}">
        `,
        confirmButtonText: 'حفظ',
        preConfirm: () => {
            bt.name = document.getElementById('bt-name').value;
            bt.start = parseInt(document.getElementById('bt-start').value);
            bt.end = parseInt(document.getElementById('bt-end').value);
            bt.current = parseInt(document.getElementById('bt-current').value);
            saveDB(); showTab('bondTypes');
        }
    });
}

function deleteBondType(id) {
    Swal.fire({title: 'متأكد؟', text: 'سيتم حذف نوع السند', icon: 'warning', showCancelButton: true, confirmButtonText: 'نعم احذف'}).then((result) => {
        if (result.isConfirmed) {
            db.bondTypes = db.bondTypes.filter(t => t.id!== id);
            saveDB(); showTab('bondTypes');
        }
    });
}

function addSimpleItem(type, title) {
    Swal.fire({title: `إضافة ${title}`, input: 'text', inputPlaceholder: 'الاسم', confirmButtonText: 'إضافة'}).then((result) => {
        if (result.isConfirmed && result.value) {
            db[type].push({id: Date.now(), name: result.value});
            saveDB(); showTab(type);
        }
    });
}

function renderPayments() { return renderSimpleList('payments', translations[currentLang].payments); }
function renderAccountants() { return renderSimpleList('accountants', translations[currentLang].accountants); }
function renderFunds() { return renderSimpleList('funds', translations[currentLang].funds); }

function renderSimpleList(type, title) {
    return `<div class="bg-white rounded-lg shadow p-6">
        <div class="flex justify-between mb-4"><h2 class="text-xl font-bold">${title}</h2>
        <button onclick="addSimpleItem('${type}', '${title}');playSound()" class="bg-green-600 text-white px-4 py-2 rounded-lg">+ إضافة</button></div>
        <div class="space-y-2">${db[type].map(item => `
            <div class="border p-3 rounded-lg flex justify-between items-center">
                <span class="font-bold">${item.name}</span>
                <button onclick="db.${type}=db.${type}.filter(i=>i.id!==${item.id});saveDB();showTab('${type}');playSound()" class="bg-red-500 text-white px-3 py-1 rounded text-sm">حذف</button>
            </div>`).join('') || '<p class="text-gray-500 text-center py-8">لا يوجد</p>'}
        </div></div>`;
}

if (localStorage.getItem('v4_lang')) {
    setLang(currentLang);
} else {
    document.getElementById('languageScreen').classList.remove('hidden');
}
updateCompanyDisplay();
