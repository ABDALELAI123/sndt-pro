let currentLang = localStorage.getItem('v4_lang') || 'ar';

function setLang(lang) {
    currentLang = lang;
    localStorage.setItem('v4_lang', lang);
    document.documentElement.lang = lang;
    document.documentElement.dir = ['ar','ur','fa'].includes(lang)? 'rtl' : 'ltr';
    document.getElementById('languageScreen').classList.add('hidden');
    document.getElementById('loginScreen').classList.remove('hidden');
    applyTranslations();
    updateCompanyDisplay();
}

function showLangScreen() {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('languageScreen').classList.remove('hidden');
}

function applyTranslations() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = translations[currentLang][el.dataset.i18n] || el.textContent;
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        el.placeholder = translations[currentLang][el.dataset.i18nPlaceholder] || el.placeholder;
    });
}

let db = {
    users: JSON.parse(localStorage.getItem('v4_users') || '[]'),
    bondTypes: JSON.parse(localStorage.getItem('v4_bondTypes') || '[]'),
    payments: JSON.parse(localStorage.getItem('v4_payments') || '[]'),
    accountants: JSON.parse(localStorage.getItem('v4_accountants') || '[]'),
    funds: JSON.parse(localStorage.getItem('v4_funds') || '[]'),
    bonds: JSON.parse(localStorage.getItem('v4_bonds') || '[]'),
    cashbox: JSON.parse(localStorage.getItem('v4_cashbox') || '[]'),
    company: JSON.parse(localStorage.getItem('v4_company') || '{"name":"سندات برو","address":"","cr":"","logo":""}'),
    printSettings: JSON.parse(localStorage.getItem('v4_printSettings') || '{"allowMultiplePrint":false,"maxPrints":1,"hideSignatures":true,"customHeaders":{"title":"","subtitle":""},"showQR":true,"qrPosition":"bottom-left","autoGenerateQR":true}')
};
let currentUser = null;

if (db.users.length === 0) {
    db.users.push({
        id: 1, phone: '0597087767', password: '500600', name: 'المدير العام',
        role: 'superadmin', active: true, permissions: { all: true }, printCount: {},
        dailyTotalLimit: 0, allowedBondTypes: []
    });
    saveDB();
}

function saveDB() {
    localStorage.setItem('v4_users', JSON.stringify(db.users));
    localStorage.setItem('v4_bondTypes', JSON.stringify(db.bondTypes));
    localStorage.setItem('v4_payments', JSON.stringify(db.payments));
    localStorage.setItem('v4_accountants', JSON.stringify(db.accountants));
    localStorage.setItem('v4_funds', JSON.stringify(db.funds));
    localStorage.setItem('v4_bonds', JSON.stringify(db.bonds));
    localStorage.setItem('v4_cashbox', JSON.stringify(db.cashbox));
    localStorage.setItem('v4_company', JSON.stringify(db.company));
    localStorage.setItem('v4_printSettings', JSON.stringify(db.printSettings));
    updateCompanyDisplay();
}

function updateCompanyDisplay() {
    const name = db.company.name || translations[currentLang].app_name;
    document.getElementById('companyNameLogin').textContent = name;
    document.getElementById('companyNameHeader').textContent = name;
    document.title = name;
    if (db.company.logo) {
        document.getElementById('loginLogo').src = db.company.logo;
        document.getElementById('loginLogo').classList.remove('hidden');
        document.getElementById('headerLogo').src = db.company.logo;
        document.getElementById('headerLogo').classList.remove('hidden');
    }
}

function login() {
    const phone = document.getElementById('loginPhone').value.trim();
    const pass = document.getElementById('loginPass').value.trim();
    const user = db.users.find(u => u.phone === phone && u.password === pass);
    if (!user) return Swal.fire('خطأ', 'رقم الجوال أو كلمة المرور خطأ', 'error');
    if (!user.active) return Swal.fire('موقوف', 'حسابك موقوف. راجع الإدارة', 'error');
    currentUser = user;
    if (!currentUser.printCount) currentUser.printCount = {};
    if (!currentUser.allowedBondTypes) currentUser.allowedBondTypes = [];
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');
    document.getElementById('userName').textContent = user.name;
    document.getElementById('userRole').textContent = user.role === 'superadmin'? 'مدير عام' : user.role === 'manager'? 'مدير' : 'مندوب';
    if (user.role === 'delegate') {
        document.getElementById('delegateTabs').classList.remove('hidden');
        showTab('createBond');
    } else {
        document.getElementById('adminTabs').classList.remove('hidden');
        showTab('dashboard');
    }
    applyTranslations();
    updateCompanyDisplay();
}

function logout() { location.reload(); }
function renderCreateBond() {
    const today = new Date().toLocaleDateString('ar-SA');
    if (currentUser.bondsTodayDate!== today) {
        currentUser.bondsToday = 0;
        currentUser.bondsTodayAmount = 0;
        currentUser.bondsTodayDate = today;
    }

    const remainingCount = currentUser.dailyLimit > 0? currentUser.dailyLimit - currentUser.bondsToday : null;
    const remainingAmount = currentUser.dailyAmountLimit > 0? currentUser.dailyAmountLimit - (currentUser.bondsTodayAmount || 0) : null;

    if (currentUser.dailyLimit > 0 && currentUser.bondsToday >= currentUser.dailyLimit) {
        const suppliedCount = db.bonds.filter(b => b.userId === currentUser.id && b.date.startsWith(today) && b.supplied).length;
        if (suppliedCount === 0) {
            return `<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">وصلت للسقف اليومي: ${currentUser.dailyLimit} سند. قم بتوريد سنداتك ليتم فتح العدد المتبقي</div>`;
        }
    }

    if (currentUser.dailyAmountLimit > 0 && (currentUser.bondsTodayAmount || 0) >= currentUser.dailyAmountLimit) {
        const suppliedAmount = db.bonds.filter(b => b.userId === currentUser.id && b.date.startsWith(today) && b.supplied).reduce((sum, b) => sum + b.amount, 0);
        if (suppliedAmount === 0) {

    }

    const allowedBondTypes = currentUser.allowedBondTypes?.length? db.bondTypes.filter(t => currentUser.allowedBondTypes.includes(t.id)) : db.bondTypes;

function saveBond() {
    const typeId = document.getElementById('bond-type').value;
    const amount = parseFloat(document.getElementById('bond-amount').value);
    const bondType = db.bondTypes.find(t => t.id == typeId);

    if (!bondType) return Swal.fire('خطأ', 'اختر نوع السند', 'error');
    if (!amount || amount <= 0) return Swal.fire('خطأ', 'اكتب المبلغ', 'error');
    if (currentUser.maxAmount > 0 && amount > currentUser.maxAmount) return Swal.fire('خطأ', `المبلغ يتجاوز الحد المسموح للسند: ${currentUser.maxAmount} ريال`, 'error');

    const today = new Date().toLocaleDateString('ar-SA');
    const todayAmount = (currentUser.bondsTodayAmount || 0);
    if (currentUser.dailyAmountLimit > 0 && (todayAmount + amount) > currentUser.dailyAmountLimit) {
        const suppliedAmount = db.bonds.filter(b => b.userId === currentUser.id && b.date.startsWith(today) && b.supplied).reduce((sum, b) => sum + b.amount, 0);
        if ((todayAmount + amount - suppliedAmount) > currentUser.dailyAmountLimit) {
            return Swal.fire('خطأ', `إجمالي المبالغ اليوم سيتجاوز الحد: ${currentUser.dailyAmountLimit} ريال`, 'error');
        }
    }

    if (bondType.current > bondType.end) return Swal.fire('خطأ', 'انتهى تسلسل هذا النوع', 'error');

    const todayCount = currentUser.bondsToday || 0;
    if (currentUser.dailyLimit > 0 && todayCount >= currentUser.dailyLimit) {
        const suppliedCount = db.bonds.filter(b => b.userId === currentUser.id && b.date.startsWith(today) && b.supplied).length;
        if (todayCount - suppliedCount >= currentUser.dailyLimit) {
            return Swal.fire('خطأ', 'وصلت للسقف اليومي. قم بتوريد سنداتك أولاً', 'error');
        }
    }

    const bondId = Date.now();
    const bond = {
        id: bondId,
        number: bondType.current,
        type: bondType.name,
        amount: amount,
        clientName: document.getElementById('bond-client').value,
        clientPhone: document.getElementById('bond-client-phone').value,
        clientAccount: document.getElementById('bond-client-account').value,
        payment: document.getElementById('bond-payment').value,
        accountant: document.getElementById('bond-accountant').value,
        fund: document.getElementById('bond-fund').value,
        description: document.getElementById('bond-desc').value,
        supplied: document.getElementById('bond-supplied').value === 'true',
        userId: currentUser.id,
        userName: currentUser.name,
        date: new Date().toLocaleString('ar-SA'),
        qrData: `bond:${bondId}`,
        printCount: {}
    };

    if (!bond.clientName) return Swal.fire('خطأ', 'اكتب اسم العميل', 'error');

    db.bonds.push(bond);
    bondType.current++;
    currentUser.bondsToday = (currentUser.bondsToday || 0) + 1;
    currentUser.bondsTodayAmount = (currentUser.bondsTodayAmount || 0) + amount;
    currentUser.bondsTodayDate = today;

    const idx = db.users.findIndex(u => u.id === currentUser.id);
    db.users[idx] = currentUser;

    updateCashbox(bond);
    saveDB();
    Swal.fire('تم', `تم إنشاء السند رقم ${bond.number}`, 'success').then(() => showTab('myBonds'));
}

function printBond(id) {
    if (!canPrint(id)) return Swal.fire('ممنوع', 'تم استخدام الحد الأقصى للطباعة', 'error');
    const b = db.bonds.find(bond => bond.id === id);
    currentUser.printCount[id] = (currentUser.printCount[id] || 0) + 1;
    const idx = db.users.findIndex(u => u.id === currentUser.id);
    db.users[idx] = currentUser;
    saveDB();

    const printWindow = window.open('', '', 'height=600,width=800');
    printWindow.document.write(generateBondHTML(b, false));
    printWindow.document.close();

    if (db.printSettings.showQR) {
        setTimeout(() => {
            QRCode.toCanvas(printWindow.document.getElementById('qrcanvas'), window.location.origin + window.location.pathname + '?bond=' + b.id, {width: 100}, function (error) {
                if (error) console.error(error);
                printWindow.print();
            });
        }, 500);
    } else {
        printWindow.print();
    }
}

function printBondPDF(id) {
    const b = db.bonds.find(bond => bond.id === id);
    const printWindow = window.open('', '', 'height=600,width=800');
    printWindow.document.write(generateBondHTML(b, true));
    printWindow.document.close();

    setTimeout(() => {
        const element = printWindow.document.getElementById('bond-content');
        const opt = {
            margin: 10,
            filename: `سند-${b.type}-${b.number}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }, 1000);
}

function printQR(id) {
    const b = db.bonds.find(bond => bond.id === id);
    const printWindow = window.open('', '', 'height=300,width=300');
    printWindow.document.write(`<html><body style="text-align:center;padding:20px">

function uploadLogo(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        const base64 = e.target.result;
        document.getElementById('comp-logo').value = base64;
        document.getElementById('logo-preview').src = base64;
        document.getElementById('logo-preview').classList.remove('hidden');
        Swal.fire('تم', 'تم رفع الشعار. اضغط حفظ الإعدادات لتأكيد الحفظ', 'success');
    };
    reader.readAsDataURL(file);
}

function saveCompany() {
    db.company = {
        name: document.getElementById('comp-name').value,
        address: document.getElementById('comp-address').value,
        cr: document.getElementById('comp-cr').value,
        logo: document.getElementById('comp-logo').value
    };
    saveDB();
    updateCompanyDisplay();
    Swal.fire('تم', 'تم حفظ إعدادات الشركة. الاسم والشعار يظهران الآن في كل الصفحات والسندات', 'success');
}

function addUser(role) {
    const paymentsOptions = db.payments.map(p => `<label class="flex items-center gap-2"><input type="checkbox" value="${p.name}" class="payment-check"> ${p.name}</label>`).join('');
    const bondTypesOptions = db.bondTypes.map(t => `<label class="flex items-center gap-2"><input type="checkbox" value="${t.id}" class="bondtype-check"> ${t.name}</label>`).join('');
    Swal.fire({
        title: `إضافة ${role === 'manager'? 'مدير' : 'مندوب'} جديد`,
        html: `
            <input id="swal-name" class="swal2-input" placeholder="الاسم">
            <input id="swal-phone" class="swal2-input" placeholder="رقم الجوال 05xxxxxxxx">
            ${role === 'delegate'? `
                <input id="swal-limit" type="number" class="swal2-input" placeholder="السقف اليومي لعدد السندات - 0 = غير محدد">
                <input id="swal-maxamount" type="number" class="swal2-input" placeholder="أكبر مبلغ للسند الواحد - 0 = غير محدد">
                <input id="swal-daily-total" type="number" class="swal2-input" placeholder="الحد الإجمالي للمبالغ اليومية - 0 = غير محدد">
                <div class="text-right mt-3 mb-2 font-bold">أنواع السندات المتاحة:</div>
                <div class="text-right max-h-32 overflow-y-auto">${bondTypesOptions || 'لا توجد أنواع. أضفها أولاً'}</div>
                <div class="text-right mt-3 mb-2 font-bold">طرق الدفع المتاحة:</div>
                <div class="text-right max-h-32 overflow-y-auto">${paymentsOptions || 'لا توجد طرق دفع. أضفها أولاً'}</div>
            ` : ''}
        `,
        confirmButtonText: 'إضافة',
        width: '600px',
        preConfirm: () => {
            const name = document.getElementById('swal-name').value;
            const phone = document.getElementById('swal-phone').value;
            if (!name ||!phone) Swal.showValidationMessage('املأ الاسم والجوال');
            if (db.users.find(u => u.phone === phone)) Swal.showValidationMessage('رقم الجوال مسجل مسبقاً');
            const allowedPayments = Array.from(document.querySelectorAll('.payment-check:checked')).map(cb => cb.value);
            const allowedBondTypes = Array.from(document.querySelectorAll('.bondtype-check:checked')).map(cb => parseInt(cb.value));
            return {
                name, phone,
                limit: parseInt(document.getElementById('swal-limit')?.value) || 0,
                maxAmount: parseInt(document.getElementById('swal-maxamount')?.value) || 0,
                dailyAmountLimit: parseInt(document.getElementById('swal-daily-total')?.value) || 0,
                allowedPayments,
                allowedBondTypes
            };
        }
    }).then((result) => {
        if (result.isConfirmed) {
            db.users.push({
                id: Date.now(), phone: result.value.phone, password: '123456',
                name: result.value.name, role: role, active: true,
                dailyLimit: result.value.limit,
                maxAmount: result.value.maxAmount,
                dailyAmountLimit: result.value.dailyAmountLimit,
                allowedPayments: result.value.allowedPayments,
                allowedBondTypes: result.value.allowedBondTypes,
                bondsToday: 0, bondsTodayAmount: 0, bondsTodayDate: '', printCount: {}
            });
            saveDB();
            showTab(role === 'manager'? 'managers' : 'delegates');
            Swal.fire('تم', 'تمت الإضافة. كلمة المرور: 123456', 'success');
        }
    });
}

            <input id="swal-phone" class="swal2-input" placeholder="رقم الجوال" value="${d.phone}">
            <input id="swal-limit" type="number" class="swal2-input" placeholder="السقف اليومي لعدد السندات" value="${d.dailyLimit || 0}">
            <input id="swal-maxamount" type="number" class="swal2-input" placeholder="أكبر مبلغ للسند" value="${d.maxAmount || 0}">
            <input id="swal-daily-total" type="number" class="swal2-input" placeholder="الحد الإجمالي اليومي" value="${d.dailyAmountLimit || 0}">
            <div class="text-right mt-3 mb-2 font-bold">أنواع السندات المتاحة:</div>
            <div class="text-right max-h-32 overflow-y-auto">${bondTypesOptions}</div>
            <div class="text-right mt-3 mb-2 font-bold">طرق الدفع المتاحة:</div>
            <div class="text-right max-h-32 overflow-y-auto">${paymentsOptions}</div>
        `,
        confirmButtonText: 'حفظ',
        width: '600px',
        preConfirm: () => {
            d.name = document.getElementById('swal-name').value;
            d.phone = document.getElementById('swal-phone').value;
            d.dailyLimit = parseInt(document.getElementById('swal-limit').value) || 0;
            d.maxAmount = parseInt(document.getElementById('swal-maxamount').value) || 0;
            d.dailyAmountLimit = parseInt(document.getElementById('swal-daily-total').value) || 0;
            d.allowedPayments = Array.from(document.querySelectorAll('.payment-check:checked')).map(cb => cb.value);
            d.allowedBondTypes = Array.from(document.querySelectorAll('.bondtype-check:checked')).map(cb => parseInt(cb.value));
            saveDB();
            showTab('delegates');
        }
    });
}

function viewBondByUrl() {
    const params = new URLSearchParams(window.location.search);
    const bondId = params.get('bond');
    if (bondId) {
        const b = db.bonds.find(x => x.id == bondId);
        if (b) {
            document.getElementById('bondViewContent').innerHTML = generateBondHTML(b, false).replace('<html dir="rtl">', '').replace('</html>', '').replace(/<head>[\s\S]*?<\/head>/, '');
            document.getElementById('bondViewContent').dataset.bondId = b.id;
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('languageScreen').classList.add('hidden');
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('bondViewScreen').classList.remove('hidden');
            if (db.printSettings.showQR) {
                setTimeout(() => {
                    const canvas = document.querySelector('#bondViewContent #qrcanvas');
                    if (canvas) {
                        QRCode.toCanvas(canvas, window.location.href, {width: 100});
                    }
                }, 300);
            }
        }
    }
}

if (localStorage.getItem('v4_lang')) {
    setLang(currentLang);
} else {
    document.getElementById('languageScreen').classList.remove('hidden');
}

updateCompanyDisplay();
viewBondByUrl();
</script>
</body>
</html>
