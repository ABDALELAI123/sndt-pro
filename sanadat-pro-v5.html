let currentLang = localStorage.getItem('v5_lang') || 'ar';
let projectMode = localStorage.getItem('v5_project_mode') || null;
let projectCode = localStorage.getItem('v5_project_code') || null;
let currentUser = null;

function generateProjectCode() {
    return 'PRJ-' + Math.random().toString(36).substring(2, 10).toUpperCase();
}

function selectProjectMode(mode) {
    if (mode === 'single') {
        projectMode = 'single';
        projectCode = 'SINGLE-' + Date.now();
        localStorage.setItem('v5_project_mode', projectMode);
        localStorage.setItem('v5_project_code', projectCode);
        initProjectDB();
        showLangScreen();
    } else {
        document.getElementById('connectedOptions').classList.remove('hidden');
    }
}

function createNewProject() {
    projectMode = 'connected';
    projectCode = generateProjectCode();
    localStorage.setItem('v5_project_mode', projectMode);
    localStorage.setItem('v5_project_code', projectCode);
    initProjectDB();
    Swal.fire({
        title: 'تم إنشاء المشروع',
        html: `كود المشروع: <b style="font-size:24px;color:#2563eb">${projectCode}</b><br><br>شارك هذا الكود مع فريقك للانضمام`,
        icon: 'success',
        confirmButtonText: 'متابعة'
    }).then(() => showLangScreen());
}

function joinProject() {
    const code = document.getElementById('joinProjectCode').value.trim().toUpperCase();
    if (!code) return Swal.fire('خطأ', 'أدخل كود المشروع', 'error');
    projectMode = 'connected';
    projectCode = code;
    localStorage.setItem('v5_project_mode', projectMode);
    localStorage.setItem('v5_project_code', projectCode);
    initProjectDB();
    Swal.fire('تم', 'تم الانضمام للمشروع بنجاح', 'success').then(() => showLangScreen());
}

function backToProjectSelect() {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('projectSelectScreen').classList.remove('hidden');
}

    const url = `${window.location.origin}${window.location.pathname}?project=${projectCode}`;

function copyToClipboard(text, btn) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
            const oldText = btn.textContent;
            btn.textContent = 'تم النسخ ✓';
            btn.classList.add('bg-green-700');
            setTimeout(() => {
                btn.textContent = oldText;
                btn.classList.remove('bg-green-700');
            }, 2000);
        }).catch(() => {
            fallbackCopy(text, btn);
        });
    } else {
        fallbackCopy(text, btn);
    }
}

function fallbackCopy(text, btn) {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.select();
    try {
        document.execCommand('copy');
        const oldText = btn.textContent;
        btn.textContent = 'تم النسخ ✓';
        setTimeout(() => { btn.textContent = oldText; }, 2000);
    } catch (err) {
        Swal.fire('خطأ', 'فشل النسخ. انسخ يدوياً', 'error');
    }
    document.body.removeChild(textarea);
}

function checkDelegateLimits() {
    if (currentUser.role!== 'delegate') return { allowed: true };
    const today = new Date().toLocaleDateString('ar-SA');
    if (currentUser.bondsTodayDate!== today) {
        currentUser.bondsToday = 0;
        currentUser.bondsTodayAmount = 0;
        currentUser.bondsTodayDate = today;
    }

    return { allowed: true };
}

function saveBond() {
    const typeId = document.getElementById('bond-type').value;
    const amount = parseFloat(document.getElementById('bond-amount').value);
    const bondTypeEl = document.getElementById('bond-type');
    const bondTypeName = bondTypeEl.options[bondTypeEl.selectedIndex].dataset.name;
    const bondType = db.bondTypes.find(t => t.id == typeId);

    if (!bondType) return Swal.fire('خطأ', 'اختر نوع السند', 'error');
    if (!amount || amount <= 0) return Swal.fire('خطأ', 'اكتب المبلغ', 'error');

    const limitCheck = checkDelegateLimits();
    if (!limitCheck.allowed) return Swal.fire('موقوف', limitCheck.reason, 'error');

    if (currentUser.maxAmount > 0 && amount > currentUser.maxAmount) {
        return Swal.fire('خطأ', `المبلغ يتجاوز الحد المسموح للسند: ${currentUser.maxAmount} ريال`, 'error');
    }

    const todayAmount = (currentUser.bondsTodayAmount || 0);
    if (currentUser.dailyAmountLimit > 0 && (todayAmount + amount) > currentUser.dailyAmountLimit) {
        return Swal.fire('خطأ', `إجمالي المبالغ اليوم سيتجاوز الحد: ${currentUser.dailyAmountLimit} ريال`, 'error');
    }

    if (bondType.current > bondType.end) return Swal.fire('خطأ', 'انتهى تسلسل هذا النوع', 'error');

    const bondId = Date.now();
    const isQabdh = bondTypeName.includes('قبض') || bondTypeName.includes('قيد') || bondTypeName.includes('+');
    const isSarf = bondTypeName.includes('صرف') || bondTypeName.includes('-');

    const bond = {
        id: bondId,
        number: bondType.current,
        type: bondType.name,
        typeName: bondTypeName,
        amount: amount,
        clientName: document.getElementById('bond-client').value,
        clientPhone: document.getElementById('bond-client-phone').value,
        clientAccount: document.getElementById('bond-client-account').value,
        payment: document.getElementById('bond-payment').value,
        accountant: document.getElementById('bond-accountant').value,
        fund: document.getElementById('bond-fund').value,
        description: document.getElementById('bond-desc').value,
        supplied: false,
        verified: false,
        isQabdh: isQabdh,
        isSarf: isSarf,
        userId: currentUser.id,
        userName: currentUser.name,
        date: new Date().toLocaleString('ar-SA'),
        qrData: `${window.location.origin}${window.location.pathname}?project=${projectCode}&bond=${bondId}`,
        printCount: {},
        projectCode: projectCode
    };

    if (!bond.clientName) return Swal.fire('خطأ', 'اكتب اسم العميل', 'error');

    const currentBonds = db.bonds;
    currentBonds.push(bond);
    db.bonds = currentBonds;

    const currentTypes = db.bondTypes;
    const typeIdx = currentTypes.findIndex(t => t.id == typeId);
    currentTypes[typeIdx].current++;
    db.bondTypes = currentTypes;

    currentUser.bondsToday = (currentUser.bondsToday || 0) + 1;
    currentUser.bondsTodayAmount = (currentUser.bondsTodayAmount || 0) + amount;
    currentUser.bondsTodayDate = new Date().toLocaleDateString('ar-SA');

    const users = db.users;
    const idx = users.findIndex(u => u.id === currentUser.id);
    users[idx] = currentUser;
    db.users = users;

    updateCashbox(bond);
    saveDB();
    Swal.fire('تم', `تم إنشاء السند رقم ${bond.number}`, 'success').then(() => showTab('myBonds'));
}

function saveBond() {
    const typeId = document.getElementById('bond-type').value;
    const amount = parseFloat(document.getElementById('bond-amount').value);
    const bondTypeEl = document.getElementById('bond-type');
    const bondTypeName = bondTypeEl.options[bondTypeEl.selectedIndex].dataset.name;
    const bondType = db.bondTypes.find(t => t.id == typeId);

    if (!bondType) return Swal.fire('خطأ', 'اختر نوع السند', 'error');
    if (!amount || amount <= 0) return Swal.fire('خطأ', 'اكتب المبلغ', 'error');

    const limitCheck = checkDelegateLimits();
    if (!limitCheck.allowed) return Swal.fire('موقوف', limitCheck.reason, 'error');

    if (currentUser.maxAmount > 0 && amount > currentUser.maxAmount) {
        return Swal.fire('خطأ', `المبلغ يتجاوز الحد المسموح للسند: ${currentUser.maxAmount} ريال`, 'error');
    }

    const todayAmount = (currentUser.bondsTodayAmount || 0);
    if (currentUser.dailyAmountLimit > 0 && (todayAmount + amount) > currentUser.dailyAmountLimit) {
        return Swal.fire('خطأ', `إجمالي المبالغ اليوم سيتجاوز الحد: ${currentUser.dailyAmountLimit} ريال`, 'error');
    }

    if (bondType.current > bondType.end) return Swal.fire('خطأ', 'انتهى تسلسل هذا النوع', 'error');

    const bondId = Date.now();
    const isQabdh = bondTypeName.includes('قبض') || bondTypeName.includes('قيد') || bondTypeName.includes('+');
    const isSarf = bondTypeName.includes('صرف') || bondTypeName.includes('-');

    const bond = {
        id: bondId,
        number: bondType.current,
        type: bondType.name,
        typeName: bondTypeName,
        amount: amount,
        clientName: document.getElementById('bond-client').value,
        clientPhone: document.getElementById('bond-client-phone').value,
        clientAccount: document.getElementById('bond-client-account').value,
        payment: document.getElementById('bond-payment').value,
        accountant: document.getElementById('bond-accountant').value,
        fund: document.getElementById('bond-fund').value,
        description: document.getElementById('bond-desc').value,
        supplied: false,
        verified: false,
        isQabdh: isQabdh,
        isSarf: isSarf,
        userId: currentUser.id,
        userName: currentUser.name,
        date: new Date().toLocaleString('ar-SA'),
        qrData: `${window.location.origin}${window.location.pathname}?project=${projectCode}&bond=${bondId}`,
        printCount: {},
        projectCode: projectCode
    };

    if (!bond.clientName) return Swal.fire('خطأ', 'اكتب اسم العميل', 'error');

    const currentBonds = db.bonds;
    currentBonds.push(bond);
    db.bonds = currentBonds;

    const currentTypes = db.bondTypes;
    const typeIdx = currentTypes.findIndex(t => t.id == typeId);
    currentTypes[typeIdx].current++;
    db.bondTypes = currentTypes;

    currentUser.bondsToday = (currentUser.bondsToday || 0) + 1;
    currentUser.bondsTodayAmount = (currentUser.bondsTodayAmount || 0) + amount;
    currentUser.bondsTodayDate = new Date().toLocaleDateString('ar-SA');

    const users = db.users;
    const idx = users.findIndex(u => u.id === currentUser.id);
    users[idx] = currentUser;
    db.users = users;

    updateCashbox(bond);
    saveDB();
    Swal.fire('تم', `تم إنشاء السند رقم ${bond.number}`, 'success').then(() => showTab('myBonds'));
}

function verifyBond(id) {
    const bonds = db.bonds;
    const bondIdx = bonds.findIndex(b => b.id === id);
    const bond = bonds[bondIdx];
    if (currentUser.role === 'delegate') return;

    if (bond.isQabdh) {
        bond.supplied = true;
    } else {
        bond.verified = true;
    }
    db.bonds = bonds;
    saveDB();
    showTab(currentUser.role === 'delegate'? 'myBonds' : 'bonds');
    Swal.fire('تم', 'تم التحديث بنجاح. الصلاحية انفتحت للمندوب', 'success');
}

function canPrint(bondId) {
    if (currentUser.role === 'superadmin') return true;
    if (!currentUser.printCount[bondId]) return true;
    if (db.printSettings.allowMultiplePrint && currentUser.printCount[bondId] < db.printSettings.maxPrints) return true;
    return false;
}

function printBond(id) {
    if (!canPrint(id)) return Swal.fire('ممنوع', 'تم استخدام الحد الأقصى للطباعة', 'error');
    const b = db.bonds.find(bond => bond.id === id);
    currentUser.printCount[id] = (currentUser.printCount[id] || 0) + 1;
    const users = db.users;
    const idx = users.findIndex(u => u.id === currentUser.id);
    users[idx] = currentUser;
    db.users = users;
    saveDB();

    const printWindow = window.open('', '', 'height=700,width=900');
    printWindow.document.write(generateBondHTML(b, false));
    printWindow.document.close();

    if (db.printSettings.showQR) {
        setTimeout(() => {
            const canvas = printWindow.document.getElementById('qrcanvas');
            if (canvas) {
                QRCode.toCanvas(canvas, b.qrData, {
                    width: 140,
                    margin: 2,
                    errorCorrectionLevel: 'H',
                    color: { dark: '#000000', light: '#ffffff' }
                }, function (error) {
                    if (error) console.error(error);
                    setTimeout(() => printWindow.print(), 300);
                });
            }
        }, 500);
    } else {
        setTimeout(() => printWindow.print(), 300);
    }
}

function printBondPDF(id) {
    const b = db.bonds.find(bond => bond.id === id);
    const element = document.createElement('div');
    element.innerHTML = generateBondHTML(b, true);

    if (db.printSettings.showQR) {
        const tempCanvas = document.createElement('canvas');
        QRCode.toCanvas(tempCanvas, b.qrData, {
            width: 140,
            margin: 2,
            errorCorrectionLevel: 'H'
        }, function(error) {
            if (!error) {
                const qrDiv = element.querySelector('.qr-print');
                if (qrDiv) {
                    const img = document.createElement('img');
                    img.src = tempCanvas.toDataURL();
                    img.style.width = '140px';
                    qrDiv.innerHTML = '';
                    qrDiv.appendChild(img);
                    const label = document.createElement('div');
                    label.className = 'qr-label';
                    label.textContent = 'امسح لعرض السند';
                    qrDiv.appendChild(label);
                }
            }
            generatePDF(element, b);
        });
    } else {
        generatePDF(element, b);
    }
}

function generatePDF(element, b) {
    const opt = {
        margin: [10, 10, 10, 10],
        filename: `سند-${b.type}-${b.number}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true, letterRendering: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(element).save().then(() => {
        Swal.fire('تم', 'تم تحميل PDF بنجاح', 'success');
    }).catch(err => {
        Swal.fire('خطأ', 'فشل تحميل PDF', 'error');
        console.error(err);
    });
}

function sendWhatsApp(phone, id) {
    const b = db.bonds.find(bond => bond.id === id);
    if (!phone) return Swal.fire('تنبيه', 'رقم العميل غير موجود', 'warning');

    const bondUrl = b.qrData;
    const statusText = b.isQabdh?
        (b.supplied? translations[currentLang].supplied : translations[currentLang].not_supplied) :
        (b.verified? translations[currentLang].verified : translations[currentLang].not_verified);

    const msg = `*${db.company.name}*%0A%0A*سند ${b.type} رقم ${b.number}*%0A━━━━━━━━━━━━━━━%0A💰 المبلغ: *${b.amount.toLocaleString('ar-SA')} ريال*%0A👤 العميل: ${b.clientName}%0A📅 التاريخ: ${b.date}%0A📝 البيان: ${b.description || '-'}%0A💳 طريقة الدفع: ${b.payment || '-'}%0A📦 الحالة: ${statusText}%0A%0A🔗 رابط السند: ${encodeURIComponent(bondUrl)}%0A%0Aشكراً لتعاملكم معنا`;

    const cleanPhone = phone.replace(/^0/, '').replace(/[^0-9]/g, '');
    window.open(`https://wa.me/966${cleanPhone}?text=${msg}`, '_blank');
}

function updateCashbox(bond) {
    const affectsCashbox = bond.isQabdh || bond.isSarf;
    if (!affectsCashbox) return;

    const currentCashbox = db.cashbox;
    const existingEntry = currentCashbox.find(c => c.bondId === bond.id);
    if (existingEntry) return;

    currentCashbox.push({
        id: Date.now(),
        bondId: bond.id,
        bondNumber: bond.number,
        type: bond.type,
        amount: bond.amount,
        description: bond.description,
        date: bond.date,
        userName: bond.userName,
        isQabdh: bond.isQabdh,
        projectCode: bond.projectCode
    });
    db.cashbox = currentCashbox;
    saveDB();
}

function printBond(id) {
    if (!canPrint(id)) return Swal.fire('ممنوع', 'تم استخدام الحد الأقصى للطباعة', 'error');
    const b = db.bonds.find(bond => bond.id === id);
    currentUser.printCount[id] = (currentUser.printCount[id] || 0) + 1;
    const users = db.users;
    const idx = users.findIndex(u => u.id === currentUser.id);
    users[idx] = currentUser;
    db.users = users;
    saveDB();

    const printWindow = window.open('', '', 'height=800,width=1000');
    printWindow.document.write(generateBondHTML(b, false));
    printWindow.document.close();

    if (db.printSettings.showQR) {
        setTimeout(() => {
            const canvas = printWindow.document.getElementById('qrcanvas');
            if (canvas) {
                QRCode.toCanvas(canvas, b.qrData, {
                    width: 140,
                    margin: 2,
                    errorCorrectionLevel: 'H',
                    color: { dark: '#000000', light: '#ffffff' }
                }, function (error) {
                    if (error) {
                        console.error('QR Error:', error);
                        printWindow.print();
                    } else {
                        setTimeout(() => printWindow.print(), 300);
                    }
                });
            } else {
                printWindow.print();
            }
        }, 600);
    } else {
        setTimeout(() => printWindow.print(), 400);
    }
}

function printBondPDF(id) {
    const b = db.bonds.find(bond => bond.id === id);
    const element = document.createElement('div');
    element.innerHTML = generateBondHTML(b, true);
    document.body.appendChild(element);

    const processGeneration = () => {
        if (db.printSettings.showQR) {
            const tempCanvas = document.createElement('canvas');
            QRCode.toCanvas(tempCanvas, b.qrData, {
                width: 140,
                margin: 2,
                errorCorrectionLevel: 'H',
                color: { dark: '#000000', light: '#ffffff' }
            }, function(error) {
                if (!error) {
                    const qrDiv = element.querySelector('.qr-print');
                    if (qrDiv) {
                        const img = document.createElement('img');
                        img.src = tempCanvas.toDataURL();
                        img.style.width = '140px';
                        img.style.height = '140px';
                        qrDiv.innerHTML = '';
                        qrDiv.appendChild(img);
                        const label = document.createElement('div');
                        label.className = 'qr-label';
                        label.textContent = 'امسح الكود لعرض السند كاملاً';
                        qrDiv.appendChild(label);
                    }
                }
                generatePDF(element, b);
            });
        } else {
            generatePDF(element, b);
        }
    };

    setTimeout(processGeneration, 500);
}

function generatePDF(element, b) {
    const opt = {
        margin: [10, 10, 10, 10],
        filename: `سند-${b.type}-${b.number}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true, letterRendering: true, allowTaint: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(element).save().then(() => {
        document.body.removeChild(element);
        Swal.fire('تم', 'تم تحميل PDF بنجاح', 'success');
    }).catch(err => {
        document.body.removeChild(element);
        Swal.fire('خطأ', 'فشل تحميل PDF', 'error');
        console.error(err);
    });
}

function printBond(id) {
    if (!canPrint(id)) return Swal.fire('ممنوع', 'تم استخدام الحد الأقصى للطباعة', 'error');
    const b = db.bonds.find(bond => bond.id === id);
    currentUser.printCount[id] = (currentUser.printCount[id] || 0) + 1;
    const users = db.users;
    const idx = users.findIndex(u => u.id === currentUser.id);
    users[idx] = currentUser;
    db.users = users;
    saveDB();

    const printWindow = window.open('', '', 'height=700,width=900');
    printWindow.document.write(generateBondHTML(b, false));
    printWindow.document.close();

    if (db.printSettings.showQR) {
        setTimeout(() => {
            const canvas = printWindow.document.getElementById('qrcanvas');
            if (canvas) {
                QRCode.toCanvas(canvas, b.qrData, {
                    width: 120,
                    margin: 1,
                    errorCorrectionLevel: 'H',
                    color: { dark: '#000000', light: '#ffffff' }
                }, function (error) {
                    if (error) console.error(error);
                    setTimeout(() => printWindow.print(), 300);
                });
            }
        }, 600);
    } else {
        setTimeout(() => printWindow.print(), 300);
    }
}

function printBondPDF(id) {
    const b = db.bonds.find(bond => bond.id === id);
    const element = document.createElement('div');
    element.innerHTML = generateBondHTML(b, true);

    if (db.printSettings.showQR) {
        const tempCanvas = document.createElement('canvas');
        QRCode.toCanvas(tempCanvas, b.qrData, {
            width: 120,
            margin: 1,
            errorCorrectionLevel: 'H'
        }, function(error) {
            if (!error) {
                const qrDiv = element.querySelector('.qr-print');
                if (qrDiv) {
                    const img = document.createElement('img');
                    img.src = tempCanvas.toDataURL();
                    img.style.width = '120px';
                    img.style.height = '120px';
                    qrDiv.innerHTML = '';
                    qrDiv.appendChild(img);
                    const text = document.createElement('div');
                    text.style.fontSize = '11px';
                    text.style.marginTop = '8px';
                    text.style.fontWeight = '600';
                    text.textContent = 'امسح الكود لعرض السند';
                    qrDiv.appendChild(text);
                }
            }
            generatePDF(element, b);
        });
    } else {
        generatePDF(element, b);
    }
}

function generatePDF(element, b) {
    const opt = {
        margin: [10, 10, 10, 10],
        filename: `سند-${b.type}-${b.number}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true, letterRendering: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(element).save().then(() => {
        Swal.fire('تم', 'تم تحميل PDF بنجاح', 'success');
    }).catch(err => {
        Swal.fire('خطأ', 'فشل تحميل PDF', 'error');
        console.error(err);
    });
}

function sendWhatsApp(phone, id) {
    const b = db.bonds.find(bond => bond.id === id);
    if (!phone) return Swal.fire('تنبيه', 'رقم العميل غير موجود', 'warning');

    const bondUrl = b.qrData;
    const statusText = b.isQabdh?
        (b.supplied? translations[currentLang].supplied : translations[currentLang].not_supplied) :
        (b.verified? translations[currentLang].verified : translations[currentLang].not_verified);

    const msg = `*${db.company.name}*%0A%0A*سند ${b.type} رقم ${b.number}*%0A━━━━━━━━━━━━━━━%0A💰 المبلغ: *${b.amount.toLocaleString('ar-SA')} ريال*%0A👤 العميل: ${b.clientName}%0A📅 التاريخ: ${b.date}%0A📝 البيان: ${b.description || '-'}%0A💳 طريقة الدفع: ${b.payment || '-'}%0A📦 الحالة: ${statusText}%0A%0A🔗 رابط السند: ${encodeURIComponent(bondUrl)}%0A%0Aشكراً لتعاملكم معنا`;

    const cleanPhone = phone.replace(/^0/, '').replace(/[^0-9]/g, '');
    window.open(`https://wa.me/966${cleanPhone}?text=${msg}`, '_blank');
}

function updateCashbox(bond) {
    const affectsCashbox = bond.isQabdh || bond.isSarf;
    if (!affectsCashbox) return;

    const currentCashbox = db.cashbox;
    const existingEntry = currentCashbox.find(c => c.bondId === bond.id);
    if (existingEntry) return;

    currentCashbox.push({
        id: Date.now(),
        bondId: bond.id,
        bondNumber: bond.number,
        type: bond.type,
        amount: bond.amount,
        description: bond.description,
        date: bond.date,
        userName: bond.userName,
        isQabdh: bond.isQabdh,
        projectCode: bond.projectCode
    });
    db.cashbox = currentCashbox;
    saveDB();
}

            ${db.printSettings.showQR? `<div class="qr-print"><canvas id="qrcanvas"></canvas><div class="qr-label">امسح الكود لعرض السند</div></div>` : ''}
        </div>

}

function printBond(id) {
    if (!canPrint(id)) return Swal.fire('ممنوع', 'تم استخدام الحد الأقصى للطباعة', 'error');
    const b = db.bonds.find(bond => bond.id === id);
    currentUser.printCount[id] = (currentUser.printCount[id] || 0) + 1;
    const users = db.users;
    const idx = users.findIndex(u => u.id === currentUser.id);
    users[idx] = currentUser;
    db.users = users;
    saveDB();

    const printWindow = window.open('', '', 'height=800,width=900');
    printWindow.document.write(generateBondHTML(b, false));
    printWindow.document.close();

    if (db.printSettings.showQR) {
        setTimeout(() => {
            const canvas = printWindow.document.getElementById('qrcanvas');
            if (canvas) {
                QRCode.toCanvas(canvas, b.qrData, {
                    width: 140,
                    margin: 1,
                    errorCorrectionLevel: 'H',
                    color: { dark: '#000000', light: '#ffffff' }
                }, function (error) {
                    if (error) console.error(error);
                    setTimeout(() => printWindow.print(), 300);
                });
            }
        }, 600);
    } else {
        setTimeout(() => printWindow.print(), 400);
    }
}

function printBondPDF(id) {
    const b = db.bonds.find(bond => bond.id === id);
    const element = document.createElement('div');
    element.innerHTML = generateBondHTML(b, true);

    if (db.printSettings.showQR) {
        const tempCanvas = document.createElement('canvas');
        QRCode.toCanvas(tempCanvas, b.qrData, {
            width: 140,
            margin: 1,
            errorCorrectionLevel: 'H'
        }, function(error) {
            if (!error) {
                const qrDiv = element.querySelector('.qr-print');
                if (qrDiv) {
                    const img = document.createElement('img');
                    img.src = tempCanvas.toDataURL();
                    img.style.width = '140px';
                    qrDiv.innerHTML = '';
                    qrDiv.appendChild(img);
                    const label = document.createElement('div');
                    label.className = 'qr-label';
                    label.textContent = 'امسح الكود لعرض السند';
                    qrDiv.appendChild(label);
                }
            }
            generatePDF(element, b);
        });
    } else {
        generatePDF(element, b);
    }
}

function generatePDF(element, b) {
    const opt = {
        margin: [10, 10, 10, 10],
        filename: `سند-${b.type}-${b.number}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true, letterRendering: true, logging: false },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(element).save().then(() => {
        Swal.fire('تم', 'تم تحميل PDF بنجاح', 'success');
    }).catch(err => {
        Swal.fire('خطأ', 'فشل تحميل PDF', 'error');
        console.error(err);
    });
}

function sendWhatsApp(phone, id) {
    const b = db.bonds.find(bond => bond.id === id);
    if (!phone) return Swal.fire('تنبيه', 'رقم العميل غير موجود', 'warning');

    const bondUrl = b.qrData;
    const statusText = b.isQabdh?
        (b.supplied? translations[currentLang].supplied : translations[currentLang].not_supplied) :
        (b.verified? translations[currentLang].verified : translations[currentLang].not_verified);

    const msg = `*${db.company.name}*%0A%0A*سند ${b.type} رقم ${b.number}*%0A━━━━━━━━━━━━━━━%0A💰 المبلغ: *${b.amount.toLocaleString('ar-SA')} ريال*%0A👤 العميل: ${b.clientName}%0A📅 التاريخ: ${b.date}%0A📝 البيان: ${b.description || '-'}%0A💳 طريقة الدفع: ${b.payment || '-'}%0A📦 الحالة: ${statusText}%0A%0A🔗 رابط السند: ${encodeURIComponent(bondUrl)}%0A%0Aشكراً لتعاملكم معنا`;

    const cleanPhone = phone.replace(/^0/, '').replace(/[^0-9]/g, '');

function updateCashbox(bond) {
    const affectsCashbox = bond.isQabdh || bond.isSarf;
    if (!affectsCashbox) return;

    const currentCashbox = db.cashbox;
    const existingEntry = currentCashbox.find(c => c.bondId === bond.id);
    if (existingEntry) return;

    currentCashbox.push({
        id: Date.now(),
        bondId: bond.id,
        bondNumber: bond.number,
        type: bond.type,
        amount: bond.amount,
        description: bond.description,
        date: bond.date,
        userName: bond.userName,
        isQabdh: bond.isQabdh,
        projectCode: bond.projectCode
    });
    db.cashbox = currentCashbox;
    saveDB();
}

function uploadLogo(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) return Swal.fire('خطأ', 'حجم الصورة كبير جداً. الحد الأقصى 2 ميجابايت', 'error');
    const reader = new FileReader();
    reader.onload = function(e) {
        const base64 = e.target.result;
        document.getElementById('comp-logo').value = base64;
        document.getElementById('logo-preview').src = base64;
        document.getElementById('logo-preview').classList.remove('hidden');
        Swal.fire('تم', 'تم رفع الشعار. اضغط حفظ الإعدادات لتأكيد الحفظ', 'success');
    };
    reader.readAsDataURL(file);
}

function viewBondByUrl() {
    const params = new URLSearchParams(window.location.search);
    const bondId = params.get('bond');
    const projCode = params.get('project');

    if (bondId && projCode) {
        const savedCode = localStorage.getItem('v5_project_code');
        if (savedCode!== projCode) {
            localStorage.setItem('v5_project_code', projCode);
            localStorage.setItem('v5_project_mode', 'connected');
            projectCode = projCode;
            projectMode = 'connected';
            initProjectDB();
        }

        const b = db.bonds.find(x => x.id == bondId);
        if (b) {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = generateBondHTML(b, false);
            document.getElementById('bondViewContent').innerHTML = tempDiv.querySelector('body').innerHTML;
            document.getElementById('bondViewContent').dataset.bondId = b.id;
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('projectSelectScreen').classList.add('hidden');
            document.getElementById('languageScreen').classList.add('hidden');
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('bondViewScreen').classList.remove('hidden');

            setTimeout(() => {
                const canvas = document.getElementById('qrcanvas');
                if (canvas) {
                    QRCode.toCanvas(canvas, b.qrData, {
                        width: 120,
                        margin: 1,
                        errorCorrectionLevel: 'H'
                    });
                }
            }, 500);
        } else {
            Swal.fire('خطأ', 'السند غير موجود في هذا المشروع', 'error');
        }
    }
}

function addUser(role) {
    const paymentsOptions = db.payments.map(p => `<label class="flex items-center gap-2"><input type="checkbox" value="${p.name}" class="payment-check"> ${p.name}</label>`).join('');
    const bondTypesOptions = db.bondTypes.map(t => `<label class="flex items-center gap-2"><input type="checkbox" value="${t.id}" class="bondtype-check"> ${t.name}</label>`).join('');
    Swal.fire({
        title: `إضافة ${role === 'manager'? 'مدير' : 'مندوب'} جديد`,
        html: `
            <input id="swal-name" class="swal2-input" placeholder="الاسم">
            <input id="swal-phone" class="swal2-input" placeholder="رقم الجوال 05xxxxxxxx">
            ${role === 'delegate'? `
                <input id="swal-limit" type="number" class="swal2-input" placeholder="السقف اليومي لعدد السندات - 0 = غير محدد">
                <input id="swal-maxamount" type="number" class="swal2-input" placeholder="أكبر مبلغ للسند الواحد - 0 = غير محدد">
                <input id="swal-daily-total" type="number" class="swal2-input" placeholder="الحد الإجمالي للمبالغ اليومية - 0 = غير محدد">
                <div class="text-right mt-3 mb-2 font-bold">أنواع السندات المتاحة:</div>
                <div class="text-right max-h-32 overflow-y-auto border p-2 rounded">${bondTypesOptions || 'لا توجد أنواع. أضفها أولاً'}</div>
                <div class="text-right mt-3 mb-2 font-bold">طرق الدفع المتاحة:</div>
                <div class="text-right max-h-32 overflow-y-auto border p-2 rounded">${paymentsOptions || 'لا توجد طرق دفع. أضفها أولاً'}</div>
            ` : ''}
        `,
        confirmButtonText: 'إضافة',
        width: '600px',
        preConfirm: () => {
            const name = document.getElementById('swal-name').value;
            const phone = document.getElementById('swal-phone').value;
            if (!name ||!phone) Swal.showValidationMessage('املأ الاسم والجوال');
            if (db.users.find(u => u.phone === phone)) Swal.showValidationMessage('رقم الجوال مسجل مسبقاً');
            const allowedPayments = Array.from(document.querySelectorAll('.payment-check:checked')).map(cb => cb.value);
            const allowedBondTypes = Array.from(document.querySelectorAll('.bondtype-check:checked')).map(cb => parseInt(cb.value));
            return {
                name, phone,
                limit: parseInt(document.getElementById('swal-limit')?.value) || 0,
                maxAmount: parseInt(document.getElementById('swal-maxamount')?.value) || 0,
                dailyAmountLimit: parseInt(document.getElementById('swal-daily-total')?.value) || 0,
                allowedPayments,
                allowedBondTypes
            };
        }
    }).then((result) => {
        if (result.isConfirmed) {
            const users = db.users;
            users.push({
                id: Date.now(), phone: result.value.phone, password: '123456',
                name: result.value.name, role: role, active: true,
                dailyLimit: result.value.limit,
                maxAmount: result.value.maxAmount,
                dailyAmountLimit: result.value.dailyAmountLimit,
                allowedPayments: result.value.allowedPayments,
                allowedBondTypes: result.value.allowedBondTypes,
                bondsToday: 0, bondsTodayAmount: 0, bondsTodayDate: '', printCount: {}
            });
            db.users = users;
            saveDB();
            showTab(role === 'manager'? 'managers' : 'delegates');
            Swal.fire('تم', 'تمت الإضافة. كلمة المرور: 123456', 'success');
        }
    });
}

                <div class="flex gap-2 items-center">
                    <div class="upload-btn bg-gray-600 text-white px-4 py-2 rounded-lg cursor-pointer">
                        <span>${translations[currentLang].upload_logo}</span>
                        <input type="file" id="logo-upload" accept="image/*" onchange="uploadLogo(event)">
                    </div>
                    <input id="comp-logo" value="${db.company.logo}" class="flex-1 border-2 p-3 rounded-lg" placeholder="أو الصق رابط الصورة هنا">
                </div>
                ${db.company.logo? `<img id="logo-preview" src="${db.company.logo}" class="company-logo mt-2 border p-2 rounded" crossorigin="anonymous">` : '<img id="logo-preview" class="company-logo mt-2 border p-2 rounded hidden">'}
            </div>
            <button onclick="saveCompany()" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-bold">حفظ الإعدادات</button>
        </div></div>`;
}

function previewCompanyName(name) {
    document.getElementById('companyNameHeader').textContent = name || translations[currentLang].app_name;
}

function uploadLogo(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) return Swal.fire('خطأ', 'حجم الصورة كبير جداً. الحد الأقصى 2 ميجابايت', 'error');
    const reader = new FileReader();
    reader.onload = function(e) {
        const base64 = e.target.result;
        document.getElementById('comp-logo').value = base64;
        document.getElementById('logo-preview').src = base64;
        document.getElementById('logo-preview').classList.remove('hidden');
        Swal.fire('تم', 'تم رفع الشعار. اضغط حفظ الإعدادات لتأكيد الحفظ', 'success');
    };
    reader.readAsDataURL(file);
}

function saveCompany() {
    const company = {
        name: document.getElementById('comp-name').value,
        address: document.getElementById('comp-address').value,
        cr: document.getElementById('comp-cr').value,
        logo: document.getElementById('comp-logo').value
    };
    db.company = company;
    saveDB();
    updateCompanyDisplay();
    Swal.fire('تم', 'تم حفظ إعدادات الشركة', 'success');
}

function exportCashboxExcel() {
    const ws = XLSX.utils.json_to_sheet(db.cashbox.map(t => ({
        'رقم السند': t.bondNumber,
        'النوع': t.type,
        'المبلغ': t.isQabdh? t.amount : -t.amount,
        'البيان': t.description,
        'التاريخ': t.date,
        'المندوب': t.userName,
        'كود المشروع': t.projectCode || '-'
    })));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'صندوق الحركة');
    XLSX.writeFile(wb, `cashbox-${projectCode}-${Date.now()}.xlsx`);
}

function exportBondsExcel() {
    const ws = XLSX.utils.json_to_sheet(db.bonds.map(b => ({
        'رقم السند': b.number,
        'النوع': b.type,
        'المبلغ': b.amount,
        'العميل': b.clientName,
        'الجوال': b.clientPhone,
        'الحساب': b.clientAccount,
        'الدفع': b.payment,
        'المحاسب': b.accountant,
        'الصندوق': b.fund,
        'البيان': b.description,
        'الحالة': b.isQabdh? (b.supplied? 'مورد' : 'غير مورد') : (b.verified? 'موثق' : 'غير موثق'),
        'التاريخ': b.date,
        'المندوب': b.userName,
        'كود المشروع': b.projectCode || '-'
    })));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'السندات');
    XLSX.writeFile(wb, `bonds-${projectCode}-${Date.now()}.xlsx`);
}

function exportCashboxPDF() {
    const element = document.getElementById('cashbox-table');
    const opt = {
        margin: 10,
        filename: `صندوق-الحركة-${projectCode}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
    };
    html2pdf().set(opt).from(element).save();
}

function exportBondsPDF() {
    const content = document.getElementById('tabContent');
    const opt = {
        margin: 10,
        filename: `كل-السندات-${projectCode}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };
    html2pdf().set(opt).from(content).save();
}

function exportAllExcel() {
    exportBondsExcel();
    setTimeout(() => exportCashboxExcel(), 800);
}

function exportAllPDF() {
    const opt = {
        margin: 10,
        filename: `تقرير-شامل-${projectCode}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };
    html2pdf().set(opt).from(document.body).save();
}

function showBackupOptions() {
    const data = {
        projectCode: projectCode,
        company: db.company,
        users: db.users,
        bondTypes: db.bondTypes,
        payments: db.payments,
        accountants: db.accountants,
        funds: db.funds,
        bonds: db.bonds,
        cashbox: db.cashbox,
        printSettings: db.printSettings
    };
    const dataStr = JSON.stringify(data, null, 2);
    const blob = new Blob([dataStr], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `backup-${projectCode}-${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    Swal.fire('تم', 'تم تحميل النسخة الاحتياطية', 'success');
}

function viewBondByUrl() {
    const params = new URLSearchParams(window.location.search);
    const bondId = params.get('bond');
    const projCode = params.get('project');

    if (bondId && projCode) {
        const savedCode = localStorage.getItem('v5_project_code');
        if (savedCode!== projCode) {
            localStorage.setItem('v5_project_code', projCode);
            localStorage.setItem('v5_project_mode', 'connected');
            projectCode = projCode;
            projectMode = 'connected';
            initProjectDB();
        }

        const b = db.bonds.find(x => x.id == bondId);
        if (b) {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = generateBondHTML(b, false);
            document.getElementById('bondViewContent').innerHTML = tempDiv.querySelector('body').innerHTML;
            document.getElementById('bondViewContent').dataset.bondId = b.id;
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('projectSelectScreen').classList.add('hidden');
            document.getElementById('languageScreen').classList.add('hidden');
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('bondViewScreen').classList.remove('hidden');

            setTimeout(() => {
                const canvas = document.getElementById('qrcanvas');
                if (canvas) {
                    QRCode.toCanvas(canvas, b.qrData, {
                        width: 120,
                        margin: 1,
                        errorCorrectionLevel: 'H'
                    });
                }
            }, 500);
        } else {
            Swal.fire('خطأ', 'السند غير موجود في هذا المشروع', 'error');
        }
    }
}

function downloadBondPDF() {
    const element = document.getElementById('bondViewContent');
    const bondId = element.dataset.bondId;
    const b = db.bonds.find(x => x.id == bondId);
    const opt = {
        margin: 10,
        filename: `سند-${b.type}-${b.number}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true, letterRendering: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };
    html2pdf().set(opt).from(element).save();
}

function closeBondView() {
    document.getElementById('bondViewScreen').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');
}

function showTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('border-blue-600', 'font-bold'));
    if(event && event.target) event.target.classList.add('border-blue-600', 'font-bold');
    const content = document.getElementById('tabContent');
    const renderers = {
        dashboard: renderDashboard,
        managers: renderManagers,
        delegates: renderDelegates,
        bondTypes: renderBondTypes,
        payments: renderPayments,
        accountants: renderAccountants,
        funds: renderFunds,
        cashbox: renderCashbox,
        company: renderCompany,
        printSettings: renderPrintSettings,
        bonds: renderBonds,
        createBond: renderCreateBond,
        myBonds: renderMyBonds
    };
    if (renderers[tab]) content.innerHTML = renderers[tab]();
    applyTranslations();
}

window.onload = () => {
    const urlParams = new URLSearchParams(window.location.search);
    const projectParam = urlParams.get('project');
    const bondParam = urlParams.get('bond');

    if (projectParam && bondParam) {
        projectCode = projectParam;
        projectMode = 'connected';
        localStorage.setItem('v5_project_code', projectCode);
        localStorage.setItem('v5_project_mode', projectMode);
        initProjectDB();
        viewBondByUrl();
    } else if (projectParam) {
        projectCode = projectParam;
        projectMode = 'connected';
        localStorage.setItem('v5_project_code', projectCode);
        localStorage.setItem('v5_project_mode', projectMode);
        initProjectDB();
        showLangScreen();
    } else {
        const savedMode = localStorage.getItem('v5_project_mode');
        if (savedMode) {
            projectMode = savedMode;
            projectCode = localStorage.getItem('v5_project_code');
            initProjectDB();
            showLangScreen();
        } else {
            document.getElementById('projectSelectScreen').classList.remove('hidden');
        }
    }
};
</script>
