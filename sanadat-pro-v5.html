let currentLang = localStorage.getItem('v5_lang') || 'ar';

function setLang(lang) {
    currentLang = lang;
    localStorage.setItem('v5_lang', lang);
    document.documentElement.lang = lang;
    document.documentElement.dir = ['ar','ur','fa'].includes(lang)? 'rtl' : 'ltr';
    document.getElementById('languageScreen').classList.add('hidden');
    document.getElementById('loginScreen').classList.remove('hidden');
    applyTranslations();
    updateCompanyDisplay();
}

function showLangScreen() {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('languageScreen').classList.remove('hidden');
}

function applyTranslations() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = translations[currentLang][el.dataset.i18n] || el.textContent;
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        el.placeholder = translations[currentLang][el.dataset.i18nPlaceholder] || el.placeholder;
    });
}

let db = {
    users: JSON.parse(localStorage.getItem('v5_users') || '[]'),
    bondTypes: JSON.parse(localStorage.getItem('v5_bondTypes') || '[]'),
    payments: JSON.parse(localStorage.getItem('v5_payments') || '[]'),
    accountants: JSON.parse(localStorage.getItem('v5_accountants') || '[]'),
    funds: JSON.parse(localStorage.getItem('v5_funds') || '[]'),
    bonds: JSON.parse(localStorage.getItem('v5_bonds') || '[]'),
    cashbox: JSON.parse(localStorage.getItem('v5_cashbox') || '[]'),
    company: JSON.parse(localStorage.getItem('v5_company') || '{"name":"سندات برو","address":"","cr":"","logo":""}'),
    printSettings: JSON.parse(localStorage.getItem('v5_printSettings') || '{"allowMultiplePrint":false,"maxPrints":1,"hideSignatures":true,"customHeaders":{"title":"","subtitle":""},"showQR":true,"qrContentType":"text","autoGenerateQR":true}')
};
let currentUser = null;
function saveDB() {
    localStorage.setItem('v5_users', JSON.stringify(db.users));
    localStorage.setItem('v5_bondTypes', JSON.stringify(db.bondTypes));
    localStorage.setItem('v5_payments', JSON.stringify(db.payments));
    localStorage.setItem('v5_accountants', JSON.stringify(db.accountants));
    localStorage.setItem('v5_funds', JSON.stringify(db.funds));
    localStorage.setItem('v5_bonds', JSON.stringify(db.bonds));
    localStorage.setItem('v5_cashbox', JSON.stringify(db.cashbox));
    localStorage.setItem('v5_company', JSON.stringify(db.company));
    localStorage.setItem('v5_printSettings', JSON.stringify(db.printSettings));
}

if (db.users.length === 0) {
    db.users = [
        {id: 1, phone: '0500000001', password: '123456', name: 'مدير النظام', role: 'superadmin', active: true, printCount: {}},
        {id: 2, phone: '0500000002', password: '123456', name: 'أحمد المدير', role: 'manager', active: true, printCount: {}},
        {id: 3, phone: '0500000003', password: '123456', name: 'مندوب تجريبي', role: 'delegate', active: true, dailyLimit: 10, maxAmount: 5000, dailyAmountLimit: 20000, bondsToday: 0, bondsTodayAmount: 0, bondsTodayDate: '', allowedBondTypes: [], allowedPayments: [], printCount: {}}
    ];
    saveDB();
}

function updateCompanyDisplay() {
    const name = db.company.name || translations[currentLang].app_name;
    document.getElementById('companyNameLogin').textContent = name;
    document.getElementById('companyNameHeader').textContent = name;
    if (db.company.logo) {
        document.getElementById('loginLogo').src = db.company.logo;
        document.getElementById('loginLogo').classList.remove('hidden');
        document.getElementById('headerLogo').src = db.company.logo;
        document.getElementById('headerLogo').classList.remove('hidden');
    }
}

function login() {
    const phone = document.getElementById('loginPhone').value.trim();
    const pass = document.getElementById('loginPass').value;
    const user = db.users.find(u => u.phone === phone && u.password === pass && u.active);
    if (user) {
        currentUser = user;
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('userName').textContent = user.name;
        document.getElementById('userRole').textContent = user.role === 'superadmin'? 'مدير عام' : user.role === 'manager'? 'مدير' : 'مندوب';

        if (user.role === 'superadmin' || user.role === 'manager') {
            document.getElementById('adminTabs').classList.remove('hidden');
            showTab('dashboard');
        } else {
            document.getElementById('delegateTabs').classList.remove('hidden');

function checkDailyReset() {
    const today = new Date().toISOString().split('T')[0];
    if (currentUser.bondsTodayDate!== today) {
        currentUser.bondsToday = 0;
        currentUser.bondsTodayAmount = 0;
        currentUser.bondsTodayDate = today;
        const idx = db.users.findIndex(u => u.id === currentUser.id);
        db.users[idx] = currentUser;
        saveDB();
    }
}

function canCreateBond(amount) {
    if (currentUser.role!== 'delegate') return true;
    checkDailyReset();

    // الشرط 1: عدد السندات اليومي
    if (currentUser.dailyLimit > 0 && currentUser.bondsToday >= currentUser.dailyLimit) {
        Swal.fire('تجاوزت الحد', `وصلت للحد الأقصى اليومي: ${currentUser.dailyLimit} سند`, 'error');
        return false;
    }

    // الشرط 2: أكبر مبلغ للسند الواحد
    if (currentUser.maxAmount > 0 && amount > currentUser.maxAmount) {
        Swal.fire('تجاوزت الحد', `أكبر مبلغ مسموح للسند الواحد: ${currentUser.maxAmount} ريال`, 'error');
        return false;
    }

    // الشرط 3: إجمالي المبالغ اليومية
    if (currentUser.dailyAmountLimit > 0) {
        const newTotal = currentUser.bondsTodayAmount + amount;
        if (newTotal > currentUser.dailyAmountLimit) {
            const remaining = currentUser.dailyAmountLimit - currentUser.bondsTodayAmount;
            Swal.fire('تجاوزت الحد', `تجاوزت الحد الإجمالي اليومي ${currentUser.dailyAmountLimit} ريال. المتبقي لك: ${remaining.toFixed(2)} ريال`, 'error');
            return false;
        }
    }

    return true;
}

function canPrint(bondId) {
    if (currentUser.role!== 'delegate') return true;
    if (!db.printSettings.allowMultiplePrint) {
        const count = currentUser.printCount[bondId] || 0;
        if (count >= db.printSettings.maxPrints) return false;
    }
    return true;
}

function printBond(id) {
    if (!canPrint(id)) return Swal.fire('ممنوع', 'تم استخدام الحد الأقصى للطباعة', 'error');
    const b = db.bonds.find(bond => bond.id === id);
    currentUser.printCount[id] = (currentUser.printCount[id] || 0) + 1;
    const idx = db.users.findIndex(u => u.id === currentUser.id);
    db.users[idx] = currentUser;
    saveDB();

    const printWindow = window.open('', '', 'height=600,width=800');
    printWindow.document.write(generateBondHTML(b, false));
    printWindow.document.close();

    if (db.printSettings.showQR) {
        const qrText = generateQRText(b);
        setTimeout(() => {
            QRCode.toCanvas(printWindow.document.getElementById('qrcanvas'), qrText, {
                width: 100,
                errorCorrectionLevel: 'H',
                margin: 1
            }, function (error) {
                if (error) console.error(error);
                setTimeout(() => printWindow.print(), 200);
            });
        }, 500);
    } else {
        setTimeout(() => printWindow.print(), 300);
    }
}

function createBond() {
    const typeId = document.getElementById('bondType').value;
    const amount = parseFloat(document.getElementById('amount').value);

    if (!typeId ||!amount) return Swal.fire('خطأ', 'املأ الحقول المطلوبة', 'error');
    if (!canCreateBond(amount)) return;

    const type = db.bondTypes.find(t => t.id == typeId);
    const payment = document.getElementById('payment').value;
    const accountant = document.getElementById('accountant').value;
    const fund = document.getElementById('fund').value;

    if (currentUser.role === 'delegate') {
        if (currentUser.allowedBondTypes && currentUser.allowedBondTypes.length > 0 &&!currentUser.allowedBondTypes.includes(parseInt(typeId))) {
            return Swal.fire('ممنوع', 'غير مسموح لك بهذا النوع من السندات', 'error');
        }
        if (currentUser.allowedPayments && currentUser.allowedPayments.length > 0 &&!currentUser.allowedPayments.includes(payment)) {
            return Swal.fire('ممنوع', 'غير مسموح لك بطريقة الدفع هذه', 'error');
        }
    }

    if (type.current > type.end) return Swal.fire('خطأ', 'انتهت أرقام هذا النوع', 'error');

    const isQabdh = type.name.includes('قبض');
    const isSarf = type.name.includes('صرف');

    const bond = {
        id: Date.now(),
        number: type.current,
        type: type.name,
        amount: amount,
        clientName: document.getElementById('clientName').value,
        clientPhone: document.getElementById('clientPhone').value,
        clientAccount: document.getElementById('clientAccount').value,
        payment: payment,
        accountant: accountant,
        fund: fund,
        description: document.getElementById('description').value,
        isQabdh: isQabdh,
        isSarf: isSarf,
        supplied: false, // القبض يبدأ غير مورد
        verified: false, // الصرف يبدأ غير موثق
        date: new Date().toLocaleDateString('ar-SA'),
        userId: currentUser.id,
        userName: currentUser.name,
        qrData: `${window.location.origin}${window.location.pathname}?bond=${Date.now()}`
    };

    bond.qrData = `${window.location.origin}${window.location.pathname}?bond=${bond.id}`;

    db.bonds.push(bond);
    type.current++;
    currentUser.bondsToday++;
    currentUser.bondsTodayAmount += amount;

    const idx = db.users.findIndex(u => u.id === currentUser.id);
    db.users[idx] = currentUser;

    updateCashbox(bond);
    saveDB();

    Swal.fire({
        title: 'تم الإنشاء',
        text: `سند ${type.name} رقم ${bond.number}`,
        icon: 'success',
        showCancelButton: true,
        confirmButtonText: 'طباعة',
        cancelButtonText: 'إغلاق'
    }).then((result) => {
        if (result.isConfirmed) printBond(bond.id);
        showTab('myBonds');
    });
}

            <input id="compAddress" placeholder="العنوان" value="${db.company.address}" class="border-2 p-3 rounded-lg">
            <input id="compCR" placeholder="السجل التجاري" value="${db.company.cr}" class="border-2 p-3 rounded-lg">
            <div class="upload-btn bg-gray-200 p-3 rounded-lg text-center cursor-pointer">
                ${translations[currentLang].upload_logo}
                <input type="file" id="logoUpload" accept="image/*" onchange="uploadLogo(event)">
            </div>
            ${db.company.logo? `<img src="${db.company.logo}" class="company-logo mx-auto">` : ''}
        </div>
        <button onclick="saveCompany()" class="mt-4 bg-blue-600 text-white px-6 py-3 rounded-lg">حفظ</button>
    </div>`;
}

function uploadLogo(event) {
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            db.company.logo = e.target.result;
            saveDB();
            showTab('company');
            Swal.fire('تم', 'تم رفع الشعار بنجاح', 'success');
        };
        reader.readAsDataURL(file);
    }
}

function saveCompany() {
    db.company.name = document.getElementById('compName').value;
    db.company.address = document.getElementById('compAddress').value;
    db.company.cr = document.getElementById('compCR').value;
    saveDB();
    updateCompanyDisplay();
    Swal.fire('تم', 'تم حفظ بيانات الشركة', 'success');
}

function renderDashboard() {
    const today = new Date().toISOString().split('T')[0];
    const todayBonds = db.bonds.filter(b => b.date === today);
    const todayTotal = todayBonds.reduce((sum, b) => sum + b.amount, 0);
    const todayQabdh = todayBonds.filter(b => b.isQabdh).reduce((sum, b) => sum + b.amount, 0);
    const todaySarf = todayBonds.filter(b => b.isSarf).reduce((sum, b) => sum + b.amount, 0);

    return `<div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <div class="bg-white p-6 rounded-lg shadow">
            <div class="text-gray-600 text-sm">سندات اليوم</div>
            <div class="text-3xl font-bold text-blue-600">${todayBonds.length}</div>
        </div>
        <div class="bg-white p-6 rounded-lg shadow">
            <div class="text-gray-600 text-sm">إجمالي اليوم</div>
            <div class="text-3xl font-bold text-green-600">${todayTotal.toFixed(2)} ريال</div>
        </div>
        <div class="bg-white p-6 rounded-lg shadow">
            <div class="text-gray-600 text-sm">سندات قبض اليوم</div>
            <div class="text-3xl font-bold text-green-600">${todayQabdh.toFixed(2)} ريال</div>
        </div>
        <div class="bg-white p-6 rounded-lg shadow">
            <div class="text-gray-600 text-sm">سندات صرف اليوم</div>
            <div class="text-3xl font-bold text-red-600">${todaySarf.toFixed(2)} ريال</div>
        </div>
    </div>`;
}

function renderManagers() {
    const managers = db.users.filter(u => u.role === 'manager' || u.role === 'superadmin');
    return `<div class="bg-white rounded-lg shadow p-6">
        <div class="flex justify-between mb-4">
            <h2 class="text-xl font-bold">${translations[currentLang].managers}</h2>
            <button onclick="showAddManager()" class="bg-blue-600 text-white px-4 py-2 rounded-lg">إضافة مدير</button>
        </div>
        <div class="space-y-2">${managers.map(m => `
            <div class="border p-4 rounded-lg flex justify-between items-center">
                <div>
                    <div class="font-bold">${m.name} ${m.role === 'superadmin'? '<span class="text-xs bg-red-100 text-red-800 px-2 py-1 rounded">مدير عام</span>' : ''}</div>
                    <div class="text-sm text-gray-600">${m.phone}</div>
                </div>
                <div class="flex gap-2">
                    <button onclick="toggleUser(${m.id})" class="px-3 py-1 rounded ${m.active? 'bg-red-500' : 'bg-green-500'} text-white text-sm">${m.active? 'إيقاف' : 'تفعيل'}</button>
                    ${m.role!== 'superadmin'? `<button onclick="deleteUser(${m.id})" class="bg-red-600 text-white px-3 py-1 rounded text-sm">حذف</button>` : ''}
                </div>
            </div>`).join('')}
        </div></div>`;
}

function renderDelegates() {
    const delegates = db.users.filter(u => u.role === 'delegate');
    return `<div class="bg-white rounded-lg shadow p-6">
        <div class="flex justify-between mb-4">
            <h2 class="text-xl font-bold">${translations[currentLang].delegates}</h2>
            <button onclick="showAddDelegate()" class="bg-blue-600 text-white px-4 py-2 rounded-lg">إضافة مندوب</button>
        </div>
        <div class="space-y-2">${delegates.map(d => `
            <div class="border p-4 rounded-lg">
                <div class="flex justify-between items-start mb-2">
                    <div>
                        <div class="font-bold">${d.name}</div>
                        <div class="text-sm text-gray-600">${d.phone}</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editDelegate(${d.id})" class="bg-yellow-500 text-white px-3 py-1 rounded text-sm">تعديل</button>
                        <button onclick="toggleUser(${d.id})" class="px-3 py-1 rounded ${d.active? 'bg-red-500' : 'bg-green-500'} text-white text-sm">${d.active? 'إيقاف' : 'تفعيل'}</button>
                        <button onclick="deleteUser(${d.id})" class="bg-red-600 text-white px-3 py-1 rounded text-sm">حذف</button>
                    </div>
                <div class="text-xs text-gray-500 grid grid-cols-3 gap-2">
                    <div>الحد اليومي: ${d.dailyLimit || 'غير محدود'}</div>
                    <div>أكبر مبلغ: ${d.maxAmount || 'غير محدود'} ريال</div>
                    <div>الحد الإجمالي: ${d.dailyAmountLimit || 'غير محدود'} ريال</div>
                </div>
            </div>`).join('')}
        </div></div>`;
}

function showAddDelegate() {
    Swal.fire({
        title: 'إضافة مندوب جديد',
        html: `
            <input id="swal-name" class="swal2-input" placeholder="الاسم">
            <input id="swal-phone" class="swal2-input" placeholder="رقم الجوال">
            <input id="swal-pass" type="password" class="swal2-input" placeholder="كلمة المرور">
            <input id="swal-daily" type="number" class="swal2-input" placeholder="الحد اليومي للعدد" value="10">
            <input id="swal-max" type="number" class="swal2-input" placeholder="أكبر مبلغ للسند" value="5000">
            <input id="swal-total" type="number" class="swal2-input" placeholder="الحد الإجمالي اليومي" value="20000">
        `,
        confirmButtonText: 'إضافة',
        showCancelButton: true,
        cancelButtonText: 'إلغاء',
        preConfirm: () => {
            const name = document.getElementById('swal-name').value;
            const phone = document.getElementById('swal-phone').value;
            const pass = document.getElementById('swal-pass').value;
            if (!name ||!phone ||!pass) {
                Swal.showValidationMessage('املأ جميع الحقول');
                return false;
            }
            return {
                name: name,
                phone: phone,
                password: pass,
                dailyLimit: parseInt(document.getElementById('swal-daily').value) || 0,
                maxAmount: parseFloat(document.getElementById('swal-max').value) || 0,
                dailyAmountLimit: parseFloat(document.getElementById('swal-total').value) || 0
            };
        }
    }).then((result) => {
        if (result.isConfirmed) {
            db.users.push({
                id: Date.now(),
                phone: result.value.phone,
                password: result.value.password,
                name: result.value.name,
                role: 'delegate',
                active: true,
                dailyLimit: result.value.dailyLimit,
                maxAmount: result.value.maxAmount,
                dailyAmountLimit: result.value.dailyAmountLimit,
                bondsToday: 0,
                bondsTodayAmount: 0,
                bondsTodayDate: '',
                allowedBondTypes: [],
                allowedPayments: [],
                printCount: {}
            });
            saveDB();
            showTab('delegates');
            Swal.fire('تم', 'تم إضافة المندوب بنجاح', 'success');
        }
    });
}

function toggleUser(id) {
    const user = db.users.find(u => u.id === id);
    user.active =!user.active;
    saveDB();
    showTab(currentUser.role === 'delegate'? 'delegates' : 'managers');
}

function deleteUser(id) {
    Swal.fire({
        title: 'تأكيد الحذف',
        text: 'هل أنت متأكد من حذف هذا المستخدم؟',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'نعم، احذف',
        cancelButtonText: 'إلغاء'
    }).then((result) => {
        if (result.isConfirmed) {
            db.users = db.users.filter(u => u.id!== id);
            saveDB();
            showTab(currentUser.role === 'delegate'? 'delegates' : 'managers');
            Swal.fire('تم', 'تم الحذف بنجاح', 'success');
        }
    });
}

function showChangePass() {
    Swal.fire({
        title: 'تغيير كلمة المرور',
        html: `
            <input id="swal-old" type="password" class="swal2-input" placeholder="كلمة المرور الحالية">
            <input id="swal-new" type="password" class="swal2-input" placeholder="كلمة المرور الجديدة">
            <input id="swal-confirm" type="password" class="swal2-input" placeholder="تأكيد كلمة المرور">
        `,
        confirmButtonText: 'تغيير',
        showCancelButton: true,
        cancelButtonText: 'إلغاء',
        preConfirm: () => {
            const oldPass = document.getElementById('swal-old').value;
            const newPass = document.getElementById('swal-new').value;
            const confirmPass = document.getElementById('swal-confirm').value;
            if (oldPass!== currentUser.password) {
                Swal.showValidationMessage('كلمة المرور الحالية غير صحيحة');
                return false;
            }
            if (newPass!== confirmPass) {
                Swal.showValidationMessage('كلمة المرور الجديدة غير متطابقة');
                return false;
            }
            if (newPass.length < 6) {
                Swal.showValidationMessage('كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                return false;
            }
            return newPass;
        }
    }).then((result) => {
        if (result.isConfirmed) {
            currentUser.password = result.value;
            const idx = db.users.findIndex(u => u.id === currentUser.id);
            db.users[idx] = currentUser;
            saveDB();
            Swal.fire('تم', 'تم تغيير كلمة المرور بنجاح', 'success');
        }
    });
}

function downloadBondPDF() {
    const bondId = document.getElementById('bondViewContent').dataset.bondId;
    if (bondId) printBondPDF(parseInt(bondId));
}

function closeBondView() {
    document.getElementById('bondViewScreen').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');
}

function showTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('font-bold', 'border-b-2', 'border-blue-600');
    });
    event?.target.classList.add('font-bold', 'border-b-2', 'border-blue-600');

    const content = document.getElementById('tabContent');
    if (tab === 'dashboard') content.innerHTML = renderDashboard();
    else if (tab === 'managers') content.innerHTML = renderManagers();
    else if (tab === 'delegates') content.innerHTML = renderDelegates();
    else if (tab === 'createBond') content.innerHTML = renderCreateBond();
    else if (tab === 'myBonds') content.innerHTML = renderMyBonds();
    else if (tab === 'bonds') content.innerHTML = renderBonds();
    else if (tab === 'cashbox') content.innerHTML = renderCashbox();
    else if (tab === 'printSettings') content.innerHTML = renderPrintSettings();
    else if (tab === 'company') content.innerHTML = renderCompany();
    else content.innerHTML = '<div class="bg-white rounded-lg shadow p-6 text-center text-gray-500">قريباً...</div>';
}

function exportBondsExcel() {
    const ws = XLSX.utils.json_to_sheet(db.bonds);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'السندات');
    XLSX.writeFile(wb, 'السندات.xlsx');
}

function exportBondsPDF() {
    Swal.fire('جاري التصدير', 'سيتم تحميل ملف PDF...', 'info');
}

// تشغيل عند تحميل الصفحة
if (localStorage.getItem('v5_lang')) {
    setLang(currentLang);
} else {
    document.getElementById('languageScreen').classList.remove('hidden');
}

updateCompanyDisplay();
viewBondByUrl();
</script>
</body>
</html>
