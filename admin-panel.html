<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="adminPanel">لوحة تحكم سندات برو</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
       .hidden { display: none!important; }
       .tab-btn.active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 800; background: #eff6ff; }
       .badge { font-size: 10px; padding: 2px 8px; border-radius: 6px; font-weight: 700; }

    <script type="module">
        import { t, setLanguage, applyLanguage } from './lang.js?v=999999';
        window.t = t;
        window.setLanguage = setLanguage;
        window.applyLanguage = applyLanguage;

</head>
<body class="p-4">

    <!-- شاشة تحميل -->

        <div class="bg-white rounded-2xl shadow-2xl p-8 text-center">

                <button id="logoutBtn" class="bg-gradient-to-r from-red-500 to-red-600 text-white px-5 py-2 rounded-xl font-bold hover:opacity-90 transition">
                    <i class="fas fa-sign-out-alt ml-2"></i> خروج

        <!-- إحصائيات سريعة للسوبر -->
        <div id="superStats" class="hidden grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white/90 backdrop-blur rounded-2xl shadow-xl p-5 card-hover">
                <p class="text-gray-500 text-sm">إجمالي المشاريع</p>
                <p id="statProjects" class="text-3xl font-extrabold text-blue-600">0</p>
                <p id="statProjectsActive" class="text-xs text-green-600 mt-1"></p>

            <div class="bg-white/90 backdrop-blur rounded-2xl shadow-xl p-5 card-hover">
                <p class="text-gray-500 text-sm">إجمالي المدراء</p>
                <p id="statManagers" class="text-3xl font-extrabold text-green-600">0</p>
            </div>
            <div class="bg-white/90 backdrop-blur rounded-2xl shadow-xl p-5 card-hover">
                <p class="text-gray-500 text-sm">إجمالي المناديب</p>

            </div>

                <p class="text-gray-500 text-sm">إجمالي السندات</p>
                <p id="statBonds" class="text-3xl font-extrabold text-orange-600">0</p>

        <!-- رسم بياني للمشاريع -->
        <div id="chartContainer" class="hidden bg-white/90 backdrop-blur rounded-2xl shadow-xl p-6 mb-6">

            </h2>
            <canvas id="projectsChart" height="80"></canvas>
        </div>

        <!-- التبويبات -->

                <button data-tab="projects" id="tab-projects" class="tab-btn px-6 py-4 font-bold border-b-4 border-blue-600 text-blue-600 bg-blue-50 active">

                <button data-tab="managers" id="tab-managers" class="tab-btn px-6 py-4 font-bold text-gray-600 hover:bg-gray-50">
                    <i class="fas fa-users-cog ml-2"></i>المدراء

                <button data-tab="delegates" id="tab-delegates" class="tab-btn px-6 py-4 font-bold text-gray-600 hover:bg-gray-50">

                <button data-tab="bonds" id="tab-bonds" class="tab-btn px-6 py-4 font-bold text-gray-600 hover:bg-gray-50">
                    <i class="fas fa-file-invoice-dollar ml-2"></i>السندات

                <button data-tab="settings" id="tab-settings" class="tab-btn px-6 py-4 font-bold text-gray-600 hover:bg-gray-50">

        <!-- تبويب المشاريع -->
        <div id="projectsTab" class="tab-content bg-white/90 backdrop-blur rounded-2xl shadow-xl p-6">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2">

            </h2>
            <div id="createProjectForm" class="grid md:grid-cols-4 gap-3 mb-6">

                <input id="projectCodeInput" autocomplete="off" placeholder="كود المشروع مثل TAQWA01"

                       class="border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none">

                        <span class="text-sm">مدى الحياة</span>
                    </label>
                    <button id="addProjectBtn" class="bg-gradient-to-r from-purple-500 to-purple-600 text-white px-6 py-3 rounded-xl font-bold hover:opacity-90 transition">

        <!-- تبويب المدراء -->

                <i class="fas fa-users-cog text-blue-600"></i>إدارة المدراء

            <div id="addManagerForm" class="grid md:grid-cols-6 gap-3 mb-6">

                       class="border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none">
                <input id="managerPhone" autocomplete="off" placeholder="رقم الجوال"

                <input id="managerPassword" type="password" autocomplete="new-password" placeholder="كلمة المرور"
                       class="border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none">
                <select id="managerRole" class="border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none">
                    <option value="admin">مدير عام - كل الصلاحيات</option>
                    <option value="manager">مدير - إضافة مناديب وسندات</option>
                    <option value="viewer">مشاهد - عرض فقط</option>
                </select>
                <button id="addManagerBtn" class="bg-gradient-to-r from-green-500 to-green-600 text-white px-6 py-3 rounded-xl font-bold hover:opacity-90 transition">
                    <i class="fas fa-plus ml-2"></i>إضافة
                </button>
            </div>
            <div id="managersList" class="space-y-3"></div>
        </div>

        <!-- تبويب المناديب -->
        <div id="delegatesTab" class="tab-content hidden bg-white/90 backdrop-blur rounded-2xl shadow-xl p-6">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                <i class="fas fa-user-tie text-blue-600"></i>إدارة المناديب
            </h2>
            <div id="addDelegateForm" class="grid md:grid-cols-5 gap-3 mb-6">
                <input id="delegateName" autocomplete="off" placeholder="اسم المندوب"
                       class="border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none">
                <input id="delegatePhone" autocomplete="off" placeholder="رقم الجوال"
                       class="border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none" dir="ltr">
                <select id="delegateProjectCode" class="border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none">
                    <option value="">اختر المشروع</option>
                </select>
                <input id="delegatePassword" type="password" autocomplete="new-password" placeholder="كلمة المرور"
                       class="border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none">
                <button id="addDelegateBtn" class="bg-gradient-to-r from-green-500 to-green-600 text-white px-6 py-3 rounded-xl font-bold hover:opacity-90 transition">
                    <i class="fas fa-plus ml-2"></i>إضافة
                </button>
            </div>
            <div id="delegatesList" class="space-y-3"></div>
        </div>

        <!-- تبويب السندات -->
        <div id="bondsTab" class="tab-content hidden bg-white/90 backdrop-blur rounded-2xl shadow-xl p-6">
            <h2 class="text-xl font-extrabold mb-4 flex items-center gap-2">
                <i class="fas fa-file-invoice-dollar text-blue-600"></i>كل السندات
            </h2>
            <div class="mb-4 flex gap-2">
                <select id="filterProject" class="border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none">
                    <option value="">كل المشاريع</option>
                </select>
                <input id="searchBonds" type="text" placeholder="بحث..."
                       class="border-2 border-gray-200 p-3 rounded-xl flex-1 focus:border-blue-500 outline-none">
                <select id="filterType" class="border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none">
                    <option value="">الكل</option>
                    <option value="قبض">سند قبض</option>
                    <option value="صرف">سند صرف</option>
                </select>
            </div>
            <div id="bondsList" class="space-y-3"></div>
        </div>

        <!-- تبويب إعدادات المشروع -->
        <div id="settingsTab" class="tab-content hidden bg-white/90 backdrop-blur rounded-2xl shadow-xl p-6">
            <h2 class="text-xl font-extrabold mb-6 flex items-center gap-2">
                <i class="fas fa-cog text-blue-600"></i>إعدادات المشروع
            </h2>
            <div class="mb-6">
                <label class="block text-sm font-bold text-gray-700 mb-2">اختر المشروع للتعديل</label>
                <select id="settingsProjectCode" class="w-full border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none">
                    <option value="">اختر المشروع</option>
                </select>
            </div>

            <div id="projectSettingsForm" class="hidden space-y-5">
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">لوجو المشروع - رابط صورة</label>
                        <input id="projectLogo" autocomplete="off" placeholder="https://example.com/logo.png"
                               class="w-full border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none" dir="ltr">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">تاريخ انتهاء المشروع</label>
                        <div class="flex gap-2">
                            <input id="projectExpiryEdit" type="date"
                                   class="flex-1 border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none">
                            <label class="flex items-center gap-2 bg-gray-50 px-4 rounded-xl border-2 border-gray-200">
                                <input id="projectLifetimeEdit" type="checkbox" class="w-5 h-5">
                                <span class="text-sm">مدى الحياة</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">الشروط والأحكام</label>
                    <textarea id="projectTerms" rows="6" placeholder="اكتب الشروط والأحكام الخاصة بالمشروع هنا..."
                           class="w-full border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none"
                           oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">تفعيل الميزات للمناديب</label>
                    <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
                        <label class="flex items-center gap-2 bg-gray-50 p-3 rounded-xl border-2 border-gray-200">
                            <input id="featureWhatsApp" type="checkbox" checked class="w-5 h-5">
                            <i class="fab fa-whatsapp text-green-600"></i>
                            <span>واتساب</span>
                        </label>
                        <label class="flex items-center gap-2 bg-gray-50 p-3 rounded-xl border-2 border-gray-200">
                            <input id="featureExcel" type="checkbox" checked class="w-5 h-5">
                            <i class="fas fa-file-excel text-green-700"></i>
                            <span>اكسل</span>
                        </label>
                        <label class="flex items-center gap-2 bg-gray-50 p-3 rounded-xl border-2 border-gray-200">
                            <input id="featurePDF" type="checkbox" checked class="w-5 h-5">
                            <i class="fas fa-file-pdf text-red-600"></i>
                            <span>PDF</span>
                        </label>
                        <label class="flex items-center gap-2 bg-gray-50 p-3 rounded-xl border-2 border-gray-200">
                            <input id="featurePrint" type="checkbox" checked class="w-5 h-5">
                            <i class="fas fa-print text-blue-600"></i>
                            <span>طباعة</span>
                        </label>
                        <label class="flex items-center gap-2 bg-gray-50 p-3 rounded-xl border-2 border-gray-200">
                            <input id="featureQR" type="checkbox" checked class="w-5 h-5">
                            <i class="fas fa-qrcode text-purple-600"></i>
                            <span>QR</span>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">إعدادات الواجهة</label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="flex items-center gap-2 bg-gray-50 p-3 rounded-xl border-2 border-gray-200">
                            <input id="showCreateBond" type="checkbox" checked class="w-5 h-5">
                            <span>إظهار زر "إنشاء سند" للمناديب</span>
                        </label>
                        <label class="flex items-center gap-2 bg-gray-50 p-3 rounded-xl border-2 border-gray-200">
                            <input id="showBondsTab" type="checkbox" checked class="w-5 h-5">
                            <span>إظهار تبويب "السندات"</span>
                        </label>
                        <label class="flex items-center gap-2 bg-gray-50 p-3 rounded-xl border-2 border-gray-200 col-span-2">
                            <input id="forceTermsAccept" type="checkbox" checked class="w-5 h-5">
                            <span>إلزام المدير بالموافقة على الشروط عند أول دخول</span>
                        </label>
                    </div>
                </div>

                <button id="saveSettingsBtn" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white p-4 rounded-xl font-bold text-lg hover:opacity-90 transition">
                    <i class="fas fa-save ml-2"></i>حفظ الإعدادات
                </button>
            </div>
        </div>
    </div>

<script type="module">
    import { auth, db } from './firebase.js?v=999999';
    import { getCurrentUserData, logout, createUser } from './auth.js?v=999999';
    import { showSuccess, showError, showConfirm, formatDate, formatMoney } from './core.js?v=999999';
    import { TERMS_VERSION, showTermsModal, hasAcceptedLatestTerms } from './terms.js?v=999999';
    import { collection, addDoc, deleteDoc, doc, onSnapshot, serverTimestamp, updateDoc, query, where, getDocs, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    let currentUser = null;
    let allProjects = [];
    let allManagers = [];
    let allDelegates = [];
    let allBonds = [];
    let editingManagerId = null;
    let projectsChart = null;

    const PERMISSIONS = {
        superadmin: { canCreateProject: true, canViewAllProjects: true, canManageManagers: true, canManageDelegates: true, canManageBonds: true, canEditSettings: true, canDelete: true, maxProjects: -1 },
        admin: { canCreateProject: false, canViewAllProjects: false, canManageManagers: true, canManageDelegates: true, canManageBonds: true, canEditSettings: true, canDelete: true, maxProjects: 0 },
        manager: { canCreateProject: false, canViewAllProjects: false, canManageManagers: false, canManageDelegates: true, canManageBonds: true, canEditSettings: false, canDelete: false, maxProjects: 0 },
        viewer: { canCreateProject: false, canViewAllProjects: false, canManageManagers: false, canManageDelegates: false, canManageBonds: false, canEditSettings: false, canDelete: false, maxProjects: 0 }
    };

    // 1. تحقق من المستخدم + الشروط
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'index.html?logout=true';
            return;
        }

        const SUPER_ADMIN_EMAIL = '001122334455-0597087767@sanadat.pro';

        if (user.email === SUPER_ADMIN_EMAIL) {
            currentUser = { uid: user.uid, email: user.email, role: 'superadmin', name: 'السوبر ادمن', projectCode: '001122334455' };
        } else {
            currentUser = await getCurrentUserData();
        }

        if (!currentUser ||!PERMISSIONS[currentUser.role]) {
            Swal.fire('خطأ', 'غير مصرح لك بالدخول', 'error').then(() => logout());
            return;
        }

        // تشييك الشروط للمدير
        if (['admin', 'manager'].includes(currentUser.role)) {
            const userDoc = await getDoc(doc(db, 'users', currentUser.uid));
            const userData = userDoc.data();
            if (!userData.termsAccepted || userData.termsAcceptedVersion!== TERMS_VERSION) {
                const accepted = await showTermsModal();
                if (!accepted) {
                    await logout();
                    return;
                }
                await updateDoc(doc(db, 'users', currentUser.uid), {
                    termsAccepted: true,
                    termsAcceptedVersion: TERMS_VERSION,
                    termsAcceptedAt: new Date()
                });
            }
        }

        applyPermissions();
        document.getElementById('loadingScreen').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        document.getElementById('welcomeMsg').textContent = `مرحباً ${currentUser.name}`;
        loadAllData();
    });

    // 2. تطبيق الصلاحيات
    function applyPermissions() {
        const perms = PERMISSIONS[currentUser.role];
        const roleNames = { superadmin: 'سوبر ادمن', admin: 'مدير عام', manager: 'مدير', viewer: 'مشاهد' };
        const badgeColors = { superadmin: 'bg-red-500 text-white', admin: 'bg-purple-500 text-white', manager: 'bg-blue-500 text-white', viewer: 'bg-gray-500 text-white' };

        document.getElementById('roleBadge').className = `badge ${badgeColors[currentUser.role]}`;
        document.getElementById('roleBadge').textContent = roleNames[currentUser.role];

        if (!perms.canViewAllProjects) {
            document.getElementById('tab-projects').classList.add('hidden');
            document.getElementById('projectsTab').classList.add('hidden');
            document.getElementById('superStats').classList.add('hidden');
            document.getElementById('chartContainer').classList.add('hidden');
        } else {
            document.getElementById('superStats').classList.remove('hidden');
            document.getElementById('chartContainer').classList.remove('hidden');
        }

        if (!perms.canCreateProject) document.getElementById('createProjectForm').classList.add('hidden');
        if (!perms.canManageManagers) {
            document.getElementById('tab-managers').classList.add('hidden');
            document.getElementById('managersTab').classList.add('hidden');
            document.getElementById('addManagerForm').classList.add('hidden');
        }
        if (!perms.canManageDelegates) document.getElementById('addDelegateForm').classList.add('hidden');
        if (!perms.canEditSettings) {
            document.getElementById('tab-settings').classList.add('hidden');
            document.getElementById('settingsTab').classList.add('hidden');
        }

        const firstVisibleTab = document.querySelector('.tab-btn:not(.hidden)');
        if (firstVisibleTab) firstVisibleTab.click();
    }

    // 3. خروج
    document.getElementById('logoutBtn').onclick = async () => { await logout(); };

    // 4. التبويبات
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.onclick = () => {
            const tab = btn.dataset.tab;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('active', 'border-blue-600', 'bg-blue-50', 'text-blue-600');
                b.classList.add('text-gray-600');
            });
            document.getElementById(tab + 'Tab').classList.remove('hidden');
            btn.classList.add('active', 'border-blue-600', 'bg-blue-50', 'text-blue-600');
            btn.classList.remove('text-gray-600');
        };
    });

    // 5. تحميل البيانات
    function loadAllData() {
        const perms = PERMISSIONS[currentUser.role];

        let projectsQuery = collection(db, 'projects');
        if (currentUser.role!== 'superadmin') {
            projectsQuery = query(collection(db, 'projects'), where('code', '==', currentUser.projectCode));
        }
        onSnapshot(projectsQuery, (snapshot) => {
            allProjects = snapshot.docs.map(doc => ({ id: doc.id,...doc.data() }));
            renderProjects();
            renderProjectOptions();
            updateStats();
            renderChart();
        });

        let usersQuery = collection(db, 'users');
        if (currentUser.role!== 'superadmin') {
            usersQuery = query(collection(db, 'users'), where('projectCode', '==', currentUser.projectCode));
        }
        onSnapshot(usersQuery, (snapshot) => {
            const users = snapshot.docs.map(doc => ({ id: doc.id,...doc.data() }));
            allManagers = users.filter(u => ['admin', 'manager', 'viewer'].includes(u.role));
            allDelegates = users.filter(u => u.role === 'delegate');
            renderManagers();
            renderDelegates();
            updateStats();
        });

        let bondsQuery = collection(db, 'bonds');
        if (currentUser.role!== 'superadmin') {
            bondsQuery = query(collection(db, 'bonds'), where('projectCode', '==', currentUser.projectCode));
        }
        onSnapshot(bondsQuery, (snapshot) => {
            allBonds = snapshot.docs.map(doc => ({ id: doc.id,...doc.data() }));
            renderBonds();
            updateStats();
            renderChart();
        });
    }

    // 6. إحصائيات
    function updateStats() {
        document.getElementById('statProjects').textContent = allProjects.length;
        const activeProjects = allProjects.filter(p => {
            if (p.isLifetime) return true;
            if (!p.expiryDate) return true;
            return new Date(p.expiryDate) >= new Date();
        }).length;
        document.getElementById('statProjectsActive').textContent = `${activeProjects} نشط`;

        document.getElementById('statManagers').textContent = allManagers.length;
        document.getElementById('statDelegates').textContent = allDelegates.length;
        document.getElementById('statBonds').textContent = allBonds.length;

        const totalAmount = allBonds.reduce((sum, b) => sum + (b.amount || 0), 0);
        document.getElementById('statBondsAmount').textContent = formatMoney(totalAmount);
    }

    // 7. رسم بياني
    function renderChart() {
        const ctx = document.getElementById('projectsChart');
        if (!ctx) return;

        const last30Days = {};
        const today = new Date();
        for (let i = 29; i >= 0; i--) {
            const d = new Date(today);
            d.setDate(d.getDate() - i);
            const key = d.toISOString().split('T')[0];
            last30Days[key] = 0;
        }

        allBonds.forEach(b => {
            const date = b.createdAt?.toDate? b.createdAt.toDate().toISOString().split('T')[0] : b.bondDate;
            if (last30Days.hasOwnProperty(date)) last30Days[date]++;
        });

        if (projectsChart) projectsChart.destroy();
        projectsChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Object.keys(last30Days).map(d => d.split('-')[2] + '/' + d.split('-')[1]),
                datasets: [{
                    label: 'عدد السندات',
                    data: Object.values(last30Days),
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
            }
        });
    }

    window.renewProject = async (projectId, years = 1) => {
        const result = await Swal.fire({
            title: 'تجديد المشروع',
            html: `تجديد لمدة <input id="renewYears" type="number" value="${years}" min="1" max="10" class="swal2-input" style="width:100px"> سنة`,
            showCancelButton: true,
            confirmButtonText: 'تجديد',
            cancelButtonText: 'إلغاء',
            preConfirm: () => {
                return document.getElementById('renewYears').value;
            }
        });

        if (result.isConfirmed) {
            const newYears = parseInt(result.value);
            const project = allProjects.find(p => p.id === projectId);
            let newExpiry = new Date();
            
            if (project.expiryDate) {
                newExpiry = new Date(project.expiryDate);
            }
            newExpiry.setFullYear(newExpiry.getFullYear() + newYears);

            try {
                await updateDoc(doc(db, 'projects', projectId), {
                    expiryDate: newExpiry.toISOString().split('T')[0],
                    isLifetime: false,
                    renewedAt: serverTimestamp(),
                    renewedBy: currentUser.uid
                });
                showSuccess(`تم التجديد حتى ${newExpiry.toLocaleDateString('ar-SA')}`);
            } catch (error) {

    // 11. حساب حالة المشروع
    function getProjectStatus(project) {
        if (project.isLifetime) return { text: 'نشط - مدى الحياة', class: 'status-active', icon: 'fa-infinity' };
        if (!project.expiryDate) return { text: 'نشط', class: 'status-active', icon: 'fa-check' };
        
        const today = new Date();
        const expiry = new Date(project.expiryDate);
        const diffDays = Math.ceil((expiry - today) / (1000 * 60 * 60 * 24));
        
        if (diffDays < 0) return { text: 'منتهي', class: 'status-expired', icon: 'fa-ban' };
        if (diffDays <= 30) return { text: `ينتهي خلال ${diffDays} يوم`, class: 'status-expiring', icon: 'fa-exclamation-triangle' };
        return { text: 'نشط', class: 'status-active', icon: 'fa-check' };
    }

            logo: document.getElementById('projectLogo').value.trim(),
            terms: document.getElementById('projectTerms').value.trim(),
            showCreateBond: document.getElementById('showCreateBond').checked,
            showBondsTab: document.getElementById('showBondsTab').checked,
            features: {
                whatsapp: document.getElementById('featureWhatsApp').checked,
                excel: document.getElementById('featureExcel').checked,
                pdf: document.getElementById('featurePDF').checked,
                print: document.getElementById('featurePrint').checked,
                qr: document.getElementById('featureQR').checked
            },
            forceTermsAccept: document.getElementById('forceTermsAccept').checked
        };

        const expiryDate = document.getElementById('projectExpiryEdit').value;
        const isLifetime = document.getElementById('projectLifetimeEdit').checked;

        try {
            await updateDoc(doc(db, 'projects', project.id), {
                settings,
                expiryDate: isLifetime? null : expiryDate,
                isLifetime: isLifetime,
                updatedAt: serverTimestamp()
            });
            showSuccess('تم حفظ الإعدادات');
        } catch (error) {
            showError(error.message);
        }
    };

    document.getElementById('settingsProjectCode').onchange = (e) => {
        const projectCode = e.target.value;
        const form = document.getElementById('projectSettingsForm');
        if (!projectCode) {
            form.classList.add('hidden');
            return;
        }
        const project = allProjects.find(p => p.code === projectCode);
        if (project && project.settings) {
            document.getElementById('projectLogo').value = project.settings.logo || '';
            document.getElementById('projectTerms').value = project.settings.terms || '';
            document.getElementById('projectExpiryEdit').value = project.expiryDate || '';
            document.getElementById('projectLifetimeEdit').checked = project.isLifetime || false;
            document.getElementById('projectExpiryEdit').disabled = project.isLifetime || false;
            document.getElementById('showCreateBond').checked = project.settings.showCreateBond!== false;
            document.getElementById('showBondsTab').checked = project.settings.showBondsTab!== false;
            document.getElementById('featureWhatsApp').checked = project.settings.features?.whatsapp!== false;
            document.getElementById('featureExcel').checked = project.settings.features?.excel!== false;
            document.getElementById('featurePDF').checked = project.settings.features?.pdf!== false;
            document.getElementById('featurePrint').checked = project.settings.features?.print!== false;
            document.getElementById('featureQR').checked = project.settings.features?.qr!== false;
            document.getElementById('forceTermsAccept').checked = project.settings.forceTermsAccept!== false;
            
            // تكبير textarea تلقائي
            const termsTextarea = document.getElementById('projectTerms');
            termsTextarea.style.height = '';
            termsTextarea.style.height = termsTextarea.scrollHeight + 'px';
            
            form.classList.remove('hidden');
        }
    };

    // 19. حذف عام
    window.deleteItem = async (type, id) => {
        const perms = PERMISSIONS[currentUser.role];
        if (!perms.canDelete) {
            return Swal.fire('مرفوض', 'ليس لديك صلاحية الحذف', 'error');
        }

        const result = await Swal.fire({
            title: 'تأكيد الحذف',
            text: 'سيتم الحذف نهائياً',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'نعم احذف',
            cancelButtonText: 'إلغاء'
        });

        if (result.isConfirmed) {
            try {
                await deleteDoc(doc(db, type, id));
                Swal.fire('تم', 'تم الحذف بنجاح', 'success');
            } catch (error) {
                Swal.fire('خطأ', error.message, 'error');
            }
        }
    };

    // 20. تنظيف كود المشروع
    document.getElementById('projectCodeInput').oninput = (e) => {
        e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    };

    // 21. فلترة السندات
    document.getElementById('searchBonds').oninput = renderBonds;
    document.getElementById('filterType').onchange = renderBonds;
    document.getElementById('filterProject').onchange = renderBonds;
</script>

</body>
</html>
