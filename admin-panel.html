<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="adminPanel">لوحة تحكم سندات برو</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .hidden { display: none!important; }
        .tab-btn.active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 800; background: #eff6ff; }
    </style>

    <script type="module">
        import { t, setLanguage, applyLanguage } from './lang.js';
        window.t = t;
        window.setLanguage = setLanguage;
        window.applyLanguage = applyLanguage;
        applyLanguage();
    </script>
</head>
<body class="p-4">

    <!-- شاشة تحميل -->
    <div id="loadingScreen" class="w-full max-w-md mx-auto mt-20">
        <div class="bg-white rounded-2xl shadow-2xl p-8 text-center">
            <i class="fas fa-spinner fa-spin text-4xl text-blue-600 mb-4"></i>
            <p class="text-lg font-bold">جاري التحقق من الصلاحيات...</p>
        </div>
    </div>

    <!-- لوحة التحكم -->
    <div id="dashboard" class="hidden w-full max-w-7xl mx-auto">
        <!-- الهيدر -->
        <div class="bg-white/90 backdrop-blur rounded-2xl shadow-xl p-4 mb-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center">
                    <i class="fas fa-user-shield text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-extrabold" data-i18n="dashboard">لوحة التحكم الرئيسية</h1>
                    <p class="text-sm text-gray-500" id="welcomeMsg">مرحباً بك</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="setLanguage(localStorage.getItem('language') === 'ar'? 'en' : 'ar')" 
                        class="bg-white hover:bg-gray-100 px-4 py-2 rounded-xl font-bold transition text-lg shadow">🌍</button>
                <button id="logoutBtn" class="bg-gradient-to-r from-red-500 to-red-600 text-white px-5 py-2 rounded-xl font-bold hover:opacity-90 transition" data-i18n="logout">
                    <i class="fas fa-sign-out-alt ml-2"></i> خروج
                </button>
            </div>
        </div>

        <!-- التبويبات -->
        <div class="bg-white/90 backdrop-blur rounded-2xl shadow-xl mb-6">
            <div class="flex border-b overflow-x-auto">
                <button data-tab="managers" class="tab-btn px-6 py-4 font-bold border-b-4 border-blue-600 text-blue-600 bg-blue-50 active">
                    <i class="fas fa-users-cog ml-2"></i><span data-i18n="managers">المدراء</span>
                </button>
                <button data-tab="delegates" class="tab-btn px-6 py-4 font-bold text-gray-600 hover:bg-gray-50">
                    <i class="fas fa-user-tie ml-2"></i><span data-i18n="delegates">المناديب</span>
                </button>
                <button data-tab="bonds" class="tab-btn px-6 py-4 font-bold text-gray-600 hover:bg-gray-50">
                    <i class="fas fa-file-invoice-dollar ml-2"></i><span data-i18n="bonds">السندات</span>
                </button>
                <button data-tab="create" class="tab-btn px-6 py-4 font-bold text-gray-600 hover:bg-gray-50">
                    <i class="fas fa-plus-circle ml-2"></i><span data-i18n="createBond">إنشاء سند</span>
                </button>
            </div>
        </div>

        <!-- تبويب المدراء -->
        <div id="managersTab" class="tab-content bg-white/90 backdrop-blur rounded-2xl shadow-xl p-6">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                <i class="fas fa-users-cog text-blue-600"></i><span data-i18n="managersManagement">إدارة المدراء</span>
            </h2>
            <div class="grid md:grid-cols-4 gap-3 mb-6">
                <input id="managerName" data-i18n-placeholder="managerName" placeholder="اسم المدير" 
                       class="border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none">
                <input id="managerPhone" data-i18n-placeholder="phone" placeholder="رقم الجوال" 
                       class="border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none" dir="ltr">
                <select id="managerRole" class="border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none">
                    <option value="admin" data-i18n="adminFull">مدير عام - كل الصلاحيات</option>
                    <option value="manager" data-i18n="managerAdd">مدير - إضافة مناديب وسندات</option>
                    <option value="viewer" data-i18n="viewerOnly">مشاهد - عرض فقط</option>
                </select>
                <button id="addManagerBtn" class="bg-gradient-to-r from-green-500 to-green-600 text-white px-6 py-3 rounded-xl font-bold hover:opacity-90 transition">
                    <i class="fas fa-plus ml-2"></i><span data-i18n="add">إضافة</span>
                </button>
            </div>
            <div id="managersList" class="space-y-3"></div>
        </div>

        <!-- تبويب المناديب -->
        <div id="delegatesTab" class="tab-content hidden bg-white/90 backdrop-blur rounded-2xl shadow-xl p-6">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                <i class="fas fa-user-tie text-blue-600"></i><span data-i18n="delegatesManagement">إدارة المناديب</span>
            </h2>
            <div class="grid md:grid-cols-4 gap-3 mb-6">
                <input id="delegateName" data-i18n-placeholder="delegateName" placeholder="اسم المندوب" 
                       class="border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none">
                <input id="delegatePhone" data-i18n-placeholder="phone" placeholder="رقم الجوال" 
                       class="border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none" dir="ltr">
                <label class="flex items-center gap-2 bg-gray-50 p-3 rounded-xl border-2 border-gray-200">
                    <input id="canCreateBond" type="checkbox" checked class="w-5 h-5"> 
                    <span data-i18n="canCreateBonds">ينشئ سندات</span>
                </label>
                <button id="addDelegateBtn" class="bg-gradient-to-r from-green-500 to-green-600 text-white px-6 py-3 rounded-xl font-bold hover:opacity-90 transition">
                    <i class="fas fa-plus ml-2"></i><span data-i18n="add">إضافة</span>
                </button>
            </div>
            <div id="delegatesList" class="space-y-3"></div>
        </div>

        <!-- تبويب السندات -->
        <div id="bondsTab" class="tab-content hidden bg-white/90 backdrop-blur rounded-2xl shadow-xl p-6">
            <h2 class="text-xl font-extrabold mb-4 flex items-center gap-2" data-i18n="allBonds">
                <i class="fas fa-file-invoice-dollar text-blue-600"></i>كل السندات
            </h2>
            <div class="mb-4 flex gap-2">
                <input id="searchBonds" type="text" data-i18n-placeholder="search" placeholder="بحث..."
                       class="border-2 border-gray-200 p-3 rounded-xl flex-1 focus:border-blue-500 outline-none">
                <select id="filterType" class="border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none">
                    <option value="" data-i18n="all">الكل</option>
                    <option value="قبض" data-i18n="receipt">سند قبض</option>
                    <option value="صرف" data-i18n="payment">سند صرف</option>
                </select>
            </div>
            <div id="bondsList" class="space-y-3"></div>
        </div>

        <!-- تبويب إنشاء سند -->
        <div id="createTab" class="tab-content hidden bg-white/90 backdrop-blur rounded-2xl shadow-xl p-6">
            <h2 class="text-xl font-extrabold mb-6 flex items-center gap-2" data-i18n="createNewBond">
                <i class="fas fa-plus-circle text-blue-600"></i>إنشاء سند جديد
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2" data-i18n="bondType">نوع السند</label>
                    <select id="bondType" class="w-full border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none">
                        <option value="قبض" data-i18n="receipt">سند قبض</option>
                        <option value="صرف" data-i18n="payment">سند صرف</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2" data-i18n="amount">المبلغ</label>
                    <input id="bondAmount" type="number" data-i18n-placeholder="amount" placeholder="المبلغ"
                           class="w-full border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none" dir="ltr">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2" data-i18n="from">من</label>
                    <input id="bondFrom" data-i18n-placeholder="from" placeholder="من"
                           class="w-full border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2" data-i18n="to">إلى</label>
                    <input id="bondTo" data-i18n-placeholder="to" placeholder="إلى"
                           class="w-full border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-gray-700 mb-2" data-i18n="reason">مقابل</label>
                    <input id="bondReason" data-i18n-placeholder="reason" placeholder="مقابل"
                           class="w-full border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-gray-700 mb-2" data-i18n="delegate">المندوب</label>
                    <select id="bondDelegate" class="w-full border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none">
                        <option value="" data-i18n="selectDelegate">اختر المندوب</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <button id="createBondBtn" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white p-4 rounded-xl font-bold text-lg hover:opacity-90 transition" data-i18n="createBondBtn">
                        <i class="fas fa-check-circle ml-2"></i>إنشاء السند
                    </button>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { auth } from './firebase.js?v=999999';
    import { getCurrentUserData, logout } from './auth.js?v=999999';
    import { collection, addDoc, deleteDoc, doc, onSnapshot, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
    import { db } from './firebase.js?v=999999';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    let currentUser = null;
    let allManagers = [];
    let allDelegates = [];
    let allBonds = [];

    // 1. تحقق من المستخدم - منطق موحد
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'index.html';
            return;
        }

        // تحقق خاص للسوبر ادمن اليدوي
        const SUPER_ADMIN_EMAIL = '001122334455-0597087767@sanadat.pro';
        
        if (user.email === SUPER_ADMIN_EMAIL) {
            currentUser = { 
                uid: user.uid, 
                email: user.email,
                role: 'superadmin', 
                name: 'السوبر ادمن',
                projectCode: '001122334455'
            };
        } else {
            currentUser = await getCurrentUserData();
        }

        if (!currentUser || (currentUser.role !== 'superadmin' && currentUser.role !== 'manager' && currentUser.role !== 'admin')) {
            Swal.fire('خطأ', 'غير مصرح لك بالدخول', 'error').then(() => {
                logout();
            });
            return;
        }

        document.getElementById('loadingScreen').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        document.getElementById('welcomeMsg').textContent = `مرحباً ${currentUser.name}`;
        loadAllData();
    });

    // 2. خروج
    document.getElementById('logoutBtn').onclick = async () => {
        await logout();
    };

    // 3. التبويبات
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.onclick = () => {
            const tab = btn.dataset.tab;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('active', 'border-blue-600', 'bg-blue-50', 'text-blue-600');
                b.classList.add('text-gray-600');
            });
            document.getElementById(tab + 'Tab').classList.remove('hidden');
            btn.classList.add('active', 'border-blue-600', 'bg-blue-50', 'text-blue-600');
            btn.classList.remove('text-gray-600');
        };
    });

    // 4. تحميل البيانات
    function loadAllData() {
        onSnapshot(collection(db, 'managers'), (snapshot) => {
            allManagers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderManagers();
        });

        onSnapshot(collection(db, 'delegates'), (snapshot) => {
            allDelegates = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderDelegates();
            renderDelegateOptions();
        });

        onSnapshot(collection(db, 'bonds'), (snapshot) => {
            allBonds = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderBonds();
        });
    }

    // باقي الدوال زي ما هي...
    document.getElementById('addManagerBtn').onclick = async () => {
        const name = document.getElementById('managerName').value.trim();
        const phone = document.getElementById('managerPhone').value.trim();
        const role = document.getElementById('managerRole').value;
        if (!name || !phone) return Swal.fire('تنبيه', t('fillNamePhone'), 'warning');

        try {
            await addDoc(collection(db, 'managers'), {
                name, phone, role,
                createdAt: serverTimestamp()
            });
            document.getElementById('managerName').value = '';
            document.getElementById('managerPhone').value = '';
            Swal.fire('تم', t('addedSuccess'), 'success');
        } catch (error) {
            Swal.fire('خطأ', t('addError'), 'error');
        }
    };

    document.getElementById('addDelegateBtn').onclick = async () => {
        const name = document.getElementById('delegateName').value.trim();
        const phone = document.getElementById('delegatePhone').value.trim();
        const canCreate = document.getElementById('canCreateBond').checked;
        if (!name || !phone) return Swal.fire('تنبيه', t('fillNamePhone'), 'warning');

        try {
            await addDoc(collection(db, 'delegates'), {
                name, phone, canCreate,
                createdAt: serverTimestamp()
            });
            document.getElementById('delegateName').value = '';
            document.getElementById('delegatePhone').value = '';
            Swal.fire('تم', t('addedSuccess'), 'success');
        } catch (error) {
            Swal.fire('خطأ', t('addError'), 'error');
        }
    };

    document.getElementById('createBondBtn').onclick = async () => {
        const bond = {
            type: document.getElementById('bondType').value,
            amount: parseFloat(document.getElementById('bondAmount').value),
            from: document.getElementById('bondFrom').value.trim(),
            to: document.getElementById('bondTo').value.trim(),
            reason: document.getElementById('bondReason').value.trim(),
            delegateId: document.getElementById('bondDelegate').value,
            createdAt: serverTimestamp(),
            createdBy: currentUser.uid
        };

        if (!bond.amount || !bond.delegateId) {
            return Swal.fire('تنبيه', t('fillAmountDelegate'), 'warning');
        }

        try {
            await addDoc(collection(db, 'bonds'), bond);
            Swal.fire('تم', t('bondCreated'), 'success');
            document.getElementById('bondAmount').value = '';
            document.getElementById('bondFrom').value = '';
            document.getElementById('bondTo').value = '';
            document.getElementById('bondReason').value = '';
            document.getElementById('bondDelegate').value = '';
        } catch (error) {
            Swal.fire('خطأ', t('createError'), 'error');
        }
    };

    async function deleteItem(type, id) {
        const result = await Swal.fire({
            title: t('confirmDelete'),
            text: t('deleteWarning'),
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: t('yesDelete'),
            cancelButtonText: t('cancel')
        });

        if (result.isConfirmed) {
            try {
                await deleteDoc(doc(db, type, id));
                Swal.fire('تم', t('deletedSuccess'), 'success');
            } catch (error) {
                Swal.fire('خطأ', t('deleteError'), 'error');
            }
        }
    }
    window.deleteItem = deleteItem;

    function renderManagers() {
        const roleNames = {
            'admin': t('adminFull'),
            'manager': t('managerAdd'),
            'viewer': t('viewerOnly')
        };
        document.getElementById('managersList').innerHTML = allManagers.map(m => `
            <div class="border-2 border-gray-100 p-4 rounded-xl flex justify-between items-center hover:bg-gray-50 transition">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center">
                        <i class="fas fa-user-shield text-blue-600"></i>
                    </div>
                    <div>
                        <b class="text-lg">${m.name}</b>
                        <p class="text-sm text-gray-500">${m.phone} - ${roleNames[m.role] || m.role}</p>
                    </div>
                </div>
                <button onclick="deleteItem('managers', '${m.id}')" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg transition">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
        `).join('') || `<p class="text-gray-400 text-center py-8">${t('noManagers')}</p>`;
    }

    function renderDelegates() {
        document.getElementById('delegatesList').innerHTML = allDelegates.map(d => `
            <div class="border-2 border-gray-100 p-4 rounded-xl flex justify-between items-center hover:bg-gray-50 transition">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center">
                        <i class="fas fa-user-tie text-green-600"></i>
                    </div>
                    <div>
                        <b class="text-lg">${d.name}</b>
                        <p class="text-sm text-gray-500">${d.phone} ${d.canCreate ? '✅' : '❌'}</p>
                    </div>
                </div>
                <button onclick="deleteItem('delegates', '${d.id}')" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg transition">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
        `).join('') || `<p class="text-gray-400 text-center py-8">${t('noDelegates')}</p>`;
    }

    function renderBonds() {
        const searchTerm = document.getElementById('searchBonds').value.toLowerCase();
        const filterType = document.getElementById('filterType').value;
        
        let filtered = allBonds.filter(b => {
            const matchSearch = !searchTerm || 
                b.from?.toLowerCase().includes(searchTerm) || 
                b.to?.toLowerCase().includes(searchTerm) ||
                b.reason?.toLowerCase().includes(searchTerm);
            const matchType = !filterType || b.type === filterType;
            return matchSearch && matchType;
        });

        document.getElementById('bondsList').innerHTML = filtered.map(b => {
            const delegate = allDelegates.find(d => d.id === b.delegateId);
            const date = b.createdAt?.toDate ? b.createdAt.toDate().toLocaleString('ar-SA') : '-';
            return `
            <div class="border-2 border-gray-100 p-4 rounded-xl hover:bg-gray-50 transition">
                <div class="flex justify-between items-start mb-2">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 ${b.type === 'قبض' ? 'bg-green-100' : 'bg-red-100'} rounded-lg flex items-center justify-center">
                            <i class="fas ${b.type === 'قبض' ? 'fa-arrow-down text-green-600' : 'fa-arrow-up text-red-600'} text-xl"></i>
                        </div>
                        <div>
                            <b class="text-lg">سند ${b.type} - ${b.amount} ريال</b>
                            <p class="text-sm text-gray-500">${date}</p>
                        </div>
                    </div>
                    <button onclick="deleteItem('bonds', '${b.id}')" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg transition">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
                <div class="text-sm text-gray-600 mr-15">
                    <p><b>من:</b> ${b.from} | <b>إلى:</b> ${b.to}</p>
                    <p><b>المندوب:</b> ${delegate?.name || 'غير محدد'} | <b>مقابل:</b> ${b.reason || '-'}</p>
                </div>
            </div>
        `}).join('') || `<p class="text-gray-400 text-center py-8">${t('noBonds')}</p>`;
    }

    function renderDelegateOptions() {
        document.getElementById('bondDelegate').innerHTML = `<option value="">${t('selectDelegate')}</option>` + 
            allDelegates.filter(d => d.canCreate).map(d => `<option value="${d.id}">${d.name}</option>`).join('');
    }

    document.getElementById('searchBonds').oninput = renderBonds;
    document.getElementById('filterType').onchange = renderBonds;
</script>

</body>
</html>
