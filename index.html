let currentLang = localStorage.getItem('v5_lang') || 'ar';
let projectCode = null;
let currentUser = null;
let projectData = {};
let unsubscribeListener = null;

function generateProjectCode() {
    return Math.random().toString(36).substring(2, 8).toUpperCase();
}

async function createNewProject() {
    projectCode = generateProjectCode();
    await initProjectDB();
    Swal.fire({
        title: 'تم إنشاء المشروع',
        html: `كود المشروع: <b style="font-size:24px;color:#2563eb">${projectCode}</b><br><br>شارك هذا الكود مع فريقك للانضمام`,
        icon: 'success',
        confirmButtonText: 'متابعة'
    }).then(() => showLangScreen());
}

async function joinProject() {
    const code = document.getElementById('joinProjectCode').value.trim().toUpperCase();
    if (!code) return Swal.fire('خطأ', 'أدخل كود المشروع', 'error');

    const { doc, getDoc } = window.firestoreHelpers;
    const docRef = doc(window.firebaseDB, "projects", code);
    const docSnap = await getDoc(docRef);

    if (!docSnap.exists()) return Swal.fire('خطأ', 'كود المشروع غير صحيح', 'error');

    projectCode = code;
    localStorage.setItem('v5_project_code', projectCode);
    Swal.fire('تم', 'تم الانضمام للمشروع بنجاح', 'success').then(() => showLangScreen());
}

function backToProjectSelect() {
    if (unsubscribeListener) unsubscribeListener();
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('projectSelectScreen').classList.remove('hidden');
}

function showProjectShare() {
    const url = `${window.location.origin}${window.location.pathname}?project=${projectCode}`;
    Swal.fire({
        title: 'مشاركة المشروع',
        html: `
            <div class="text-right">
                <p class="mb-2"><b>كود المشروع:</b></p>
                <div class="bg-gray-100 p-3 rounded-lg font-mono text-lg mb-4">${projectCode}</div>
                <p class="mb-2"><b>رابط المشروع:</b></p>
                <div class="bg-gray-100 p-3 rounded-lg text-sm break-all mb-4">${url}</div>
                <button onclick="navigator.clipboard.writeText('${url}')" class="bg-blue-600 text-white px-4 py-2 rounded-lg w-full">نسخ الرابط</button>
            </div>
        `,
        confirmButtonText: 'إغلاق'
    });
}

function setupRealtimeListener() {
    const { doc, onSnapshot } = window.firestoreHelpers;
    if (unsubscribeListener) unsubscribeListener();
    unsubscribeListener = onSnapshot(doc(window.firebaseDB, "projects", projectCode), (doc) => {
        if (doc.exists()) {
            projectData = doc.data();
            updateCompanyDisplay();
            if (document.getElementById('mainApp').classList.contains('hidden') === false) {
                refreshCurrentTab();
            }
        }
    });

function checkDelegateLimits() {
    if (currentUser.role!== 'delegate') return { allowed: true };
    const today = new Date().toLocaleDateString('ar-SA');
    if (currentUser.bondsTodayDate!== today) {
        currentUser.bondsToday = 0;
        currentUser.bondsTodayAmount = 0;
        currentUser.bondsTodayDate = today;
    }
    if (currentUser.dailyLimit > 0 && currentUser.bondsToday >= currentUser.dailyLimit) {
        return { allowed: false, reason: `وصلت للسقف اليومي: ${currentUser.dailyLimit} سند` };
    }
    if (currentUser.dailyAmountLimit > 0 && (currentUser.bondsTodayAmount || 0) >= currentUser.dailyAmountLimit) {
        return { allowed: false, reason: `وصلت للحد الأقصى لإجمالي المبالغ اليوم: ${currentUser.dailyAmountLimit} ريال` };
    }
    return { allowed: true };
}

async function saveBond() {
    const typeId = document.getElementById('bond-type').value;
    const amount = parseFloat(document.getElementById('bond-amount').value);
    const bondTypeEl = document.getElementById('bond-type');
    const bondTypeName = bondTypeEl.options[bondTypeEl.selectedIndex].dataset.name;
    const bondType = projectData.bondTypes.find(t => t.id == typeId);

    if (!bondType) return Swal.fire('خطأ', 'اختر نوع السند', 'error');
    if (!amount || amount <= 0) return Swal.fire('خطأ', 'اكتب المبلغ', 'error');

    const limitCheck = checkDelegateLimits();
    if (!limitCheck.allowed) return Swal.fire('موقوف', limitCheck.reason, 'error');

    if (currentUser.maxAmount > 0 && amount > currentUser.maxAmount) {
        return Swal.fire('خطأ', `المبلغ يتجاوز الحد المسموح للسند: ${currentUser.maxAmount} ريال`, 'error');
    }

    const todayAmount = (currentUser.bondsTodayAmount || 0);
    if (currentUser.dailyAmountLimit > 0 && (todayAmount + amount) > currentUser.dailyAmountLimit) {
        return Swal.fire('خطأ', `إجمالي المبالغ اليوم سيتجاوز الحد: ${currentUser.dailyAmountLimit} ريال`, 'error');
    }

    if (bondType.current > bondType.end) return Swal.fire('خطأ', 'انتهى تسلسل هذا النوع', 'error');

    const bondId = Date.now();
    const isQabdh = bondTypeName.includes('قبض') || bondTypeName.includes('قيد') || bondTypeName.includes('+');
    const isSarf = bondTypeName.includes('صرف') || bondTypeName.includes('-');

    const bond = {
        id: bondId,
        number: bondType.current,
        type: bondType.name,
        typeName: bondTypeName,
        amount: amount,
        clientName: document.getElementById('bond-client').value,
        clientPhone: document.getElementById('bond-client-phone').value,
        clientAccount: document.getElementById('bond-client-account').value,
        payment: document.getElementById('bond-payment').value,
        accountant: document.getElementById('bond-accountant').value,
        fund: document.getElementById('bond-fund').value,
        description: document.getElementById('bond-desc').value,
        supplied: false,
        verified: false,
        isQabdh: isQabdh,
        isSarf: isSarf,
        userId: currentUser.id,
        userName: currentUser.name,
        date: new Date().toLocaleString('ar-SA'),
        qrData: `${window.location.origin}${window.location.pathname}?project=${projectCode}&bond=${bondId}`,
        printCount: {},
        projectCode: projectCode
    };

    if (!bond.clientName) return Swal.fire('خطأ', 'اكتب اسم العميل', 'error');

    const { runTransaction, doc } = window.firestoreHelpers;
    try {
        await runTransaction(window.firebaseDB, async (transaction) => {
            const projectRef = doc(window.firebaseDB, "projects", projectCode);
            const projectDoc = await transaction.get(projectRef);
            if (!projectDoc.exists()) throw "المشروع غير موجود";

            const data = projectDoc.data();
            data.bonds.push(bond);

            const typeIdx = data.bondTypes.findIndex(t => t.id == typeId);
            data.bondTypes[typeIdx].current++;

            const userIdx = data.users.findIndex(u => u.id === currentUser.id);
            data.users[userIdx].bondsToday = (data.users[userIdx].bondsToday || 0) + 1;
            data.users[userIdx].bondsTodayAmount = (data.users[userIdx].bondsTodayAmount || 0) + amount;
            data.users[userIdx].bondsTodayDate = new Date().toLocaleDateString('ar-SA');

            if (isQabdh || isSarf) {
                data.cashbox.push({
                    id: Date.now(),
                    bondId: bond.id,
                    bondNumber: bond.number,
                    type: bond.type,
                    amount: bond.amount,
                    description: bond.description,
                    date: bond.date,
                    userName: bond.userName,
                    isQabdh: bond.isQabdh,
                    projectCode: bond.projectCode
                });
            }

            transaction.set(projectRef, data);
        });

        Swal.fire('تم', `تم إنشاء السند رقم ${bond.number}`, 'success').then(() => showTab('myBonds'));
    } catch (e) {
        Swal.fire('خطأ', 'فشل حفظ السند. تأكد من الاتصال', 'error');
    }
}

async function verifyBond(id) {
    if (currentUser.role === 'delegate') return;
    const { runTransaction, doc } = window.firestoreHelpers;
    try {
        await runTransaction(window.firebaseDB, async (transaction) => {
            const projectRef = doc(window.firebaseDB, "projects", projectCode);
            const projectDoc = await transaction.get(projectRef);
            const data = projectDoc.data();
            const bondIdx = data.bonds.findIndex(b => b.id === id);
            if (data.bonds[bondIdx].isQabdh) {
                data.bonds[bondIdx].supplied = true;
            } else {
                data.bonds[bondIdx].verified = true;
            }
            transaction.set(projectRef, data);
        });
        Swal.fire('تم', 'تم التحديث بنجاح', 'success');
    } catch (e) {
        Swal.fire('خطأ', 'فشل التحديث', 'error');
    }
}

async function printBond(id) {
    if (!canPrint(id)) return Swal.fire('ممنوع', 'تم استخدام الحد الأقصى للطباعة', 'error');
    const b = projectData.bonds.find(bond => bond.id === id);
    currentUser.printCount[id] = (currentUser.printCount[id] || 0) + 1;

    const { runTransaction, doc } = window.firestoreHelpers;
    await runTransaction(window.firebaseDB, async (transaction) => {
        const projectRef = doc(window.firebaseDB, "projects", projectCode);
        const projectDoc = await transaction.get(projectRef);
        const data = projectDoc.data();
        const idx = data.users.findIndex(u => u.id === currentUser.id);
        data.users[idx] = currentUser;
        transaction.set(projectRef, data);
    });

    const printWindow = window.open('', '', 'height=700,width=900');
    printWindow.document.write(generateBondHTML(b, false));
    printWindow.document.close();

    if (projectData.printSettings.showQR) {
        setTimeout(() => {
            const canvas = printWindow.document.getElementById('qrcanvas');
            if (canvas) {
                QRCode.toCanvas(canvas, b.qrData, {
                    width: 120,
                    margin: 1,
                    errorCorrectionLevel: 'H',
                    color: { dark: '#000000', light: '#ffffff' }
                }, function (error) {
                    if (error) console.error(error);
                    setTimeout(() => printWindow.print(), 200);
                });
            }
        }, 500);
    } else {
        setTimeout(() => printWindow.print(), 300);
    }
}

function printBondPDF(id) {
    const b = projectData.bonds.find(bond => bond.id === id);
    const element = document.createElement('div');
    element.innerHTML = generateBondHTML(b, true);

    if (projectData.printSettings.showQR) {
        const tempCanvas = document.createElement('canvas');
        QRCode.toCanvas(tempCanvas, b.qrData, {
            width: 120,
            margin: 1,
            errorCorrectionLevel: 'H'
        }, function(error) {
            if (!error) {
                const qrDiv = element.querySelector('.qr-print');
                if (qrDiv) {
                    const img = document.createElement('img');
                    img.src = tempCanvas.toDataURL();
                    img.style.width = '120px';
                    qrDiv.innerHTML = '';
                    qrDiv.appendChild(img);
                }
            generatePDF(element, b);
        });
    } else {
        generatePDF(element, b);
    }
}

function generatePDF(element, b) {
    const opt = {
        margin: [10, 10],

function printQR(id) {
    const b = projectData.bonds.find(bond => bond.id === id);
    const printWindow = window.open('', '', 'height=500,width=500');
    printWindow.document.write(`
        <html>
        <head>
            <meta charset="UTF-8">
            <title>QR - سند ${b.number}</title>
            <style>
                body { text-align:center; padding:30px; font-family: 'Cairo', Arial; }
                h3 { margin: 10px 0; font-size: 20px; }
                #qrcanvas { margin: 20px auto; display: block; border: 3px solid #000; padding: 10px; background: #fff; }
              .info { margin-top: 15px; font-size: 16px; }
                @media print {.no-print { display: none; } body { margin: 0; }}
            </style>
            <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"><\/script>
        </head>
        <body>
            <h3>سند ${b.type} #${b.number}</h3>
            <canvas id="qrcanvas"></canvas>
            <div class="info">
                <p><strong style="font-size:24px;color:#2563eb">${b.amount} ريال</strong></p>
                <p>${b.clientName}</p>
                <p style="font-size:12px;color:#666;margin-top:10px">كود المشروع: ${b.projectCode}</p>
                <p style="font-size:11px;color:#999;margin-top:15px">امسح الكود لعرض السند كاملاً</p>
            </div>
            <button class="no-print" onclick="window.print()" style="margin-top:20px;padding:10px 30px;background:#2563eb;color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:16px">طباعة</button>
        </body>
        </html>
    `);
    printWindow.document.close();
    setTimeout(() => {
        const canvas = printWindow.document.getElementById('qrcanvas');
        QRCode.toCanvas(canvas, b.qrData, {
            width: 280,
            margin: 2,
            errorCorrectionLevel: 'H',
            color: { dark: '#000000', light: '#ffffff' }
        }, function (error) {
            if (error) console.error(error);
        });
    }, 300);
}

function sendWhatsApp(phone, id) {
    const b = projectData.bonds.find(bond => bond.id === id);
    if (!phone) return Swal.fire('تنبيه', 'رقم العميل غير موجود', 'warning');

    const bondUrl = b.qrData;
    const statusText = b.isQabdh?
        (b.supplied? translations[currentLang].supplied : translations[currentLang].not_supplied) :
        (b.verified? translations[currentLang].verified : translations[currentLang].not_verified);

    const msg = `*${projectData.company.name}*%0A%0A*سند ${b.type} رقم ${b.number}*%0A━━━━━━━━━━━━━━━%0A💰 المبلغ: *${b.amount.toLocaleString('ar-SA')} ريال*%0A👤 العميل: ${b.clientName}%0A📅 التاريخ: ${b.date}%0A📝 البيان: ${b.description || '-'}%0A💳 طريقة الدفع: ${b.payment || '-'}%0A📦 الحالة: ${statusText}%0A%0A🔗 رابط السند: ${encodeURIComponent(bondUrl)}%0A%0Aشكراً لتعاملكم معنا`;

    const cleanPhone = phone.replace(/^0/, '').replace(/[^0-9]/g, '');
    window.open(`https://wa.me/966${cleanPhone}?text=${msg}`, '_blank');
}

function uploadLogo(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) return Swal.fire('خطأ', 'حجم الصورة كبير جداً. الحد الأقصى 2 ميجابايت', 'error');
    const reader = new FileReader();
    reader.onload = function(e) {
        const base64 = e.target.result;
        document.getElementById('comp-logo').value = base64;
        document.getElementById('logo-preview').src = base64;
        document.getElementById('logo-preview').classList.remove('hidden');
        Swal.fire('تم', 'تم رفع الشعار. اضغط حفظ الإعدادات لتأكيد الحفظ', 'success');
    };
    reader.readAsDataURL(file);
}

    const paymentsOptions = projectData.payments.map(p => `<label class="flex items-center gap-2"><input type="checkbox" value="${p.name}" class="payment-check"> ${p.name}</label>`).join('');
    const bondTypesOptions = projectData.bondTypes.map(t => `<label class="flex items-center gap-2"><input type="checkbox" value="${t.id}" class="bondtype-check"> ${t.name}</label>`).join('');
    const { value: formValues } = await Swal.fire({
        title: `إضافة ${role === 'manager'? 'مدير' : 'مندوب'} جديد`,
        html: `
            <input id="swal-name" class="swal2-input" placeholder="الاسم">
            <input id="swal-phone" class="swal2-input" placeholder="رقم الجوال 05xxxxxxxx">
            ${role === 'delegate'? `
                <input id="swal-limit" type="number" class="swal2-input" placeholder="السقف اليومي لعدد السندات - 0 = غير محدد">
                <input id="swal-maxamount" type="number" class="swal2-input" placeholder="أكبر مبلغ للسند الواحد - 0 = غير محدد">
                <input id="swal-daily-total" type="number" class="swal2-input" placeholder="الحد الإجمالي للمبالغ اليومية - 0 = غير محدد">
                <div class="text-right mt-3 mb-2 font-bold">أنواع السندات المتاحة:</div>
                <div class="text-right max-h-32 overflow-y-auto border p-2 rounded">${bondTypesOptions || 'لا توجد أنواع. أضفها أولاً'}</div>
                <div class="text-right mt-3 mb-2 font-bold">طرق الدفع المتاحة:</div>
                <div class="text-right max-h-32 overflow-y-auto border p-2 rounded">${paymentsOptions || 'لا توجد طرق دفع. أضفها أولاً'}</div>
            ` : ''}
        `,
        confirmButtonText: 'إضافة',
        width: '600px',
        preConfirm: () => {
            const name = document.getElementById('swal-name').value;
            const phone = document.getElementById('swal-phone').value;
            if (!name ||!phone) Swal.showValidationMessage('املأ الاسم والجوال');
            if (projectData.users.find(u => u.phone === phone)) Swal.showValidationMessage('رقم الجوال مسجل مسبقاً');
            const allowedPayments = Array.from(document.querySelectorAll('.payment-check:checked')).map(cb => cb.value);
            const allowedBondTypes = Array.from(document.querySelectorAll('.bondtype-check:checked')).map(cb => parseInt(cb.value));
            return {
                name, phone,
                limit: parseInt(document.getElementById('swal-limit')?.value) || 0,
                maxAmount: parseInt(document.getElementById('swal-maxamount')?.value) || 0,
                dailyAmountLimit: parseInt(document.getElementById('swal-daily-total')?.value) || 0,
                allowedPayments,
                allowedBondTypes
            };
        }
    });
    if (formValues) {
        projectData.users.push({
            id: Date.now(), phone: formValues.phone, password: '123456',
            name: formValues.name, role: role, active: true,
            dailyLimit: formValues.limit,
            maxAmount: formValues.maxAmount,
            dailyAmountLimit: formValues.dailyAmountLimit,
            allowedPayments: formValues.allowedPayments,
            allowedBondTypes: formValues.allowedBondTypes,
            bondsToday: 0, bondsTodayAmount: 0, bondsTodayDate: '', printCount: {}
        });
        await saveToCloud();
        showTab(role === 'manager'? 'managers' : 'delegates');
        Swal.fire('تم', 'تمت الإضافة. كلمة المرور: 123456', 'success');
    }
}

async function editDelegate(id) {
    const d = projectData.users.find(u => u.id === id);
    const paymentsOptions = projectData.payments.map(p => `<label class="flex items-center gap-2"><input type="checkbox" value="${p.name}" class="payment-check" ${d.allowedPayments?.includes(p.name)? 'checked' : ''}> ${p.name}</label>`).join('');
    const bondTypesOptions = projectData.bondTypes.map(t => `<label class="flex items-center gap-2"><input type="checkbox" value="${t.id}" class="bondtype-check" ${d.allowedBondTypes?.includes(t.id)? 'checked' : ''}> ${t.name}</label>`).join('');
    const { value: formValues } = await Swal.fire({
        title: 'تعديل بيانات المندوب',
        html: `
            <input id="swal-name" class="swal2-input" placeholder="الاسم" value="${d.name}">
            <input id="swal-phone" class="swal2-input" placeholder="رقم الجوال" value="${d.phone}">
            <input id="swal-limit" type="number" class="swal2-input" placeholder="السقف اليومي لعدد السندات" value="${d.dailyLimit || 0}">
            <input id="swal-maxamount" type="number" class="swal2-input" placeholder="أكبر مبلغ للسند" value="${d.maxAmount || 0}">
            <input id="swal-daily-total" type="number" class="swal2-input" placeholder="الحد الإجمالي اليومي" value="${d.dailyAmountLimit || 0}">
            <div class="text-right mt-3 mb-2 font-bold">أنواع السندات المتاحة:</div>
            <div class="text-right max-h-32 overflow-y-auto border p-2 rounded">${bondTypesOptions}</div>
            <div class="text-right mt-3 mb-2 font-bold">طرق الدفع المتاحة:</div>
            <div class="text-right max-h-32 overflow-y-auto border p-2 rounded">${paymentsOptions}</div>
        `,
        confirmButtonText: 'حفظ',
        width: '600px'
    });
    if (formValues) {
        d.name = document.getElementById('swal-name').value;
        d.phone = document.getElementById('swal-phone').value;
        d.dailyLimit = parseInt(document.getElementById('swal-limit').value) || 0;
        d.maxAmount = parseInt(document.getElementById('swal-maxamount').value) || 0;
        d.dailyAmountLimit = parseInt(document.getElementById('swal-daily-total').value) || 0;
        d.allowedPayments = Array.from(document.querySelectorAll('.payment-check:checked')).map(cb => cb.value);
        d.allowedBondTypes = Array.from(document.querySelectorAll('.bondtype-check:checked')).map(cb => parseInt(cb.value));
        await saveToCloud();
        showTab('delegates');
    }
}

async function editUser(id) {
    const u = projectData.users.find(user => user.id === id);
    const { value: formValues } = await Swal.fire({
        title: 'تعديل بيانات المدير',
        html: `
            <input id="swal-name" class="swal2-input" placeholder="الاسم" value="${u.name}">
            <input id="swal-phone" class="swal2-input" placeholder="رقم الجوال" value="${u.phone}">
        `,
        confirmButtonText: 'حفظ'
    });
    if (formValues) {
        u.name = document.getElementById('swal-name').value;
        u.phone = document.getElementById('swal-phone').value;
        await saveToCloud();
        showTab('managers');
    }
}

async function toggleUserActive(id) {
    const user = projectData.users.find(u => u.id === id);
    user.active =!user.active;
    await saveToCloud();
    showTab(user.role === 'manager'? 'managers' : 'delegates');
    Swal.fire('تم', `تم ${user.active? 'تنشيط' : 'إيقاف'} المستخدم`, 'success');
}

async function deleteUser(id) {
    const result = await Swal.fire({
        title: 'متأكد؟',
        text: 'سيتم حذف المستخدم نهائياً',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'نعم احذف',
        cancelButtonText: 'إلغاء'
    });
    if (result.isConfirmed) {
        const user = projectData.users.find(u => u.id === id);
        const userRole = user.role;
        projectData.users = projectData.users.filter(u => u.id!== id);
        await saveToCloud();
        showTab(userRole === 'manager'? 'managers' : 'delegates');
        Swal.fire('تم الحذف', '', 'success');
    }
}

function renderDashboard() {
    const totalCashbox = projectData.cashbox.reduce((sum, t) => sum + (t.isQabdh? t.amount : -t.amount), 0);
    const unverifiedBonds = projectData.bonds.filter(b =>!b.supplied &&!b.verified).length;
    const todayBonds = projectData.bonds.filter(b => b.date.includes(new Date().toLocaleDateString('ar-SA'))).length;
    const totalBonds = projectData.bonds.length;

    return `<div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <div class="bg-gradient-to-br from-blue-500 to-blue-600 text-white p-6 rounded-lg shadow-lg">
            <div class="text-3xl font-bold">${totalBonds}</div>
            <div class="text-sm opacity-90">إجمالي السندات</div>
            <div class="text-xs mt-2 opacity-75">المشروع: ${projectCode}</div>
        </div>
        <div class="bg-gradient-to-br from-green-500 to-green-600 text-white p-6 rounded-lg shadow-lg">
            <div class="text-3xl font-bold">${totalCashbox.toFixed(2)}</div>
            <div class="text-sm opacity-90">رصيد الصندوق</div>
            <div class="text-xs mt-2 opacity-75">ريال سعودي</div>
        </div>
        <div class="bg-gradient-to-br from-purple-500 to-purple-600 text-white p-6 rounded-lg shadow-lg">
            <div class="text-3xl font-bold">${projectData.users.filter(u=>u.role==='delegate' && u.active).length}</div>
            <div class="text-sm opacity-90">المناديب النشطين</div>
            <div class="text-xs mt-2 opacity-75">من أصل ${projectData.users.filter(u=>u.role==='delegate').length}</div>
        </div>
        <div class="bg-gradient-to-br from-orange-500 to-orange-600 text-white p-6 rounded-lg shadow-lg">
            <div class="text-3xl font-bold">${unverifiedBonds}</div>
            <div class="text-sm opacity-90">سندات بانتظار التوثيق</div>
            <div class="text-xs mt-2 opacity-75">اليوم: ${todayBonds} سند</div>
        </div>
    </div>
    <div class="bg-white rounded-lg shadow p-6 mb-4">
        <h3 class="text-lg font-bold mb-4">إجراءات سريعة</h3>
        <div class="flex gap-2 flex-wrap no-print">
            <button onclick="exportAllExcel()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg">${translations[currentLang].export_excel}</button>
            <button onclick="exportAllPDF()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg">تصدير PDF شامل</button>
            <button onclick="showProjectShare()" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg">مشاركة المشروع</button>
            <button onclick="showBackupOptions()" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg">نسخ احتياطي</button>
        </div>
    </div>
    <div class="bg-white rounded-lg shadow p-6">
        <h3 class="text-lg font-bold mb-4">آخر السندات</h3>
        <div class="space-y-2">${projectData.bonds.slice(-5).reverse().map(b => {
            const statusColor = b.supplied || b.verified? 'bg-green-100 text-green-800' : 'bg-orange-100 text-orange-800';
            return `<div class="border p-3 rounded-lg flex justify-between items-center hover:bg-gray-50">
                <div>
                    <span class="font-bold">سند ${b.type} #${b.number}</span>
                    <span class="text-sm text-gray-600 mr-2">${b.clientName}</span>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-lg font-bold text-blue-600">${b.amount.toLocaleString('ar-SA')} ريال</span>
                    <span class="px-3 py-1 rounded-full text-xs ${statusColor}">${b.isQabdh? (b.supplied? 'مورد' : 'غير مورد') : (b.verified? 'موثق' : 'غير موثق')}</span>
                </div>
            </div>`;
        }).join('') || '<p class="text-gray-500 text-center py-8">لا توجد سندات</p>'}</div>
    </div>`;
}

async function showChangePass() {
    const { value: newPass } = await Swal.fire({
        title: translations[currentLang].change_pass,
        html: '<input id="newPass" type="password" class="swal2-input" placeholder="'+translations[currentLang].password+'">',
        confirmButtonText: 'حفظ',
        preConfirm: () => {
            const newPass = document.getElementById('newPass').value;
            if (!newPass || newPass.length < 4) Swal.showValidationMessage('كلمة المرور قصيرة');
            return newPass;
        }
    });
    if (newPass) {
        currentUser.password = newPass;
        const idx = projectData.users.findIndex(u => u.id === currentUser.id);
        projectData.users[idx] = currentUser;
        await saveToCloud();
        Swal.fire('تم', 'تم تغيير كلمة المرور', 'success');
    }
}

function showTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('border-blue-600', 'font-bold'));
    if(event && event.target) event.target.classList.add('border-blue-600', 'font-bold');
    const content = document.getElementById('tabContent');
    const tabs = {
        dashboard: renderDashboard, managers: renderManagers, delegates: renderDelegates,
        bondTypes: renderBondTypes, payments: renderPayments, accountants: renderAccountants,
        funds: renderFunds, cashbox: renderCashbox, company: renderCompany,
        printSettings: renderPrintSettings, bonds: renderBonds,
        createBond: renderCreateBond, myBonds: renderMyBonds
    };
    content.innerHTML = tabs[tab]();
    applyTranslations();
    updateCompanyDisplay();
}

function closeBondView() {
    document.getElementById('bondViewScreen').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');
}

function exportAllExcel() {
    exportBondsExcel();
    setTimeout(() => exportCashboxExcel(), 500);
}

function exportAllPDF() {
    const opt = {
        margin: 10,
        filename: `تقرير-شامل-${projectCode}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };
    html2pdf().set(opt).from(document.body).save();
}

function showBackupOptions() {
    const data = {
        projectCode: projectCode,
        company: projectData.company,
        users: projectData.users,
        bondTypes: projectData.bondTypes,
        payments: projectData.payments,
        accountants: projectData.accountants,
        funds: projectData.funds,
        bonds: projectData.bonds,
        cashbox: projectData.cashbox,
        printSettings: projectData.printSettings
    };
    const dataStr = JSON.stringify(data, null, 2);
    const blob = new Blob([dataStr], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `backup-${projectCode}-${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    Swal.fire('تم', 'تم تحميل النسخة الاحتياطية', 'success');
}

function viewBondByUrl() {
    const params = new URLSearchParams(window.location.search);
    const bondId = params.get('bond');
    const projCode = params.get('project');

    if (bondId && projCode) {
        const savedCode = localStorage.getItem('v5_project_code');
        if (savedCode!== projCode) {
            localStorage.setItem('v5_project_code', projCode);
            localStorage.setItem('v5_project_mode', 'connected');
            projectCode = projCode;
            projectMode = 'connected';
            initProjectDB();
        }

        const b = projectData.bonds.find(x => x.id == bondId);
        if (b) {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = generateBondHTML(b, false);
            document.getElementById('bondViewContent').innerHTML = tempDiv.querySelector('body').innerHTML;
            document.getElementById('bondViewContent').dataset.bondId = b.id;
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('projectSelectScreen').classList.add('hidden');
            document.getElementById('languageScreen').classList.add('hidden');
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('bondViewScreen').classList.remove('hidden');
        } else {
            Swal.fire('خطأ', 'السند غير موجود في هذا المشروع', 'error');
        }
    }
}

function refreshCurrentTab() {
    const activeTab = document.querySelector('.tab-btn.border-blue-600');
    if (activeTab) {
        const tabName = activeTab.getAttribute('onclick').match(/'(.+)'/)[1];
        showTab(tabName);
    }
}

window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    const projCode = urlParams.get('project');

    if (projCode) {
        localStorage.setItem('v5_project_code', projCode);
        localStorage.setItem('v5_project_mode', 'connected');
        projectCode = projCode;
        projectMode = 'connected';
        initProjectDB();
        viewBondByUrl();
        return;
    }

    if (localStorage.getItem('v5_project_code')) {
        projectCode = localStorage.getItem('v5_project_code');
        projectMode = localStorage.getItem('v5_project_mode');
        initProjectDB();
        if (localStorage.getItem('v5_lang')) {
            setLang(currentLang);
        } else {
            showLangScreen();
        }
    } else {
        document.getElementById('projectSelectScreen').classList.remove('hidden');
    }

    updateCompanyDisplay();
};
</script>
