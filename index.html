<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>السندات الذكية V8.5 - تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .login-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-50">
<div id="loginScreen" class="min-h-screen login-bg flex items-center justify-center p-4">
    <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center">
                    <span class="text-4xl">📝</span>
                </div>
            </div>
            <h1 class="text-4xl font-extrabold text-gray-800 mb-2">السندات الذكية</h1>
            <p class="text-gray-500">نظام إدارة السندات السحابي</p>
        </div>
        <div class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">كود المشروع</label>
                <input id="projectCode" type="text" class="w-full p-4 border-2 border-gray-200 rounded-xl text-center focus:border-blue-500 focus:outline-none" placeholder="ادخل كود مشروعك">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">رقم الجوال</label>
                <input id="phone" type="text" class="w-full p-4 border-2 border-gray-200 rounded-xl text-center focus:border-blue-500 focus:outline-none" placeholder="05xxxxxxxx">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">كلمة المرور</label>
                <input id="password" type="password" class="w-full p-4 border-2 border-gray-200 rounded-xl text-center focus:border-blue-500 focus:outline-none" placeholder="••••">
            </div>
            <button id="loginBtn" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white p-4 rounded-xl font-bold text-lg hover:opacity-90 transition">تسجيل الدخول</button>
        </div>
    </div>
</div>

<script type="module">
    import { db, SUPERADMIN } from './firebase.js';
    import { ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    document.getElementById('loginBtn').addEventListener('click', login);

    const p = localStorage.getItem('projectCode'), ph = localStorage.getItem('phone'), pass = localStorage.getItem('password');
    if (p && ph && pass) {
        document.getElementById('projectCode').value = p;
        document.getElementById('phone').value = ph;
        document.getElementById('password').value = pass;
        login();
    }

    async function login() {
        const projectCode = document.getElementById('projectCode').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;

        if (!phone || !password) return Swal.fire('خطأ', 'عبي الجوال وكلمة السر', 'error');

        if (phone === SUPERADMIN.phone && password === SUPERADMIN.password) {
            localStorage.setItem('projectCode', 'SUPERADMIN');
            localStorage.setItem('phone', phone);
            localStorage.setItem('password', password);
            localStorage.setItem('role', 'superadmin');
            window.location.href = 'superadmin.html';
            return;
        }

        if (!projectCode) return Swal.fire('خطأ', 'ادخل كود المشروع', 'error');

        try {
            const snapshot = await get(ref(db, `projects/${projectCode}/users/${phone}`));
            if (!snapshot.exists()) return Swal.fire('خطأ', 'المستخدم غير موجود', 'error');

            const user = snapshot.val();
            if (user.password !== password) return Swal.fire('خطأ', 'كلمة السر غلط', 'error');
            if (!user.active) return Swal.fire('خطأ', 'حسابك موقوف', 'error');

            const projectSnap = await get(ref(db, `projects/${projectCode}/info`));
            if (!projectSnap.val().active) return Swal.fire('خطأ', 'المشروع موقوف', 'error');

            localStorage.setItem('projectCode', projectCode);
            localStorage.setItem('phone', phone);
            localStorage.setItem('password', password);
            localStorage.setItem('role', user.role);

            if (user.role === 'manager') {
                window.location.href = 'manager.html';
            } else if (user.role === 'delegate') {
                window.location.href = 'delegate.html';
            }
        } catch (e) {
            console.error(e);
            Swal.fire('خطأ', 'تأكد من البيانات', 'error');
        }
    }
</script>
</body>
</html>
