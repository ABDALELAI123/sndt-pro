<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سندات برو V7.0 - سحابي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-100">

<!-- شاشة تسجيل الدخول -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <h1 class="text-3xl font-bold text-center mb-6 text-blue-600">سندات برو V7.0</h1>
        <div class="space-y-4">
            <input id="projectCode" type="text" placeholder="كود المشروع PRJ-XXXX" class="w-full p-3 border rounded-lg text-center">
            <input id="phone" type="text" placeholder="رقم الجوال 05xxxxxxxx" class="w-full p-3 border rounded-lg text-center">
            <input id="password" type="password" placeholder="كلمة السر" class="w-full p-3 border rounded-lg text-center">
            <button onclick="login()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">دخول</button>
            <button onclick="showCreateProject()" class="w-full bg-green-600 text-white p-3 rounded-lg">إنشاء مشروع جديد</button>
        </div>
    </div>
</div>

<!-- الشاشة الرئيسية -->
<div id="mainApp" class="hidden">
    <!-- الهيدر -->
    <div class="bg-blue-600 text-white p-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold">سندات برو V7.0</h1>
            <p class="text-sm">المشروع: <span id="currentProject"></span> | <span id="currentUser"></span></p>
        </div>
        <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded">خروج</button>
    </div>

    <!-- تبويبات المدير العام -->
    <div id="superadminTabs" class="hidden bg-white shadow">
        <div class="flex overflow-x-auto">
            <button onclick="showTab('dashboard')" class="tab-btn px-6 py-3 border-b-2 border-blue-600">الرئيسية</button>
            <button onclick="showTab('managers')" class="tab-btn px-6 py-3">المدراء</button>
            <button onclick="showTab('projects')" class="tab-btn px-6 py-3">المشاريع</button>
            <button onclick="showTab('allBonds')" class="tab-btn px-6 py-3">كل السندات</button>
        </div>
    </div>

    <!-- تبويبات المدير -->
    <div id="managerTabs" class="hidden bg-white shadow">
        <div class="flex overflow-x-auto">
            <button onclick="showTab('dashboard')" class="tab-btn px-6 py-3 border-b-2 border-blue-600">الرئيسية</button>
            <button onclick="showTab('delegates')" class="tab-btn px-6 py-3">المناديب</button>
            <button onclick="showTab('bondTypes')" class="tab-btn px-6 py-3">أنواع السندات</button>
            <button onclick="showTab('payments')" class="tab-btn px-6 py-3">طرق الدفع</button>
            <button onclick="showTab('allBonds')" class="tab-btn px-6 py-3">كل السندات</button>
        </div>
    </div>

    <!-- تبويبات المندوب -->
    <div id="delegateTabs" class="hidden bg-white shadow">
        <div class="flex overflow-x-auto">
            <button onclick="showTab('createBond')" class="tab-btn px-6 py-3 border-b-2 border-blue-600">إنشاء سند</button>
            <button onclick="showTab('myBonds')" class="tab-btn px-6 py-3">سنداتي</button>
        </div>
    </div>

    <!-- المحتوى -->
    <div class="p-6">
        <!-- الرئيسية -->
        <div id="dashboard" class="tab-content">
            <h2 class="text-2xl font-bold mb-4">لوحة التحكم</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-white p-6 rounded-lg shadow">
                    <p class="text-gray-500">إجمالي السندات</p>
                    <p id="totalBonds" class="text-3xl font-bold">0</p>
                </div>
                <div class="bg-white p-6 rounded-lg shadow">
                    <p class="text-gray-500">سندات اليوم</p>
                    <p id="todayBonds" class="text-3xl font-bold">0</p>
                </div>
                <div class="bg-white p-6 rounded-lg shadow">
                    <p class="text-gray-500">المستخدمين</p>
                    <p id="totalUsers" class="text-3xl font-bold">0</p>
                </div>
            </div>
        </div>

        <!-- المدراء - للمدير العام فقط -->
        <div id="managers" class="tab-content hidden">
            <div class="bg-white p-6 rounded-lg shadow">
                <div class="flex justify-between mb-4">
                    <h2 class="text-2xl font-bold">المدراء</h2>
                    <button onclick="addManager()" class="bg-blue-600 text-white px-4 py-2 rounded">+ مدير جديد</button>
                </div>
                <table class="w-full">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="p-3 text-right">الاسم</th>
                            <th class="p-3 text-right">الجوال</th>
                            <th class="p-3 text-right">الحالة</th>
                            <th class="p-3 text-right">تحكم</th>
                        </tr>
                    </thead>
                    <tbody id="managersTable"></tbody>
                </table>
            </div>
        </div>

        <!-- المناديب - للمدير -->
        <div id="delegates" class="tab-content hidden">
            <div class="bg-white p-6 rounded-lg shadow">
                <div class="flex justify-between mb-4">
                    <h2 class="text-2xl font-bold">المناديب</h2>
                    <button onclick="addDelegate()" class="bg-blue-600 text-white px-4 py-2 rounded">+ مندوب جديد</button>
                </div>
                <table class="w-full">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="p-3 text-right">الاسم</th>
                            <th class="p-3 text-right">الجوال</th>
                            <th class="p-3 text-right">الحد اليومي</th>
                            <th class="p-3 text-right">الحالة</th>
                            <th class="p-3 text-right">تحكم</th>
                        </tr>
                    </thead>
                    <tbody id="delegatesTable"></tbody>
                </table>
            </div>
        </div>

        <!-- أنواع السندات - للمدير -->
        <div id="bondTypes" class="tab-content hidden">
            <div class="bg-white p-6 rounded-lg shadow">
                <div class="flex justify-between mb-4">
                    <h2 class="text-2xl font-bold">أنواع السندات</h2>
                    <button onclick="addBondType()" class="bg-blue-600 text-white px-4 py-2 rounded">+ نوع جديد</button>
                </div>
                <table class="w-full">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="p-3 text-right">الاسم</th>
                            <th class="p-3 text-right">بداية التسلسل</th>
                            <th class="p-3 text-right">نهاية التسلسل</th>
                            <th class="p-3 text-right">الحالي</th>
                            <th class="p-3 text-right">تحكم</th>
                        </tr>
                    </thead>
                    <tbody id="bondTypesTable"></tbody>
                </table>
            </div>
        </div>

        <!-- طرق الدفع - للمدير -->
        <div id="payments" class="tab-content hidden">
            <div class="bg-white p-6 rounded-lg shadow">
                <div class="flex justify-between mb-4">
                    <h2 class="text-2xl font-bold">طرق الدفع</h2>
                    <button onclick="addPayment()" class="bg-blue-600 text-white px-4 py-2 rounded">+ طريقة جديدة</button>
                </div>
                <table class="w-full">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="p-3 text-right">الاسم</th>
                            <th class="p-3 text-right">تحكم</th>
                        </tr>
                    </thead>
                    <tbody id="paymentsTable"></tbody>
                </table>
            </div>
        </div>

        <!-- إنشاء سند - للمندوب -->
        <div id="createBond" class="tab-content hidden">
            <div class="bg-white p-6 rounded-lg shadow max-w-2xl mx-auto">
                <h2 class="text-2xl font-bold mb-4">إنشاء سند جديد</h2>
                <div class="space-y-4">
                    <select id="bondTypeSelect" class="w-full p-3 border rounded-lg"></select>
                    <input id="bondAmount" type="number" placeholder="المبلغ" class="w-full p-3 border rounded-lg">
                    <input id="clientName" type="text" placeholder="اسم العميل" class="w-full p-3 border rounded-lg">
                    <input id="clientPhone" type="text" placeholder="جوال العميل" class="w-full p-3 border rounded-lg">
                    <select id="paymentSelect" class="w-full p-3 border rounded-lg"></select>
                    <textarea id="bondNote" placeholder="البيان" class="w-full p-3 border rounded-lg" rows="3"></textarea>
                    <button onclick="saveBond()" class="w-full bg-green-600 text-white p-3 rounded-lg font-bold">حفظ السند</button>
                </div>
            </div>
        </div>

        <!-- باقي التبويبات -->
        <div id="projects" class="tab-content hidden"></div>
        <div id="allBonds" class="tab-content hidden"></div>
        <div id="myBonds" class="tab-content hidden"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, update, remove, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBvEU1Cmt1IX4h0xaCd6McaOMufvGqr2fY",
        authDomain: "sanadat-pro.firebaseapp.com",
        databaseURL: "https://sanadat-pro-default-rtdb.asia-southeast1.firebaseapp.com",
        projectId: "sanadat-pro",
        storageBucket: "sanadat-pro.firebasestorage.app",
        messagingSenderId: "1039476751095",
        appId: "1:1039476751095:web:f2a7744d6469385e7771f2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentUser = null;
    let currentProject = null;

    // تسجيل الدخول
    window.login = async () => {
        const projectCode = document.getElementById('projectCode').value;
        const phone = document.getElementById('phone').value;
        const password = document.getElementById('password').value;

        if (!projectCode || !phone || !password) {
            Swal.fire('خطأ', 'عبي كل الحقول', 'error');
            return;
        }

        const userRef = ref(db, `projects/${projectCode}/users/${phone}`);
        const snapshot = await get(userRef);
        
        if (!snapshot.exists()) {
            Swal.fire('خطأ', 'المستخدم غير موجود', 'error');
            return;
        }

        const user = snapshot.val();
        if (user.password !== password) {
            Swal.fire('خطأ', 'كلمة السر غلط', 'error');
            return;
        }

        if (!user.active) {
            Swal.fire('خطأ', 'حسابك موقوف', 'error');
            return;
        }

        currentUser = user;
        currentProject = projectCode;
        localStorage.setItem('projectCode', projectCode);
        localStorage.setItem('phone', phone);
        
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('currentProject').textContent = projectCode;
        document.getElementById('currentUser').textContent = user.name;
        
        loadUserInterface();
        loadDashboard();
    };

    // واجهة حسب الدور
    function loadUserInterface() {
        document.getElementById('superadminTabs').classList.add('hidden');
        document.getElementById('managerTabs').classList.add('hidden');
        document.getElementById('delegateTabs').classList.add('hidden');

        if (currentUser.role === 'superadmin') {
            document.getElementById('superadminTabs').classList.remove('hidden');
            loadManagers();
        } else if (currentUser.role === 'manager') {
            document.getElementById('managerTabs').classList.remove('hidden');
            loadDelegates();
            loadBondTypes();
            loadPayments();
        } else if (currentUser.role === 'delegate') {
            document.getElementById('delegateTabs').classList.remove('hidden');
            loadBondTypesForDelegate();
            loadPaymentsForDelegate();
        }
    }

    // إنشاء مشروع جديد - للمدير العام
    window.showCreateProject = async () => {
        const { value: formValues } = await Swal.fire({
            title: 'إنشاء مشروع جديد',
            html: `
                <input id="swal-name" class="swal2-input" placeholder="اسم الشركة">
                <input id="swal-phone" class="swal2-input" placeholder="جوال المدير العام 05xxxx">
                <input id="swal-password" type="password" class="swal2-input" placeholder="كلمة سر المدير">
            `,
            focusConfirm: false,
            preConfirm: () => {
                return {
                    name: document.getElementById('swal-name').value,
                    phone: document.getElementById('swal-phone').value,
                    password: document.getElementById('swal-password').value
                }
            }
        });

        if (formValues) {
            const projectCode = 'PRJ-' + Math.random().toString(36).substr(2, 6).toUpperCase();
            await set(ref(db, `projects/${projectCode}/info`), {
                name: formValues.name,
                createdAt: Date.now()
            });
            await set(ref(db, `projects/${projectCode}/users/${formValues.phone}`), {
                name: formValues.name,
                phone: formValues.phone,
                password: formValues.password,
                role: 'superadmin',
                active: true
            });
            Swal.fire('تم', `كود المشروع: ${projectCode}`, 'success');
            document.getElementById('projectCode').value = projectCode;
        }
    };

    // إضافة مدير - للمدير العام
    window.addManager = async () => {
        const { value: formValues } = await Swal.fire({
            title: 'إضافة مدير',
            html: `
                <input id="swal-name" class="swal2-input" placeholder="اسم المدير">
                <input id="swal-phone" class="swal2-input" placeholder="جوال 05xxxx">
                <input id="swal-password" type="password" class="swal2-input" placeholder="كلمة السر">
            `,
            preConfirm: () => {
                return {
                    name: document.getElementById('swal-name').value,
                    phone: document.getElementById('swal-phone').value,
                    password: document.getElementById('swal-password').value
                }
            }
        });

        if (formValues) {
            await set(ref(db, `projects/${currentProject}/users/${formValues.phone}`), {
                name: formValues.name,
                phone: formValues.phone,
                password: formValues.password,
                role: 'manager',
                active: true
            });
            loadManagers();
            Swal.fire('تم', 'تمت إضافة المدير', 'success');
        }
    };

    // إضافة مندوب - للمدير
    window.addDelegate = async () => {
        const { value: formValues } = await Swal.fire({
            title: 'إضافة مندوب',
            html: `
                <input id="swal-name" class="swal2-input" placeholder="اسم المندوب">
                <input id="swal-phone" class="swal2-input" placeholder="جوال 05xxxx">
                <input id="swal-password" type="password" class="swal2-input" placeholder="كلمة السر">
                <input id="swal-dailyLimit" type="number" class="swal2-input" placeholder="الحد اليومي للسندات">
                <input id="swal-maxAmount" type="number" class="swal2-input" placeholder="أعلى مبلغ للسند">
            `,
            preConfirm: () => {
                return {
                    name: document.getElementById('swal-name').value,
                    phone: document.getElementById('swal-phone').value,
                    password: document.getElementById('swal-password').value,
                    dailyLimit: document.getElementById('swal-dailyLimit').value,
                    maxAmount: document.getElementById('swal-maxAmount').value
                }
            }
        });

        if (formValues) {
            await set(ref(db, `projects/${currentProject}/users/${formValues.phone}`), {
                name: formValues.name,
                phone: formValues.phone,
                password: formValues.password,
                role: 'delegate',
                active: true,
                dailyLimit: parseInt(formValues.dailyLimit),
                maxAmount: parseInt(formValues.maxAmount),
                dailyAmountLimit: 999999
            });
            loadDelegates();
            Swal.fire('تم', 'تمت إضافة المندوب', 'success');
        }
    };

    // إضافة نوع سند - للمدير
    window.addBondType = async () => {
        const { value: formValues } = await Swal.fire({
            title: 'إضافة نوع سند',
            html: `
                <input id="swal-name" class="swal2-input" placeholder="اسم النوع: قبض / صرف">
                <input id="swal-start" type="number" class="swal2-input" placeholder="بداية التسلسل: 1000">
                <input id="swal-end" type="number" class="swal2-input" placeholder="نهاية التسلسل: 9999">
            `,
            preConfirm: () => {
                return {
                    name: document.getElementById('swal-name').value,
                    start: document.getElementById('swal-start').value,
                    end: document.getElementById('swal-end').value
                }
            }
        });

        if (formValues) {
            const id = Date.now();
            await set(ref(db, `projects/${currentProject}/bondTypes/${id}`), {
                id: id,
                name: formValues.name,
                start: parseInt(formValues.start),
                end: parseInt(formValues.end),
                current: parseInt(formValues.start)
            });
            loadBondTypes();
            Swal.fire('تم', 'تمت إضافة النوع', 'success');
        }
    };

    // إضافة طريقة دفع - للمدير
    window.addPayment = async () => {
        const { value: name } = await Swal.fire({
            title: 'إضافة طريقة دفع',
            input: 'text',
            inputPlaceholder: 'كاش / شبكة / تحويل'
        });

        if (name) {
            const id = Date.now();
            await set(ref(db, `projects/${currentProject}/payments/${id}`), { name: name });
            loadPayments();
            Swal.fire('تم', 'تمت الإضافة', 'success');
        }
    };

    // إيقاف مستخدم
    window.toggleUser = async (phone, active) => {
        await update(ref(db, `projects/${currentProject}/users/${phone}`), { active: !active });
        loadManagers();
        loadDelegates();
    };

    // حذف مستخدم
    window.deleteUser = async (phone) => {
        const result = await Swal.fire({
            title: 'متأكد؟',
            text: 'بيتحذف من قاعدة البيانات نهائي',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'ايه احذف',
            cancelButtonText: 'لا'
        });
        if (result.isConfirmed) {
            await remove(ref(db, `projects/${currentProject}/users/${phone}`));
            loadManagers();
            loadDelegates();
            Swal.fire('تم الحذف', '', 'success');
        }
    };

    // باقي الدوال: loadManagers, loadDelegates, loadBondTypes, saveBond... 
    // بكملها لك في الجزء الثاني عشان ما يطول الكود

    window.showTab = (tab) => {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
        document.getElementById(tab).classList.remove('hidden');
    };

    window.logout = () => {
        localStorage.clear();
        location.reload();
    };

    // تحميل تلقائي لو مسجل
    window.onload = () => {
        const projectCode = localStorage.getItem('projectCode');
        const phone = localStorage.getItem('phone');
        if (projectCode && phone) {
            document.getElementById('projectCode').value = projectCode;
            document.getElementById('phone').value = phone;
        }
    };
</script>

</body>
</html>
