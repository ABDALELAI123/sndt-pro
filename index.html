<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>السندات الذكية - تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gradient-to-br from-indigo-900 to-blue-900 min-h-screen flex items-center justify-center p-4">

<div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
    <h1 class="text-3xl font-extrabold text-center mb-8 text-gray-800">السندات الذكية</h1>
    
    <div class="space-y-4">
        <input id="projectCode" type="text" placeholder="كود المشروع" class="w-full p-3 border-2 rounded-lg text-center">
        <input id="username" type="text" placeholder="اسم المستخدم / الجوال" class="w-full p-3 border-2 rounded-lg text-center">
        <input id="password" type="password" placeholder="كلمة المرور" class="w-full p-3 border-2 rounded-lg text-center">
        <button onclick="login()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold text-lg hover:bg-blue-700">
            تسجيل الدخول
        </button>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, query, where, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    // حل مشكلة الغمزة: امسح البيانات لو الرابط فيه clear=1
    if(new URLSearchParams(window.location.search).get('clear') === '1') {
        localStorage.clear();
        history.replaceState(null, '', './index.html');
    }

    const firebaseConfig = {
      apiKey: "AIzaSyBvEU1Cmt1IX4h0xaCd6McaOMufvGqr2fY",
      authDomain: "sanadat-pro.firebaseapp.com",
      databaseURL: "https://sanadat-pro-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "sanadat-pro",
      storageBucket: "sanadat-pro.firebasestorage.app",
      messagingSenderId: "1039476751095",
      appId: "1:1039476751095:web:f2a7744d6469385e7771f2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // لو مسجل دخول من قبل، روح صفحتك مباشرة بدون لوب
    const userRole = localStorage.getItem('userRole');
    if(userRole === 'manager' && localStorage.getItem('currentManager')) {
        location.replace('./manager.html');
    } else if(userRole === 'delegate' && localStorage.getItem('delegateData')) {
        location.replace('./delegate.html');
    }

    window.login = async () => {
        const projectCode = document.getElementById('projectCode').value.trim();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();

        if(!projectCode ||!username ||!password) {
            return Swal.fire('خطأ', 'املأ كل الحقول', 'error');
        }

        Swal.fire({ title: 'جاري التحقق...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });

        // 1. افحص المدراء
        const managersQ = query(collection(db, 'managers'), 
            where('projectCode', '==', projectCode),
            where('username', '==', username),
            where('password', '==', password)
        );
        const managersSnap = await getDocs(managersQ);

        if(!managersSnap.empty) {
            const managerDoc = managersSnap.docs[0];
            localStorage.setItem('currentManager', JSON.stringify({id: managerDoc.id,...managerDoc.data()}));
            localStorage.setItem('userRole', 'manager');
            location.replace('./manager.html');
            return;
        }

        // 2. افحص المناديب
        const delegatesQ = query(collection(db, 'delegates'), 
            where('projectCode', '==', projectCode),
            where('phone', '==', username),
            where('password', '==', password),
            where('status', '==', 'active')
        );
        const delegatesSnap = await getDocs(delegatesQ);

        if(!delegatesSnap.empty) {
            const delegateDoc = delegatesSnap.docs[0];
            localStorage.setItem('delegateData', JSON.stringify({id: delegateDoc.id,...delegateDoc.data()}));
            localStorage.setItem('userRole', 'delegate');
            location.replace('./delegate.html');
            return;
        }

        Swal.fire('خطأ', 'بيانات الدخول غير صحيحة أو الحساب غير مفعل', 'error');
    }
</script>
</body>
</html>
