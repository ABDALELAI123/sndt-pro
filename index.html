<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>السندات الذكية - تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gradient-to-br from-blue-900 to-indigo-900 min-h-screen flex items-center justify-center p-4">
    <div class="bg-gray-800/50 backdrop-blur-md p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-700">
        <h1 class="text-3xl font-bold text-center text-white mb-8">السندات الذكية</h1>
        <div class="space-y-6">
            <div>
                <label class="block text-gray-300 mb-2">كود المشروع</label>
                <input type="text" id="projectCode" class="w-full p-3 bg-gray-700/50 text-white rounded-lg border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-gray-300 mb-2">اسم المستخدم / رقم الجوال</label>
                <input type="text" id="phone" class="w-full p-3 bg-gray-700/50 text-white rounded-lg border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-gray-300 mb-2">كلمة المرور</label>
                <input type="password" id="password" class="w-full p-3 bg-gray-700/50 text-white rounded-lg border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-300">
                تسجيل الدخول
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6Fi7V7m8jH3LsrUFCoA2pvkPxL2hX9Hc",
            authDomain: "sanadat-pro.firebaseapp.com",
            projectId: "sanadat-pro",
            storageBucket: "sanadat-pro.appspot.com",
            messagingSenderId: "423095997472",
            appId: "1:423095997472:web:8c59d0f1f75fbd3b9a9b14"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        console.log("Firebase شغال ✅");

        window.login = async () => {
            console.log("====== بداية تسجيل الدخول ======");
            const projectCodeRaw = document.getElementById('projectCode').value;
            const phoneRaw = document.getElementById('phone').value;
            const passwordRaw = document.getElementById('password').value;

            const projectCode = projectCodeRaw.trim();
            const phone = phoneRaw.trim();
            const password = passwordRaw.trim();

            console.log("1. البيانات المدخلة بعد التنظيف:", {projectCode, phone, password});

            if (!projectCode || !phone || !password) {
                return Swal.fire('خطأ', 'املأ كل الحقول', 'error');
            }

            try {
                // سوبر أدمن
                if (projectCode === '001122334455' && phone === '0597087767' && password === '500600') {
                    console.log("2. دخول سوبر أدمن ✅");
                    localStorage.setItem('userRole', 'superadmin');
                    location.href = './superadmin.html';
                    return;
                }

                // تشخيص: جيب كل المدراء واطبعهم مع نوع البيانات
                console.log("3. جاري جلب كل المدراء للتشخيص...");
                const allManagersSnap = await getDocs(collection(db, 'المديرين'));
                console.log(`4. عدد كل المدراء في القاعدة: ${allManagersSnap.size}`);
                
                let managerFound = null;
                allManagersSnap.forEach(doc => {
                    const d = doc.data();
                    console.log(`   مدير: ${doc.id}`);
                    console.log(`      رمز المشروع: "${d['رمز المشروع']}" | النوع: ${typeof d['رمز المشروع']}`);
                    console.log(`      هاتف: "${d['هاتف']}" | النوع: ${typeof d['هاتف']}`);
                    console.log(`      كلمة المرور: "${d['كلمة المرور']}" | النوع: ${typeof d['كلمة المرور']}`);
                    console.log(`      حالة: "${d['حالة']}"`);
                    
                    // مطابقة يدوية عشان نعرف وين المشكلة بالضبط
                    const codeMatch = String(d['رمز المشروع']) === String(projectCode);
                    const phoneMatch = String(d['هاتف']) === String(phone);
                    const passMatch = String(d['كلمة المرور']) === String(password);
                    
                    console.log(`      نتيجة المطابقة: كود=${codeMatch}, هاتف=${phoneMatch}, باسورد=${passMatch}`);
                    
                    if (codeMatch && phoneMatch && passMatch) {
                        managerFound = { id: doc.id, ...d };
                    }
                });

                if (managerFound) {
                    console.log("5. لقينا المدير بالمطابقة اليدوية ✅:", managerFound);
                    
                    const status = managerFound['حالة'];
                    if (status !== 'نشط' && status !== 'نشيط' && status !== 'active') {
                         console.log("6. المدير غير نشط. الحالة:", status);
                         return Swal.fire('خطأ', 'حساب المدير غير نشط', 'error');
                    }

                    localStorage.setItem('currentManager', JSON.stringify({
                        id: managerFound.id,
                        name: managerFound['اسم'],
                        phone: managerFound['هاتف'],
                        projectCode: managerFound['رمز المشروع'],
                        projectName: managerFound['اسم المشروع'] || ''
                    }));
                    localStorage.setItem('userRole', 'manager');
                    console.log("7. تم التحويل لصفحة المدير");
                    location.href = './manager.html';
                    return;
                }

                console.log("8. ما لقينا مدير مطابق. ندور في المناديب...");
                Swal.fire('خطأ', 'بيانات الدخول غير صحيحة', 'error');

            } catch (error) {
                console.error("9. خطأ فايربيس:", error);
                if (error.code === 'failed-precondition') {
                    Swal.fire('خطأ', 'تحتاج تسوي فهرس في Firestore. افتح Console واضغط الرابط اللي يطلع لك', 'error');
                } else {
                    Swal.fire('خطأ', `فشل الاتصال: ${error.message}`, 'error');
                }
            }
        }
    </script>
</body>
</html>
