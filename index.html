<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - سندات برو</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%); min-height: 100vh; }
    </style>
</head>
<body class="p-4 flex items-center justify-center">

    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-2xl p-8">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-gradient-to-br from-blue-500 to-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-file-invoice-dollar text-white text-3xl"></i>
                </div>
                <h1 class="text-3xl font-extrabold text-gray-800">سندات برو</h1>
                <p class="text-gray-500 mt-2">نظام إدارة السندات الذكي</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">كود المشروع</label>
                    <input id="projectCode" type="text" placeholder="ABCD1234" class="w-full border-2 border-gray-200 p-4 rounded-xl focus:border-blue-500 outline-none text-lg uppercase text-center" dir="ltr" required>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">رقم الجوال</label>
                    <input id="phone" type="tel" placeholder="0597087767" class="w-full border-2 border-gray-200 p-4 rounded-xl focus:border-blue-500 outline-none text-lg text-center" dir="ltr" required>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">كلمة المرور</label>
                    <input id="password" type="password" placeholder="••••••" class="w-full border-2 border-gray-200 p-4 rounded-xl focus:border-blue-500 outline-none text-lg text-center" required>
                </div>

                <button type="submit" id="loginBtn" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 text-white p-4 rounded-xl font-bold text-lg hover:opacity-90 transition shadow-lg">
                    <i class="fas fa-sign-in-alt ml-2"></i> تسجيل الدخول
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-gray-500">
                <p>جميع الحقوق محفوظة © 2026 سندات برو</p>
            </div>
        </div>
    </div>

<script type="module">
    import { login } from './auth.js?v=999999';

    // تنظيف كود المشروع
    document.getElementById('projectCode').oninput = (e) => {
        e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    };

    // منع الإرسال العادي للفورم
    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin ml-2"></i> جاري الدخول...';

        const projectCode = document.getElementById('projectCode').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;

        if (!projectCode || !phone || !password) {
            Swal.fire('تنبيه', 'املأ جميع الحقول', 'warning');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt ml-2"></i> تسجيل الدخول';
            return;
        }

        try {
            await login(projectCode, phone, password);
            // لو نجح، auth.js بيحوله تلقائي
        } catch (error) {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt ml-2"></i> تسجيل الدخول';
        }
    };

    // لو فيه ?logout=true امسح الكاش
    if (window.location.search.includes('logout=true')) {
        localStorage.clear();
        sessionStorage.clear();
    }
</script>

</body>
</html>
