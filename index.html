<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="appName">السندات الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
    </style>
    
    <!-- شغل اللغة -->
    <script type="module">
        import { setLanguage, applyLanguage } from './lang.js';
        window.setLanguage = setLanguage;
        applyLanguage();
    </script>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">

    <!-- نافذة اختيار اللغة - تطلع أول مرة بس -->
    <div id="languageModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full mx-4 text-center">
            <div class="text-5xl mb-4">🌍</div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">اختر اللغة | Select Language</h2>
            <p class="text-gray-600 mb-6">Choose your preferred language</p>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="setLanguage('ar')" class="bg-gradient-to-r from-green-500 to-emerald-600 text-white p-4 rounded-xl font-bold text-lg hover:opacity-90 transition">
                    العربية
                </button>
                <button onclick="setLanguage('en')" class="bg-gradient-to-r from-blue-500 to-indigo-600 text-white p-4 rounded-xl font-bold text-lg hover:opacity-90 transition">
                    English
                </button>
            </div>
        </div>
    </div>

    <!-- فورم تسجيل الدخول حقك -->
    <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md relative">
        <!-- زر تغيير اللغة -->
        <button onclick="document.getElementById('languageModal').classList.remove('hidden')" class="absolute top-4 left-4 text-gray-500 hover:text-blue-600 transition">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"></path>
            </svg>
        </button>

        <div class="text-center mb-8">
            <img src="logo.jpeg" alt="Logo" class="w-20 h-20 mx-auto mb-4" onerror="this.style.display='none'">
            <h1 class="text-3xl font-extrabold text-gray-800" data-i18n="appName">السندات الذكية</h1>
            <p class="text-gray-500 mt-2" data-i18n="login">تسجيل الدخول</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2" data-i18n="phone">رقم الجوال</label>
                <input type="text" id="phone" data-i18n-placeholder="phone" placeholder="رقم الجوال" 
                       class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition text-center font-bold" 
                       required>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2" data-i18n="password">كلمة السر</label>
                <input type="password" id="password" data-i18n-placeholder="password" placeholder="كلمة السر" 
                       class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition text-center" 
                       required>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white p-4 rounded-xl font-bold text-lg hover:opacity-90 transition shadow-lg" data-i18n="login">
                تسجيل الدخول
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, get, child } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBXXXXXXXXXXXXXXXX",
            authDomain: "your-project.firebaseapp.com",
            databaseURL: "https://your-project-default-rtdb.firebaseio.com",
            projectId: "your-project",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // إذا ما اختار لغة من قبل، نظهر النافذة
        if (!localStorage.getItem('language')) {
            document.getElementById('languageModal').classList.remove('hidden');
        }

        // كود تسجيل الدخول حقك القديم - ما غيرت فيه شي
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            
            // كمل كودك حق تسجيل الدخول هنا زي ما هو...
            // أنا ما لمسته عشان ما أخرب عليك
        });
    </script>
</body>
</html>
