<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>السندات الذكية - تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="lang.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="loader" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto"></div>
            <p class="mt-4 text-gray-600" data-lang="loading">جاري التحميل...</p>
        </div>
    </div>

    <div id="loginBox" class="hidden min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
            <h1 class="text-2xl font-bold text-center mb-6 text-blue-600" data-lang="app_title">السندات الذكية</h1>
            <form id="loginForm">
                <input type="text" id="projectCode" placeholder="كود المشروع" class="w-full border rounded px-3 py-2 mb-4" required data-lang-placeholder="project_code">
                <input type="text" id="phone" placeholder="رقم الجوال" class="w-full border rounded px-3 py-2 mb-4" required data-lang-placeholder="phone">
                <input type="password" id="password" placeholder="كلمة المرور" class="w-full border rounded px-3 py-2 mb-4" required data-lang-placeholder="password">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white rounded py-2" data-lang="login">تسجيل دخول</button>
            </form>
            <p id="errorMsg" class="text-red-500 text-sm mt-4 text-center"></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, collection, query, where, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBvEU1Cmt1IX4h0xaCd6Mca0MufvGqr2fY",
            authDomain: "sanadat-pro.firebaseapp.com",
            projectId: "sanadat-pro",
            storageBucket: "sanadat-pro.firebasestorage.app",
            messagingSenderId: "1039476751095",
            appId: "1:1039476751095:web:f2a7744d6469385e7771f2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        signInAnonymously(auth).then(() => {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('loginBox').classList.remove('hidden');
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const projectCode = document.getElementById('projectCode').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = '';

            try {
                let userDoc = null;

                // 1. سوبر ادمن - الكود حقه 001122334455
                const qSuper = query(collection(db, 'superadmins'),
                    where('projectCode', '==', projectCode),
                    where('phone', '==', phone),
                    where('password', '==', password));
                const snapSuper = await getDocs(qSuper);

                if (!snapSuper.empty) {
                    userDoc = {...snapSuper.docs[0].data(), role: 'superadmin', id: snapSuper.docs[0].id };
                }
                // 2. مدير
                else {
                    const qManager = query(collection(db, 'managers'),
                        where('projectCode', '==', projectCode),
                        where('phone', '==', phone),
                        where('password', '==', password));
                    const snapManager = await getDocs(qManager);

                    if (!snapManager.empty) {
                        userDoc = {...snapManager.docs[0].data(), role: 'manager', id: snapManager.docs[0].id };
                    }
                    // 3. مندوب
                    else {
                        const qDelegate = query(collection(db, 'delegates'),
                            where('projectCode', '==', projectCode),
                            where('phone', '==', phone),
                            where('password', '==', password));
                        const snapDelegate = await getDocs(qDelegate);
                        if (!snapDelegate.empty) userDoc = {...snapDelegate.docs[0].data(), role: 'delegate', id: snapDelegate.docs[0].id };
                    }
                }

                if (userDoc) {
                    sessionStorage.setItem('user', JSON.stringify(userDoc));
                    if (userDoc.role === 'superadmin') window.location.href = 'superadmin.html';
                    else if (userDoc.role === 'manager') window.location.href = 'manager.html';
                    else if (userDoc.role === 'delegate') window.location.href = 'delegate.html';
                } else {
                    errorMsg.textContent = t('login_error');
                }
            } catch (error) {
                errorMsg.textContent = t('error') + ': ' + error.message;
            }
        });

        applyLanguage(localStorage.getItem('lang') || 'ar');
    </script>
</body>
</html>
