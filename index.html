<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>السندات الذكية - تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gradient-to-br from-blue-900 to-indigo-900 min-h-screen flex items-center justify-center p-4">
    <div class="bg-gray-800/50 backdrop-blur-md p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-700">
        <h1 class="text-3xl font-bold text-center text-white mb-8">السندات الذكية</h1>
        <div class="space-y-6">
            <div>
                <label class="block text-gray-300 mb-2">كود المشروع</label>
                <input type="text" id="projectCode" class="w-full p-3 bg-gray-700/50 text-white rounded-lg border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-gray-300 mb-2">اسم المستخدم / رقم الجوال</label>
                <input type="text" id="phone" class="w-full p-3 bg-gray-700/50 text-white rounded-lg border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-gray-300 mb-2">كلمة المرور</label>
                <input type="password" id="password" class="w-full p-3 bg-gray-700/50 text-white rounded-lg border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-300">
                تسجيل الدخول
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        // ✅ نفس إعدادات superadmin.html بالضبط
        const firebaseConfig = {
            apiKey: "AIzaSyBvEU1Cmt1IX4h0xaCd6McaOMufvGqr2fY",
            authDomain: "sanadat-pro.firebaseapp.com",
            databaseURL: "https://sanadat-pro-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sanadat-pro",
            storageBucket: "sanadat-pro.firebasestorage.app",
            messagingSenderId: "1039476751095",
            appId: "1:1039476751095:web:f2a7744d6469385e7771f2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        console.log("Firebase شغال ✅");

        window.login = async () => {
            console.log("====== بداية تسجيل الدخول ======");
            const projectCode = document.getElementById('projectCode').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value.trim();

            console.log("1. البيانات المدخلة:", {projectCode, phone, password});

            if (!projectCode || !phone || !password) {
                return Swal.fire('خطأ', 'املأ كل الحقول', 'error');
            }

            try {
                // سوبر أدمن
                if (projectCode === '001122334455' && phone === '0597087767' && password === '500600') {
                    console.log("2. دخول سوبر أدمن ✅");
                    localStorage.setItem('userRole', 'superadmin');
                    location.href = './superadmin.html';
                    return;
                }

                // ✅ نقرأ من 'managers' مو 'المديرين'
                console.log("3. جاري جلب المدراء من managers...");
                const allManagersSnap = await getDocs(collection(db, 'managers'));
                console.log(`4. عدد كل المدراء في القاعدة: ${allManagersSnap.size}`);
                
                let managerFound = null;
                allManagersSnap.forEach(doc => {
                    const d = doc.data();
                    console.log(`   مدير:`, doc.id, d);
                    
                    // ✅ أسماء الحقول انجليزي نفس superadmin.html
                    const codeMatch = String(d['projectCode']) === String(projectCode);
                    const phoneMatch = String(d['phone']) === String(phone);
                    const passMatch = String(d['password']) === String(password);
                    
                    console.log(`      مطابقة: كود=${codeMatch}, هاتف=${phoneMatch}, باسورد=${passMatch}`);
                    
                    if (codeMatch && phoneMatch && passMatch) {
                        managerFound = { id: doc.id, ...d };
                    }
                });

                if (managerFound) {
                    console.log("5. لقينا المدير ✅:", managerFound);
                    
                    if (managerFound['status'] !== 'active') {
                         console.log("6. المدير غير نشط. الحالة:", managerFound['status']);
                         return Swal.fire('خطأ', 'حساب المدير غير نشط', 'error');
                    }

                    localStorage.setItem('currentManager', JSON.stringify({
                        id: managerFound.id,
                        name: managerFound['name'],
                        phone: managerFound['phone'],
                        projectCode: managerFound['projectCode']
                    }));
                    localStorage.setItem('userRole', 'manager');
                    console.log("7. تم التحويل لصفحة المدير");
                    location.href = './manager.html';
                    return;
                }

                console.log("8. ما لقينا مدير مطابق");
                Swal.fire('خطأ', 'بيانات الدخول غير صحيحة', 'error');

            } catch (error) {
                console.error("9. خطأ فايربيس:", error);
                Swal.fire('خطأ', `فشل الاتصال: ${error.message}`, 'error');
            }
        }
    </script>
</body>
</html>
