<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - سندات برو</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    </style>
    <script type="module">
        import { t, setLanguage, applyLanguage } from './lang.js?v=999999';
        window.t = t; window.setLanguage = setLanguage; window.applyLanguage = applyLanguage; applyLanguage();
    </script>
</head>
<body class="flex items-center justify-center p-4">

    <div id="loadingScreen" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
        <div class="bg-white rounded-2xl p-8 text-center">
            <i class="fas fa-spinner fa-spin text-4xl text-blue-600 mb-4"></i>
            <p class="text-lg font-bold">جاري تسجيل الدخول...</p>
        </div>
    </div>

    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-2xl p-8">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-file-invoice-dollar text-white text-3xl"></i>
                </div>
                <h1 class="text-3xl font-extrabold mb-2">سندات برو</h1>
                <p class="text-gray-500">نظام إدارة السندات الذكي</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">كود المشروع</label>
                    <input id="projectCode" autocomplete="off" placeholder="ABCD1234" class="w-full border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none uppercase" dir="ltr">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">رقم الجوال</label>
                    <input id="phone" autocomplete="off" placeholder="0597087767" class="w-full border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none" dir="ltr">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">كلمة المرور</label>
                    <input id="password" type="password" autocomplete="new-password" placeholder="••••••••" class="w-full border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none">
                </div>
                <button id="loginBtn" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white p-4 rounded-xl font-bold text-lg hover:opacity-90 transition">
                    <i class="fas fa-sign-in-alt ml-2"></i>تسجيل الدخول
                </button>
            </div>

            <div class="mt-6 text-center text-xs text-gray-400">
                جميع الحقوق محفوظة © سندات برو 2026
            </div>
        </div>
    </div>

<script type="module">
    import { login, getCurrentUserData } from './auth.js?v=999999';
    import { showSuccess, showError } from './core.js?v=999999';

    // لو جاي من تسجيل خروج، امسح الكاش
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('logout') === 'true') {
        localStorage.clear();
        sessionStorage.clear();
        window.history.replaceState({}, document.title, window.location.pathname);
    }

    // ما عاد نستخدم onAuthStateChanged هنا نهائياً عشان ما يطردك
    // التوجيه يصير يدوي بعد تسجيل الدخول فقط

    document.getElementById('loginBtn').onclick = async () => {
        const projectCode = document.getElementById('projectCode').value.trim().toUpperCase();
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;

        if (!projectCode || !phone || !password) {
            return showError('املأ جميع الحقول');
        }

        document.getElementById('loadingScreen').classList.remove('hidden');
        document.getElementById('loginBtn').disabled = true;

        try {
            // 1. سجل دخول
            await login(projectCode, phone, password);
            
            // 2. جيب بيانات المستخدم
            const userData = await getCurrentUserData();
            
            if (!userData) {
                throw new Error('المستخدم غير موجود في قاعدة البيانات');
            }

            if (userData.active === false) {
                throw new Error('تم إيقاف حسابك. تواصل مع المدير');
            }

            // 3. توجيه حسب الرول - بدون ما نطرد أحد
            showSuccess('تم تسجيل الدخول بنجاح');
            
            setTimeout(() => {
                if (userData.role === 'delegate') {
                    window.location.href = 'delegate.html';
                } else {
                    window.location.href = 'admin-panel.html';
                }
            }, 500);

        } catch (error) {
            document.getElementById('loadingScreen').classList.add('hidden');
            document.getElementById('loginBtn').disabled = false;
            
            let msg = 'خطأ في تسجيل الدخول';
            if (error.code === 'auth/invalid-credential') msg = 'رقم الجوال أو كلمة المرور غلط';
            if (error.code === 'auth/user-not-found') msg = 'المستخدم غير موجود';
            if (error.message.includes('project')) msg = 'كود المشروع غير صحيح';
            if (error.message.includes('active') || error.message.includes('إيقاف')) msg = 'تم إيقاف حسابك';
            if (error.message.includes('قاعدة البيانات')) msg = error.message;
            showError(msg);
        }
    };

    // Enter يسجل دخول
    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });

    // لو فيه يوزر مسجل دخول قديم، حاول تحوله تلقائي
    window.addEventListener('load', async () => {
        try {
            const userData = await getCurrentUserData();
            if (userData && userData.active !== false) {
                document.getElementById('loadingScreen').classList.remove('hidden');
                if (userData.role === 'delegate') {
                    window.location.href = 'delegate.html';
                } else {
                    window.location.href = 'admin-panel.html';
                }
            }
        } catch (e) {
            // تجاهل الخطأ، خله في صفحة الدخول
        }
    });
</script>

</body>
</html>
