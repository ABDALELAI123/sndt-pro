<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>السندات الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Cairo', sans-serif; } </style>
    <script type="module">
        import { t, setLanguage, applyLanguage } from './lang.js';
        window.t = t; window.setLanguage = setLanguage; window.applyLanguage = applyLanguage;
        applyLanguage();
    </script>
</head>
<body class="bg-gradient-to-br from-blue-900 to-purple-900 min-h-screen flex items-center justify-center p-4">

<div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-gray-800">السندات الذكية</h1>
        <p class="text-gray-500">نظام إدارة السندات</p>
    </div>

    <div class="space-y-4">
        <input id="projectCode" type="text" placeholder="كود المشروع" class="w-full p-4 border-2 border-gray-200 rounded-xl text-center text-lg">
        <input id="phone" type="tel" placeholder="رقم الجوال" class="w-full p-4 border-2 border-gray-200 rounded-xl text-center text-lg">
        <input id="password" type="password" placeholder="كلمة المرور" class="w-full p-4 border-2 border-gray-200 rounded-xl text-center text-lg">
        <button onclick="login()" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white p-4 rounded-xl font-bold text-lg">
            تسجيل الدخول
        </button>
    </div>

    <button onclick="setLanguage(localStorage.getItem('language') === 'ar'? 'en' : 'ar')" class="w-full mt-4 text-gray-500">🌍 تغيير اللغة</button>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, query, where, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBvEU1Cmt1IX4h0xaCd6McaOMufvGqr2fY",
      authDomain: "sanadat-pro.firebaseapp.com",
      databaseURL: "https://sanadat-pro-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "sanadat-pro",
      storageBucket: "sanadat-pro.firebasestorage.app",
      messagingSenderId: "1039476751095",
      appId: "1:1039476751095:web:f2a7744d6469385e7771f2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.login = async () => {
        const projectCode = document.getElementById('projectCode').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!projectCode ||!phone ||!password) {
            Swal.fire('خطأ', 'املأ كل الحقول', 'error');
            return;
        }

        // 1. تحقق من السوبر أدمن
        if (projectCode === '001122334455' && phone === '0597087767' && password === '500600') {
            location.href = './superadmin.html';
            return;
        }

        // 2. تحقق من المدراء في Firebase
        const q = query(collection(db, 'managers'),
            where('projectCode', '==', projectCode),
            where('phone', '==', phone),
            where('password', '==', password)
        );

        const snap = await getDocs(q);

        if (snap.empty) {
            Swal.fire('خطأ', 'بيانات الدخول غير صحيحة', 'error');
        } else {
            const manager = snap.docs[0].data();
            localStorage.setItem('managerData', JSON.stringify(manager));
            location.href = './manager.html';
        }
    }
</script>
</body>
</html>
