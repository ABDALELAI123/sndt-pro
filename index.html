<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سندات برو - نظام التذاكر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap');
        * { font-family: 'Cairo', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
       .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
       .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
       .btn-primary:hover { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); }
    </style>
</head>
<body class="text-white min-h-screen">
    <!-- شاشة تسجيل الدخول -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass rounded-2xl p-8 w-full max-w-md">
            <div class="text-center mb-8">
                <div class="w-20 h-20 mx-auto mb-4 rounded-full bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center">
                    <i class="fas fa-ticket-alt text-3xl"></i>
                </div>
                <h1 class="text-3xl font-bold mb-2">سندات برو</h1>
                <p class="text-gray-400">نظام إدارة التذاكر</p>
            </div>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2">اسم المستخدم</label>
                    <input type="text" id="username" required class="w-full px-4 py-3 rounded-lg bg-slate-800 border border-slate-700 focus:border-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">كلمة المرور</label>
                    <input type="password" id="password" required class="w-full px-4 py-3 rounded-lg bg-slate-800 border border-slate-700 focus:border-blue-500 focus:outline-none">
                </div>
                <button type="submit" id="loginBtn" class="w-full btn-primary text-white font-bold py-3 rounded-lg transition">
                    <i class="fas fa-sign-in-alt ml-2"></i> تسجيل الدخول
                </button>
            </form>
        </div>
    </div>

    <!-- الشاشة الرئيسية -->
    <div id="mainScreen" class="hidden min-h-screen">
        <!-- الهيدر -->
        <header class="glass border-b border-slate-700 sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center">
                        <i class="fas fa-ticket-alt"></i>
                    </div>
                    <h1 class="text-xl font-bold">سندات برو</h1>
                </div>
                <div class="flex items-center gap-4">
                    <span id="userRoleText" class="text-sm text-gray-400"></span>
                    <button id="logoutBtn" class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg transition">
                        <i class="fas fa-sign-out-alt ml-2"></i> خروج
                    </button>
                </div>
            </div>
        </header>

        <!-- المحتوى -->
        <main class="max-w-7xl mx-auto p-6">
            <!-- الإحصائيات -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <div class="glass rounded-xl p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-400 text-sm mb-1">إجمالي التذاكر</p>
                            <p class="text-3xl font-bold" id="totalTickets">0</p>
                        </div>
                        <div class="w-12 h-12 rounded-lg bg-blue-500/20 flex items-center justify-center">
                            <i class="fas fa-ticket-alt text-blue-500 text-xl"></i>
                        </div>
                    </div>
                </div>
                <div class="glass rounded-xl p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-400 text-sm mb-1">مفتوحة</p>
                            <p class="text-3xl font-bold text-yellow-500" id="openTickets">0</p>
                        </div>
                        <div class="w-12 h-12 rounded-lg bg-yellow-500/20 flex items-center justify-center">
                            <i class="fas fa-clock text-yellow-500 text-xl"></i>
                        </div>
                    </div>
                </div>
                <div class="glass rounded-xl p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-400 text-sm mb-1">قيد المعالجة</p>
                            <p class="text-3xl font-bold text-blue-500" id="progressTickets">0</p>
                        </div>
                        <div class="w-12 h-12 rounded-lg bg-blue-500/20 flex items-center justify-center">
                            <i class="fas fa-spinner text-blue-500 text-xl"></i>
                        </div>
                    </div>
                </div>
                <div class="glass rounded-xl p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-400 text-sm mb-1">مغلقة</p>
                            <p class="text-3xl font-bold text-green-500" id="closedTickets">0</p>
                        </div>
                        <div class="w-12 h-12 rounded-lg bg-green-500/20 flex items-center justify-center">
                            <i class="fas fa-check-circle text-green-500 text-xl"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- أزرار التحكم -->
            <div class="glass rounded-xl p-6 mb-6">
                <div class="flex flex-wrap gap-3">
                    <button id="newTicketBtn" class="btn-primary px-6 py-3 rounded-lg font-bold">
                        <i class="fas fa-plus ml-2"></i> تذكرة جديدة
                    </button>
                    <button id="manageUsersBtn" class="px-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-lg transition font-bold hidden">
                        <i class="fas fa-user-cog ml-2"></i> إدارة المستخدمين
                    </button>
                    <button id="reportsBtn" class="px-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-lg transition font-bold hidden">
                        <i class="fas fa-chart-bar ml-2"></i> التقارير
                    </button>
                </div>
            </div>

            <!-- جدول التذاكر -->
            <div class="glass rounded-xl overflow-hidden">
                <div class="p-6 border-b border-slate-700">
                    <h2 class="text-2xl font-bold">التذاكر</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-slate-800">
                            <tr>
                                <th class="px-6 py-4 text-right">رقم التذكرة</th>
                                <th class="px-6 py-4 text-right">العنوان</th>
                                <th class="px-6 py-4 text-right">الحالة</th>
                                <th class="px-6 py-4 text-right">الأولوية</th>
                                <th class="px-6 py-4 text-right">التاريخ</th>
                                <th class="px-6 py-4 text-right">إجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="ticketsTable">
                            <tr>
                                <td colspan="6" class="px-6 py-8 text-center text-gray-500">
                                    <i class="fas fa-inbox text-4xl mb-3"></i>
                                    <p>لا توجد تذاكر حالياً</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- مودال تذكرة جديدة -->
    <div id="newTicketModal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
        <div class="glass rounded-2xl p-8 w-full max-w-2xl max-h- overflow-y-auto">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold">تذكرة جديدة</h2>
                <button class="closeModal p-2 hover:bg-slate-800 rounded-lg"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form id="newTicketForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2">عنوان التذكرة</label>
                    <input type="text" id="ticketTitle" required class="w-full px-4 py-3 rounded-lg bg-slate-800 border border-slate-700 focus:border-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">الوصف</label>
                    <textarea id="ticketDesc" required rows="4" class="w-full px-4 py-3 rounded-lg bg-slate-800 border border-slate-700 focus:border-blue-500 focus:outline-none"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">الأولوية</label>
                        <select id="ticketPriority" class="w-full px-4 py-3 rounded-lg bg-slate-800 border border-slate-700 focus:border-blue-500 focus:outline-none">
                            <option value="low">منخفضة</option>
                            <option value="medium" selected>متوسطة</option>
                            <option value="high">عالية</option>
                            <option value="urgent">عاجلة</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">التصنيف</label>
                        <select id="ticketCategory" class="w-full px-4 py-3 rounded-lg bg-slate-800 border border-slate-700 focus:border-blue-500 focus:outline-none">
                            <option value="technical">فني</option>
                            <option value="account">حسابات</option>
                            <option value="general">عام</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="w-full btn-primary text-white font-bold py-3 rounded-lg">
                    <i class="fas fa-paper-plane ml-2"></i> إرسال التذكرة
                </button>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed bottom-4 left-4 z-50 space-y-2"></div>

    <script type="module">
        // Import Firebase - بياناتك جاهزة هنا
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, get, set, push, onValue, update, remove } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        // Firebase Config - بياناتك من الصورة
        const firebaseConfig = {
          apiKey: "AIzaSyBvEU1Cmt1IX4h0xaCd6McaOMufvGqr2fY",
          authDomain: "sanadat-pro.firebaseapp.com",
          databaseURL: "https://sanadat-pro-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "sanadat-pro",
          storageBucket: "sanadat-pro.firebasestorage.app",
          messagingSenderId: "1039476751095",
          appId: "1:1039476751095:web:f2a7744d6469385e7771f2"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // متغيرات عامة
        let currentUser = null;
        let allUsers = {};
        let allTickets = {};

        // ننتظر تحميل الصفحة - هذا يحل مشكلة تسجيل الدخول
        document.addEventListener('DOMContentLoaded', () => {
            
            // تسجيل الدخول
            const loginForm = document.getElementById('loginForm');
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                const loginBtn = document.getElementById('loginBtn');
                
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin ml-2"></i> جاري التحقق...';
                
                try {
                    const usersRef = ref(db, 'users');
                    const snapshot = await get(usersRef);
                    
                    if (snapshot.exists()) {
                        const users = snapshot.val();
                        allUsers = users;
                        const user = Object.values(users).find(u => u.username === username && u.password === password);
                        
                        if (user) {
                            currentUser = user;
                            document.getElementById('loginScreen').classList.add('hidden');
                            document.getElementById('mainScreen').classList.remove('hidden');
                            document.getElementById('userRoleText').textContent = `${user.name} - ${user.role}`;
                            
                            // إظهار أزرار المدير
                            if (user.role === 'المدير العام' || user.role === 'مدير') {
                                document.getElementById('manageUsersBtn').classList.remove('hidden');
                                document.getElementById('reportsBtn').classList.remove('hidden');
                            }
                            
                            loadTickets();
                            showToast('تم تسجيل الدخول بنجاح', 'success');
                        } else {
                            showToast('اسم المستخدم أو كلمة المرور غير صحيحة', 'error');
                        }
                    } else {
                        showToast('لا يوجد مستخدمين في النظام. أضف مستخدم في Firebase', 'error');
                    }
                } catch (error) {
                    console.error(error);
                    showToast('حدث خطأ في الاتصال بقاعدة البيانات', 'error');
                }
                
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt ml-2"></i> تسجيل الدخول';
            });

            // تسجيل الخروج
            document.getElementById('logoutBtn').addEventListener('click', () => {
                currentUser = null;
                document.getElementById('mainScreen').classList.add('hidden');
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('loginForm').reset();
            });

            // فتح مودال تذكرة جديدة
            document.getElementById('newTicketBtn').addEventListener('click', () => {
                document.getElementById('newTicketModal').classList.remove('hidden');
            });

            // إغلاق المودالز
            document.querySelectorAll('.closeModal').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.target.closest('.fixed').classList.add('hidden');
                });
            });

            // إرسال تذكرة جديدة
            document.getElementById('newTicketForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const title = document.getElementById('ticketTitle').value;
                const desc = document.getElementById('ticketDesc').value;
                const priority = document.getElementById('ticketPriority').value;
                const category = document.getElementById('ticketCategory').value;
                
                try {
                    const ticketsRef = ref(db, 'tickets');
                    const newTicketRef = push(ticketsRef);
                    
                    await set(newTicketRef, {
                        id: newTicketRef.key,
                        title: title,
                        description: desc,
                        priority: priority,
                        category: category,
                        status: 'open',
                        createdBy: currentUser.username,
                        createdAt: new Date().toISOString(),
                        ticketNumber: `TKT-${Date.now()}`
                    });
                    
                    document.getElementById('newTicketModal').classList.add('hidden');
                    document.getElementById('newTicketForm').reset();
                    showToast('تم إنشاء التذكرة بنجاح', 'success');
                } catch (error) {
                    console.error(error);
                    showToast('فشل إنشاء التذكرة', 'error');
                }
            });
        });

        // تحميل التذاكر
        function loadTickets() {
            const ticketsRef = ref(db, 'tickets');
            onValue(ticketsRef, (snapshot) => {
                const tbody = document.getElementById('ticketsTable');
                
                if (snapshot.exists()) {
                    allTickets = snapshot.val();
                    const tickets = Object.values(allTickets);
                    
                    // تحديث الإحصائيات
                    document.getElementById('totalTickets').textContent = tickets.length;
                    document.getElementById('openTickets').textContent = tickets.filter(t => t.status === 'open').length;
                    document.getElementById('progressTickets').textContent = tickets.filter(t => t.status === 'progress').length;
                    document.getElementById('closedTickets').textContent = tickets.filter(t => t.status === 'closed').length;
                    
                    // عرض التذاكر
                    tbody.innerHTML = tickets.map(ticket => `
                        <tr class="border-b border-slate-700 hover:bg-slate-800/50">
                            <td class="px-6 py-4">${ticket.ticketNumber}</td>
                            <td class="px-6 py-4">${ticket.title}</td>
                            <td class="px-6 py-4">
                                <span class="px-3 py-1 rounded-full text-xs ${getStatusColor(ticket.status)}">
                                    ${getStatusText(ticket.status)}
                                </span>
                            </td>
                            <td class="px-6 py-4">
                                <span class="px-3 py-1 rounded-full text-xs ${getPriorityColor(ticket.priority)}">
                                    ${getPriorityText(ticket.priority)}
                                </span>
                            </td>
                            <td class="px-6 py-4">${new Date(ticket.createdAt).toLocaleDateString('ar-SA')}</td>
                            <td class="px-6 py-4">
                                <button class="text-blue-500 hover:text-blue-400">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="6" class="px-6 py-8 text-center text-gray-500">
                                <i class="fas fa-inbox text-4xl mb-3"></i>
                                <p>لا توجد تذاكر حالياً</p>
                            </td>
                        </tr>
                    `;
                }
            });
        }

        // دوال مساعدة
        function getStatusColor(status) {
            const colors = {
                open: 'bg-yellow-500/20 text-yellow-500',
                progress: 'bg-blue-500/20 text-blue-500',
                closed: 'bg-green-500/20 text-green-500'
            };
            return colors[status] || colors.open;
        }

        function getStatusText(status) {
            const texts = { open: 'مفتوحة', progress: 'قيد المعالجة', closed: 'مغلقة' };
            return texts[status] || status;
        }

        function getPriorityColor(priority) {
            const colors = {
                low: 'bg-gray-500/20 text-gray-400',
                medium: 'bg-blue-500/20 text-blue-400',
                high: 'bg-orange-500/20 text-orange-400',
                urgent: 'bg-red-500/20 text-red-400'
            };
            return colors[priority] || colors.medium;
        }

        function getPriorityText(priority) {
            const texts = { low: 'منخفضة', medium: 'متوسطة', high: 'عالية', urgent: 'عاجلة' };
            return texts[priority] || priority;
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgColor = type === 'success'? 'bg-green-600' : 'bg-red-600';
            const icon = type === 'success'? 'fa-check-circle' : 'fa-exclamation-circle';
            
            toast.className = `${bgColor} text-white px-6 py-4 rounded-lg shadow-lg flex items-center gap-3`;
            toast.innerHTML = `<i class="fas ${icon}"></i><span>${message}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
