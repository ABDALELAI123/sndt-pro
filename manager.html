<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة تحكم المدير - سندات برو</title>
  <style>
    * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body {
      margin: 0; padding: 0; min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .login-box, .dashboard {
      background: white; padding: 40px; border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 90%; max-width: 450px;
    }
    .dashboard { max-width: 900px; display: none; }
    h2 { color: #667eea; text-align: center; margin-bottom: 30px; }
    .error {
      background: #fee; color: #c33; padding: 12px; border-radius: 8px;
      margin-bottom: 20px; text-align: center; display: none;
    }
    label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; }
    input {
      width: 100%; padding: 12px; border: 2px solid #e0e0e0;
      border-radius: 8px; margin-bottom: 20px; font-size: 16px;
    }
    input:focus { outline: none; border-color: #667eea; }
    button {
      width: 100%; padding: 14px; background: #667eea; color: white;
      border: none; border-radius: 8px; font-size: 18px; font-weight: bold;
      cursor: pointer; transition: 0.3s;
    }
    button:hover { background: #5568d3; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .logout { width: auto; padding: 10px 20px; background: #e74c3c; }
    .logout:hover { background: #c0392b; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 12px; text-align: right; border-bottom: 1px solid #eee; }
    th { background: #f8f9fa; color: #667eea; }
    .delete-btn { background: #e74c3c; padding: 6px 12px; font-size: 14px; width: auto; }
    .delete-btn:hover { background: #c0392b; }
    .add-form { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
    .add-form input { margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="login-box" id="loginBox">
    <h2>تسجيل دخول المدير 🛡️</h2>
    <div class="error" id="errorMsg"></div>
    <label>كود المشروع</label>
    <input type="text" id="projectCode">
    <label>رقم الجوال</label>
    <input type="text" id="phone">
    <label>كلمة المرور</label>
    <input type="password" id="password">
    <button id="loginBtn">دخول ←</button>
  </div>
  <div class="dashboard" id="dashboard">
    <div class="header">
      <h2>لوحة التحكم</h2>
      <button class="logout" id="logoutBtn">تسجيل خروج</button>
    </div>
    <div class="add-form">
      <h3>إضافة سند جديد</h3>
      <input type="text" id="sanadTitle">
      <input type="text" id="sanadAmount">
      <button id="addSanadBtn">إضافة سند</button>
    </div>
    <h3>قائمة السندات</h3>
    <table id="sanadatTable">
      <thead>
        <tr>
          <th>العنوان</th>
          <th>المبلغ</th>
          <th>التاريخ</th>
          <th>حذف</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, addDoc, deleteDoc, onSnapshot, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    const firebaseConfig = {
      apiKey: "AIzaSyCjvjjJ4rW0X2D0E4BqJ9Q7k5m1n3p6r8s",
      authDomain: "sanadat-pro.firebaseapp.com",
      projectId: "sanadat-pro",
      storageBucket: "sanadat-pro.appspot.com",
      messagingSenderId: "123456789012",
      appId: "1:123456789012:web:abc123def456ghi789"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const loginBox = document.getElementById('loginBox');
    const dashboard = document.getElementById('dashboard');
    const errorMsg = document.getElementById('errorMsg');
    document.getElementById('loginBtn').onclick = async () => {
      const code = document.getElementById('projectCode').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const pass = document.getElementById('password').value;
      errorMsg.style.display = 'none';
      if (code !== '001122334455') {
        errorMsg.innerText = 'كود المشروع غير صحيح';
        errorMsg.style.display = 'block';
        return;
      }
      const email = `user${phone}@gmail.com`;
      try {
        await signInWithEmailAndPassword(auth, email, pass);
      } catch (e) {
        errorMsg.innerText = 'رقم الجوال أو كلمة المرور غلط';
        errorMsg.style.display = 'block';
      }
    };
    document.getElementById('logoutBtn').onclick = () => signOut(auth);
    onAuthStateChanged(auth, (user) => {
      if (user) {
        loginBox.style.display = 'none';
        dashboard.style.display = 'block';
        loadSanadat();
      } else {
        loginBox.style.display = 'block';
        dashboard.style.display = 'none';
      }
    });
    function loadSanadat() {
      const q = query(collection(db, 'sanadat'), orderBy('createdAt', 'desc'));
      onSnapshot(q, (snapshot) => {
        const tbody = document.querySelector('#sanadatTable tbody');
        tbody.innerHTML = '';
        snapshot.forEach((docSnap) => {
          const data = docSnap.data();
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${data.title || '-'}</td>
            <td>${data.amount || '-'}</td>
            <td>${data.createdAt ? new Date(data.createdAt.toDate()).toLocaleDateString('ar-SA') : '-'}</td>
            <td><button class="delete-btn" onclick="deleteSanad('${docSnap.id}')">حذف</button></td>
          `;
          tbody.appendChild(tr);
        });
      });
    }
    document.getElementById('addSanadBtn').onclick = async () => {
      const title = document.getElementById('sanadTitle').value.trim();
      const amount = document.getElementById('sanadAmount').value.trim();
      if (!title || !amount) return alert('عبي كل الحقول');
      await addDoc(collection(db, 'sanadat'), {
        title: title,
        amount: amount,
        createdAt: serverTimestamp()
      });
      document.getElementById('sanadTitle').value = '';
      document.getElementById('sanadAmount').value = '';
    };
    window.deleteSanad = async (id) => {
      if (confirm('متأكد تبي تحذف السند؟')) {
        await deleteDoc(doc(db, 'sanadat', id));
      }
    };
  </script>
</body>
</html>
