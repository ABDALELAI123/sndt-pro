<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المدير - سندات برو</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Tajawal', sans-serif; } </style>
</head>
<body class="bg-gray-100">

    <div class="container mx-auto p-4 md:p-8">
        <!-- الهيدر -->
        <div class="bg-white p-6 rounded-xl shadow-lg mb-8">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-bold text-green-600">لوحة تحكم المدير</h1>
                    <p id="managerInfo" class="text-gray-500 mt-1">جاري التحميل...</p>
                </div>
                <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600">تسجيل خروج</button>
            </div>
        </div>

        <!-- الإحصائيات -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-6 rounded-xl shadow">
                <p class="text-gray-500">إجمالي السندات</p>
                <p id="totalBonds" class="text-3xl font-bold text-blue-600">0</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow">
                <p class="text-gray-500">إجمالي المبلغ</p>
                <p id="totalAmount" class="text-3xl font-bold text-green-600">0 ر.س</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow">
                <p class="text-gray-500">عدد المناديب</p>
                <p id="totalDelegates" class="text-3xl font-bold text-purple-600">0</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow">
                <p class="text-gray-500">سندات اليوم</p>
                <p id="todayBonds" class="text-3xl font-bold text-orange-600">0</p>
            </div>
        </div>

        <!-- إضافة مندوب -->
        <div class="bg-white p-6 rounded-xl shadow-lg mb-6">
            <h2 class="text-2xl font-bold mb-4">إضافة مندوب جديد</h2>
            <form id="addDelegateForm" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="delegateName" class="p-3 border rounded-lg" placeholder="اسم المندوب" required>
                <input type="tel" id="delegatePhone" class="p-3 border rounded-lg" placeholder="05xxxxxxxx" required>
                <input type="text" id="delegatePassword" class="p-3 border rounded-lg" placeholder="كلمة المرور" required>
                <button type="submit" class="bg-green-600 text-white p-3 rounded-lg font-bold hover:bg-green-700">إضافة</button>
            </form>
        </div>

        <!-- جدول المناديب -->
        <div class="bg-white p-6 rounded-xl shadow-lg mb-6">
            <h2 class="text-2xl font-bold mb-4">مناديب المشروع</h2>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="p-3 text-right">الاسم</th>
                            <th class="p-3 text-right">الجوال</th>
                            <th class="p-3 text-right">عدد السندات</th>
                            <th class="p-3 text-right">إجمالي المبلغ</th>
                            <th class="p-3 text-right">الحالة</th>
                        </tr>
                    </thead>
                    <tbody id="delegatesTable">
                        <tr><td colspan="5" class="p-4 text-center text-gray-500">جاري التحميل...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- آخر السندات -->
        <div class="bg-white p-6 rounded-xl shadow-lg">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold">آخر السندات</h2>
                <a href="bonds.html" class="text-blue-600 font-bold hover:underline">عرض الكل</a>
            </div>
            <div id="bondsList" class="space-y-3">
                <p class="text-gray-500">جاري التحميل...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase.js';
        import { getCurrentUserData, createUser } from './auth.js';
        import { formatMoney, formatDate, showSuccess, showError, requireAuth, logout } from './core.js';
        import { isValidSaudiPhone } from './utils.js';
        import { collection, query, where, getDocs, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // 1. حماية الصفحة
        requireAuth();
        const userData = await getCurrentUserData();
        if (!userData || userData.role!== 'manager') {
            window.location.href = 'index.html';
        }

        // 2. عرض معلومات المدير
        document.getElementById('managerInfo').textContent = `${userData.name} | كود المشروع: ${userData.projectCode}`;
        document.getElementById('logoutBtn').onclick = logout;

        // 3. تحميل الإحصائيات
        async function loadStats() {
            // سندات المشروع كامل
            const bondsQuery = query(collection(db, 'bonds'), where('projectCode', '==', userData.projectCode));
            const bondsSnapshot = await getDocs(bondsQuery);
            
            let totalAmount = 0;
            let todayCount = 0;
            const today = new Date().toDateString();
            
            bondsSnapshot.forEach(doc => {
                const bond = doc.data();
                totalAmount += parseFloat(bond.amount) || 0;
                if (bond.createdAt?.toDate().toDateString() === today) todayCount++;
            });

            document.getElementById('totalBonds').textContent = bondsSnapshot.size;
            document.getElementById('totalAmount').textContent = formatMoney(totalAmount);
            document.getElementById('todayBonds').textContent = todayCount;

            // عدد المناديب
            const delegatesQuery = query(collection(db, 'users'), 
                where('projectCode', '==', userData.projectCode), 
                where('role', '==', 'delegate')
            );
            const delegatesSnapshot = await getDocs(delegatesQuery);
            document.getElementById('totalDelegates').textContent = delegatesSnapshot.size;
        }

        // 4. إضافة مندوب
        document.getElementById('addDelegateForm').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('delegateName').value;
            const phone = document.getElementById('delegatePhone').value;
            const password = document.getElementById('delegatePassword').value;

            if (!isValidSaudiPhone(phone)) {
                showError('رقم الجوال غير صحيح');
                return;
            }

            try {
                await createUser(userData.projectCode, phone, password, 'delegate', name);
                showSuccess('تم إضافة المندوب بنجاح');
                e.target.reset();
                loadDelegates();
                loadStats();
            } catch (error) {
                showError(error.message);
            }
        };

        // 5. تحميل المناديب
        async function loadDelegates() {
            const delegatesTable = document.getElementById('delegatesTable');
            const q = query(collection(db, 'users'), 
                where('projectCode', '==', userData.projectCode), 
                where('role', '==', 'delegate')
            );
            const snapshot = await getDocs(q);

            if (snapshot.empty) {
                delegatesTable.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-gray-500">لا يوجد مناديب</td></tr>';
                return;
            }

            delegatesTable.innerHTML = '';
            for (const userDoc of snapshot.docs) {
                const delegate = userDoc.data();
                
                // جيب سندات المندوب
                const bondsQuery = query(collection(db, 'bonds'), 
                    where('createdBy', '==', userDoc.id)
                );
                const bondsSnapshot = await getDocs(bondsQuery);
                let delegateTotal = 0;
                bondsSnapshot.forEach(b => delegateTotal += parseFloat(b.data().amount) || 0);

                delegatesTable.innerHTML += `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="p-3 font-bold">${delegate.name}</td>
                        <td class="p-3">${delegate.phone}</td>
                        <td class="p-3">${bondsSnapshot.size}</td>
                        <td class="p-3 font-bold text-green-600">${formatMoney(delegateTotal)}</td>
                        <td class="p-3"><span class="bg-green-100 text-green-800 px-3 py-1 rounded-full text-sm">نشط</span></td>
                    </tr>
                `;
            }
        }

        // 6. تحميل آخر السندات
        async function loadLatestBonds() {
            const bondsList = document.getElementById('bondsList');
            const q = query(collection(db, 'bonds'), 
                where('projectCode', '==', userData.projectCode),
                orderBy('createdAt', 'desc'),
                limit(5)
            );
            const snapshot = await getDocs(q);

            if (snapshot.empty) {
                bondsList.innerHTML = '<p class="text-gray-500">لا توجد سندات</p>';
                return;
            }

            bondsList.innerHTML = '';
            snapshot.forEach(doc => {
                const bond = doc.data();
                bondsList.innerHTML += `
                    <div class="p-4 border rounded-lg bg-gray-50 flex justify-between items-center">
                        <div>
                            <p class="font-bold">${bond.bondNumber}</p>
                            <p class="text-gray-600 text-sm">${bond.clientName || 'بدون اسم'} | ${formatDate(bond.createdAt)}</p>
                        </div>
                        <p class="font-bold text-lg text-green-600">${formatMoney(bond.amount)}</p>
                    </div>
                `;
            });
        }

        // تحميل كل شي
        loadStats();
        loadDelegates();
        loadLatestBonds();
    </script>
</body>
</html>
