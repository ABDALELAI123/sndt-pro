<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام السندات - سندات برو</title>
<script type="importmap">
{
  "imports": {
    "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"
  }
}
</script>
<style>
* { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
body { margin: 0; background: #f4f6f8; color: #333; }
.login-box { max-width: 400px; margin: 100px auto; padding: 30px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
input, button, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
button { background: #0d6efd; color: white; border: none; cursor: pointer; font-weight: bold; }
button:hover { background: #0b5ed7; }
.hidden { display: none!important; }
.header { background: #0d6efd; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
.card { background: white; padding: 20px; margin: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
</style>
</head>
<body>

<div id="loginScreen" class="login-box">
  <h2 style="text-align:center">تسجيل الدخول</h2>
  <input type="tel" id="phone" placeholder="رقم الجوال" value="0597087767">
  <input type="password" id="password" placeholder="كلمة المرور" value="500600">
  <button onclick="login()">دخول</button>
  <p id="loginError" style="color:red; text-align:center;"></p>
</div>

<div id="mainApp" class="hidden">
  <div class="header">
    <h3 id="welcomeUser">مرحبا</h3>
    <button onclick="logout()">خروج</button>
  </div>
  <div id="superAdminPanel" class="hidden"></div>
  <div id="managerPanel" class="hidden"></div>
  <div id="delegatePanel" class="hidden"></div>
</div>

<script type="module">
import { initializeApp } from "firebase/app";
import { getAuth, signInWithEmailAndPassword, signOut } from "firebase/auth";
import { getFirestore, collection, getDocs, query, where } from "firebase/firestore";

// 1. ربط Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBvEU1Cmt1IX4h0xaCd6Mca0MufvGqr2fY",
  authDomain: "sanadat-pro.firebaseapp.com",
  projectId: "sanadat-pro",
  storageBucket: "sanadat-pro.firebasestorage.app",
  messagingSenderId: "1039476751095",
  appId: "1:1039476751095:web:f2a7744d6469385e7771f2"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

// 2. تسجيل الدخول برقم الجوال فقط
window.login = async () => {
  const phone = document.getElementById('phone').value.trim();
  const pass = document.getElementById('password').value.trim();
  const fakeEmail = phone + '@sanadat.pro'; // يتحول لإيميل في الخلفية

  try {
    const userCred = await signInWithEmailAndPassword(auth, fakeEmail, pass);
    const usersSnap = await getDocs(query(collection(db, "users"), where("uid", "==", userCred.user.uid)));

    if(usersSnap.empty) throw new Error("المستخدم غير موجود في قاعدة البيانات");

    currentUser = usersSnap.docs[0].data();
    showDashboard();
  } catch (e) {
    document.getElementById('loginError').innerText = "رقم الجوال أو كلمة السر خطأ";
    console.error(e);
  }
}

// 3. عرض الواجهة حسب الدور
function showDashboard() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('welcomeUser').innerText = `مرحبا ${currentUser.name}`;

  if(currentUser.role === 'super_admin') { loadSuperAdmin(); }
  else if(currentUser.role === 'manager') { loadManager(); }
  else if(currentUser.role === 'delegate') { loadDelegate(); }
}

// 4. خروج
window.logout = async () => {
  await signOut(auth);
  location.reload();
}

// دوال الواجهات هتيجي في الجزء 2
function loadSuperAdmin() { document.getElementById('superAdminPanel').classList.remove('hidden'); }
function loadManager() { document.getElementById('managerPanel').classList.remove('hidden'); }
function loadDelegate() { document.getElementById('delegatePanel').classList.remove('hidden'); }
</script>
</body>
</html>
