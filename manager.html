<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المدير</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style> body { font-family: 'Cairo', sans-serif; } </style>
    <script type="module">
        import { t, setLanguage, applyLanguage } from './lang.js';
        window.t = t; window.setLanguage = setLanguage; window.applyLanguage = applyLanguage;
        applyLanguage();
    </script>
</head>
<body class="bg-gradient-to-br from-green-600 to-teal-500 min-h-screen p-4">

<div class="max-w-6xl mx-auto">
    <div class="bg-white rounded-2xl shadow-xl p-6 mb-6 flex justify-between items-center">
        <button onclick="logout()" class="bg-red-500 text-white px-6 py-2 rounded-xl font-bold">خروج</button>
        <div class="text-right">
            <h1 class="text-2xl font-extrabold">لوحة تحكم المدير</h1>
            <p id="projectName" class="text-gray-500">جاري التحميل...</p>
        </div>
        <div class="w-16 h-16 bg-gradient-to-br from-green-600 to-teal-500 rounded-2xl flex items-center justify-center">
            <i class="fas fa-user-tie text-white text-2xl"></i>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-xl p-8">
        <h2 class="text-xl font-bold mb-6"><i class="fas fa-users text-green-500"></i> المناديب</h2>
        <div id="delegatesList" class="text-center text-gray-500">
            جاري تحميل المناديب...
        </div>
        <button onclick="addDelegate()" class="mt-6 bg-green-500 text-white px-6 py-3 rounded-xl font-bold w-full">
            <i class="fas fa-plus"></i> إضافة مندوب
        </button>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, query, where, getDocs, addDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBvEU1Cmt1IX4h0xaCd6McaOMufvGqr2fY",
      authDomain: "sanadat-pro.firebaseapp.com",
      databaseURL: "https://sanadat-pro-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "sanadat-pro",
      storageBucket: "sanadat-pro.firebasestorage.app",
      messagingSenderId: "1039476751095",
      appId: "1:1039476751095:web:f2a7744d6469385e7771f2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // جيب بيانات المدير من التخزين المحلي
    const managerData = JSON.parse(localStorage.getItem('managerData') || '{}');
    
    if (!managerData.projectCode) {
        Swal.fire('خطأ', 'الرجاء تسجيل الدخول أولاً', 'error').then(() => {
            location.href = './index.html';
        });
    }

    document.getElementById('projectName').textContent = `مشروع: ${managerData.projectCode} | المدير: ${managerData.name}`;

    async function loadDelegates() {
        const q = query(collection(db, 'delegates'), where('projectCode', '==', managerData.projectCode));
        const snap = await getDocs(q);
        const list = document.getElementById('delegatesList');
        
        if (snap.empty) {
            list.innerHTML = '<p>لا يوجد مناديب حالياً</p>';
            return;
        }

        list.innerHTML = '';
        snap.forEach(doc => {
            const d = doc.data();
            list.innerHTML += `
                <div class="border border-gray-200 p-4 rounded-xl mb-3 flex justify-between items-center">
                    <div class="text-right">
                        <p class="font-bold">${d.name}</p>
                        <p class="text-gray-500 text-sm">جوال: ${d.phone}</p>
                    </div>
                </div>`;
        });
    }

    window.addDelegate = async () => {
        const { value: form } = await Swal.fire({
            title: 'إضافة مندوب جديد',
            html: `<input id="swal-name" class="swal2-input" placeholder="اسم المندوب">
                   <input id="swal-phone" class="swal2-input" placeholder="رقم الجوال">
                   <input id="swal-pass" type="password" class="swal2-input" placeholder="كلمة المرور">`,
            confirmButtonText: 'حفظ',
            showCancelButton: true, cancelButtonText: 'إلغاء',
            preConfirm: () => {
                const name = document.getElementById('swal-name').value;
                const phone = document.getElementById('swal-phone').value;
                const password = document.getElementById('swal-pass').value;
                if (!name || !phone || !password) Swal.showValidationMessage('املأ كل الحقول');
                return { name, phone, password, projectCode: managerData.projectCode }
            }
        });
        if (form) {
            await addDoc(collection(db, 'delegates'), form);
            Swal.fire('تم', 'تم إضافة المندوب', 'success');
            loadDelegates();
        }
    }

    window.logout = () => {
        localStorage.removeItem('managerData');
        location.href = './index.html';
    }

    loadDelegates();
</script>
</body>
</html>
