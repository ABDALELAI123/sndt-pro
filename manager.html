<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="appName">السندات الذكية - لوحة المدير</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --primary: #0d6efd; --success: #198754; --danger: #dc3545;
      --warning: #ffc107; --dark: #212529; --light: #f8f9fa; --border: #dee2e6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Cairo', sans-serif; background: #f0f2f5; color: var(--dark); }
  .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
  .header { background: white; padding: 15px 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .header h1 { font-size: 22px; }
  .user-info { display: flex; align-items: center; gap: 15px; }
  .btn { padding: 10px 20px; border: none; border-radius: 8px; font-family: 'Cairo'; font-weight: 600; cursor: pointer; transition: 0.2s; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-danger { background: var(--danger); color: white; }
  .btn-success { background: var(--success); color: white; }
  .btn-sm { padding: 5px 10px; font-size: 14px; }
  .btn:hover { opacity: 0.9; }
  .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
  .card-header h2 { font-size: 18px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: right; border-bottom: 1px solid var(--border); }
    th { background: #f8f9fa; font-weight: 700; }
  .loader { display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; gap: 15px; }
  .spinner { width: 50px; height: 50px; border: 5px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #main-content { display: none; }
  .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
  .modal.active { display: flex; }
  .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 500px; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .close-btn { font-size: 24px; cursor: pointer; }
  .form-group { margin-bottom: 15px; }
  .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
  .form-group input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-family: 'Cairo'; }
  .lang-switch { cursor: pointer; padding: 8px 12px; border-radius: 8px; background: #e9ecef; font-weight: 700; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
  .stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .stat-card h3 { font-size: 32px; color: var(--primary); margin: 10px 0; }
  .stat-card p { color: #6c757d; font-size: 14px; }
  .error-box { background: #fff3cd; border: 1px solid #ffc107; padding: 15px; border-radius: 8px; margin: 20px 0; }
    @media print { body * { visibility: hidden; }.print-area,.print-area * { visibility: visible; }.print-area { position: absolute; left: 0; top: 0; width: 100%; }.no-print { display: none!important; } }
    [dir="ltr"] { text-align: left; }
    [dir="ltr"] th, [dir="ltr"] td { text-align: left; }
  </style>
</head>
<body>

  <div id="loader" class="loader">
    <div class="spinner"></div>
    <p data-i18n="loading">جاري التحميل...</p>
    <div id="errorMsg" class="error-box" style="display:none;"></div>
  </div>

  <div id="main-content">
    <div class="container">
      <div class="header">
        <h1><i class="fa-solid fa-user-tie"></i> <span data-i18n="dashboard">الرئيسية</span></h1>
        <div class="user-info">
          <div class="lang-switch no-print" id="langSwitch">EN</div>
          <div>
            <div id="managerName" style="font-weight: 700;">...</div>
            <div id="projectName" style="font-size: 14px; color: #6c757d;">...</div>
          </div>
          <button id="logoutBtn" class="btn btn-danger no-print">
            <i class="fa-solid fa-right-from-bracket"></i> <span data-i18n="logout">خروج</span>
          </button>
        </div>
      </div>

      <div class="stats-grid no-print">
        <div class="stat-card"><p data-i18n="bondsCount">عدد السندات</p><h3 id="totalBondsCount">0</h3></div>
        <div class="stat-card"><p data-i18n="totalIncome">إجمالي القبض</p><h3 id="totalIncomeAmount">0</h3></div>
        <div class="stat-card"><p data-i18n="totalExpense">إجمالي الصرف</p><h3 id="totalExpenseAmount">0</h3></div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2><i class="fa-solid fa-users"></i> <span data-i18n="delegate">المناديب</span></h2>
          <button id="addDelegateBtn" class="btn btn-primary no-print">
            <i class="fa-solid fa-plus"></i> <span data-i18n="save">إضافة مندوب</span>
          </button>
        </div>
        <div style="overflow-x: auto;">
          <table id="delegatesTable">
            <thead><tr><th data-i18n="delegate">المندوب</th><th data-i18n="phone">رقم الجوال</th><th data-i18n="bondsCount">عدد السندات</th><th class="no-print" data-i18n="actions">تحكم</th></tr></thead>
            <tbody id="delegatesTableBody"></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2><i class="fa-solid fa-file-invoice-dollar"></i> <span data-i18n="myBonds">السندات</span></h2>
          <button id="printBondsBtn" class="btn btn-success no-print">
            <i class="fa-solid fa-print"></i> <span data-i18n="print">طباعة</span>
          </button>
        </div>
        <div style="overflow-x: auto;">
          <table id="bondsTable" class="print-area">
            <thead><tr><th data-i18n="bondNumber">رقم السند</th><th data-i18n="delegate">المندوب</th><th data-i18n="amount">المبلغ</th><th data-i18n="date">التاريخ</th><th data-i18n="status">الحالة</th></tr></thead>
            <tbody id="bondsTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div id="addDelegateModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 data-i18n="save">إضافة مندوب جديد</h3>
        <span class="close-btn" id="closeDelegateModal">&times;</span>
      </div>
      <form id="addDelegateForm">
        <div class="form-group"><label data-i18n="delegate">اسم المندوب</label><input type="text" id="delegateName" required></div>
        <div class="form-group"><label data-i18n="phone">رقم الجوال</label><input type="tel" id="delegatePhone" data-i18n-placeholder="phone" placeholder="05xxxxxxxx" required></div>
        <div class="form-group"><label data-i18n="email">البريد الإلكتروني</label><input type="email" id="delegateEmail" placeholder="email@example.com" required></div>
        <div class="form-group"><label data-i18n="password">كلمة المرور</label><input type="password" id="delegatePassword" data-i18n-placeholder="newPassword" placeholder="6 أحرف على الأقل" required></div>
        <button type="submit" class="btn btn-primary" style="width: 100%;"><i class="fa-solid fa-save"></i> <span data-i18n="save">حفظ</span></button>
      </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp, deleteApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs, deleteDoc, onSnapshot, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBvEU1Cmt1IX4h0xaCd6Mca0MufvGqr2fY",
      authDomain: "sanadat-pro.firebaseapp.com",
      projectId: "sanadat-pro",
      storageBucket: "sanadat-pro.firebasestorage.app",
      messagingSenderId: "1039476751095",
      appId: "1:1039476751095:web:f2a7744d6469385e7771f2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const translations = {
      ar: { appName: "السندات الذكية", login: "تسجيل الدخول", phone: "رقم الجوال", password: "كلمة المرور", projectCode: "كود المشروع", error: "خطأ", fillAllFields: "عبي الجوال وكلمة السر", enterProjectCode: "ادخل كود المشروع", userNotFound: "المستخدم غير موجود", wrongPassword: "كلمة السر غلط", accountSuspended: "حسابك موقوف", projectSuspended: "المشروع موقوف", checkData: "تأكد من البيانات", logout: "خروج", delegate: "مندوب", dashboard: "الرئيسية", createBond: "إنشاء سند", myBonds: "سنداتي", printPreview: "معاينة الطباعة", smartSheet: "الصفحة الذكية", totalIncome: "إجمالي قبض سنداتي", totalExpense: "إجمالي صرف سنداتي", bondsCount: "عدد سنداتي", currency: "ريال سعودي", bond: "سند", noPermission: "تنبيه: لا تملك أي صلاحيات لإنشاء سندات. راجع مدير المشروع.", bondType: "نوع السند", selectBondType: "اختر نوع السند", amount: "المبلغ", date: "التاريخ", clientName: "اسم العميل", clientPhone: "جوال العميل", requiredForReceipt: "مطلوب لسندات القبض فقط", paymentMethod: "طريقة الدفع", selectPaymentMethod: "اختر طريقة الدفع", description: "البيان", saveBond: "حفظ السند", bondNumber: "رقم السند", type: "النوع", client: "العميل", actions: "تحكم", preview: "معاينة", print: "طباعة", selectBondToPreview: "اختر سند من تبويب \"سنداتي\" واضغط \"معاينة\" عشان تشوفه هنا", sendWhatsapp: "إرسال واتساب", sendToClient: "إرسال للعميل", downloadPdf: "تحميل PDF", search: "بحث...", exportExcel: "تصدير Excel", total: "الإجمالي:", receiver: "المستلم", accountant: "المحاسب", thankYou: "شكراً لتعاملكم معنا", dear: "عزيزي", receivedAmount: "تم استلام مبلغ", bondDetails: "تفاصيل السند", alert: "تنبيه", noClientPhone: "لا يوجد رقم جوال للعميل", comingSoon: "قريباً", exportSoon: "ميزة التصدير للإكسل قيد التطوير", changePassword: "تغيير كلمة السر", oldPassword: "كلمة السر القديمة", newPassword: "كلمة السر الجديدة", save: "حفظ", cancel: "إلغاء", wrongOldPassword: "كلمة السر القديمة غلط", passwordChanged: "تغيرت كلمة السر", done: "تم", rejected: "مرفوض", phoneRequiredForReceipt: "جوال العميل مطلوب لسندات القبض", invalidPhone: "رقم الجوال لازم يبدأ بـ 05 ويكون 10 أرقام", amountExceeded: "المبلغ تجاوز الحد المسموح للسند الواحد:", dailyLimitReached: "وصلت الحد الأقصى للسندات اليوم:", totalLimitReached: "وصلت الحد الأقصى لإجمالي السندات:", totalAmountExceeded: "إجمالي المبالغ راح يتجاوز الحد:", sequenceEnded: "وصلت لنهاية التسلسل لهذا النوع", bondSaved: "انحفظ السند رقم", loading: "جاري التحميل..." },
      en: { appName: "Smart Bonds", login: "Login", phone: "Phone Number", password: "Password", projectCode: "Project Code", error: "Error", fillAllFields: "Fill phone and password", enterProjectCode: "Enter project code", userNotFound: "User not found", wrongPassword: "Wrong password", accountSuspended: "Your account is suspended", projectSuspended: "Project is suspended", checkData: "Check your data", logout: "Logout", delegate: "Delegate", dashboard: "Dashboard", createBond: "Create Bond", myBonds: "My Bonds", printPreview: "Print Preview", smartSheet: "Smart Sheet", totalIncome: "Total Receipts", totalExpense: "Total Expenses", bondsCount: "Bonds Count", currency: "SAR", bond: "Bond", noPermission: "Alert: You have no permissions to create bonds. Contact project manager.", bondType: "Bond Type", selectBondType: "Select Bond Type", amount: "Amount", date: "Date", clientName: "Client Name", clientPhone: "Client Phone", requiredForReceipt: "Required for receipt bonds only", paymentMethod: "Payment Method", selectPaymentMethod: "Select Payment Method", description: "Description", saveBond: "Save Bond", bondNumber: "Bond Number", type: "Type", client: "Client", actions: "Actions", preview: "Preview", print: "Print", selectBondToPreview: "Select a bond from 'My Bonds' and click 'Preview' to view it here", sendWhatsapp: "Send WhatsApp", sendToClient: "Send to Client", downloadPdf: "Download PDF", search: "Search...", exportExcel: "Export Excel", total: "Total:", receiver: "Receiver", accountant: "Accountant", thankYou: "Thank you for your business", dear: "Dear", receivedAmount: "Amount received", bondDetails: "Bond Details", alert: "Alert", noClientPhone: "No client phone number", comingSoon: "Coming Soon", exportSoon: "Excel export feature is under development", changePassword: "Change Password", oldPassword: "Old Password", newPassword: "New Password", save: "Save", cancel: "Cancel", wrongOldPassword: "Old password is wrong", passwordChanged: "Password changed", done: "Done", rejected: "Rejected", phoneRequiredForReceipt: "Client phone is required for receipt bonds", invalidPhone: "Phone must start with 05 and be 10 digits", amountExceeded: "Amount exceeded the limit per bond:", dailyLimitReached: "Daily bond limit reached:", totalLimitReached: "Total bonds limit reached:", totalAmountExceeded: "Total amount will exceed the limit:", sequenceEnded: "Reached the end of sequence for this type", bondSaved: "Bond saved number", loading: "Loading..." }
    };

    let currentLang = localStorage.getItem('language') || 'ar';
    function t(key) { return translations[currentLang][key] || key; }
    function applyLanguage() {
      const lang = currentLang;
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'ar'? 'rtl' : 'ltr';
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang][key]) el.textContent = translations[lang][key];
      });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        if (translations[lang][key]) el.placeholder = translations[lang][key];
      });
    }

    let currentUserData = null, currentProjectData = null, allDelegates = [], allBonds = [];
    let unsubscribeDelegates = null, unsubscribeBonds = null;
    let authChecked = false;

    const loader = document.getElementById('loader');
    const errorMsg = document.getElementById('errorMsg');
    const mainContent = document.getElementById('main-content');
    const logoutBtn = document.getElementById('logoutBtn');
    const managerNameEl = document.getElementById('managerName');
    const projectNameEl = document.getElementById('projectName');
    const addDelegateBtn = document.getElementById('addDelegateBtn');
    const addDelegateModal = document.getElementById('addDelegateModal');
    const closeDelegateModal = document.getElementById('closeDelegateModal');
    const addDelegateForm = document.getElementById('addDelegateForm');
    const delegatesTableBody = document.getElementById('delegatesTableBody');
    const bondsTableBody = document.getElementById('bondsTableBody');
    const printBondsBtn = document.getElementById('printBondsBtn');
    const langSwitch = document.getElementById('langSwitch');
    const totalBondsCount = document.getElementById('totalBondsCount');
    const totalIncomeAmount = document.getElementById('totalIncomeAmount');
    const totalExpenseAmount = document.getElementById('totalExpenseAmount');

    langSwitch.addEventListener('click', () => {
      currentLang = currentLang === 'ar'? 'en' : 'ar';
      localStorage.setItem('language', currentLang);
      langSwitch.textContent = currentLang === 'ar'? 'EN' : 'AR';
      applyLanguage();
      if(allBonds.length > 0) loadBonds();
      if(allDelegates.length > 0) loadDelegates();
    });

    // الحل الجذري: نوقف اللوب
    onAuthStateChanged(auth, async (user) => {
      if (authChecked) return;
      authChecked = true;
      
      if (!user) {
        window.location.href = 'index.html';
        return;
      }

      try {
        const managerDoc = await getDoc(doc(db, "managers", user.uid));
        if (!managerDoc.exists()) {
          errorMsg.textContent = t('noPermission');
          errorMsg.style.display = 'block';
          setTimeout(() => { signOut(auth); window.location.href = 'index.html'; }, 3000);
          return;
        }

        currentUserData = { id: user.uid,...managerDoc.data() };
        managerNameEl.textContent = currentUserData.name;
        
        const projectDoc = await getDoc(doc(db, "projects", currentUserData.projectCode));
        if (projectDoc.exists()) {
          currentProjectData = projectDoc.data();
          projectNameEl.textContent = currentProjectData.name;
        }
        
        applyLanguage();
        langSwitch.textContent = currentLang === 'ar'? 'EN' : 'AR';
        loadBonds();
        loadDelegates();
        
        loader.style.display = 'none';
        mainContent.style.display = 'block';
      } catch (e) {
        errorMsg.textContent = t('error') + ': ' + e.message;
        errorMsg.style.display = 'block';
      }
    });

    logoutBtn.addEventListener('click', () => signOut(auth));
    addDelegateBtn.addEventListener('click', () => addDelegateModal.classList.add('active'));
    closeDelegateModal.addEventListener('click', () => addDelegateModal.classList.remove('active'));
    window.addEventListener('click', (e) => { if (e.target == addDelegateModal) addDelegateModal.classList.remove('active'); });

    addDelegateForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('delegateName').value.trim();
      const phone = document.getElementById('delegatePhone').value.trim();
      const email = document.getElementById('delegateEmail').value.trim();
      const password = document.getElementById('delegatePassword').value;

      if (!name ||!phone ||!email ||!password) return alert(t('fillAllFields'));
      if (password.length < 6) return alert(t('newPassword') + ' 6+');
      if (!/^(05)\d{8}$/.test(phone)) return alert(t('invalidPhone'));

      const phoneQuery = await getDocs(query(collection(db, "delegates"), where("phone", "==", phone)));
      if (!phoneQuery.empty) return alert(t('phone') + ' ' + t('error'));

      try {
        const secondaryApp = initializeApp(firebaseConfig, "Secondary");
        const secondaryAuth = getAuth(secondaryApp);
        const userCredential = await createUserWithEmailAndPassword(secondaryAuth, email, password);
        const uid = userCredential.user.uid;
        await updateProfile(userCredential.user, { displayName: name });
        await setDoc(doc(db, "delegates", uid), {
          uid: uid, name: name, phone: phone, email: email,
          projectCode: currentUserData.projectCode, managerId: currentUserData.id,
          createdAt: serverTimestamp(), isActive: true
        });
        await deleteApp(secondaryApp);
        alert(t('done'));
        addDelegateForm.reset();
        addDelegateModal.classList.remove('active');
      } catch (error) {
        if (error.code == 'auth/email-already-in-use') {
          alert(t('userNotFound'));
        } else {
          alert(t('error') + ': ' + error.message);
        }
      }
    });

    function loadDelegates() {
      if (unsubscribeDelegates) unsubscribeDelegates();
      const q = query(collection(db, "delegates"), where("projectCode", "==", currentUserData.projectCode));
      unsubscribeDelegates = onSnapshot(q, (snapshot) => {
        allDelegates = [];
        delegatesTableBody.innerHTML = '';
        snapshot.forEach((doc) => {
          const delegate = { id: doc.id,...doc.data() };
          allDelegates.push(delegate);
          const bondCount = allBonds.filter(b => b.delegateId == delegate.id).length;
          const row = `<tr><td>${delegate.name}</td><td>${delegate.phone}</td><td>${bondCount}</td><td class="no-print"><button class="btn btn-danger btn-sm" onclick="deleteDelegate('${delegate.id}', '${delegate.name}')"><i class="fa-solid fa-trash"></i></button></td></tr>`;
          delegatesTableBody.innerHTML += row;
        });
      });
    }

    window.deleteDelegate = async (id, name) => {
      if (!confirm(`${t('alert')}: ${name}?`)) return;
      try {
        await deleteDoc(doc(db, "delegates", id));
        alert(t('done'));
      } catch (error) {
        alert(t('error') + ': ' + error.message);
      }
    }

    function loadBonds() {
      if (unsubscribeBonds) unsubscribeBonds();
      const q = query(collection(db, "bonds"), where("projectCode", "==", currentUserData.projectCode), orderBy("createdAt", "desc"));
      unsubscribeBonds = onSnapshot(q, (snapshot) => {
        allBonds = [];
        let totalIncome = 0, totalExpense = 0;
        bondsTableBody.innerHTML = '';
        snapshot.forEach((doc) => {
          const bond = { id: doc.id,...doc.data() };
          allBonds.push(bond);
          if(bond.type === 'receipt') totalIncome += bond.amount;
          else totalExpense += bond.amount;
          const date = bond.createdAt? new Date(bond.createdAt.seconds * 1000).toLocaleDateString(currentLang === 'ar'? 'ar-SA' : 'en-US') : '...';
          const statusText = bond.status == 'مسدد'? t('done') : t('rejected');
          const row = `<tr><td>${bond.id.substring(0, 6)}</td><td>${bond.delegateName}</td><td>${bond.amount.toLocaleString()} ${t('currency')}</td><td>${date}</td><td><span style="color: ${bond.status == 'مسدد'? 'green' : 'orange'}">${statusText}</span></td></tr>`;
          bondsTableBody.innerHTML += row;
        });
        totalBondsCount.textContent = allBonds.length;
        totalIncomeAmount.textContent = totalIncome.toLocaleString() + ' ' + t('currency');
        totalExpenseAmount.textContent = totalExpense.toLocaleString() + ' ' + t('currency');
        if(delegatesTableBody.innerHTML!== '') loadDelegates();
      });
    }

    printBondsBtn.addEventListener('click', () => window.print());
    applyLanguage();
  </script>
</body>
</html>
