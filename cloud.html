<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام سندات سحابي 100%</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        body { font-family: 'Cairo', sans-serif; }
        .hidden { display: none; }
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; }
        }
    </style>
</head>
<body class="bg-gray-100">

    <!-- شاشة الدخول -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
            <h1 class="text-3xl font-bold text-center text-gray-800 mb-2">نظام سندات سحابي 100%</h1>
            <p class="text-center text-gray-500 mb-8">ادخل كود المشروع أو أنشئ مشروع جديد</p>
            <div class="space-y-4">
                <input id="project-code-input" type="text" placeholder="أدخل كود المشروع" class="w-full p-3 border-2 border-gray-200 rounded-lg text-center tracking-widest text-lg focus:border-blue-500 focus:ring-blue-500">
                <button id="login-btn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">دخول للمشروع</button>
                <div class="text-center text-gray-400">أو</div>
                <button id="create-project-btn" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition">إنشاء مشروع جديد</button>
            </div>
        </div>
    </div>

    <!-- الشاشة الرئيسية -->
    <div id="main-screen" class="hidden">
        <header class="bg-white shadow-md p-4 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold text-gray-800">لوحة التحكم</h1>
                <p class="text-sm text-gray-500">كود المشروع: <span id="project-code-display" class="font-mono bg-gray-200 px-2 py-1 rounded"></span></p>
            </div>
            <button id="logout-btn" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600">خروج</button>
        </header>

        <main class="p-4 md:p-6">
            <!-- إحصائيات -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="bg-white p-4 rounded-xl shadow">
                    <h3 class="text-gray-500">إجمالي المبيعات</h3>
                    <p id="total-sales" class="text-2xl font-bold text-green-600">0 ريال</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow">
                    <h3 class="text-gray-500">إجمالي المشتريات</h3>
                    <p id="total-purchases" class="text-2xl font-bold text-red-600">0 ريال</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow">
                    <h3 class="text-gray-500">صافي الربح</h3>
                    <p id="net-profit" class="text-2xl font-bold text-blue-600">0 ريال</p>
                </div>
            </div>

            <!-- أزرار الإجراءات -->
            <div class="bg-white p-4 rounded-xl shadow mb-6 flex flex-wrap gap-3">
                <button id="add-sale-btn" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">+ سند قبض</button>
                <button id="add-purchase-btn" class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700">+ سند صرف</button>
                <button id="share-btn" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">مشاركة المشروع</button>
                <button id="export-excel-btn" class="bg-teal-600 text-white px-4 py-2 rounded-lg hover:bg-teal-700">تصدير Excel</button>
            </div>

            <!-- جدول السندات -->
            <div class="bg-white rounded-xl shadow overflow-hidden">
                <table class="w-full text-sm text-right">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="p-3">التاريخ</th>
                            <th class="p-3">النوع</th>
                            <th class="p-3">البيان</th>
                            <th class="p-3">المبلغ</th>
                            <th class="p-3">إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="bonds-table-body">
                        <tr><td colspan="5" class="text-center p-8 text-gray-500">لا توجد سندات بعد. ابدأ بإضافة سند جديد</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, doc, addDoc, getDoc, getDocs, updateDoc, deleteDoc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // إعدادات Firebase حقتك
        const firebaseConfig = {
            apiKey: "AIzaSyBJoDikIxW2yYn5dCXyoDg3iY1ynSgWPEA",
            authDomain: "sanadat-pro.firebaseapp.com",
            projectId: "sanadat-pro",
            storageBucket: "sanadat-pro.firebasestorage.app",
            messagingSenderId: "75362633904",
            appId: "1:75362633904:web:55fe31ed0a58594cbff0c1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // عناصر الواجهة
        const loginScreen = document.getElementById('login-screen');
        const mainScreen = document.getElementById('main-screen');
        const projectCodeInput = document.getElementById('project-code-input');
        const loginBtn = document.getElementById('login-btn');
        const createProjectBtn = document.getElementById('create-project-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const projectCodeDisplay = document.getElementById('project-code-display');
        const bondsTableBody = document.getElementById('bonds-table-body');
        const addSaleBtn = document.getElementById('add-sale-btn');
        const addPurchaseBtn = document.getElementById('add-purchase-btn');
        const shareBtn = document.getElementById('share-btn');
        const exportExcelBtn = document.getElementById('export-excel-btn');

        let currentProjectCode = null;
        let unsubscribe = null;// توليد كود مشروع عشوائي
        function generateProjectCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = '';
            for (let i = 0; i < 6; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }

        // دخول مشروع
        async function loginToProject(code) {
            if (!code || code.length !== 6) {
                Swal.fire('خطأ', 'كود المشروع لازم يكون 6 أحرف', 'error');
                return;
            }

            const projectsRef = collection(db, 'projects');
            const q = query(projectsRef, where('code', '==', code.toUpperCase()));
            const snapshot = await getDocs(q);

            if (snapshot.empty) {
                Swal.fire('خطأ', 'كود المشروع غير صحيح', 'error');
                return;
            }

            currentProjectCode = code.toUpperCase();
            projectCodeDisplay.textContent = currentProjectCode;
            loginScreen.classList.add('hidden');
            mainScreen.classList.remove('hidden');
            loadBonds();
        }

        // إنشاء مشروع جديد
        async function createNewProject() {
            const newCode = generateProjectCode();
            await addDoc(collection(db, 'projects'), {
                code: newCode,
                createdAt: new Date()
            });
            
            Swal.fire({
                title: 'تم إنشاء المشروع',
                html: `كود مشروعك هو: <b class="text-2xl font-mono">${newCode}</b><br><br>احفظ الكود في مكان آمن`,
                icon: 'success',
                confirmButtonText: 'دخول للمشروع'
            }).then(() => {
                loginToProject(newCode);
            });
        }

        // تحميل السندات
        function loadBonds() {
            if (unsubscribe) unsubscribe();
            
            const bondsRef = collection(db, 'projects', currentProjectCode, 'bonds');
            unsubscribe = onSnapshot(bondsRef, (snapshot) => {
                let totalSales = 0;
                let totalPurchases = 0;
                bondsTableBody.innerHTML = '';
                
                if (snapshot.empty) {
                    bondsTableBody.innerHTML = '<tr><td colspan="5" class="text-center p-8 text-gray-500">لا توجد سندات بعد. ابدأ بإضافة سند جديد</td></tr>';
                } else {
                    const bonds = [];
                    snapshot.forEach(doc => {
                        bonds.push({ id: doc.id, ...doc.data() });
                    });
                    
                    // ترتيب حسب التاريخ
                    bonds.sort((a, b) => new Date(b.date) - new Date(a.date));
                    
                    bonds.forEach(bond => {
                        if (bond.type === 'قبض') totalSales += parseFloat(bond.amount);
                        else totalPurchases += parseFloat(bond.amount);
                        
                        const row = document.createElement('tr');
                        row.className = 'border-b hover:bg-gray-50';
                        row.innerHTML = `
                            <td class="p-3">${bond.date}</td>
                            <td class="p-3"><span class="px-2 py-1 rounded text-xs ${bond.type === 'قبض' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${bond.type}</span></td>
                            <td class="p-3">${bond.description}</td>
                            <td class="p-3 font-bold ${bond.type === 'قبض' ? 'text-green-600' : 'text-red-600'}">${bond.amount} ريال</td>
                            <td class="p-3">
                                <button onclick="deleteBond('${bond.id}')" class="text-red-600 hover:text-red-800 text-sm">حذف</button>
                            </td>
                        `;
                        bondsTableBody.appendChild(row);
                    });
                }
                
                document.getElementById('total-sales').textContent = totalSales.toFixed(2) + ' ريال';
                document.getElementById('total-purchases').textContent = totalPurchases.toFixed(2) + ' ريال';
                document.getElementById('net-profit').textContent = (totalSales - totalPurchases).toFixed(2) + ' ريال';
            });
        }

        // إضافة سند
        async function addBond(type) {
            const { value: formValues } = await Swal.fire({
                title: type === 'قبض' ? 'سند قبض جديد' : 'سند صرف جديد',
                html: `
                    <input id="swal-date" type="date" class="swal2-input" value="${new Date().toISOString().split('T')[0]}">
                    <input id="swal-desc" class="swal2-input" placeholder="البيان">
                    <input id="swal-amount" type="number" class="swal2-input" placeholder="المبلغ">
                `,
                focusConfirm: false,
                preConfirm: () => {
                    return {
                        date: document.getElementById('swal-date').value,
                        description: document.getElementById('swal-desc').value,
                        amount: document.getElementById('swal-amount').value
                    }
                }
            });

            if (formValues && formValues.description && formValues.amount) {
                await addDoc(collection(db, 'projects', currentProjectCode, 'bonds'), {
                    type: type,
                    date: formValues.date,
                    description: formValues.description,
                    amount: parseFloat(formValues.amount),
                    createdAt: new Date()
                });
                Swal.fire('تم', 'تم إضافة السند بنجاح', 'success');
            }
        }

        // حذف سند
        window.deleteBond = async function(id) {
            const result = await Swal.fire({
                title: 'متأكد؟',
                text: 'ما تقدر تتراجع بعد الحذف',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'نعم احذف',
                cancelButtonText: 'إلغاء'
            });
            
            if (result.isConfirmed) {
                await deleteDoc(doc(db, 'projects', currentProjectCode, 'bonds', id));
                Swal.fire('تم الحذف', '', 'success');
            }
        }// دوال المشروع
        function generateProjectCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = '';
            for (let i = 0; i < 6; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        async function createProject() {
            const code = generateProjectCode();
            try {
                await addDoc(collection(db, "projects"), {
                    code: code,
                    createdAt: new Date(),
                    phone: ""
                });
                Swal.fire('تم!', `كود مشروعك الجديد: ${code}`, 'success');
                loginToProject(code);
            } catch (e) {
                Swal.fire('خطأ', 'فشل إنشاء المشروع', 'error');
            }
        }

        async function loginToProject(code) {
            if (!code) {
                Swal.fire('تنبيه', 'الرجاء إدخال كود المشروع', 'warning');
                return;
            }
            const q = query(collection(db, "projects"), where("code", "==", code.toUpperCase()));
            const querySnapshot = await getDocs(q);
            
            if (querySnapshot.empty) {
                Swal.fire('خطأ', 'كود المشروع غير صحيح', 'error');
                return;
            }

            currentProjectCode = code.toUpperCase();
            localStorage.setItem('projectCode', currentProjectCode);
            projectCodeDisplay.textContent = currentProjectCode;
            loginScreen.classList.add('hidden');
            mainScreen.classList.remove('hidden');
            listenToBonds();
        }

        function logout() {
            if (unsubscribe) unsubscribe();
            localStorage.removeItem('projectCode');
            currentProjectCode = null;
            mainScreen.classList.add('hidden');
            loginScreen.classList.remove('hidden');
            projectCodeInput.value = '';
        }

        // دوال السندات
        function listenToBonds() {
            const bondsRef = collection(db, "projects", currentProjectCode, "bonds");
            unsubscribe = onSnapshot(bondsRef, (snapshot) => {
                const bonds = [];
                snapshot.forEach(doc => bonds.push({ id: doc.id, ...doc.data() }));
                bonds.sort((a, b) => b.date.seconds - a.date.seconds);
                renderBonds(bonds);
                updateStats(bonds);
            });
        }

        function renderBonds(bonds) {
            if (bonds.length === 0) {
                bondsTableBody.innerHTML = `<tr><td colspan="5" class="text-center p-8 text-gray-500">لا توجد سندات بعد. ابدأ بإضافة سند جديد</td></tr>`;
                return;
            }
            bondsTableBody.innerHTML = bonds.map(bond => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-3">${new Date(bond.date.seconds * 1000).toLocaleDateString('ar-SA')}</td>
                    <td class="p-3">
                        <span class="px-2 py-1 rounded-full text-xs ${bond.type === 'sale' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                            ${bond.type === 'sale' ? 'قبض' : 'صرف'}
                        </span>
                    </td>
                    <td class="p-3">${bond.description}</td>
                    <td class="p-3 font-bold ${bond.type === 'sale' ? 'text-green-600' : 'text-red-600'}">${bond.amount.toLocaleString()} ريال</td>
                    <td class="p-3">
                        <button onclick="window.deleteBond('${bond.id}')" class="text-red-500 hover:text-red-700">حذف</button>
                    </td>
                </tr>
            `).join('');
        }

        function updateStats(bonds) {
            const totalSales = bonds.filter(b => b.type === 'sale').reduce((sum, b) => sum + b.amount, 0);
            const totalPurchases = bonds.filter(b => b.type === 'purchase').reduce((sum, b) => sum + b.amount, 0);
            document.getElementById('total-sales').textContent = totalSales.toLocaleString() + ' ريال';
            document.getElementById('total-purchases').textContent = totalPurchases.toLocaleString() + ' ريال';
            document.getElementById('net-profit').textContent = (totalSales - totalPurchases).toLocaleString() + ' ريال';
        }

        async function addBond(type) {
            const { value: formValues } = await Swal.fire({
                title: type === 'sale' ? 'إضافة سند قبض' : 'إضافة سند صرف',
                html: `
                    <input id="swal-desc" class="swal2-input" placeholder="البيان / الوصف">
                    <input id="swal-amount" type="number" class="swal2-input" placeholder="المبلغ">
                `,
                focusConfirm: false,
                preConfirm: () => {
                    return {
                        description: document.getElementById('swal-desc').value,
                        amount: parseFloat(document.getElementById('swal-amount').value)
                    }
                }
            });

            if (formValues && formValues.description && formValues.amount > 0) {
                try {
                    await addDoc(collection(db, "projects", currentProjectCode, "bonds"), {
                        type: type,
                        description: formValues.description,
                        amount: formValues.amount,
                        date: new Date()
                    });
                    Swal.fire('تم', 'تم إضافة السند بنجاح', 'success');
                } catch (e) {
                    Swal.fire('خطأ', 'فشل إضافة السند', 'error');
                }
            }
        }window.deleteBond = async (id) => {
            const result = await Swal.fire({
                title: 'متأكد؟',
                text: "ما تقدر تتراجع عن الحذف!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'ايه، احذفه!',
                cancelButtonText: 'إلغاء'
            });

            if (result.isConfirmed) {
                try {
                    await deleteDoc(doc(db, "projects", currentProjectCode, "bonds", id));
                    Swal.fire('انحذف!', 'السند انحذف بنجاح.', 'success');
                } catch (e) {
                    Swal.fire('خطأ', 'فشل حذف السند', 'error');
                }
            }
        }

        function shareProject() {
            const url = `${window.location.origin}${window.location.pathname}?code=${currentProjectCode}`;
            navigator.clipboard.writeText(url).then(() => {
                Swal.fire('تم النسخ!', 'رابط المشاركة انسخ للحافظة', 'success');
            });
        }

        async function exportToExcel() {
            const bondsRef = collection(db, "projects", currentProjectCode, "bonds");
            const snapshot = await getDocs(bondsRef);
            const data = [];
            snapshot.forEach(doc => {
                const d = doc.data();
                data.push({
                    'التاريخ': new Date(d.date.seconds * 1000).toLocaleDateString('ar-SA'),
                    'النوع': d.type === 'sale' ? 'قبض' : 'صرف',
                    'البيان': d.description,
                    'المبلغ': d.amount
                });
            });

            if (data.length === 0) {
                Swal.fire('تنبيه', 'لا توجد بيانات للتصدير', 'warning');
                return;
            }

            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "السندات");
            XLSX.writeFile(wb, `سندات-${currentProjectCode}.xlsx`);
        }

        // ربط الأزرار
        loginBtn.onclick = () => loginToProject(projectCodeInput.value);
        createProjectBtn.onclick = createProject;
        logoutBtn.onclick = logout;
        addSaleBtn.onclick = () => addBond('sale');
        addPurchaseBtn.onclick = () => addBond('purchase');
        shareBtn.onclick = shareProject;
        exportExcelBtn.onclick = exportToExcel;
        
        projectCodeInput.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') loginToProject(projectCodeInput.value);
        });

        // تسجيل دخول تلقائي لو فيه كود محفوظ
        const savedCode = localStorage.getItem('projectCode');
        if (savedCode) loginToProject(savedCode);
        
        // دخول من الرابط مباشرة
        const urlParams = new URLSearchParams(window.location.search);
        const codeFromUrl = urlParams.get('code');
        if (codeFromUrl) {
            loginToProject(codeFromUrl);
        }

    </script>
</body>
</html>
