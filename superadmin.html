<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم السوبر أدمن</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; }
    </style>
    <script type="module">
        import { t, setLanguage, applyLanguage } from './lang.js';
        window.t = t; window.setLanguage = setLanguage; window.applyLanguage = applyLanguage;
        applyLanguage();
    </script>
</head>
<body class="bg-gradient-to-br from-purple-600 to-blue-500 min-h-screen p-4">

<div class="max-w-6xl mx-auto">
    <!-- الهيدر -->
    <div class="bg-white rounded-2xl shadow-xl p-6 mb-6 flex justify-between items-center">
        <div class="flex gap-3">
            <button onclick="logout()" class="bg-red-500 text-white px-6 py-2 rounded-xl font-bold">خروج</button>
            <button onclick="setLanguage(localStorage.getItem('language') === 'ar'? 'en' : 'ar')" class="text-2xl">🌍</button>
        </div>
        <div class="text-right">
            <h1 class="text-2xl font-extrabold">لوحة تحكم السوبر أدمن</h1>
            <p class="text-gray-500">إدارة كل المشاريع</p>
        </div>
        <div class="w-16 h-16 bg-gradient-to-br from-purple-600 to-blue-500 rounded-2xl flex items-center justify-center">
            <i class="fas fa-crown text-white text-2xl"></i>
        </div>
    </div>

    <!-- التبويبات -->
    <div class="bg-white rounded-2xl shadow-xl p-2 mb-6 flex gap-2">
        <button onclick="showTab('stats')" id="statsTab" class="flex-1 py-3 rounded-xl font-bold bg-blue-500 text-white">
            <i class="fas fa-chart-pie"></i> الإحصائيات
        </button>
        <button onclick="showTab('projects')" id="projectsTab" class="flex-1 py-3 rounded-xl font-bold text-gray-600">
            <i class="fas fa-building"></i> المشاريع
        </button>
    </div>

    <!-- الإحصائيات -->
    <div id="statsDiv" class="bg-white rounded-2xl shadow-xl p-8">
        <h2 class="text-xl font-bold mb-6"><i class="fas fa-chart-pie text-blue-500"></i> الإحصائيات العامة</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-blue-500 text-white p-6 rounded-2xl text-center">
                <i class="fas fa-building text-3xl mb-2"></i>
                <p>إجمالي المشاريع</p>
                <p id="totalProjects" class="text-4xl font-extrabold">0</p>
            </div>
            <div class="bg-green-500 text-white p-6 rounded-2xl text-center">
                <i class="fas fa-users text-3xl mb-2"></i>
                <p>إجمالي المدراء</p>
                <p id="totalManagers" class="text-4xl font-extrabold">0</p>
            </div>
            <div class="bg-purple-500 text-white p-6 rounded-2xl text-center">
                <i class="fas fa-user text-3xl mb-2"></i>
                <p>إجمالي المناديب</p>
                <p id="totalDelegates" class="text-4xl font-extrabold">0</p>
            </div>
            <div class="bg-pink-500 text-white p-6 rounded-2xl text-center">
                <i class="fas fa-file-invoice text-3xl mb-2"></i>
                <p>إجمالي السندات</p>
                <p id="totalBonds" class="text-4xl font-extrabold">0</p>
            </div>
        </div>
    </div>

    <!-- المشاريع -->
    <div id="projectsDiv" class="bg-white rounded-2xl shadow-xl p-8 hidden">
        <div class="flex justify-between items-center mb-6">
            <button onclick="addProject()" class="bg-green-500 text-white px-6 py-3 rounded-xl font-bold">
                <i class="fas fa-plus"></i> إضافة مشروع
            </button>
            <h2 class="text-xl font-bold"><i class="fas fa-building text-blue-500"></i> المشاريع</h2>
        </div>
        <div id="projectsList" class="space-y-3"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    // Firebase Config حقك
    const firebaseConfig = {
      apiKey: "AIzaSyBvEU1Cmt1IX4h0xaCd6McaOMufvGqr2fY",
      authDomain: "sanadat-pro.firebaseapp.com",
      databaseURL: "https://sanadat-pro-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "sanadat-pro",
      storageBucket: "sanadat-pro.firebasestorage.app",
      messagingSenderId: "1039476751095",
      appId: "1:1039476751095:web:f2a7744d6469385e7771f2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // تحميل الإحصائيات
    async function loadStats() {
        const projects = await getDocs(collection(db, 'projects'));
        const managers = await getDocs(collection(db, 'managers'));
        const delegates = await getDocs(collection(db, 'delegates'));
        const bonds = await getDocs(collection(db, 'bonds'));

        document.getElementById('totalProjects').textContent = projects.size;
        document.getElementById('totalManagers').textContent = managers.size;
        document.getElementById('totalDelegates').textContent = delegates.size;
        document.getElementById('totalBonds').textContent = bonds.size;
    }

    // تحميل المشاريع
    async function loadProjects() {
        const snap = await getDocs(collection(db, 'projects'));
        const list = document.getElementById('projectsList');
        list.innerHTML = '';
        snap.forEach(doc => {
            const p = doc.data();
            list.innerHTML += `
                <div class="border border-gray-200 p-4 rounded-xl flex justify-between items-center">
                    <button onclick="deleteProject('${doc.id}')" class="bg-red-500 text-white px-4 py-2 rounded-lg"><i class="fas fa-trash"></i></button>
                    <div class="text-right">
                        <p class="font-bold text-lg">${p.name}</p>
                        <p class="text-gray-500 text-sm">كود: ${p.code}</p>
                    </div>
                </div>`;
        });
    }

    // إضافة مشروع
    window.addProject = async () => {
        const { value: form } = await Swal.fire({
            title: 'إضافة مشروع جديد',
            html: `
                <input id="swal-name" class="swal2-input" placeholder="اسم المشروع">
                <input id="swal-code" class="swal2-input" placeholder="كود المشروع">`,
            confirmButtonText: 'حفظ',
            preConfirm: () => {
                return {
                    name: document.getElementById('swal-name').value,
                    code: document.getElementById('swal-code').value
                }
            }
        });
        if (form && form.name && form.code) {
            await addDoc(collection(db, 'projects'), form);
            Swal.fire('تم', 'تم إضافة المشروع', 'success');
            loadProjects();
            loadStats();
        }
    }

    // حذف مشروع
    window.deleteProject = async (id) => {
        const confirm = await Swal.fire({
            title: 'متأكد؟', text: "ما تقدر ترجع المشروع", icon: 'warning',
            showCancelButton: true, confirmButtonText: 'نعم احذف', cancelButtonText: 'إلغاء'
        });
        if (confirm.isConfirmed) {
            await deleteDoc(doc(db, 'projects', id));
            Swal.fire('انحذف', 'تم حذف المشروع', 'success');
            loadProjects();
            loadStats();
        }
    }

    // تبديل التبويبات
    window.showTab = (tab) => {
        document.getElementById('statsDiv').classList.add('hidden');
        document.getElementById('projectsDiv').classList.add('hidden');
        document.getElementById('statsTab').classList.remove('bg-blue-500', 'text-white');
        document.getElementById('projectsTab').classList.remove('bg-blue-500', 'text-white');
        
        if (tab === 'stats') {
            document.getElementById('statsDiv').classList.remove('hidden');
            document.getElementById('statsTab').classList.add('bg-blue-500', 'text-white');
            loadStats();
        } else {
            document.getElementById('projectsDiv').classList.remove('hidden');
            document.getElementById('projectsTab').classList.add('bg-blue-500', 'text-white');
            loadProjects();
        }
    }

    window.logout = () => location.href = './index.html';

    // أول ما تفتح الصفحة
    loadStats();
</script>
</body>
</html>
