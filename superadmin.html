<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>السندات الذكية - السوبر ادمن</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="lang.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        body { font-family: 'Cairo', sans-serif; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; }
        [dir="ltr"] { font-family: 'Inter', sans-serif; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="loader" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto"></div>
            <p class="mt-4 text-gray-600" data-lang="loading">جاري التحميل...</p>
        </div>
    </div>

    <div id="app" class="hidden">
        <!-- Header -->
        <header class="bg-white shadow-md">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-16">
                    <h1 class="text-xl font-bold text-blue-600" data-lang="app_title">السندات الذكية - السوبر ادمن</h1>
                    <div class="flex items-center gap-4">
                        <button id="langToggle" class="px-3 py-1 rounded bg-gray-200 hover:bg-gray-300 text-sm font-semibold">
                            EN
                        </button>
                        <span id="userEmail" class="text-sm text-gray-600"></span>
                        <button id="logoutBtn" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded text-sm" data-lang="logout">
                            تسجيل خروج
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Tabs -->
        <div class="bg-white border-b">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex gap-8">
                    <button class="tab-btn tab-active py-4 font-semibold" data-tab="projects" data-lang="projects_tab">المشاريع</button>
                    <button class="tab-btn py-4 font-semibold text-gray-500" data-tab="managers" data-lang="managers_tab">المدراء</button>
                    <button class="tab-btn py-4 font-semibold text-gray-500" data-tab="reports" data-lang="reports_tab">التقارير</button>
                </div>
            </div>
        </div>

        <!-- Content -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- Projects Tab -->
            <div id="projects" class="tab-content">
                <div class="bg-white rounded-lg shadow p-6 mb-6">
                    <h2 class="text-lg font-bold mb-4" data-lang="add_project">إضافة مشروع جديد</h2>
                    <form id="projectForm" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <input type="text" id="projectName" placeholder="اسم المشروع" class="border rounded px-3 py-2" required data-lang-placeholder="project_name">
                        <input type="text" id="projectCode" placeholder="كود المشروع" class="border rounded px-3 py-2" required data-lang-placeholder="project_code">
                        <select id="projectStatus" class="border rounded px-3 py-2">
                            <option value="active" data-lang="active">نشط</option>
                            <option value="inactive" data-lang="inactive">موقوف</option>
                        </select>
                        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white rounded px-4 py-2" data-lang="add">إضافة</button>
                    </form>
                </div>

                <div class="bg-white rounded-lg shadow overflow-hidden">
                    <table class="w-full">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase" data-lang="project_name">اسم المشروع</th>
                                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase" data-lang="project_code">الكود</th>
                                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase" data-lang="status">الحالة</th>
                                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase" data-lang="actions">إجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="projectsTable" class="divide-y divide-gray-200"></tbody>
                    </table>
                </div>
            </div>

            <!-- Managers Tab -->
            <div id="managers" class="tab-content hidden">
                <div class="bg-white rounded-lg shadow p-6 mb-6">
                    <h2 class="text-lg font-bold mb-4" data-lang="add_manager">إضافة مدير جديد</h2>
                    <form id="managerForm" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <input type="text" id="managerName" placeholder="اسم المدير" class="border rounded px-3 py-2" required data-lang-placeholder="manager_name">
                        <input type="text" id="managerPhone" placeholder="رقم الجوال" class="border rounded px-3 py-2" required data-lang-placeholder="phone">
                        <input type="email" id="managerEmail" placeholder="الايميل" class="border rounded px-3 py-2" required data-lang-placeholder="email">
                        <input type="password" id="managerPassword" placeholder="كلمة المرور" class="border rounded px-3 py-2" required data-lang-placeholder="password">
                        <select id="managerProject" class="border rounded px-3 py-2" required>
                            <option value="" data-lang="select_project">اختر المشروع</option>
                        </select>
                        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white rounded px-4 py-2" data-lang="add">إضافة</button>
                    </form>
                </div>

                <div class="bg-white rounded-lg shadow overflow-hidden">
                    <table class="w-full">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase" data-lang="manager_name">اسم المدير</th>
                                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase" data-lang="phone">الجوال</th>
                                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase" data-lang="email">الايميل</th>
                                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase" data-lang="project">المشروع</th>
                                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase" data-lang="actions">إجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="managersTable" class="divide-y divide-gray-200"></tbody>
                    </table>
                </div>
            </div>

            <!-- Reports Tab -->
            <div id="reports" class="tab-content hidden">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                    <div class="bg-white rounded-lg shadow p-6">
                        <h3 class="text-gray-500 text-sm" data-lang="total_bonds">إجمالي السندات</h3>
                        <p id="totalBonds" class="text-3xl font-bold text-blue-600 mt-2">0</p>
                    </div>
                    <div class="bg-white rounded-lg shadow p-6">
                        <h3 class="text-gray-500 text-sm" data-lang="total_income">إجمالي القبض</h3>
                        <p id="totalIncome" class="text-3xl font-bold text-green-600 mt-2">0</p>
                    </div>
                    <div class="bg-white rounded-lg shadow p-6">
                        <h3 class="text-gray-500 text-sm" data-lang="total_expense">إجمالي الصرف</h3>
                        <p id="totalExpense" class="text-3xl font-bold text-red-600 mt-2">0</p>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow overflow-hidden">
                    <div class="p-4 border-b">
                        <h2 class="text-lg font-bold" data-lang="projects_summary">ملخص المشاريع</h2>
                    </div>
                    <table class="w-full">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase" data-lang="project_name">المشروع</th>
                                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase" data-lang="bonds_count">عدد السندات</th>
                                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase" data-lang="income">القبض</th>
                                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase" data-lang="expense">الصرف</th>
                            </tr>
                        </thead>
                        <tbody id="reportsTable" class="divide-y divide-gray-200"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, where, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBvEU1Cmt1IX4h0xaCd6Mca0MufvGqr2fY",
            authDomain: "sanadat-pro.firebaseapp.com",
            projectId: "sanadat-pro",
            storageBucket: "sanadat-pro.firebasestorage.app",
            messagingSenderId: "1039476751095",
            appId: "1:1039476751095:web:f2a7744d6469385e7771f2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentLang = localStorage.getItem('lang') || 'ar';
        let currentUser = null;

        // Language System
        function updateLanguage() {
            applyLanguage(currentLang);
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('langToggle').textContent = currentLang === 'ar' ? 'EN' : 'عربي';
            document.querySelectorAll('[data-lang-placeholder]').forEach(el => {
                el.placeholder = t(el.dataset.langPlaceholder);
            });
        }

        document.getElementById('langToggle').addEventListener('click', () => {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            localStorage.setItem('lang', currentLang);
            updateLanguage();
        });

        // Auth Check - No Blink Solution
        let authInitialized = false;
        onAuthStateChanged(auth, async (user) => {
            if (authInitialized) return;
            authInitialized = true;
            
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (!userDoc.exists() || userDoc.data().role !== 'superadmin') {
                alert(t('no_permission'));
                await signOut(auth);
                window.location.href = 'index.html';
                return;
            }

            currentUser = user;
            document.getElementById('userEmail').textContent = user.email;
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            updateLanguage();
            loadProjects();
            loadManagers();
            loadReports();
        });

        // Tabs
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active', 'text-gray-500'));
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.add('text-gray-500'));
                btn.classList.add('tab-active');
                btn.classList.remove('text-gray-500');
                
                document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                document.getElementById(btn.dataset.tab).classList.remove('hidden');
            });
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await signOut(auth);
            window.location.href = 'index.html';
        });

        // Projects
        async function loadProjects() {
            const q = query(collection(db, 'projects'));
            const snapshot = await getDocs(q);
            const tbody = document.getElementById('projectsTable');
            const select = document.getElementById('managerProject');
            tbody.innerHTML = '';
            select.innerHTML = `<option value="">${t('select_project')}</option>`;
            
            snapshot.forEach(doc => {
                const data = doc.data();
                tbody.innerHTML += `
                    <tr>
                        <td class="px-6 py-4">${data.name}</td>
                        <td class="px-6 py-4">${data.code}</td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-1 text-xs rounded ${data.status === 'active' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                                ${t(data.status)}
                            </span>
                        </td>
                        <td class="px-6 py-4">
                            <button onclick="toggleProjectStatus('${doc.id}', '${data.status}')" class="text-blue-600 hover:text-blue-800 text-sm">
                                ${data.status === 'active' ? t('deactivate') : t('activate')}
                            </button>
                        </td>
                    </tr>
                `;
                select.innerHTML += `<option value="${doc.id}">${data.name} - ${data.code}</option>`;
            });
        }

        document.getElementById('projectForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('projectName').value;
            const code = document.getElementById('projectCode').value;
            const status = document.getElementById('projectStatus').value;
            
            await addDoc(collection(db, 'projects'), { name, code, status, createdAt: new Date() });
            e.target.reset();
            loadProjects();
        });

        window.toggleProjectStatus = async (id, currentStatus) => {
            const newStatus = currentStatus === 'active' ? 'inactive' : 'active';
            await updateDoc(doc(db, 'projects', id), { status: newStatus });
            loadProjects();
        }

        // Managers
        async function loadManagers() {
            const q = query(collection(db, 'managers'));
            const snapshot = await getDocs(q);
            const tbody = document.getElementById('managersTable');
            tbody.innerHTML = '';
            
            for (const docSnap of snapshot.docs) {
                const data = docSnap.data();
                const projectDoc = await getDoc(doc(db, 'projects', data.projectCode));
                const projectName = projectDoc.exists() ? projectDoc.data().name : '-';
                
                tbody.innerHTML += `
                    <tr>
                        <td class="px-6 py-4">${data.name}</td>
                        <td class="px-6 py-4">${data.phone}</td>
                        <td class="px-6 py-4">${data.email}</td>
                        <td class="px-6 py-4">${projectName}</td>
                        <td class="px-6 py-4">
                            <button onclick="deleteManager('${docSnap.id}')" class="text-red-600 hover:text-red-800 text-sm" data-lang="delete">حذف</button>
                        </td>
                    </tr>
                `;
            }
        }

        document.getElementById('managerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('managerName').value;
            const phone = document.getElementById('managerPhone').value;
            const email = document.getElementById('managerEmail').value;
            const password = document.getElementById('managerPassword').value;
            const projectCode = document.getElementById('managerProject').value;
            
            try {
                // Create auth user
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const uid = userCredential.user.uid;
                
                // Add to users collection
                await setDoc(doc(db, 'users', uid), { email, role: 'manager', projectCode });
                
                // Add to managers collection
                await addDoc(collection(db, 'managers'), { name, phone, email, projectCode, uid, createdAt: new Date() });
                
                // Sign back in as superadmin - prevents auto logout
                await signOut(auth);
                alert(t('manager_added_success'));
                window.location.reload();
            } catch (error) {
                alert(t('error') + ': ' + error.message);
            }
        });

        window.deleteManager = async (id) => {
            if (confirm(t('confirm_delete'))) {
                await deleteDoc(doc(db, 'managers', id));
                loadManagers();
            }
        }

        // Reports
        async function loadReports() {
            const bondsSnapshot = await getDocs(collection(db, 'bonds'));
            const projectsSnapshot = await getDocs(collection(db, 'projects'));
            
            let totalBonds = 0, totalIncome = 0, totalExpense = 0;
            const projectStats = {};
            
            projectsSnapshot.forEach(doc => {
                projectStats[doc.id] = { name: doc.data().name, bonds: 0, income: 0, expense: 0 };
            });
            
            bondsSnapshot.forEach(doc => {
                const data = doc.data();
                totalBonds++;
                if (data.type === 'income') totalIncome += data.amount || 0;
                if (data.type === 'expense') totalExpense += data.amount || 0;
                
                if (projectStats[data.projectCode]) {
                    projectStats[data.projectCode].bonds++;
                    if (data.type === 'income') projectStats[data.projectCode].income += data.amount || 0;
                    if (data.type === 'expense') projectStats[data.projectCode].expense += data.amount || 0;
                }
            });
            
            document.getElementById('totalBonds').textContent = totalBonds;
            document.getElementById('totalIncome').textContent = totalIncome.toLocaleString();
            document.getElementById('totalExpense').textContent = totalExpense.toLocaleString();
            
            const tbody = document.getElementById('reportsTable');
            tbody.innerHTML = '';
            Object.values(projectStats).forEach(stat => {
                tbody.innerHTML += `
                    <tr>
                        <td class="px-6 py-4 font-semibold">${stat.name}</td>
                        <td class="px-6 py-4">${stat.bonds}</td>
                        <td class="px-6 py-4 text-green-600">${stat.income.toLocaleString()}</td>
                        <td class="px-6 py-4 text-red-600">${stat.expense.toLocaleString()}</td>
                    </tr>
                `;
            });
        }
    </script>
</body>
</html>
