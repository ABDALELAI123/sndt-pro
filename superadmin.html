<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="superadminPanel">لوحة السوبر أدمن</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
      .hidden { display: none!important; }
      .tab-btn.active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 800; background: #eff6ff; }
    </style>

    <script type="module">
        import { t, setLanguage, applyLanguage } from './lang.js';
        window.t = t;
        window.setLanguage = setLanguage;
        window.applyLanguage = applyLanguage;
        applyLanguage();
    </script>
</head>
<body class="flex items-center justify-center p-4">

    <!-- شاشة الدخول - 3 خانات زي باقي الملفات -->
    <div id="loginScreen" class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-2xl p-8 relative">
            <button onclick="setLanguage(localStorage.getItem('language') === 'ar'? 'en' : 'ar')"
                    class="absolute top-4 left-4 text-gray-400 hover:text-gray-600 text-2xl">🌍</button>

            <div class="flex justify-center mb-6">
                <div class="w-20 h-20 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center">
                    <i class="fas fa-crown text-white text-3xl"></i>
                </div>
            </div>

            <h1 class="text-3xl font-extrabold text-center mb-2" data-i18n="superadminPanel">لوحة السوبر أدمن</h1>
            <p class="text-center text-gray-500 mb-8" data-i18n="login">تسجيل الدخول</p>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2" data-i18n="projectCode">كود المشروع</label>
                    <input id="projectCode" type="text" class="w-full border border-gray-300 p-3 rounded-xl text-center text-lg" data-i18n-placeholder="projectCode" placeholder="كود المشروع" dir="ltr">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2" data-i18n="phone">رقم الجوال</label>
                    <input id="phone" type="tel" class="w-full border border-gray-300 p-3 rounded-xl text-center text-lg" data-i18n-placeholder="phone" placeholder="رقم الجوال" dir="ltr">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2" data-i18n="password">كلمة المرور</label>
                    <input id="password" type="password" class="w-full border border-gray-300 p-3 rounded-xl text-center text-lg" data-i18n-placeholder="password" placeholder="كلمة المرور">
                </div>
                <button id="loginBtn" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white p-4 rounded-xl font-bold text-lg hover:opacity-90 transition mt-6" data-i18n="loginBtn">تسجيل الدخول</button>
            </div>
        </div>
    </div>

    <!-- لوحة التحكم -->
    <div id="dashboard" class="hidden w-full max-w-7xl mx-auto">
        <div class="bg-white rounded-2xl shadow-2xl p-6 mb-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="w-14 h-14 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center">
                        <i class="fas fa-crown text-white text-2xl"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-extrabold" data-i18n="superadminDashboard">لوحة تحكم السوبر أدمن</h1>
                        <p class="text-sm text-gray-500" data-i18n="manageAllProjects">إدارة كل المشاريع</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="setLanguage(localStorage.getItem('language') === 'ar'? 'en' : 'ar')" class="bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded-xl font-bold transition">🌍</button>
                    <button id="logoutBtn" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-xl font-bold transition" data-i18n="logout">
                        <i class="fas fa-sign-out-alt ml-2"></i>خروج
                    </button>
                </div>
            </div>
        </div>

        <!-- تبويبات -->
        <div class="bg-white rounded-2xl shadow-2xl mb-4 overflow-hidden">
            <div class="flex border-b overflow-x-auto">
                <button data-tab="projects" class="tab-btn px-6 py-4 font-bold border-b-4 border-blue-600 bg-blue-50 text-blue-600 active">
                    <i class="fas fa-building ml-2"></i><span data-i18n="projects">المشاريع</span>
                </button>
                <button data-tab="stats" class="tab-btn px-6 py-4 font-bold text-gray-600 hover:bg-gray-50 transition">
                    <i class="fas fa-chart-pie ml-2"></i><span data-i18n="statistics">الإحصائيات</span>
                </button>
            </div>
        </div>

        <!-- تبويب المشاريع -->
        <div id="projectsTab" class="tab-content bg-white rounded-2xl shadow-2xl p-6">
            <h2 class="text-xl font-extrabold mb-4 flex items-center gap-2">
                <i class="fas fa-building text-blue-600"></i><span data-i18n="projectsManagement">إدارة المشاريع</span>
            </h2>
            <div class="grid md:grid-cols-4 gap-3 mb-6">
                <input id="projectName" data-i18n-placeholder="projectName" placeholder="اسم المشروع" class="border border-gray-300 p-3 rounded-xl focus:border-blue-500 outline-none">
                <input id="newProjectCode" data-i18n-placeholder="projectCode" placeholder="كود المشروع" class="border border-gray-300 p-3 rounded-xl focus:border-blue-500 outline-none" dir="ltr">
                <input id="projectPhone" data-i18n-placeholder="phone" placeholder="جوال المدير" class="border border-gray-300 p-3 rounded-xl focus:border-blue-500 outline-none" dir="ltr">
                <button id="addProjectBtn" class="bg-gradient-to-r from-green-500 to-emerald-600 text-white px-6 py-3 rounded-xl font-bold hover:opacity-90 transition">
                    <i class="fas fa-plus ml-2"></i><span data-i18n="add">إضافة</span>
                </button>
            </div>
            <div id="projectsList" class="space-y-2"></div>
        </div>

        <!-- تبويب الإحصائيات -->
        <div id="statsTab" class="tab-content hidden bg-white rounded-2xl shadow-2xl p-6">
            <h2 class="text-xl font-extrabold mb-6 flex items-center gap-2">
                <i class="fas fa-chart-pie text-blue-600"></i><span data-i18n="globalStats">الإحصائيات العامة</span>
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="bg-gradient-to-br from-blue-500 to-blue-600 text-white p-6 rounded-xl">
                    <i class="fas fa-building text-3xl mb-2"></i>
                    <p class="text-sm opacity-80" data-i18n="totalProjects">إجمالي المشاريع</p>
                    <p class="text-3xl font-extrabold" id="totalProjects">0</p>
                </div>
                <div class="bg-gradient-to-br from-green-500 to-green-600 text-white p-6 rounded-xl">
                    <i class="fas fa-users text-3xl mb-2"></i>
                    <p class="text-sm opacity-80" data-i18n="totalManagers">إجمالي المدراء</p>
                    <p class="text-3xl font-extrabold" id="totalManagers">0</p>
                </div>
                <div class="bg-gradient-to-br from-purple-500 to-purple-600 text-white p-6 rounded-xl">
                    <i class="fas fa-user-tie text-3xl mb-2"></i>
                    <p class="text-sm opacity-80" data-i18n="totalDelegates">إجمالي المناديب</p>
                    <p class="text-3xl font-extrabold" id="totalDelegates">0</p>
                </div>
                <div class="bg-gradient-to-br from-pink-500 to-rose-600 text-white p-6 rounded-xl">
                    <i class="fas fa-file-invoice text-3xl mb-2"></i>
                    <p class="text-sm opacity-80" data-i18n="totalBonds">إجمالي السندات</p>
                    <p class="text-3xl font-extrabold" id="totalBonds">0</p>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, serverTimestamp, getDocs, query, where } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    // 🔥 ضع Firebase Config حقك هنا
    const firebaseConfig = {
        apiKey: "ضع_هنا",
        authDomain: "ضع_هنا",
        projectId: "ضع_هنا",
        storageBucket: "ضع_هنا",
        messagingSenderId: "ضع_هنا",
        appId: "ضع_هنا"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // بيانات السوبر أدمن الثابتة
    const SUPER_ADMIN = {
        projectCode: "001122334455",
        phone: "0597087767",
        password: "500600"
    };

    let allProjects = [];

    // تسجيل الدخول - 3 خانات
    document.getElementById('loginBtn').onclick = async () => {
        const projectCode = document.getElementById('projectCode').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!projectCode ||!phone ||!password) {
            Swal.fire('خطأ', t('fillAllFields'), 'error');
            return;
        }

        // تحقق من بيانات السوبر أدمن
        if (projectCode === SUPER_ADMIN.projectCode && 
            phone === SUPER_ADMIN.phone && 
            password === SUPER_ADMIN.password) {
            
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.body.classList.remove('flex', 'items-center', 'justify-center');
            document.body.classList.add('p-4');
            loadAllData();
        } else {
            Swal.fire('خطأ', t('invalidLogin'), 'error');
        }
    };

    document.getElementById('logoutBtn').onclick = () => location.reload();

    // التبويبات
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.onclick = () => {
            const tab = btn.dataset.tab;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('active', 'border-blue-600', 'bg-blue-50', 'text-blue-600');
                b.classList.add('text-gray-600');
            });
            document.getElementById(tab + 'Tab').classList.remove('hidden');
            btn.classList.add('active', 'border-blue-600', 'bg-blue-50', 'text-blue-600');
            btn.classList.remove('text-gray-600');
        };
    });

    // تحميل البيانات
    function loadAllData() {
        onSnapshot(collection(db, 'projects'), (snapshot) => {
            allProjects = snapshot.docs.map(doc => ({ id: doc.id,...doc.data() }));
            renderProjects();
            updateStats();
        });
    }

    // إضافة مشروع جديد + إنشاء مدير تلقائي
    document.getElementById('addProjectBtn').onclick = async () => {
        const name = document.getElementById('projectName').value.trim();
        const code = document.getElementById('newProjectCode').value.trim();
        const phone = document.getElementById('projectPhone').value.trim();

        if (!name ||!code ||!phone) return Swal.fire('تنبيه', t('fillAllFields'), 'warning');

        try {
            // 1. أضف المشروع
            await addDoc(collection(db, 'projects'), {
                name, code, phone,
                createdAt: serverTimestamp()
            });

            // 2. أنشئ مدير عام للمشروع تلقائي
            await addDoc(collection(db, 'managers'), {
                name: `مدير ${name}`,
                phone: phone,
                password: '123456', // باسورد افتراضي، المدير يغيره بعدين
                role: 'admin',
                projectCode: code,
                createdAt: serverTimestamp()
            });

            document.getElementById('projectName').value = '';
            document.getElementById('newProjectCode').value = '';
            document.getElementById('projectPhone').value = '';
            Swal.fire('تم', t('addedSuccess') + ' - باسورد المدير الافتراضي: 123456', 'success');
        } catch (error) {
            Swal.fire('خطأ', t('addError'), 'error');
        }
    };

    // حذف
    async function deleteProject(id) {
        const result = await Swal.fire({
            title: t('confirmDelete'),
            text: t('deleteWarning'),
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: t('yesDelete'),
            cancelButtonText: t('cancel')
        });

        if (result.isConfirmed) {
            await deleteDoc(doc(db, 'projects', id));
            Swal.fire('تم', t('deletedSuccess'), 'success');
        }
    }
    window.deleteProject = deleteProject;

    // عرض المشاريع
    function renderProjects() {
        document.getElementById('projectsList').innerHTML = allProjects.map(p => `
            <div class="border border-gray-200 p-4 rounded-xl flex justify-between items-center hover:bg-gray-50 transition">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center">
                        <i class="fas fa-building text-blue-600"></i>
                    </div>
                    <div>
                        <b class="text-lg">${p.name}</b>
                        <p class="text-sm text-gray-500">${p.code} - ${p.phone}</p>
                    </div>
                </div>
                <button onclick="deleteProject('${p.id}')" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg transition">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
        `).join('') || `<p class="text-gray-400 text-center py-8">${t('noProjects')}</p>`;
    }

    // الإحصائيات
    async function updateStats() {
        document.getElementById('totalProjects').textContent = allProjects.length;
        
        const managersSnap = await getDocs(collection(db, 'managers'));
        document.getElementById('totalManagers').textContent = managersSnap.size;
        
        const delegatesSnap = await getDocs(collection(db, 'delegates'));
        document.getElementById('totalDelegates').textContent = delegatesSnap.size;
        
        const bondsSnap = await getDocs(collection(db, 'bonds'));
        document.getElementById('totalBonds').textContent = bondsSnap.size;
    }
</script>

</body>
</html>
