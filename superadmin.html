<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>السندات الذكية - المدير العام</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .hidden { display: none!important; }
        .tab-btn.active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 800; background: #eff6ff; }
        .project-logo { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; border: 2px solid white; }
        @media print {.no-print { display: none!important; }}
    </style>
</head>
<body class="bg-gray-50">
    <!-- الهيدر العلوي -->
    <div class="bg-gradient-to-r from-blue-600 to-purple-600 text-white p-4 shadow-lg no-print">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                    <span class="text-2xl">👑</span>
                </div>
                <div>
                    <h1 class="text-2xl font-extrabold">السندات الذكية</h1>
                    <p class="text-sm opacity-90">الإدارة العامة | <span id="currentUser"></span> | <span class="bg-white/20 px-2 py-1 rounded">مدير عام</span></p>
                </div>
            </div>
            <button id="logoutBtn" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg font-bold transition text-sm">خروج</button>
        </div>
    </div>

    <!-- تبويبات المدير العام -->
    <div class="bg-white shadow-md border-b no-print">
        <div class="flex overflow-x-auto">
            <button onclick="showTab('dashboard')" class="tab-btn px-8 py-4 active">الرئيسية</button>
            <button onclick="showTab('projects')" class="tab-btn px-8 py-4">المشاريع</button>
            <button onclick="showTab('managers')" class="tab-btn px-8 py-4">المدراء</button>
        </div>
    </div>

    <div class="p-6">
        <!-- لوحة التحكم -->
        <div id="dashboard" class="tab-content">
            <h2 class="text-3xl font-extrabold mb-6 text-gray-800">لوحة التحكم</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-5">
                <div class="bg-white p-6 rounded-xl shadow-lg border-r-4 border-blue-500"><p class="text-gray-500 text-sm">إجمالي المشاريع</p><p id="totalProjects" class="text-4xl font-extrabold text-gray-800 mt-2">0</p></div>
                <div class="bg-white p-6 rounded-xl shadow-lg border-r-4 border-green-500"><p class="text-gray-500 text-sm">المشاريع النشطة</p><p id="activeProjects" class="text-4xl font-extrabold text-gray-800 mt-2">0</p></div>
                <div class="bg-white p-6 rounded-xl shadow-lg border-r-4 border-yellow-500"><p class="text-gray-500 text-sm">إجمالي المدراء</p><p id="totalManagers" class="text-4xl font-extrabold text-gray-800 mt-2">0</p></div>
                <div class="bg-white p-6 rounded-xl shadow-lg border-r-4 border-purple-500"><p class="text-gray-500 text-sm">إجمالي المستخدمين</p><p id="totalUsers" class="text-4xl font-extrabold text-gray-800 mt-2">0</p></div>
            </div>
        </div>

        <!-- صفحة المشاريع -->
        <div id="projects" class="tab-content hidden">
            <div class="bg-white p-8 rounded-xl shadow-lg">
                <div class="flex justify-between items-center mb-6 flex-wrap gap-3">
                    <h2 class="text-3xl font-extrabold text-gray-800">المشاريع</h2>
                    <div class="flex gap-2">
                        <button onclick="exportTableToExcel('projectsTable','المشاريع')" class="bg-green-600 hover:bg-green-700 text-white px-5 py-3 rounded-xl font-bold transition">📊 اكسل</button>
                        <button id="createProjectBtn" class="bg-gradient-to-r from-blue-600 to-purple-600 text-white px-6 py-3 rounded-xl font-bold hover:opacity-90 transition">+ إنشاء مشروع</button>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full" id="projectsTable">
                        <thead class="bg-gray-50"><tr>
                            <th class="p-4 text-right font-bold">الشعار</th><th class="p-4 text-right font-bold">كود المشروع</th>
                            <th class="p-4 text-right font-bold">اسم الشركة</th><th class="p-4 text-right font-bold">جوال المدير</th>
                            <th class="p-4 text-right font-bold">الحالة</th><th class="p-4 text-right font-bold no-print">تحكم</th>
                        </tr></thead>
                        <tbody id="projectsTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- صفحة المدراء -->
        <div id="managers" class="tab-content hidden">
            <div class="bg-white p-8 rounded-xl shadow-lg">
                <div class="flex justify-between items-center mb-6 flex-wrap gap-3">
                    <h2 class="text-3xl font-extrabold">كل المدراء</h2>
                    <button onclick="exportTableToExcel('managersTable','المدراء')" class="bg-green-600 hover:bg-green-700 text-white px-5 py-3 rounded-xl font-bold transition">📊 اكسل</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full" id="managersTable">
                        <thead class="bg-gray-50"><tr>
                            <th class="p-4 text-right font-bold">المشروع</th>
                            <th class="p-4 text-right font-bold">الاسم</th>
                            <th class="p-4 text-right font-bold">الجوال</th>
                            <th class="p-4 text-right font-bold">الحالة</th>
                            <th class="p-4 text-right font-bold no-print">تحكم</th>
                        </tr></thead>
                        <tbody id="managersTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { db, SUPERADMIN } from './firebase.js';
    import { ref, get, set, update, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // حماية الصفحة
    const role = localStorage.getItem('role');
    const phone = localStorage.getItem('phone');
    if (role !== 'superadmin' || phone !== SUPERADMIN.phone) {
        window.location.href = 'index.html';
    }

    document.getElementById('currentUser').textContent = SUPERADMIN.name;
    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('createProjectBtn').addEventListener('click', createProject);

    loadDashboard();
    loadAllProjects();
    loadAllManagers();
    showTab('dashboard');

    function showTab(tabName) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabName).classList.remove('hidden');
        event.target.classList.add('active');
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'index.html';
    }

    function loadDashboard() {
        onValue(ref(db, 'projects'), (snap) => {
            let total = 0, active = 0, managers = 0, users = 0;
            if (snap.exists()) {
                Object.entries(snap.val()).forEach(([code, project]) => {
                    total++;
                    if (project.info.active) active++;
                    if (project.users) {
                        Object.values(project.users).forEach(u => {
                            users++;
                            if (u.role === 'manager') managers++;
                        });
                    }
                });
            }
            document.getElementById('totalProjects').textContent = total;
            document.getElementById('activeProjects').textContent = active;
            document.getElementById('totalManagers').textContent = managers;
            document.getElementById('totalUsers').textContent = users;
        });
    }

    function loadAllProjects() {
        onValue(ref(db, 'projects'), (snap) => {
            const tbody = document.getElementById('projectsTableBody');
            tbody.innerHTML = '';
            if (snap.exists()) {
                Object.entries(snap.val()).forEach(([code, project]) => {
                    tbody.innerHTML += `
                        <tr class="border-b hover:bg-gray-50">
                            <td class="p-4"><img src="${project.info.logo || ''}" class="w-10 h-10 rounded object-cover"></td>
                            <td class="p-4 font-bold">${code}</td>
                            <td class="p-4">${project.info.companyName || '-'}</td>
                            <td class="p-4">${project.info.managerPhone || '-'}</td>
                            <td class="p-4">${project.info.active ? '<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm">نشط</span>' : '<span class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-sm">موقوف</span>'}</td>
                            <td class="p-4 no-print">
                                <button onclick="toggleProject('${code}', ${!project.info.active})" class="text-blue-600 hover:underline">${project.info.active ? 'إيقاف' : 'تفعيل'}</button>
                            </td>
                        </tr>`;
                });
            }
        });
    }

    function loadAllManagers() {
        onValue(ref(db, 'projects'), (snap) => {
            const tbody = document.getElementById('managersTableBody');
            tbody.innerHTML = '';
            if (snap.exists()) {
                Object.entries(snap.val()).forEach(([code, project]) => {
                    if (project.users) {
                        Object.values(project.users).forEach(user => {
                            if (user.role === 'manager') {
                                tbody.innerHTML += `
                                    <tr class="border-b hover:bg-gray-50">
                                        <td class="p-4">${project.info.companyName}</td>
                                        <td class="p-4">${user.name}</td>
                                        <td class="p-4">${user.phone}</td>
                                        <td class="p-4">${user.active ? '<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm">نشط</span>' : '<span class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-sm">موقوف</span>'}</td>
                                        <td class="p-4 no-print">
                                            <button onclick="toggleUser('${code}','${user.phone}', ${!user.active})" class="text-blue-600 hover:underline">${user.active ? 'إيقاف' : 'تفعيل'}</button>
                                        </td>
                                    </tr>`;
                            }
                        });
                    }
                });
            }
        });
    }

    async function createProject() {
        const { value: formValues } = await Swal.fire({
            title: 'إنشاء مشروع جديد',
            html: `
                <input id="swal-code" class="swal2-input" placeholder="كود المشروع">
                <input id="swal-name" class="swal2-input" placeholder="اسم الشركة">
                <input id="swal-phone" class="swal2-input" placeholder="جوال المدير">
                <input id="swal-pass" type="password" class="swal2-input" placeholder="كلمة سر المدير">`,
            focusConfirm: false,
            preConfirm: () => ({
                code: document.getElementById('swal-code').value,
                name: document.getElementById('swal-name').value,
                phone: document.getElementById('swal-phone').value,
                pass: document.getElementById('swal-pass').value
            })
        });
        if (!formValues || !formValues.code || !formValues.name || !formValues.phone || !formValues.pass) return;
        
        await set(ref(db, `projects/${formValues.code}/info`), {
            code: formValues.code,
            companyName: formValues.name,
            managerPhone: formValues.phone,
            active: true,
            createdAt: Date.now()
        });
        await set(ref(db, `projects/${formValues.code}/users/${formValues.phone}`), {
            name: 'مدير المشروع',
            phone: formValues.phone,
            password: formValues.pass,
            role: 'manager',
            active: true
        });
        Swal.fire('تم', 'انشئ المشروع بنجاح', 'success');
    }

    function toggleProject(code, status) {
        update(ref(db, `projects/${code}/info`), { active: status });
    }

    function toggleUser(code, phone, status) {
        update(ref(db, `projects/${code}/users/${phone}`), { active: status });
    }

    function exportTableToExcel(tableId, filename) {
        const wb = XLSX.utils.table_to_book(document.getElementById(tableId));
        XLSX.writeFile(wb, `${filename}.xlsx`);
    }

    window.showTab = showTab;
    window.toggleProject = toggleProject;
    window.toggleUser = toggleUser;
    window.createProject = createProject;
    window.exportTableToExcel = exportTableToExcel;
</script>
</body>
</html>
