<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المندوب - سندات برو</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .hidden { display: none!important; }
        .tab-btn.active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 800; background: #eff6ff; }
        .badge { font-size: 10px; padding: 2px 8px; border-radius: 6px; font-weight: 700; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-4px); }
        textarea { resize: none; overflow: hidden; }
    </style>
</head>
<body class="p-4">
    <div id="loadingScreen" class="w-full max-w-md mx-auto mt-20">
        <div class="bg-white rounded-2xl shadow-2xl p-8 text-center">
            <i class="fas fa-spinner fa-spin text-4xl text-blue-600 mb-4"></i>
            <p class="text-lg font-bold">جاري التحقق من الصلاحيات...</p>
        </div>
    </div>

    <div id="delegateDashboard" class="hidden w-full max-w-5xl mx-auto">
        <div class="bg-white/90 backdrop-blur rounded-2xl shadow-xl p-4 mb-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-gradient-to-br from-purple-500 to-blue-600 rounded-xl flex items-center justify-center">
                    <i class="fas fa-user-tie text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-extrabold">مرحبا يا <span id="delegateName"></span></h1>
                    <p class="text-sm text-gray-500" id="projectName"></p>
                    <span id="limitInfo" class="badge bg-yellow-100 text-yellow-800"></span>
                </div>
            </div>
            <button id="logoutBtn" class="bg-red-500 hover:bg-red-600 text-white px-5 py-2 rounded-xl font-bold transition">
                <i class="fas fa-sign-out-alt ml-2"></i> خروج
            </button>
        </div>
        <!-- إحصائيات المندوب -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white/90 backdrop-blur rounded-2xl shadow-xl p-5 card-hover">
                <p class="text-gray-500 text-sm">سندات اليوم</p>
                <p id="todayBonds" class="text-3xl font-extrabold text-blue-600">0</p>
            </div>
            <div class="bg-white/90 backdrop-blur rounded-2xl shadow-xl p-5 card-hover">
                <p class="text-gray-500 text-sm">إجمالي سنداتي</p>
                <p id="totalBonds" class="text-3xl font-extrabold text-green-600">0</p>
            </div>
            <div class="bg-white/90 backdrop-blur rounded-2xl shadow-xl p-5 card-hover">
                <p class="text-gray-500 text-sm">إجمالي القبض</p>
                <p id="totalIncome" class="text-3xl font-extrabold text-emerald-600">0</p>
            </div>
            <div class="bg-white/90 backdrop-blur rounded-2xl shadow-xl p-5 card-hover">
                <p class="text-gray-500 text-sm">إجمالي الصرف</p>
                <p id="totalExpense" class="text-3xl font-extrabold text-red-600">0</p>
            </div>
        </div>

        <!-- التبويبات -->
        <div class="bg-white/90 backdrop-blur rounded-2xl shadow-xl mb-6">
            <div class="flex border-b overflow-x-auto" id="tabsContainer">
                <button data-tab="createBond" id="tab-createBond" class="tab-btn px-6 py-4 font-bold border-b-4 border-blue-600 text-blue-600 bg-blue-50 active">
                    <i class="fas fa-plus-circle ml-2"></i>إنشاء سند
                </button>
                <button data-tab="myBonds" id="tab-myBonds" class="tab-btn px-6 py-4 font-bold text-gray-600 hover:bg-gray-50">
                    <i class="fas fa-list ml-2"></i>سنداتي
                </button>
            </div>
        </div>
        <!-- محتوى تبويب إنشاء سند -->
        <div id="createBondTab" class="tab-content bg-white/90 backdrop-blur rounded-2xl shadow-xl p-6">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fas fa-plus-circle text-blue-600"></i>إنشاء سند جديد</h2>
            <form id="bondForm" class="space-y-4">
                <div class="grid md:grid-cols-2 gap-4">
                    <div id="field-amount" class="hidden">
                        <label class="block text-sm font-bold mb-2">المبلغ <span class="text-red-500">*</span></label>
                        <input id="bondAmount" type="number" step="0.01" class="w-full border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none" dir="ltr">
                    </div>
                    <div id="field-from" class="hidden">
                        <label class="block text-sm font-bold mb-2">من <span class="text-red-500">*</span></label>
                        <input id="bondFrom" type="text" class="w-full border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none">
                    </div>
                    <div id="field-to" class="hidden">
                        <label class="block text-sm font-bold mb-2">إلى <span class="text-red-500">*</span></label>
                        <input id="bondTo" type="text" class="w-full border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none">
                    </div>
                    <div id="field-reason" class="hidden">
                        <label class="block text-sm font-bold mb-2">مقابل</label>
                        <input id="bondReason" type="text" class="w-full border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none">
                    </div>
                </div>
                <div class="grid md:grid-cols-2 gap-4">
                    <div id="field-paymentMethod" class="hidden">
                        <label class="block text-sm font-bold mb-2">طريقة الدفع <span class="text-red-500">*</span></label>
                        <select id="bondPaymentMethod" class="w-full border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none"></select>
                    </div>
                    <div id="field-cashbox" class="hidden">
                        <label class="block text-sm font-bold mb-2">الصندوق</label>
                        <select id="bondCashbox" class="w-full border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none"></select>
                    </div>
                </div>
                <div id="field-notes" class="hidden">
                    <label class="block text-sm font-bold mb-2">ملاحظات</label>
                    <textarea id="bondNotes" rows="3" class="w-full border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none"></textarea>
                </div>
                <div id="docUploadDiv" class="hidden">
                    <label class="block text-sm font-bold mb-2">إرفاق مستند للصرف <span class="text-red-500">*</span></label>
                    <input id="bondDoc" type="file" accept="image/*,.pdf" class="w-full border-2 border-gray-200 p-3 rounded-xl">
                </div>
                <button type="submit" id="createBondBtn" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white p-4 rounded-xl font-bold text-lg hover:opacity-90 transition">
                    <i class="fas fa-save ml-2"></i>حفظ السند
                </button>
            </form>
        </div>
       <!-- محتوى تبويب سنداتي -->
        <div id="myBondsTab" class="tab-content hidden bg-white/90 backdrop-blur rounded-2xl shadow-xl p-6">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fas fa-list text-blue-600"></i>سنداتي</h2>
            <div class="mb-4 flex gap-2">
                <input id="searchMyBonds" type="text" placeholder="بحث بالرقم أو الاسم..." class="border-2 border-gray-200 p-3 rounded-xl flex-1 focus:border-blue-500 outline-none">
                <select id="filterMyBondsType" class="border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none">
                    <option value="">كل الأنواع</option>
                </select>
            </div>
            <div id="myBondsList" class="space-y-3"></div>
        </div>
    </div> <!-- قفلنا delegateDashboard -->

    <!-- مودال عرض السند -->
    <div id="bondModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-extrabold">عرض السند</h2>
                    <button onclick="closeBondModal()" class="text-gray-500 hover:text-red-500 text-3xl">&times;</button>
                </div>
                <div id="bondPrintArea"></div>
                <div class="flex gap-2 mt-4">
                    <button id="printBtn" class="flex-1 bg-blue-600 text-white p-3 rounded-xl font-bold"><i class="fas fa-print ml-2"></i>طباعة</button>
                    <button id="pdfBtn" class="flex-1 bg-red-600 text-white p-3 rounded-xl font-bold"><i class="fas fa-file-pdf ml-2"></i>PDF</button>
                    <button id="whatsappBtn" class="flex-1 bg-green-600 text-white p-3 rounded-xl font-bold"><i class="fab fa-whatsapp ml-2"></i>واتساب</button>
                </div>
            </div>
        </div>
    </div>
    <script type="module">
    import { auth, db, storage } from './firebase.js?v=999';
    import { getCurrentUserData, logout } from './auth.js?v=999';
    import { showSuccess, showError, formatDate, formatMoney, tafqeet } from './core.js?v=999';
    import { collection, addDoc, serverTimestamp, query, where, onSnapshot, orderBy, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
    import { ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    let currentUser = null, projectSettings = null, delegateLimits = null, bondTypes = [], paymentMethods = [], cashboxes = [], allMyBonds = [];
    
    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html?logout=true'; return; }
        currentUser = await getCurrentUserData();
        if (!currentUser || currentUser.role !== 'delegate') { await logout(); return; }
        
        document.getElementById('delegateName').textContent = currentUser.name;
        document.getElementById('loadingScreen').classList.add('hidden');
        document.getElementById('delegateDashboard').classList.remove('hidden');
        
        loadProjectSettings();
        loadDelegateLimits();
        loadBonds();
        initTabs();
    });

    async function loadProjectSettings() {
        // تحميل إعدادات المشروع + الحقول الظاهرة
    }
    
    async function loadDelegateLimits() {
        // تحميل قيود المندوب وعرضها
        const info = document.getElementById('limitInfo');
        if(delegateLimits) { info.textContent = `حد يومي: ${delegateLimits.dailyCount || '∞'}`; info.classList.remove('hidden'); }
    }

    function initTabs() {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab + 'Tab').classList.remove('hidden');
            };
        });
    }
        async function loadBonds() {
        const q = query(collection(db, 'bonds'), where('delegateId', '==', currentUser.id), orderBy('createdAt', 'desc'));
        onSnapshot(q, (snap) => {
            allMyBonds = snap.docs.map(d => ({id: d.id,...d.data()}));
            renderStats();
            renderMyBonds();
        });
    }

    function renderStats() {
        const today = new Date().toISOString().split('T')[0];
        const todayBonds = allMyBonds.filter(b => b.createdAt?.toDate?.().toISOString().split('T')[0] === today).length;
        const income = allMyBonds.filter(b => b.type === 'قبض').reduce((sum, b) => sum + (b.amount || 0), 0);
        const expense = allMyBonds.filter(b => b.type === 'صرف').reduce((sum, b) => sum + (b.amount || 0), 0);

        document.getElementById('todayBonds').textContent = todayBonds;
        document.getElementById('totalBonds').textContent = allMyBonds.length;
        document.getElementById('totalIncome').textContent = formatMoney(income);
        document.getElementById('totalExpense').textContent = formatMoney(expense);
    }

    function renderMyBonds() {
        const list = document.getElementById('myBondsList');
        if(allMyBonds.length === 0) { list.innerHTML = '<p class="text-center text-gray-500 p-8">لا توجد سندات بعد</p>'; return; }
        list.innerHTML = allMyBonds.map(b => `
            <div class="border-2 border-gray-200 rounded-xl p-4 hover:border-blue-400 transition cursor-pointer" onclick="showBond('${b.id}')">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="font-bold">${b.type} #${b.number}</p>
                        <p class="text-sm text-gray-500">${formatDate(b.createdAt)} - ${b.from || b.to}</p>
                    </div>
                    <p class="text-xl font-extrabold ${b.type === 'قبض'? 'text-green-600' : 'text-red-600'}">${formatMoney(b.amount)}</p>
                </div>
            </div>
        `).join('');
    }

    function closeBondModal() { document.getElementById('bondModal').classList.add('hidden'); }
    window.closeBondModal = closeBondModal;

    document.getElementById('logoutBtn').onclick = logout;
    document.getElementById('bondForm').onsubmit = async (e) => { e.preventDefault(); /* منطق الحفظ */ showSuccess('تم حفظ السند'); };
</script>
</body>
</html>
