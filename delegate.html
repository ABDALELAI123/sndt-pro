<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المندوب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style> body { font-family: 'Cairo', sans-serif; } </style>
    <script type="module">
        import { t, setLanguage, applyLanguage } from './lang.js';
        window.t = t; window.setLanguage = setLanguage; window.applyLanguage = applyLanguage;
        applyLanguage();
    </script>
</head>
<body class="bg-gradient-to-br from-blue-500 to-indigo-600 min-h-screen p-4">

<div class="max-w-4xl mx-auto">
    <div class="bg-white rounded-2xl shadow-xl p-6 mb-6 flex justify-between items-center">
        <button onclick="logout()" class="bg-red-500 text-white px-6 py-2 rounded-xl font-bold">خروج</button>
        <div class="text-right">
            <h1 class="text-2xl font-extrabold">لوحة تحكم المندوب</h1>
            <p class="text-gray-500" id="delegateInfo">مشروع: | المندوب: </p>
        </div>
        <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center">
            <i class="fas fa-user text-white text-2xl"></i>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-xl p-8">
        <div class="flex justify-between items-center mb-6">
            <button onclick="addBond()" class="bg-blue-500 text-white px-6 py-3 rounded-xl font-bold">
                <i class="fas fa-plus"></i> إضافة سند جديد
            </button>
            <h2 class="text-xl font-bold"><i class="fas fa-file-invoice text-blue-500"></i> سنداتي</h2>
        </div>
        <div id="bondsList" class="space-y-3"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, query, where, getDocs, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBvEU1Cmt1IX4h0xaCd6McaOMufvGqr2fY",
      authDomain: "sanadat-pro.firebaseapp.com",
      databaseURL: "https://sanadat-pro-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "sanadat-pro",
      storageBucket: "sanadat-pro.firebasestorage.app",
      messagingSenderId: "1039476751095",
      appId: "1:1039476751095:web:f2a7744d6469385e7771f2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const delegateData = JSON.parse(localStorage.getItem('delegateData') || '{}');

    if(!delegateData.projectCode || localStorage.getItem('userRole') !== 'delegate') {
        location.href = './index.html';
    }
    
    document.getElementById('delegateInfo').textContent = `مشروع: ${delegateData.projectCode} | المندوب: ${delegateData.name}`;

    async function loadBonds() {
        const q = query(collection(db, 'bonds'), 
            where('projectCode', '==', delegateData.projectCode),
            where('delegatePhone', '==', delegateData.phone)
        );
        const snap = await getDocs(q);
        const list = document.getElementById('bondsList');
        list.innerHTML = '';
        
        if(snap.empty) {
            list.innerHTML = '<p class="text-center text-gray-500 py-8">لا توجد سندات حالياً</p>';
            return;
        }

        snap.forEach(doc => {
            const b = doc.data();
            list.innerHTML += `
                <div class="border border-gray-200 p-4 rounded-xl">
                    <div class="flex justify-between items-start mb-2">
                        <span class="bg-green-100 text-green-800 px-3 py-1 rounded-lg text-sm">${b.amount} ريال</span>
                        <p class="font-bold text-lg">${b.customerName}</p>
                    </div>
                    <p class="text-gray-600 text-sm text-right">التاريخ: ${b.date || 'غير محدد'}</p>
                    <p class="text-gray-600 text-sm text-right">ملاحظات: ${b.notes || 'لا يوجد'}</p>
                </div>`;
        });
    }

    window.addBond = async () => {
        const { value: form } = await Swal.fire({
            title: 'إضافة سند جديد',
            html: `<input id="swal-customer" class="swal2-input" placeholder="اسم العميل">
                   <input id="swal-amount" type="number" class="swal2-input" placeholder="المبلغ">
                   <input id="swal-date" type="date" class="swal2-input">
                   <textarea id="swal-notes" class="swal2-textarea" placeholder="ملاحظات"></textarea>`,
            confirmButtonText: 'حفظ السند',
            showCancelButton: true, cancelButtonText: 'إلغاء',
            preConfirm: () => {
                const customerName = document.getElementById('swal-customer').value;
                const amount = document.getElementById('swal-amount').value;
                const date = document.getElementById('swal-date').value;
                const notes = document.getElementById('swal-notes').value;
                if (!customerName || !amount) Swal.showValidationMessage('اسم العميل والمبلغ مطلوب');
                return { customerName, amount, date, notes }
            }
        });
        if (form) {
            await addDoc(collection(db, 'bonds'), {
                ...form,
                projectCode: delegateData.projectCode,
                delegatePhone: delegateData.phone,
                delegateName: delegateData.name,
                createdAt: serverTimestamp()
            });
            Swal.fire('تم', 'تم إضافة السند بنجاح', 'success');
            loadBonds();
        }
    }

    window.logout = () => { localStorage.clear(); location.href = './index.html'; }
    loadBonds();
</script>
</body>
</html>
