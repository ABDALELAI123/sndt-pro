أ<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض السند</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen p-4">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-8 mt-10">
        <div id="loading" class="text-center py-10">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
            <p class="mt-4 text-gray-600 text-lg">جاري تحميل بيانات السند...</p>
        </div>
        
        <div id="receiptData" class="hidden">
            <div class="text-center mb-8 pb-6 border-b-2 border-gray-200">
                <i class="fas fa-file-invoice text-blue-600 text-5xl mb-3"></i>
                <h1 class="text-3xl font-extrabold text-blue-600">سند <span id="bondType"></span></h1>
                <p class="text-gray-500 mt-2">مشروع: <span id="projectCode" class="font-bold"></span></p>
            </div>
            
            <div class="space-y-4 text-lg">
                <div class="flex justify-between p-4 bg-gray-50 rounded-xl">
                    <span class="text-gray-600">رقم السند:</span>
                    <span class="font-bold" id="bondNumber">---</span>
                </div>
                <div class="flex justify-between p-4 bg-gray-50 rounded-xl">
                    <span class="text-gray-600">اسم العميل:</span>
                    <span class="font-bold" id="customerName">---</span>
                </div>
                <div class="flex justify-between p-4 bg-green-50 rounded-xl">
                    <span class="text-gray-600">المبلغ:</span>
                    <span class="font-bold text-green-600 text-2xl"><span id="amount"></span> ريال</span>
                </div>
                <div class="flex justify-between p-4 bg-gray-50 rounded-xl">
                    <span class="text-gray-600">التاريخ:</span>
                    <span class="font-bold" id="bondDate">---</span>
                </div>
                <div class="flex justify-between p-4 bg-gray-50 rounded-xl">
                    <span class="text-gray-600">المندوب:</span>
                    <span class="font-bold" id="delegateName">---</span>
                </div>
                <div class="flex justify-between items-center p-4 bg-gray-50 rounded-xl">
                    <span class="text-gray-600">حالة السند:</span>
                    <span class="font-bold px-4 py-2 rounded-full text-sm" id="status">---</span>
                </div>
                <div class="p-4 bg-gray-50 rounded-xl">
                    <p class="text-gray-600 mb-2">ملاحظات:</p>
                    <p class="font-bold" id="notes">لا يوجد</p>
                </div>
            </div>
            
            <div class="mt-8 pt-6 border-t-2 text-center text-sm text-gray-500">
                <p><i class="fas fa-sync-alt text-blue-500"></i> يتم تحديث حالة السند تلقائياً</p>
                <p class="mt-1">آخر تحديث: <span id="lastUpdate"></span></p>
            </div>
        </div>
        
        <div id="error" class="hidden text-center py-10">
            <i class="fas fa-exclamation-triangle text-red-500 text-5xl mb-4"></i>
            <p class="text-red-600 text-xl font-bold">السند غير موجود أو الرابط خاطئ</p>
            <p class="text-gray-500 mt-2">تأكد من صحة الرابط أو تواصل مع المندوب</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, doc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
          apiKey: "AIzaSyBvEU1Cmt1IX4h0xaCd6McaOMufvGqr2fY",
          authDomain: "sanadat-pro.firebaseapp.com",
          projectId: "sanadat-pro",
          storageBucket: "sanadat-pro.firebasestorage.app",
          messagingSenderId: "1039476751095",
          appId: "1:1039476751095:web:f2a7744d6469385e7771f2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const bondId = urlParams.get('id');
        const projectCode = urlParams.get('project');

        console.log('Bond ID:', bondId, 'Project:', projectCode);

        if (!bondId || !projectCode) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error').classList.remove('hidden');
        } else {
            const docRef = doc(db, 'bonds', bondId);
            
            // onSnapshot = تحديث لحظي لو المدير غير الحالة
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists() && docSnap.data().projectCode === projectCode) {
                    const data = docSnap.data();
                    console.log('بيانات السند:', data);
                    
                    document.getElementById('bondType').textContent = data.bondType || 'قبض';
                    document.getElementById('projectCode').textContent = data.projectCode;
                    document.getElementById('bondNumber').textContent = data.bondNumber || '---';
                    document.getElementById('customerName').textContent = data.customerName;
                    document.getElementById('amount').textContent = data.amount.toLocaleString();
                    document.getElementById('bondDate').textContent = data.date;
                    document.getElementById('delegateName').textContent = data.delegateName;
                    document.getElementById('notes').textContent = data.notes || 'لا يوجد';
                    
                    const statusEl = document.getElementById('status');
                    const status = data.status || 'غير مورد';
                    statusEl.textContent = status;
                    if (status === 'مورد' || status === 'موثق') {
                        statusEl.className = 'font-bold px-4 py-2 rounded-full text-sm bg-green-100 text-green-800';
                    } else {
                        statusEl.className = 'font-bold px-4 py-2 rounded-full text-sm bg-yellow-100 text-yellow-800';
                    }
                    
                    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('ar-SA');
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('receiptData').classList.remove('hidden');
                    document.getElementById('error').classList.add('hidden');
                } else {
                    console.error('السند غير موجود أو المشروع غلط');
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('error').classList.remove('hidden');
                }
            }, (error) => {
                console.error('خطأ في جلب البيانات:', error);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error').classList.remove('hidden');
            });
        }
    </script>
</body>
</html>
