<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض سند</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, doc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        import { firebaseConfig } from './firebase-config.js';

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // جيب id و projectCode من الرابط
        const params = new URLSearchParams(window.location.search);
        const receiptId = params.get('id');
        const projectCode = params.get('project');

        if (!receiptId || !projectCode) {
            document.getElementById('content').innerHTML = '<p class="text-red-500 text-center">رابط غير صحيح</p>';
        } else {
            // تابع السند لحظياً
            const receiptRef = doc(db, `projects/${projectCode}/receipts/${receiptId}`);
            onSnapshot(receiptRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('content').innerHTML = `
                        <div class="bg-white p-6 rounded-lg shadow-lg max-w-md mx-auto mt-10">
                            <h1 class="text-2xl font-bold text-center mb-4">سند رقم: ${data.receiptNumber || receiptId}</h1>
                            <div class="space-y-3 text-lg">
                                <p><strong>المبلغ:</strong> ${data.amount} ريال</p>
                                <p><strong>التاريخ:</strong> ${data.date?.toDate().toLocaleDateString('ar-SA') || '-'}</p>
                                <p><strong>البيان:</strong> ${data.description || '-'}</p>
                                <div class="border-t pt-3 mt-3">
                                    <p><strong>حالة التوريد:</strong> 
                                        <span class="px-3 py-1 rounded ${data.isSupplied ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">
                                            ${data.isSupplied ? 'مورد' : 'غير مورد'}
                                        </span>
                                    </p>
                                    <p class="mt-2"><strong>حالة التوثيق:</strong> 
                                        <span class="px-3 py-1 rounded ${data.isDocumented ? 'bg-blue-100 text-blue-700' : 'bg-gray-100 text-gray-700'}">
                                            ${data.isDocumented ? 'موثق' : 'غير موثق'}
                                        </span>
                                    </p>
                                </div>
                            <button onclick="window.print()" class="w-full mt-6 bg-gray-800 text-white py-2 rounded hover:bg-black">
                                طباعة السند
                            </button>
                        </div>
                    `;
                } else {
                    document.getElementById('content').innerHTML = '<p class="text-red-500 text-center">السند غير موجود</p>';
                }
            });
        }
    </script>
    <style>
        @media print {
            button { display: none; }
        }
    </style>
</head>
<body class="bg-gray-100">
    <div id="content" class="p-4">
        <p class="text-center text-gray-500">جاري تحميل بيانات السند...</p>
    </div>
</body>
</html>
