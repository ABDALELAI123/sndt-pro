<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم السوبر ادمن - سندات برو</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
       .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
       .switch input { opacity: 0; width: 0; height: 0; }
       .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition:.4s; border-radius: 28px; }
       .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition:.4s; border-radius: 50%; }
        input:checked +.slider { background-color: #2563eb; }
        input:checked +.slider:before { transform: translateX(22px); }
    </style>
</head>
<body class="bg-gray-100">

    <div class="container mx-auto p-4 md:p-8">
        <div class="bg-white p-6 rounded-xl shadow-lg mb-8">
            <div class="flex justify-between items-center">
                <h1 class="text-3xl font-bold text-blue-600">لوحة تحكم السوبر ادمن</h1>
                <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600">تسجيل خروج</button>
            </div>
        </div>

        <!-- تبويبات -->
        <div class="mb-6">
            <div class="flex gap-2 border-b">
                <button class="tab-btn px-6 py-3 font-bold border-b-2 border-blue-600 text-blue-600" data-tab="projects">المشاريع</button>
                <button class="tab-btn px-6 py-3 font-bold text-gray-500" data-tab="users">المستخدمين</button>
            </div>
        </div>

        <!-- تبويب المشاريع -->
        <div id="projectsTab" class="tab-content">
            <div class="bg-white p-6 rounded-xl shadow-lg mb-6">
                <h2 class="text-2xl font-bold mb-4">إنشاء مشروع جديد</h2>
                <form id="createProjectForm" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block font-bold mb-2">اسم المشروع</label>
                            <input type="text" id="projectName" class="w-full p-3 border rounded-lg" required>
                        </div>
                        <div>
                            <label class="block font-bold mb-2">كود المشروع</label>
                            <div class="flex gap-2">
                                <input type="text" id="projectCode" class="w-full p-3 border rounded-lg" required>
                                <button type="button" id="generateCodeBtn" class="bg-gray-500 text-white px-4 rounded-lg">توليد</button>
                            </div>
                        </div>
                        <div>
                            <label class="block font-bold mb-2">رقم بداية السندات</label>
                            <input type="number" id="bondStartNumber" class="w-full p-3 border rounded-lg" value="1" min="1" required>
                        </div>
                        <div>
                            <label class="block font-bold mb-2">بادئة السند (اختياري)</label>
                            <input type="text" id="bondPrefix" class="w-full p-3 border rounded-lg" placeholder="مثال: INV-">
                        </div>
                    </div>

                    <div class="border-t pt-4">
                        <h3 class="font-bold text-lg mb-3">ميزات المشروع</h3>
                        <div id="featuresContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <!-- الميزات تنضاف هنا بالجافاسكربت -->
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700">إنشاء المشروع</button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-lg">
                <h2 class="text-2xl font-bold mb-4">كل المشاريع</h2>
                <div id="projectsList" class="space-y-3">
                    <p class="text-gray-500">جاري التحميل...</p>
                </div>
            </div>
        </div>

        <!-- تبويب المستخدمين -->
        <div id="usersTab" class="tab-content hidden">
            <div class="bg-white p-6 rounded-xl shadow-lg mb-6">
                <h2 class="text-2xl font-bold mb-4">إضافة مستخدم جديد</h2>
                <form id="createUserForm" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block font-bold mb-2">اختر المشروع</label>
                            <select id="userProjectCode" class="w-full p-3 border rounded-lg" required>
                                <option value="">-- اختر مشروع --</option>
                            </select>
                        </div>
                        <div>
                            <label class="block font-bold mb-2">الاسم</label>
                            <input type="text" id="userName" class="w-full p-3 border rounded-lg" required>
                        </div>
                        <div>
                            <label class="block font-bold mb-2">رقم الجوال</label>
                            <input type="text" id="userPhone" class="w-full p-3 border rounded-lg" placeholder="05xxxxxxxx" required>
                        </div>
                        <div>
                            <label class="block font-bold mb-2">كلمة المرور</label>
                            <input type="text" id="userPassword" class="w-full p-3 border rounded-lg" required>
                        </div>
                        <div>
                            <label class="block font-bold mb-2">الصلاحية</label>
                            <select id="userRole" class="w-full p-3 border rounded-lg" required>
                                <option value="manager">مدير مشروع</option>
                                <option value="delegate">مندوب</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-green-600 text-white p-3 rounded-lg font-bold hover:bg-green-700">إضافة المستخدم</button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-lg">
                <h2 class="text-2xl font-bold mb-4">كل المستخدمين</h2>
                <div id="usersList" class="space-y-3">
                    <p class="text-gray-500">جاري التحميل...</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase.js';
        import { DEFAULT_FEATURES, FEATURE_LABELS } from './features.js';
        import { generateProjectCode, isValidSaudiPhone } from './utils.js';
        import { showSuccess, showError, requireAuth, logout } from './core.js';
        import { getCurrentUserData, isSuperAdmin, createUser } from './auth.js';
        import { collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // 1. تشييك انه سوبر ادمن
        requireAuth();
        const userData = await getCurrentUserData();
        if (!userData || userData.role!== 'superadmin') {
            window.location.href = 'index.html';
        }

        // 2. تسجيل خروج
        document.getElementById('logoutBtn').onclick = logout;

        // 3. التبويبات
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => {
                    b.classList.remove('border-blue-600', 'text-blue-600');
                    b.classList.add('text-gray-500');
                });
                btn.classList.add('border-blue-600', 'text-blue-600');
                btn.classList.remove('text-gray-500');

                document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                document.getElementById(btn.dataset.tab + 'Tab').classList.remove('hidden');
            };
        });

        // 4. عرض الميزات كسويتشات
        const featuresContainer = document.getElementById('featuresContainer');
        Object.keys(DEFAULT_FEATURES).forEach(key => {
            const label = FEATURE_LABELS[key].ar;
            const checked = DEFAULT_FEATURES[key]? 'checked' : '';
            featuresContainer.innerHTML += `
                <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                    <span class="font-bold">${label}</span>
                    <label class="switch">
                        <input type="checkbox" data-feature="${key}" ${checked}>
                        <span class="slider"></span>
                    </label>
                </div>
            `;
        });

        // 5. توليد كود مشروع
        document.getElementById('generateCodeBtn').onclick = () => {
            document.getElementById('projectCode').value = generateProjectCode();
        };

        // 6. إنشاء مشروع
        document.getElementById('createProjectForm').onsubmit = async (e) => {
            e.preventDefault();
            const projectName = document.getElementById('projectName').value;
            const projectCode = document.getElementById('projectCode').value.toUpperCase();
            const bondStartNumber = parseInt(document.getElementById('bondStartNumber').value);
            const bondPrefix = document.getElementById('bondPrefix').value;

            // جمع الميزات المفعلة
            const features = {};
            document.querySelectorAll('#featuresContainer input[type="checkbox"]').forEach(input => {
                features[input.dataset.feature] = input.checked;
            });

            try {
                await addDoc(collection(db, 'projects'), {
                    name: projectName,
                    code: projectCode,
                    bondStartNumber: bondStartNumber,
                    bondPrefix: bondPrefix,
                    bondNumberLength: 6,
                    features: features,
                    createdAt: new Date(),
                    createdBy: userData.uid
                });
                showSuccess('تم إنشاء المشروع بنجاح');
                e.target.reset();
                loadProjects();
            } catch (error) {
                showError('فشل إنشاء المشروع: ' + error.message);
            }
        };

        // 7. تحميل المشاريع
        async function loadProjects() {
            const projectsList = document.getElementById('projectsList');
            const userProjectCode = document.getElementById('userProjectCode');
            const q = query(collection(db, 'projects'), orderBy('createdAt', 'desc'));
            const snapshot = await getDocs(q);

            projectsList.innerHTML = '';
            userProjectCode.innerHTML = '<option value="">-- اختر مشروع --</option>';

            snapshot.forEach(doc => {
                const project = doc.data();
                projectsList.innerHTML += `
                    <div class="p-4 border rounded-lg bg-gray-50">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-bold text-lg">${project.name}</h3>
                                <p class="text-gray-600">الكود: ${project.code}</p>
                                <p class="text-gray-600">بداية السند: ${project.bondPrefix || ''}${project.bondStartNumber}</p>
                            </div>
                            <span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm">${Object.values(project.features).filter(Boolean).length} ميزات</span>
                        </div>
                    </div>
                `;
                userProjectCode.innerHTML += `<option value="${project.code}">${project.name} - ${project.code}</option>`;
            });
        }

        // 8. إضافة مستخدم
        document.getElementById('createUserForm').onsubmit = async (e) => {
            e.preventDefault();
            const projectCode = document.getElementById('userProjectCode').value;
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            const password = document.getElementById('userPassword').value;
            const role = document.getElementById('userRole').value;

            if (!isValidSaudiPhone(phone)) {
                showError('رقم الجوال غير صحيح. لازم يبدأ بـ 05');
                return;
            }

            try {
                await createUser(projectCode, phone, password, role, name);
                showSuccess('تم إضافة المستخدم بنجاح');
                e.target.reset();
                loadUsers();
            } catch (error) {
                showError(error.message);
            }
        };

        // 9. تحميل المستخدمين
        async function loadUsers() {
            const usersList = document.getElementById('usersList');
            const q = query(collection(db, 'users'), orderBy('createdAt', 'desc'));
            const snapshot = await getDocs(q);

            usersList.innerHTML = '';
            snapshot.forEach(doc => {
                const user = doc.data();
                if (user.role === 'superadmin') return;

                const roleLabel = user.role === 'manager'? 'مدير' : 'مندوب';
                const roleColor = user.role === 'manager'? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800';

                usersList.innerHTML += `
                    <div class="p-4 border rounded-lg bg-gray-50">
                        <div class="flex justify-between items-center">
                            <div>
                                <h3 class="font-bold">${user.name}</h3>
                                <p class="text-gray-600">${user.phone} | مشروع: ${user.projectCode}</p>
                            </div>
                            <span class="${roleColor} px-3 py-1 rounded-full text-sm font-bold">${roleLabel}</span>
                        </div>
                    </div>
                `;
            });
        }

        // تحميل البيانات أول مرة
        loadProjects();
        loadUsers();
    </script>
</body>
</html>
