<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>السندات - سندات برو</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        @media print {.no-print { display: none; } }
      .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body class="bg-gray-100">

    <div class="container mx-auto p-4 md:p-8">
        <!-- هذي تظهر لو الرابط فيه id سند واحد للعميل -->
        <div id="singleBondView" class="hidden">
            <div class="bg-white rounded-2xl shadow-2xl max-w-3xl mx-auto">
                <div id="publicBondArea" class="p-8"></div>
                <div class="p-4 border-t flex gap-2 no-print">
                    <button id="publicPrintBtn" class="flex-1 bg-blue-600 text-white p-3 rounded-lg">طباعة PDF</button>
                    <button id="publicShareBtn" class="flex-1 bg-green-600 text-white p-3 rounded-lg">مشاركة واتساب</button>
                </div>
            </div>
        </div>

        <!-- هذي لوحة التحكم للمدير والسوبر -->
        <div id="dashboardView" class="hidden">
            <!-- الهيدر -->
            <div class="bg-white p-6 rounded-xl shadow-lg mb-6 no-print">
                <div class="flex justify-between items-center">
                    <div>
                        <h1 class="text-3xl font-bold text-blue-600">إدارة السندات</h1>
                        <p id="userInfo" class="text-gray-500 mt-1"></p>
                    </div>
                    <div class="flex gap-2">
                        <button id="exportExcelBtn" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">تصدير Excel</button>
                        <button id="exportPDFBtn" class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700">تصدير PDF</button>
                        <button id="backBtn" class="bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-600">رجوع</button>
                    </div>
                </div>
            </div>

            <!-- الفلاتر المتقدمة -->
            <div class="bg-white p-6 rounded-xl shadow-lg mb-6 no-print">
                <h2 class="text-xl font-bold mb-4">بحث متقدم</h2>
                <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
                    <input type="text" id="searchQuery" class="p-3 border rounded-lg" placeholder="رقم سند، اسم عميل، جوال...">
                    <select id="filterStatus" class="p-3 border rounded-lg">
                        <option value="">كل الحالات</option>
                        <option value="غير مورد">غير مورد</option>
                        <option value="مورد">مورد</option>
                        <option value="موثق">موثق</option>
                    </select>
                    <select id="filterType" class="p-3 border rounded-lg">
                        <option value="">كل الأنواع</option>
                        <option value="قبض">سند قبض</option>
                        <option value="صرف">سند صرف</option>
                    </select>
                    <input type="date" id="dateFrom" class="p-3 border rounded-lg">
                    <input type="date" id="dateTo" class="p-3 border rounded-lg">
                </div>
            </div>

            <!-- جدول السندات -->
            <div class="bg-white p-6 rounded-xl shadow-lg">
                <div id="bondsTableContainer" class="overflow-x-auto">
                    <p class="text-center text-gray-500 p-8">جاري التحميل...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- نافذة عرض السند للمدير -->
    <div id="adminBondModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl max-w-3xl w-full max-h- overflow-y-auto">
            <div id="adminBondArea" class="p-8"></div>
            <div class="p-4 border-t flex gap-2 no-print">
                <button id="verifyBtn" class="flex-1 bg-green-600 text-white p-3 rounded-lg">توثيق السند</button>
                <button id="submitBtn" class="flex-1 bg-blue-600 text-white p-3 rounded-lg">توريد السند</button>
                <button onclick="document.getElementById('adminBondModal').classList.add('hidden')" class="px-6 bg-gray-500 text-white rounded-lg">إغلاق</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase.js';
        import { getCurrentUserData } from './auth.js';
        import { formatMoney, formatDate, showSuccess, showError } from './core.js';
        import { toArabicNumbers } from './utils.js';
        import { collection, query, where, getDocs, orderBy, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const urlParams = new URLSearchParams(window.location.search);
        const bondId = urlParams.get('id');
        const projectCode = urlParams.get('project');

        // 1. لو الرابط فيه id = عرض سند واحد للعميل
        if (bondId && projectCode) {
            document.getElementById('singleBondView').classList.remove('hidden');
            loadPublicBond(bondId, projectCode);
        } else {
            // 2. لوحة تحكم المدير/السوبر
            document.getElementById('dashboardView').classList.remove('hidden');
            await initDashboard();
        }

        // عرض سند للعميل عبر QR
        async function loadPublicBond(id, project) {
            const bondDoc = await getDoc(doc(db, 'bonds', id));
            if (!bondDoc.exists() || bondDoc.data().projectCode!== project) {
                document.getElementById('publicBondArea').innerHTML = '<p class="text-center text-red-500 text-xl">السند غير موجود</p>';
                return;
            }

            const b = bondDoc.data();
            const projectDoc = await getDoc(doc(db, 'projects', project));
            const projectName = projectDoc.exists()? projectDoc.data().name : project;

            const statusColor = b.status === 'مورد'? 'text-green-600' : b.status === 'موثق'? 'text-blue-600' : 'text-yellow-600';
            const effectText = b.accountingEffect === 'إيجابي'? 'غير مورد' : 'غير موثق';

            document.getElementById('publicBondArea').innerHTML = `
                <div class="text-center mb-6">
                    <h2 class="text-3xl font-bold">${projectName}</h2>
                    <p class="text-gray-600 text-lg">سند ${b.bondType}</p>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-6 text-lg">
                    <div><strong>رقم السند:</strong> ${b.bondNumber}</div>
                    <div><strong>التاريخ:</strong> ${b.bondDate}</div>
                    <div><strong>المبلغ:</strong> ${formatMoney(b.amount)}</div>
                    <div><strong>نوع الدفع:</strong> ${b.paymentType}</div>
                    <div><strong>العميل:</strong> ${b.clientName || '-'}</div>
                    <div><strong>الصندوق:</strong> ${b.fundName || '-'}</div>
                </div>
                <div class="mb-6 text-lg"><strong>المبلغ كتابة:</strong> ${toArabicNumbers(b.amount)} ريال سعودي فقط</div>
                <div class="mb-6 text-xl">
                    <strong>الحالة:</strong>
                    <span class="font-bold ${statusColor}">${b.status}</span>
                    <span class="text-sm text-gray-500">(${effectText})</span>
                </div>
                ${b.notes? `<div class="mb-6"><strong>ملاحظات:</strong> ${b.notes}</div>` : ''}
                <div class="flex justify-between items-center mt-8 pt-6 border-t">
                    <div><strong>المحاسب:</strong> ${b.accountantName || '-'}</div>
                    <div id="publicQR"></div>
                </div>
            `;

            new QRCode(document.getElementById('publicQR'), {
                text: window.location.href,
                width: 120,
                height: 120
            });

            // أزرار العميل
            document.getElementById('publicPrintBtn').onclick = () => {
                html2pdf().from(document.getElementById('publicBondArea')).save(`سند-${b.bondNumber}.pdf`);
            };

            document.getElementById('publicShareBtn').onclick = () => {
                const text = `*سند ${b.bondType} - ${projectName}*\nرقم: ${b.bondNumber}\nالمبلغ: ${formatMoney(b.amount)}\nالتاريخ: ${b.bondDate}\nالحالة: ${b.status}\n\n${window.location.href}`;
                window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
            };
        }

        // لوحة تحكم المدير
        async function initDashboard() {
            const userData = await getCurrentUserData();
            if (!userData || (userData.role!== 'manager' && userData.role!== 'superadmin')) {
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('userInfo').textContent = `${userData.name} | ${userData.role === 'superadmin'? 'سوبر ادمن' : 'مدير مشروع: ' + userData.projectCode}`;
            document.getElementById('backBtn').onclick = () => {
                window.location.href = userData.role === 'superadmin'? 'super-admin.html' : 'manager.html';
            };

            window.currentUser = userData;
            await loadBondsTable();

            // فلاتر
            ['searchQuery', 'filterStatus', 'filterType', 'dateFrom', 'dateTo'].forEach(id => {
                document.getElementById(id).onchange = loadBondsTable;
            });
            document.getElementById('searchQuery').oninput = loadBondsTable;
        }

        async function loadBondsTable() {
            const userData = window.currentUser;
            let q = query(collection(db, 'bonds'), orderBy('createdAt', 'desc'));

            // المدير يشوف مشروعه بس، السوبر يشوف الكل
            if (userData.role === 'manager') {
                q = query(q, where('projectCode', '==', userData.projectCode));
            }

            const snap = await getDocs(q);
            let bonds = snap.docs.map(d => ({ id: d.id,...d.data() }));

            // فلترة
            const search = document.getElementById('searchQuery').value.toLowerCase();
            const status = document.getElementById('filterStatus').value;
            const type = document.getElementById('filterType').value;
            const dateFrom = document.getElementById('dateFrom').value;
            const dateTo = document.getElementById('dateTo').value;

            if (search) bonds = bonds.filter(b =>
                b.bondNumber.toLowerCase().includes(search) ||
                b.clientName?.toLowerCase().includes(search) ||
                b.clientPhone?.includes(search) ||
                b.createdByName?.toLowerCase().includes(search)
            );
            if (status) bonds = bonds.filter(b => b.status === status);
            if (type) bonds = bonds.filter(b => b.bondType === type);
            if (dateFrom) bonds = bonds.filter(b => b.bondDate >= dateFrom);
            if (dateTo) bonds = bonds.filter(b => b.bondDate <= dateTo);

            window.filteredBonds = bonds;

            // عرض الجدول
            const container = document.getElementById('bondsTableContainer');
            if (bonds.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 p-8">لا توجد سندات</p>';
                return;
            }

            container.innerHTML = `
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="p-3 text-right">رقم السند</th>
                            <th class="p-3 text-right">المبلغ</th>
                            <th class="p-3 text-right">النوع</th>
                            <th class="p-3 text-right">العميل</th>
                            <th class="p-3 text-right">المندوب</th>
                            <th class="p-3 text-right">التاريخ</th>
                            <th class="p-3 text-right">الحالة</th>
                            <th class="p-3 text-right">إجراءات</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${bonds.map(b => `
                            <tr class="border-b hover:bg-gray-50">
                                <td class="p-3 font-bold">${b.bondNumber}</td>
                                <td class="p-3">${formatMoney(b.amount)}</td>
                                <td class="p-3">${b.bondType}</td>
                                <td class="p-3">${b.clientName || '-'}</td>
                                <td class="p-3">${b.createdByName}</td>
                                <td class="p-3">${b.bondDate}</td>
                                <td class="p-3">
                                    <span class="px-2 py-1 rounded text-xs ${b.status === 'مورد'? 'bg-green-100 text-green-800' : b.status === 'موثق'? 'bg-blue-100 text-blue-800' : 'bg-yellow-100 text-yellow-800'}">
                                        <span class="status-dot ${b.status === 'مورد'? 'bg-green-500' : b.status === 'موثق'? 'bg-blue-500' : 'bg-yellow-500'}"></span>
                                        ${b.status}
                                    </span>
                                </td>
                                <td class="p-3">
                                    <button onclick="viewAdminBond('${b.id}')" class="text-blue-600 hover:underline text-sm">عرض/تعديل</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        // عرض سند للمدير مع أزرار توثيق/توريد
        window.viewAdminBond = async (id) => {
            const bondDoc = await getDoc(doc(db, 'bonds', id));
            const b = bondDoc.data();

            document.getElementById('adminBondArea').innerHTML = `
                <div class="text-center mb-6">
                    <h2 class="text-2xl font-bold">سند ${b.bondType}</h2>
                    <p class="text-gray-600">${b.bondNumber}</p>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div><strong>المبلغ:</strong> ${formatMoney(b.amount)}</div>
                    <div><strong>التاريخ:</strong> ${b.bondDate}</div>
                    <div><strong>العميل:</strong> ${b.clientName || '-'}</div>
                    <div><strong>جوال العميل:</strong> ${b.clientPhone || '-'}</div>
                    <div><strong>الصندوق:</strong> ${b.fundName || '-'}</div>
                    <div><strong>المحاسب:</strong> ${b.accountantName || '-'}</div>
                    <div><strong>المندوب:</strong> ${b.createdByName}</div>
                    <div><strong>نوع الدفع:</strong> ${b.paymentType}</div>
                </div>
                <div class="mb-4 p-4 rounded-lg ${b.status === 'مورد'? 'bg-green-50' : b.status === 'موثق'? 'bg-blue-50' : 'bg-yellow-50'}">
                    <strong>الحالة الحالية:</strong>
                    <span class="font-bold text-lg">${b.status}</span>
                    <p class="text-sm mt-1">الأثر: ${b.accountingEffect === 'إيجابي'? 'غير مورد' : 'غير موثق'}</p>
                </div>
            `;

            // أزرار التوثيق والتوريد
            const verifyBtn = document.getElementById('verifyBtn');
            const submitBtn = document.getElementById('submitBtn');

            // إخفاء الأزرار لو الحالة منتهية
            if (b.status === 'مورد' && b.accountingEffect === 'إيجابي') {
                submitBtn.classList.add('hidden');
            }
            if (b.status === 'موثق' && b.accountingEffect === 'سلبي') {
                verifyBtn.classList.add('hidden');
            }

            verifyBtn.onclick = async () => {
                await updateDoc(doc(db, 'bonds', id), { status: 'موثق' });
                showSuccess('تم توثيق السند');
                document.getElementById('adminBondModal').classList.add('hidden');
                loadBondsTable();
            };

            submitBtn.onclick = async () => {
                await updateDoc(doc(db, 'bonds', id), { status: 'مورد' });
                showSuccess('تم توريد السند');
                document.getElementById('adminBondModal').classList.add('hidden');
                loadBondsTable();
            };

            document.getElementById('adminBondModal').classList.remove('hidden');
        };

        // تصدير Excel
        document.getElementById('exportExcelBtn').onclick = () => {
            const ws = XLSX.utils.json_to_sheet(window.filteredBonds.map(b => ({
                'رقم السند': b.bondNumber,
                'المبلغ': b.amount,
                'نوع السند': b.bondType,
                'نوع الدفع': b.paymentType,
                'العميل': b.clientName,
                'جوال العميل': b.clientPhone,
                'المندوب': b.createdByName,
                'التاريخ': b.bondDate,
                'الحالة': b.status,
                'الأثر': b.accountingEffect,
                'ملاحظات': b.notes
            })));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'السندات');
            XLSX.writeFile(wb, `السندات-${Date.now()}.xlsx`);
        };

        // تصدير PDF
        document.getElementById('exportPDFBtn').onclick = () => {
            html2pdf().from(document.getElementById('bondsTableContainer')).save(`السندات-${Date.now()}.pdf`);
        };
    </script>
</body>
</html>
