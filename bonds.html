```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة المناديب - SNDT Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
        .debug-box { background: #1f2937; color: #10b981; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 11px; white-space: pre-wrap; direction: ltr; text-align: left; }
    </style>
</head>
<body class="bg-gray-100">

    <div id="auth-screen" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-xl shadow-lg w-96">
            <div class="text-center mb-6">
                <i class="fa-solid fa-user-tie text-5xl text-green-600 mb-3"></i>
                <h1 class="text-2xl font-bold">دخول المناديب</h1>
            </div>
            
            <!-- خطوة 1: ادخال الجوال -->
            <div id="phone-step">
                <input id="phone" type="tel" placeholder="رقم الجوال 05xxx" class="w-full p-3 mb-3 border rounded-lg">
                <div id="recaptcha-container" class="mb-3"></div>
                <button onclick="sendOTP()" class="w-full bg-green-600 text-white p-3 rounded-lg font-bold"><i class="fa-solid fa-paper-plane ml-2"></i>ارسال كود التحقق</button>
            </div>

            <!-- خطوة 2: ادخال الكود -->
            <div id="otp-step" class="hidden">
                <p class="text-sm text-gray-600 mb-3 text-center">ارسلنا كود لـ <span id="sent-phone"></span></p>
                <input id="otp" type="text" placeholder="ادخل كود التحقق" class="w-full p-3 mb-3 border rounded-lg text-center">
                <button onclick="verifyOTP()" class="w-full bg-green-600 text-white p-3 rounded-lg font-bold"><i class="fa-solid fa-right-to-bracket ml-2"></i>تأكيد الدخول</button>
                <button onclick="backToPhone()" class="w-full text-gray-500 p-2 text-sm mt-2">تغيير الرقم</button>
            </div>

            <p id="auth-error" class="text-red-500 text-sm mt-3 text-center"></p>
        </div>
    </div>

    <div id="delegate-screen" class="hidden p-6">
        <div class="max-w-5xl mx-auto">
            <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow">
                <div>
                    <h1 class="text-2xl font-bold"><i class="fa-solid fa-hand-wave text-yellow-500"></i> مرحبا <span id="delegate-name"></span></h1>
                    <p class="text-sm text-gray-600">الجوال: <span id="delegate-phone"></span></p>
                </div>
                <button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded-lg text-sm"><i class="fa-solid fa-power-off ml-1"></i>خروج</button>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md">
                <h3 class="text-xl font-bold mb-4"><i class="fa-solid fa-file-circle-plus text-green-600 ml-2"></i>إنشاء سند جديد</h3>
                <div class="grid grid-cols-2 gap-3">
                    <select id="bond-type" class="p-2 border rounded-lg">
                        <option value="">اختر نوع السند *</option>
                    </select>
                    <input id="bond-amount" type="number" placeholder="المبلغ *" class="p-2 border rounded-lg">
                    <input id="client-name" placeholder="اسم العميل *" class="p-2 border rounded-lg">
                    <input id="client-account" placeholder="رقم حساب العميل - اختياري" class="p-2 border rounded-lg">
                </div>
                <textarea id="bond-desc" placeholder="البيان / التفاصيل *" class="p-2 border rounded-lg w-full mt-3" rows="2"></textarea>
                <button onclick="createBond()" id="create-btn" class="w-full bg-green-600 text-white p-3 rounded-lg mt-3 font-bold"><i class="fa-solid fa-plus ml-2"></i>إنشاء السند</button>
                <p id="bond-error" class="text-red-500 text-sm mt-2 text-center font-bold"></p>
                <p id="bond-success" class="text-green-600 text-sm mt-2 text-center font-bold"></p>
            </div>
        </div>
    </div>

<!-- Firebase + App Check -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCxKr-2tej7PaBmJLXKJVudl00HnPkqH5Q",
        authDomain: "sndt-pro-v2.firebaseapp.com",
        projectId: "sndt-pro-v2",
        storageBucket: "sndt-pro-v2.firebasestorage.app",
        messagingSenderId: "255580444878",
        appId: "1:255580444878:web:80400b33c29ba0b174589f"
    };

    firebase.initializeApp(firebaseConfig);
    
    // App Check
    const appCheck = firebase.appCheck();
    appCheck.activate('6Lf75BctAAAAAJQqpSVLTVU0PKOtexfrbi6nuqeQ', true);
    
    const auth = firebase.auth();
    const db = firebase.firestore();
    let confirmationResult = null;
    let currentUser = null;

    // reCAPTCHA
    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
        'size': 'normal',
        'callback': (response) => {}
    });

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('delegate-screen').classList.remove('hidden');
            document.getElementById('delegate-phone').textContent = user.phoneNumber;
            loadUserData();
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('delegate-screen').classList.add('hidden');
        }
    });

    window.sendOTP = async () => {
        const phone = document.getElementById('phone').value;
        const errorEl = document.getElementById('auth-error');
        errorEl.textContent = '';
        
        if (!phone.startsWith('05') || phone.length !== 10) {
            errorEl.textContent = 'رقم الجوال لازم يبدأ بـ 05 ويكون 10 أرقام';
            return;
        }

        const phoneNumber = '+966' + phone.substring(1);
        
        try {
            confirmationResult = await auth.signInWithPhoneNumber(phoneNumber, window.recaptchaVerifier);
            document.getElementById('phone-step').classList.add('hidden');
            document.getElementById('otp-step').classList.remove('hidden');
            document.getElementById('sent-phone').textContent = phone;
        } catch (error) {
            errorEl.textContent = 'خطأ: ' + error.message;
            window.recaptchaVerifier.render().then(widgetId => {
                grecaptcha.reset(widgetId);
            });
        }
    };

    window.verifyOTP = async () => {
        const code = document.getElementById('otp').value;
        const errorEl = document.getElementById('auth-error');
        
        try {
            await confirmationResult.confirm(code);
        } catch (error) {
            errorEl.textContent = 'كود التحقق خطأ';
        }
    };

    window.backToPhone = () => {
        document.getElementById('otp-step').classList.add('hidden');
        document.getElementById('phone-step').classList.remove('hidden');
    };

    window.logout = () => auth.signOut();

    async function loadUserData() {
        const userDoc = await db.collection('users').doc(currentUser.uid).get();
        if (userDoc.exists) {
            const userData = userDoc.data();
            document.getElementById('delegate-name').textContent = userData.name || 'مندوب';
        }
    }

    window.createBond = async () => {
        document.getElementById('bond-error').textContent = '';
        document.getElementById('bond-success').textContent = 'تم إنشاء السند';
    };
</script>
</body>
</html>
